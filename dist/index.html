<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Control Center — 최적화 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@11.2.0/marked.min.js"></script>
<style>
  :root {
    --bg: #000000;
    --bg-soft: #0a0a0a;
    --card: rgba(255, 255, 255, 0.025);
    --card-hi: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.07);
    --border-hi: rgba(255, 255, 255, 0.14);
    --text: #f5f5f5;
    --text-mute: #a0a0a8;
    --text-dim: #6b6b72;
    --accent: #d97757;         /* Claude 시그니처 오렌지 */
    --accent-2: #c96442;
    --cyan: #7dd3fc;
    --ok: #4ade80;
    --warn: #fbbf24;
    --err: #f87171;
    --grad: linear-gradient(135deg, #d97757 0%, #c96442 100%);
    --grad-soft: linear-gradient(135deg, rgba(217,119,87,0.12), rgba(201,100,66,0.08));
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); margin: 0; height: 100%; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(55% 40% at 0% 0%, rgba(217,119,87,0.04), transparent 60%),
      radial-gradient(40% 35% at 100% 100%, rgba(255,255,255,0.02), transparent 60%);
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  ::-webkit-scrollbar-track { background: transparent; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); min-width: 0; max-width: 100%; }
  .card-hi { background: var(--card-hi); border-color: var(--border-hi); }
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 0.85rem; border-radius: 10px; font-size: 0.82rem; font-weight: 500; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: rgba(255,255,255,0.12); border-color: var(--border-hi); }
  .btn-primary { background: var(--grad); border: none; color: #0a0a0f; font-weight: 600; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: rgba(255,255,255,0.06); }
  .chip { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.7rem; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-mute); }
  .chip-accent { background: var(--grad-soft); border-color: rgba(167,139,250,0.35); color: #e9defc; }
  .chip-ok { background: rgba(74,222,128,0.15); border-color: rgba(74,222,128,0.35); color: #86efac; }
  .chip-warn { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.35); color: #fcd34d; }
  .chip-err { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.35); color: #fca5a5; }
  .divider { height: 1px; background: var(--border); margin: 0.75rem 0; }
  .nav-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.8rem; border-radius: 10px; color: var(--text-mute); font-size: 0.88rem; cursor: pointer; transition: background 0.15s, color 0.15s; user-select: none; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-item.active { background: var(--grad-soft); color: #fff; border: 1px solid rgba(167,139,250,0.35); }
  .badge-n { display: inline-block; min-width: 20px; height: 20px; line-height: 20px; text-align: center; padding: 0 6px; border-radius: 10px; font-size: 0.7rem; background: rgba(255,255,255,0.08); color: var(--text-mute); }
  .gradient-text { color: #d97757; }
  .score-ring { --p: 0; --col-a: #d97757; --col-b: #c96442; width: 180px; height: 180px; border-radius: 50%;
    background: conic-gradient(from 0deg, var(--col-a) 0deg, var(--col-b) calc(var(--p) * 3.6deg), rgba(255,255,255,0.05) calc(var(--p) * 3.6deg));
    display: grid; place-items: center; position: relative; animation: ringSpin 0.8s ease-out; }
  .score-ring::after { content: ""; position: absolute; inset: 10px; background: #0a0a0a; border-radius: 50%; }
  .score-ring > * { position: relative; z-index: 2; }
  @keyframes ringSpin { from { filter: brightness(0.6); } to { filter: brightness(1); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 1.4s infinite; display: inline-block; }
  .pulse-dot.off { background: #6b7280; animation: none; }
  .tab-enter { animation: tabFade 0.3s ease; }
  @keyframes tabFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  table.data { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  table.data th { text-align: left; font-weight: 500; color: var(--text-mute); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  table.data td { padding: 0.65rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  table.data tr:hover td { background: rgba(255,255,255,0.03); }
  .link-row { cursor: pointer; }
  .input { width: 100%; padding: 0.55rem 0.75rem; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.88rem; }
  .input:focus { outline: none; border-color: var(--accent); }
  textarea.input { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.8rem; line-height: 1.55; }
  .kbd { display: inline-block; padding: 0.1rem 0.45rem; border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; background: rgba(255,255,255,0.05); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(4px); z-index: 50; display: grid; place-items: center; padding: 24px; }
  .modal { background: #0f0f16; border: 1px solid var(--border-hi); border-radius: 18px; max-width: 1100px; width: 100%; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal-wide { max-width: 1440px; height: 90vh; max-height: 90vh; }
  .modal-wide textarea { font-size: 13px; line-height: 1.55; }
  .prose-claude { color: var(--text); font-size: 0.9rem; line-height: 1.6; }
  .prose-claude h1, .prose-claude h2, .prose-claude h3 { color: #fff; margin-top: 1em; }
  .prose-claude code { background: rgba(255,255,255,0.08); padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.85em; }
  .prose-claude pre { background: #0a0a0f; padding: 1em; border-radius: 10px; overflow-x: auto; border: 1px solid var(--border); }
  .prose-claude ul { padding-left: 1.2em; }
  .hover-lift { transition: transform 0.15s, background 0.15s; }
  .hover-lift:hover { transform: translateY(-2px); background: var(--card-hi); }
  .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.75rem; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-dim); }
  .tag-tool { display: inline-block; padding: 1px 7px; font-size: 0.68rem; border-radius: 4px; background: rgba(217,119,87,0.14); color: #f5b997; font-family: 'JetBrains Mono', monospace; margin: 1px; }
  .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.12), rgba(255,255,255,0.04)); background-size: 200% 100%; animation: shimmerMove 1.6s infinite; border-radius: 6px; }
  @keyframes shimmerMove { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .line-clamp-6 { display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; }
  body.sb-collapsed #sidebar { width: 58px; }
  body.sb-collapsed #sidebar .nav-label,
  body.sb-collapsed #sidebar .nav-desc,
  body.sb-collapsed #sidebar .brand-text,
  body.sb-collapsed #sidebar .group-label,
  body.sb-collapsed #sidebar .cli-body { display: none; }
  body.sb-collapsed #sidebar .nav-item { justify-content: center; padding: 0.55rem 0.4rem; }
  body.sb-collapsed #content { margin-left: 58px; }
  body.sb-collapsed #sidebar-foot { padding: 0.5rem; }
  body.sb-collapsed #btn-reindex span:last-child { display: none; }
  #sidebar { transition: width 0.18s ease; }
  #content { transition: margin-left 0.18s ease; }
  @media (max-width: 900px) {
    #sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 40; transform: translateX(-100%); transition: transform 0.2s; }
    #sidebar.open { transform: translateX(0); }
    #content { margin-left: 0 !important; }
  }
</style>
</head>
<body>

<aside id="sidebar" class="fixed left-0 top-0 h-screen w-[260px] border-r border-[var(--border)] bg-[var(--bg-soft)] flex flex-col z-30">
  <div class="px-3 pt-4 pb-3 flex items-center gap-2">
    <div class="w-9 h-9 rounded-[10px] grid place-items-center flex-shrink-0" style="background: #d97757;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2 L13.2 9.6 L20.8 10.8 L13.2 12 L12 19.6 L10.8 12 L3.2 10.8 L10.8 9.6 Z" fill="#000"/>
        <path d="M5.2 4.2 L7.4 9.6 L12 10.8 L7.4 12 L5.2 17.4 L3 12 L-1.6 10.8 L3 9.6 Z" fill="#000" opacity="0.55" transform="translate(2 2) rotate(30 6 10.8)"/>
      </svg>
    </div>
    <div class="brand-text flex-1 min-w-0">
      <div class="font-semibold text-[14px] truncate">Claude Control Center</div>
    </div>
    <button id="sbToggle" class="btn-ghost btn p-1.5" title="사이드바 접기/펼치기">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
  </div>
  <nav id="nav" class="flex-1 overflow-y-auto px-3 pb-3 space-y-1"></nav>
  <div id="sidebar-foot" class="border-t border-[var(--border)] p-3 space-y-2">
    <div id="cliStatus" class="text-[11px]"></div>
    <button id="btn-reindex" class="btn w-full justify-center text-[12px]">
      <span>🔄</span><span>세션 재인덱스</span>
    </button>
  </div>
</aside>

<main id="content" class="ml-[260px] min-h-screen">
  <header class="sticky top-0 z-20 backdrop-blur-xl bg-[rgba(10,10,15,0.6)] border-b border-[var(--border)] px-7 py-3 flex items-center gap-4">
    <button id="navToggle" class="btn-ghost btn" title="사이드바 토글" style="display:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="flex-1">
      <input id="globalSearch" class="input max-w-[420px]" placeholder="세션, 스킬, 에이전트, 명령어 검색…" />
    </div>
    <div class="flex items-center gap-2">
      <span id="liveStatus" class="chip chip-ok"><span class="pulse-dot"></span><span>연결됨</span></span>
      <button id="btn-refresh" class="btn-ghost btn" title="새로고침">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </div>
  </header>

  <div id="view" class="px-7 py-6" style="min-width:0; overflow-x:hidden;"></div>
</main>

<div id="toast" class="fixed bottom-6 right-6 z-[60] space-y-2"></div>
<div id="modal-root"></div>

<script>
// ────────────────────────────────────────────────────────────────
// STATE & HELPERS
// ────────────────────────────────────────────────────────────────
const state = { view: 'overview', data: {}, loading: {} };

const DOCS_BASE = 'https://docs.claude.com/en/docs/claude-code/';
const NAV = [
  { id: 'overview',    icon: '✦',  label: '개요',            group: 'main', docUrl: DOCS_BASE+'overview' },
  { id: 'projects',    icon: '📁', label: '프로젝트',          group: 'main', desc: '프로젝트별 Claude 세팅 + AI 추천', docUrl: DOCS_BASE+'memory' },
  { id: 'analytics',   icon: '📊', label: '통계 & 스코어',      group: 'main', docUrl: DOCS_BASE+'costs' },
  { id: 'sessions',    icon: '🗂️', label: '세션 히스토리',      group: 'main', docUrl: DOCS_BASE+'interactive-mode' },
  { id: 'agents',      icon: '🤝', label: '에이전트 & 그래프',  group: 'work', docUrl: DOCS_BASE+'sub-agents' },
  { id: 'projectAgents', icon: '👥', label: '프로젝트 서브 에이전트', group: 'work',
    desc: '프로젝트별 서브 에이전트 보기/추가/교체 + 16개 역할 프리셋', docUrl: DOCS_BASE+'sub-agents' },
  { id: 'skills',      icon: '✨', label: '스킬',              group: 'work', docUrl: DOCS_BASE+'skills' },
  { id: 'commands',    icon: '/',  label: '슬래시 명령어',      group: 'work', docUrl: DOCS_BASE+'slash-commands' },
  { id: 'hooks',       icon: '🪝', label: '훅',
    group: 'config', desc: '이벤트(프롬프트 전/후, 도구 사용 등) 시 자동 실행되는 쉘 훅', docUrl: DOCS_BASE+'hooks' },
  { id: 'permissions', icon: '🔐', label: '권한',
    group: 'config', desc: '허용/차단할 도구·명령 규칙. deny가 안전도를 높입니다', docUrl: DOCS_BASE+'iam' },
  { id: 'mcp',         icon: '🔗', label: 'MCP 커넥터',
    group: 'config', desc: '외부 시스템(DB·GitHub·브라우저 등)과 연결하는 MCP 서버', docUrl: DOCS_BASE+'mcp' },
  { id: 'plugins',     icon: '🔌', label: '플러그인',
    group: 'config', desc: '마켓플레이스에서 설치한 기능 팩(스킬+에이전트+명령어 묶음)', docUrl: DOCS_BASE+'plugins' },
  { id: 'settings',    icon: '⚙️', label: 'Settings 편집',
    group: 'config', desc: '~/.claude/settings.json 직접 편집 + 추천 프로파일 원클릭', docUrl: DOCS_BASE+'settings' },
  { id: 'claudemd',    icon: '📜', label: 'CLAUDE.md',
    group: 'config', desc: '모든 세션 시작 시 로드되는 글로벌 지침(기억·규칙·취향)', docUrl: DOCS_BASE+'memory' },
  { id: 'outputStyles',icon: '🎨', label: '출력 스타일',
    group: 'advanced', desc: '답변 톤/포맷을 바꾸는 output styles', docUrl: DOCS_BASE+'output-styles' },
  { id: 'statusline',  icon: '📡', label: '상태라인 / 키바인딩',
    group: 'advanced', desc: 'Claude Code 하단 상태라인, 키 바인딩', docUrl: DOCS_BASE+'statusline' },
  { id: 'plans',       icon: '🧭', label: '플랜 보관소',
    group: 'advanced', desc: 'Plan Mode 로 만든 계획 문서들', docUrl: DOCS_BASE+'plan-mode' },
  { id: 'envConfig',   icon: '🌿', label: '환경 변수',
    group: 'advanced', desc: 'ANTHROPIC_MODEL, CLAUDE_CONFIG_DIR, 프록시 등', docUrl: DOCS_BASE+'settings#environment-variables' },
  { id: 'modelConfig', icon: '🧬', label: '모델 설정',
    group: 'advanced', desc: 'settings.json 의 model / autoUpdates / cleanup 등', docUrl: DOCS_BASE+'settings' },
  { id: 'ideStatus',   icon: '💻', label: 'IDE 통합',
    group: 'advanced', desc: 'VS Code/JetBrains 연결 상태, 감지된 터미널', docUrl: DOCS_BASE+'ide-integrations' },
  { id: 'marketplaces',icon: '🏪', label: '마켓플레이스',
    group: 'advanced', desc: '플러그인 마켓 추가/삭제 (git URL)', docUrl: DOCS_BASE+'plugins' },
  { id: 'scheduled',   icon: '⏰', label: '예약된 작업',
    group: 'advanced', desc: '~/.claude/scheduled-tasks/ 정의 스킬', docUrl: DOCS_BASE+'overview' },
  { id: 'usage',       icon: '💳', label: '사용량 / 비용',
    group: 'system', desc: '최근 도구 호출 통계 + 일자별 그래프', docUrl: DOCS_BASE+'costs' },
  { id: 'metrics',     icon: '📉', label: '토큰 메트릭',
    group: 'system', desc: 'metrics/costs.jsonl 토큰 사용량 시계열', docUrl: DOCS_BASE+'monitoring-usage' },
  { id: 'memory',      icon: '🧠', label: '프로젝트 메모리',
    group: 'system', desc: '~/.claude/projects/*/memory 자동 기억', docUrl: DOCS_BASE+'memory' },
  { id: 'tasks',       icon: '✅', label: '태스크 / TODO',
    group: 'system', desc: '세션별 TaskCreate 저장소', docUrl: DOCS_BASE+'overview' },
  { id: 'backups',     icon: '💾', label: '백업 / 파일 히스토리',
    group: 'system', desc: 'backups/, file-history/, shell-snapshots/ 관측', docUrl: DOCS_BASE+'troubleshooting' },
  { id: 'bashHistory', icon: '📜', label: '셸 명령 기록',
    group: 'system', desc: 'Bash 도구 실행 히스토리 (~/.claude/bash-commands.log)', docUrl: DOCS_BASE+'settings' },
  { id: 'telemetry',   icon: '📡', label: '텔레메트리',
    group: 'system', desc: 'Claude Code 내부 이벤트 로그', docUrl: DOCS_BASE+'monitoring-usage' },
  { id: 'homunculus',  icon: '🏠', label: 'Homunculus',
    group: 'system', desc: 'Claude Code 내부 프로젝트 추적기', docUrl: DOCS_BASE+'overview' },
  { id: 'team',        icon: '👨‍👩‍👧', label: '팀 / 조직',
    group: 'system', desc: '워크스페이스 / 조직 정보 (claude.ai)', docUrl: 'https://claude.ai/settings/organization' },
  { id: 'system',      icon: '🖥️', label: '시스템 상태',       group: 'system', docUrl: DOCS_BASE+'troubleshooting' },
];
const GROUPS = [
  { id: 'main',     label: '메인' },
  { id: 'work',     label: '작업 자원' },
  { id: 'config',   label: '설정 & 구성' },
  { id: 'advanced', label: '고급 기능' },
  { id: 'system',   label: '시스템 & 관측' },
];

function viewHeader(title, subtitle, viewId) {
  const meta = NAV.find(n => n.id === viewId) || {};
  const docUrl = meta.docUrl || '';
  return `
    <div class="mb-4 flex items-start justify-between gap-3 flex-wrap">
      <div>
        <h1 class="text-2xl font-bold">${escapeHtml(title)}</h1>
        ${subtitle ? `<p class="text-sm text-[var(--text-mute)] mt-1">${subtitle}</p>` : ''}
      </div>

// 변경(POST/PUT/DELETE) 후 자동 페이지 리로드 — 디바운스로 연속 호출 합치기
let __autoReloadTimer = null;
function _scheduleAutoReload() {
  if (__autoReloadTimer) clearTimeout(__autoReloadTimer);
  __autoReloadTimer = setTimeout(() => {
    __autoReloadTimer = null;
    try { renderView && renderView(); } catch (e) { console.warn('autoReload renderView failed', e); }
  }, 250);
}
// 데이터 갱신과 무관한 엔드포인트는 자동 리로드 제외 (LLM 호출, 단순 미리보기, 외부 IO 등)
const __noReloadPaths = [
  '/api/feature/recommend', '/api/file/recommend', '/api/recommend',
  '/api/translate/batch', '/api/translate', '/api/settings/preview',
  '/api/open-folder', '/api/open-session', '/api/sessions/reindex',
  '/api/login', '/api/auth',
];
async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok && r.status !== 200) {
    let msg = r.status.toString();
    try { const j = await r.json(); if (j.error) msg = j.error; } catch {}
    throw new Error(msg);
  }
  const data = await r.json();
  const method = ((opts && opts.method) || 'GET').toUpperCase();
  if (method !== 'GET') {
    const ok = data && (data.ok === true || data.ok === undefined && !data.error);
    const skip = __noReloadPaths.some(p => path.startsWith(p));
    if (ok && !skip) _scheduleAutoReload();
  }
  return data;
}

function toast(msg, kind='info') {
  const div = document.createElement('div');
  div.className = `card px-4 py-3 text-sm flex items-center gap-2`;
  div.innerHTML = `<span>${({info:'ℹ️', ok:'✅', err:'❌', warn:'⚠️'})[kind]||'ℹ️'}</span><span>${escapeHtml(msg)}</span>`;
  document.getElementById('toast').appendChild(div);
  setTimeout(() => div.style.opacity='0', 2600);
  setTimeout(() => div.remove(), 3200);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
// JSON 객체를 HTML 속성(작은/큰따옴표 모두 안전) 으로 인코딩
function jsonAttr(obj) {
  return escapeHtml(JSON.stringify(obj));
}
function fmtMs(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function fmtRel(ms) {
  if (!ms) return '—';
  const d = Math.max(0, Math.floor((Date.now() - ms) / 1000));
  if (d < 60) return `${d}초 전`;
  if (d < 3600) return `${Math.floor(d/60)}분 전`;
  if (d < 86400) return `${Math.floor(d/3600)}시간 전`;
  return `${Math.floor(d/86400)}일 전`;
}
function fmtDur(ms) {
  if (!ms) return '—';
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}
function scoreColor(n) {
  n = Number(n) || 0;
  if (n >= 80) return '#4ade80';
  if (n >= 60) return '#a78bfa';
  if (n >= 40) return '#fbbf24';
  return '#f87171';
}

async function quickRecommend(kind) {
  if (kind === 'claudemd') return startGlobalClaudeMdRecommend();
  if (kind === 'projectAgent') return go('projectAgents');
  if (kind === 'mcp') return go('mcp');
  if (kind === 'analytics') return go('analytics');
  if (['hooks','permissions','output-styles','statusline'].includes(kind)) return startFeatureRecommend(kind);
}

async function startFeatureRecommend(kind) {
  const labelMap = { hooks:'훅', permissions:'권한', 'output-styles':'출력 스타일', statusline:'상태라인' };
  const label = labelMap[kind] || kind;
  showModalLoading(`Claude 에게 ${label} 추천 요청 중 (30~90초)…`);
  try {
    const r = await api('/api/feature/recommend', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ kind }),
    });
    if (r.error) { closeModal(); toast(r.error, 'err'); return; }
    closeModal();
    openFeatureApplyModal(kind, r);
  } catch (e) { closeModal(); toast(e.message, 'err'); }
}

function openFeatureApplyModal(kind, r) {
  const labelMap = { hooks:'훅', permissions:'권한', 'output-styles':'출력 스타일', statusline:'상태라인' };
  const label = labelMap[kind] || kind;
  const currentStr = JSON.stringify(r.current || {}, null, 2);
  const proposedStr = JSON.stringify(r.proposed || {}, null, 2);
  const cost = r.costInfo || {};
  const saveFn = async (newRawStr) => {
    let parsed; try { parsed = JSON.parse(newRawStr); }
    catch (e) { return { ok:false, error: 'JSON: '+e.message }; }
    // 병합 전략
    const s = await api('/api/settings');
    if (kind === 'hooks') {
      s.hooks = { ...(s.hooks||{}), ...(parsed.hooks || parsed) };
    } else if (kind === 'permissions') {
      const p = parsed.permissions || parsed;
      const cur = s.permissions || { allow:[], deny:[] };
      const allow = Array.from(new Set([...(cur.allow||[]), ...(p.allow||[])]));
      const deny = Array.from(new Set([...(cur.deny||[]), ...(p.deny||[])]));
      s.permissions = { ...cur, allow, deny };
    } else if (kind === 'statusline') {
      s.statusLine = parsed.statusLine || parsed;
    } else if (kind === 'output-styles') {
      // 별도 API로 저장
      const id = parsed.id || 'ai-recommended';
      const raw = parsed.raw || '';
      return api('/api/output-styles/save', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id, raw }),
      });
    }
    return api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  };
  openDiffApplyModal({
    title: `AI 추천: ${label}`,
    relpath: kind === 'output-styles' ? '~/.claude/output-styles/<name>.md' : '~/.claude/settings.json',
    reason: `비용 $${(cost.costUsd||0).toFixed(4)} · ${Math.round((cost.durationMs||0)/1000)}초. ${r.applyHint||''}`,
    cwd: '',
    currentRaw: currentStr,
    proposedRaw: proposedStr,
    badge: `🤖 ${label} AI 추천`,
    saveFn,
  });
}

AFTER.sessions = () => {
  const qInput = document.getElementById('sessQ');
  const sortInput = document.getElementById('sessSort');
  let debounce;
  qInput.addEventListener('input', e => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      state.data.sessionsFilter = { q: e.target.value, sort: sortInput.value };
      renderView();
    }, 250);
  });
  sortInput.addEventListener('change', () => {
    state.data.sessionsFilter = { q: qInput.value, sort: sortInput.value };
    renderView();
  });
};

async function openSessionDetail(sessionId) {
  showModalLoading('세션 불러오는 중…');
  try {
    const d = await api('/api/sessions/detail/' + sessionId);
    if (d.error) { closeModal(); toast(d.error, 'err'); return; }
    renderSessionDetail(d);
  } catch (e) {
    closeModal();
    toast(e.message, 'err');
  }
}
function renderSessionDetail(d) {
  const s = d.session;
  const tools = d.tools || [];
  const msgs = d.messages || [];
  const toolCounts = {};
  tools.forEach(t => { toolCounts[t.tool] = (toolCounts[t.tool]||0) + 1; });
  const breakdown = s.score_breakdown || {};
  const breakdownHtml = Object.entries(breakdown).map(([k,v]) => `
    <div class="flex justify-between py-1 text-xs">
      <span class="text-[var(--text-mute)]">${k}</span>
      <span class="mono font-bold" style="color:${scoreColor(v*4)}">+${v}</span>
    </div>`).join('');

  const toolsHtml = tools.slice(0, 120).map(t => `
    <div class="flex items-center gap-2 p-2 hover:bg-white/5 rounded">
      <span class="chip ${t.had_error?'chip-err':''}">${escapeHtml(t.tool)}</span>
      ${t.subagent_type ? `<span class="chip chip-accent">→ ${escapeHtml(t.subagent_type)}</span>` : ''}
      <span class="text-xs flex-1 truncate text-[var(--text-mute)] mono">${escapeHtml(t.input_summary || '')}</span>
      <span class="text-[10px] text-[var(--text-dim)]">${fmtMs(t.ts)}</span>
    </div>`).join('');

  const msgsHtml = msgs.slice(-40).map(m => `
    <div class="p-2 border-l-2 ${m.role==='user'?'border-[var(--cyan)]':'border-[var(--accent)]'} pl-3 mb-2">
      <div class="text-[10px] uppercase tracking-widest text-[var(--text-dim)] mb-1">${m.role} · ${fmtRel(m.ts)}</div>
      <div class="text-xs whitespace-pre-wrap line-clamp-6">${escapeHtml(m.preview||'')}</div>
    </div>`).join('');

  showModal(`
    <div class="p-6 border-b border-[var(--border)] flex items-start gap-4">
      <div class="score-ring" style="--p:${s.score}; width:110px; height:110px;">
        <div class="text-center">
          <div class="text-3xl font-bold mono" style="color:${scoreColor(s.score)}">${s.score}</div>
        </div>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-xs text-[var(--text-dim)] mono">${escapeHtml(s.session_id)}</div>
        <h2 class="text-lg font-bold mt-1 line-clamp-2">${escapeHtml(s.first_user_prompt || '(요청 없음)')}</h2>
        <div class="flex flex-wrap gap-2 mt-3">
          <span class="chip">📁 ${escapeHtml(s.project || '—')}</span>
          <span class="chip">💬 ${s.message_count}</span>
          <span class="chip">🛠 ${s.tool_use_count}</span>
          <span class="chip chip-accent">🤝 ${s.agent_call_count}</span>
          <span class="chip">⏱ ${fmtDur(s.duration_ms)}</span>
          <span class="chip">${escapeHtml(s.model||'—')}</span>
          ${s.error_count ? `<span class="chip chip-err">❌ ${s.error_count}</span>` : ''}
        </div>
      </div>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div class="flex-1 overflow-y-auto grid grid-cols-1 lg:grid-cols-3 gap-4 p-6">
      <div class="lg:col-span-1 space-y-4">
        <div>
          <div class="text-[11px] uppercase text-[var(--text-dim)] mb-2">스코어 브레이크다운</div>
          <div class="card p-3">${breakdownHtml}</div>
        </div>
        <div>
          <div class="text-[11px] uppercase text-[var(--text-dim)] mb-2">도구 카운트</div>
          <div class="card p-3">
            ${Object.entries(toolCounts).sort((a,b)=>b[1]-a[1]).map(([k,v]) =>
              `<div class="flex justify-between py-1 text-xs"><span>${escapeHtml(k)}</span><span class="mono">${v}</span></div>`
            ).join('') || '<div class="text-xs text-[var(--text-dim)]">—</div>'}
          </div>
        </div>
        <div>
          <div class="text-[11px] uppercase text-[var(--text-dim)] mb-2">서브에이전트</div>
          <div class="card p-3 text-xs">
            ${Object.entries(s.subagent_types || {}).map(([k,v]) =>
              `<span class="chip chip-accent mr-1 mb-1">${escapeHtml(k)} ×${v}</span>`
            ).join('') || '<span class="text-[var(--text-dim)]">호출 없음</span>'}
          </div>
        </div>
      </div>
      <div class="lg:col-span-2 space-y-4">
        <div>
          <div class="text-[11px] uppercase text-[var(--text-dim)] mb-2">도구 타임라인 (최대 120)</div>
          <div class="card max-h-[280px] overflow-y-auto p-1">${toolsHtml || '<div class="empty text-xs">도구 호출 없음</div>'}</div>
        </div>
        <div>
          <div class="text-[11px] uppercase text-[var(--text-dim)] mb-2">메시지 (최근 40)</div>
          <div class="card max-h-[280px] overflow-y-auto p-3">${msgsHtml || '<div class="empty text-xs">메시지 없음</div>'}</div>
        </div>
      </div>
    </div>
  `);
}

VIEWS.agents = async () => {
  const [list, graph, modelRes] = await Promise.all([
    api('/api/agents'),
    api('/api/agents/graph?days=60'),
    api('/api/subagent/model-choices'),
  ]);
  state.data.agents = list;
  state.data.agentsGraph = graph;
  window.__subModelChoices = modelRes.choices || [];
  const agents = list.agents || [];
  const counts = list.counts || {};
  const q = (state.data.agentFilter || '').toLowerCase();
  const onlyEnabled = !!state.data.agentOnlyEnabled;
  let filtered = q ? agents.filter(a => (a.name+a.description+a.id+(a.source||'')).toLowerCase().includes(q)) : agents.slice();
  if (onlyEnabled) filtered = filtered.filter(a => a.scope !== 'plugin' || a.pluginEnabled);

  const groups = { global: [], builtin: [], plugin: [] };
  filtered.forEach(a => { (groups[a.scope] || (groups[a.scope] = [])).push(a); });

  const scopeLabel = { global: '🔧 전역 (~/.claude/agents)', builtin: '⚡ 빌트인 (Claude Code)', plugin: '🔌 플러그인' };
  const scopeOrder = ['global', 'builtin', 'plugin'];

  const modelBg = (m) => ({
    inherit: 'rgba(255,255,255,0.06)',
    haiku: 'rgba(125,211,252,0.18)',
    sonnet: 'rgba(217,119,87,0.18)',
    opus: 'rgba(244,114,182,0.18)',
  })[m] || 'rgba(217,119,87,0.14)';
  const renderAgentCard = a => {
    const readOnly = a.scope === 'builtin';
    const selectorScope = a.scope;
    const displayName = a.name || a.invokeId || a.id || '(이름 없음)';
    const invoke = a.invokeId || a.id || '';
    const safeId = escapeHtml(a.id);
    const scopeBadge = (() => {
      if (a.scope === 'global')  return '<span class="chip chip-ok text-[9px]">✓ 사용자 설정</span>';
      if (a.scope === 'builtin') return '<span class="chip text-[9px]">⚡ 빌트인</span>';
      if (a.scope === 'plugin') {
        if (a.pluginEnabled) return '<span class="chip text-[9px]" style="background:rgba(217,119,87,0.12);">🔌 플러그인 제공</span>';
        return `<button class="chip chip-warn text-[9px] cursor-pointer hover:brightness-125"
                onclick="event.stopPropagation();togglePluginFromAgent('${escapeHtml(a.pluginKey||'')}', true)">비활성 플러그인 ▶ 활성화</button>`;
      }
      return '';
    })();
    const actionButtons = (() => {
      if (a.scope === 'global') {
        return `<button class="btn text-[9px]" onclick='event.stopPropagation();deleteGlobalAgent("${safeId}")' style="color:#fca5a5">삭제</button>`;
      }
      if (a.scope === 'plugin' && a.pluginEnabled) {
        return `<button class="chip text-[9px] cursor-pointer"
                onclick="event.stopPropagation();togglePluginFromAgent('${escapeHtml(a.pluginKey||'')}', false)" style="color:#fcd34d">비활성화</button>`;
      }
      return '';
    })();
    const modelControl = readOnly
      ? `<span class="chip text-[10px]" style="background:${modelBg(a.model)};">🔒 ${escapeHtml(a.model||'inherit')}</span>`
      : `<select class="input text-[10px] py-1 flex-1"
                style="background:${modelBg(a.model)};"
                onclick="event.stopPropagation();"
                onchange="event.stopPropagation();setSubagentModel('${selectorScope}','${safeId}', this.value)">
           ${(window.__subModelChoices || []).map(m => `<option value="${escapeHtml(m.id)}" ${a.model===m.id?'selected':''}>${escapeHtml(m.label)}</option>`).join('')}
         </select>`;
    return `
      <div class="card p-4 hover-lift cursor-pointer flex flex-col" onclick="viewAgent('${safeId}')">
        <!-- 1행: 이름 (최상단, 카드 전체 폭) -->
        <div class="flex items-center gap-2 mb-1">
          <div class="font-semibold text-sm truncate flex-1" title="${escapeHtml(displayName)}">${escapeHtml(displayName)}</div>
          ${scopeBadge}
          ${actionButtons}
        </div>
        <!-- 2행: 호출 id (마켓프리픽스 포함) -->
        <div class="text-[10px] mono text-[var(--text-dim)] truncate mb-2" title="${escapeHtml(a.source||a.id||'')}">${escapeHtml(invoke)}</div>
        <!-- 3행: 설명 -->
        ${a.descriptionKo
          ? `<div class="text-xs text-[var(--text)] line-clamp-2 mb-1" style="min-height:2.2em;">${escapeHtml(a.descriptionKo)}</div>
             <details class="text-[11px] text-[var(--text-dim)] mb-2" onclick="event.stopPropagation();"><summary class="cursor-pointer">원문</summary><div class="mt-1">${escapeHtml(a.description||'—')}</div></details>`
          : `<div class="text-xs text-[var(--text-mute)] line-clamp-3 mb-2" style="min-height:3.2em;">${escapeHtml(a.description || '—')}</div>`}
        <!-- 4행: 도구 -->
        <div class="mb-2 flex-1">${(a.tools||[]).slice(0,6).map(t => `<span class="tag-tool">${escapeHtml(t)}</span>`).join('')}</div>
        <!-- 5행: 모델 (별도 줄, 풀폭) -->
        <div class="flex items-center gap-2 pt-2 border-t border-[var(--border)]">
          <span class="text-[10px] text-[var(--text-dim)] whitespace-nowrap">모델</span>
          ${modelControl}
        </div>
        ${a.scope === 'plugin' && !a.pluginEnabled ? '<div class="text-[10px] text-[var(--warn)] mt-2">⚠️ 이 플러그인은 현재 비활성화 — Claude Code 에서 호출되지 않습니다. 플러그인 탭에서 토글</div>' : ''}
      </div>`;
  };

  return `
    <div class="mb-4 flex items-start justify-between gap-3 flex-wrap">
      <div>
        <h1 class="text-2xl font-bold">에이전트 & 상호작용 그래프</h1>
        <p class="text-sm text-[var(--text-mute)] mt-1"><b>활성(사용자 설정 ${counts.global||0} + 빌트인 ${counts.builtin||0}) = ${(counts.global||0)+(counts.builtin||0)}개</b> · 플러그인 제공 ${counts.pluginEnabled||0}/${counts.plugin||0} (별도)</p>
        <div class="text-xs mt-1 flex gap-2 flex-wrap">
          ${agents.filter(a=>a.descriptionKo).length === 0
            ? `<span class="chip chip-warn">⚠️ 한국어 번역 0/${agents.length} — 우측 "🌐" 버튼 클릭</span>`
            : `<span class="chip chip-ok">한글 번역 ${agents.filter(a=>a.descriptionKo).length}/${agents.length}</span>`}
          <span class="text-[10px] text-[var(--text-dim)]">💡 플러그인이 <b>비활성</b>이면 에이전트 카드는 보이지만 Claude Code에서 호출되지 않습니다.</span>
        </div>
      </div>
      <div class="flex gap-2">
        <button class="btn text-xs" onclick="openCreateAgent()">＋ 전역 에이전트</button>
        <button class="btn text-xs" onclick="translateAll('agent')">🌐 번역</button>
        <a class="btn text-xs" href="${DOCS_BASE}sub-agents" target="_blank" rel="noopener">📖</a>
      </div>
    </div>
    <div class="card p-3 mb-3 text-[11px] text-[var(--text-mute)] flex items-center gap-2">
      <span class="text-base">💡</span>
      <span>그래프 노드는 <b>클릭</b>해서 상세 · 비활성 플러그인 에이전트는 뱃지 클릭으로 즉시 활성화 · 전역 에이전트는 우측 상단 "＋" 로 추가, 카드에서 삭제</span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-5">
      <div class="card p-2 lg:col-span-2" style="height: 560px; position: relative;">
        <div class="absolute top-3 left-3 flex items-center gap-2 z-10 flex-wrap">
          <span class="chip chip-accent">🧠 Claude Core</span>
          <span class="chip">🤝 에이전트</span>
          <span class="chip">🛠 도구</span>
          <span class="text-[10px] text-[var(--text-dim)] ml-2">노드 클릭 시 상세</span>
        </div>
        <div id="agentNetwork" style="width:100%; height:100%;"></div>

      <div class="card p-4 overflow-y-auto" style="max-height: 560px;">
        <div class="text-xs uppercase text-[var(--text-dim)] mb-3">가장 많이 호출된 에이전트</div>
        ${Object.entries(aggregateAgentCalls(graph)).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([n,c]) => `
          <div class="flex justify-between py-1.5 border-b border-[var(--border)]">
            <span class="text-xs">${escapeHtml(n)}</span>
            <span class="mono text-xs font-bold gradient-text">${c}</span>
          </div>`).join('') || '<div class="empty text-xs">호출 기록 없음</div>'}
      </div>

    <div class="mb-4 flex items-center gap-2 flex-wrap">
      <input id="agentQ" class="input max-w-[280px]" placeholder="에이전트 검색…" value="${escapeHtml(q)}" />
      <label class="flex items-center gap-1 text-xs text-[var(--text-mute)]">
        <input type="checkbox" id="agentOnlyEnabled" ${state.data.agentOnlyEnabled?'checked':''}/> 활성 플러그인만
      </label>
      <span class="text-xs text-[var(--text-dim)]">${filtered.length} / ${agents.length} 표시</span>

function aggregateAgentCalls(graph) {
  const counts = {};
  (graph.edges||[]).forEach(e => {
    if (!String(e.dst).startsWith('tool:')) {
      counts[e.dst] = (counts[e.dst]||0) + e.weight;
    }
  });
  return counts;
}
function drawAgentGraph(g) {
  const container = document.getElementById('agentNetwork');
  if (!container || !window.vis) return;
  const nodes = new vis.DataSet((g.nodes||[]).map(n => ({
    id: n.id, label: n.label || n.id,
    shape: n.kind === 'core' ? 'hexagon' : (n.kind === 'tool' ? 'box' : 'dot'),
    size: n.kind === 'core' ? 34 : (n.kind === 'tool' ? 14 : 22),
    kind: n.kind,
    color: n.kind === 'core'
      ? { background: '#a78bfa', border: '#f472b6', highlight: { background: '#f472b6', border: '#fb923c' } }
      : n.kind === 'tool'
      ? { background: 'rgba(103,232,249,0.18)', border: '#67e8f9', highlight: { background: '#67e8f9', border: '#ffffff' } }
      : { background: 'rgba(244,114,182,0.14)', border: '#f472b6', highlight: { background: '#f472b6', border: '#ffffff' } },
    font: { color: '#e7e7ea', size: n.kind === 'core' ? 13 : 11 },
  })));
  const edges = new vis.DataSet((g.edges||[]).map(e => ({
    from: e.src, to: e.dst, value: e.weight,
    color: { color: 'rgba(167,139,250,0.35)', highlight: '#f472b6', opacity: 0.6 },
    arrows: 'to', smooth: { type: 'continuous' },
    title: `${e.src} → ${String(e.dst).replace(/^tool:/,'')} : ${e.weight}회`,
  })));
  const net = new vis.Network(container, { nodes, edges }, {
    physics: { enabled: true, barnesHut: { gravitationalConstant: -3500, springLength: 120, springConstant: 0.04 }, stabilization: { iterations: 250, fit: true } },
    interaction: { hover: true, selectable: true, tooltipDelay: 120, zoomView: false, dragView: true, dragNodes: true, navigationButtons: false, keyboard: false },
    edges: { scaling: { min: 1, max: 8 } },
  });
  container.style.cursor = 'pointer';
  net.once('stabilizationIterationsDone', () => {
    try { net.setOptions({ physics: { enabled: false } }); net.fit({ animation: false }); } catch {}
  });
  const nodeIdx = new Map((g.nodes||[]).map(n => [n.id, n]));
  const handleNode = (nid) => {
    const node = nodeIdx.get(nid);
    if (!node) {
      // fallback: tool:<name> prefix 만 있는 경우
      if (typeof nid === 'string' && nid.startsWith('tool:')) {
        showToolDetailModal(nid.slice(5), g);
      } else {
        viewAgent(String(nid));
      }
      return;
    }
    if (node.kind === 'tool')      showToolDetailModal(String(nid).replace(/^tool:/, ''), g);
    else if (node.kind === 'agent') viewAgent(String(nid));
    else if (node.kind === 'core')  showCoreModal(g);
  };
  net.on('click', params => {
    if (params.nodes && params.nodes.length) handleNode(params.nodes[0]);
  });
  net.on('selectNode', params => {
    if (params.nodes && params.nodes.length) handleNode(params.nodes[0]);
  });
  net.on('doubleClick', params => {
    if (params.nodes && params.nodes.length) handleNode(params.nodes[0]);
  });
}

async function translateAll(kind) {
  const label = { cmd: '명령어', skill: '스킬', plugin: '플러그인' }[kind] || kind;
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">전체 한국어 번역</div>
        <h2 class="text-lg font-bold">${label} 일괄 번역</h2>
      </div>
      <button class="btn-ghost btn" id="tbClose" onclick="__tbCancel=true;closeModal();">✕</button>
    </div>
    <div class="p-5 overflow-y-auto">
      <div id="tbStatus" class="text-sm mb-2">시작 중…</div>
      <div class="h-2 rounded-full bg-white/5 overflow-hidden mb-3"><div id="tbBar" style="height:100%; background:var(--grad); width:0%; transition: width 0.3s;"></div></div>
      <div id="tbLog" class="mono text-[10px] text-[var(--text-mute)] whitespace-pre-wrap max-h-[260px] overflow-y-auto p-2 bg-black/30 rounded"></div>
      <div class="text-[11px] text-[var(--text-dim)] mt-2">각 배치 50개씩 · Claude CLI 1회당 20~90초 · 중간에 창 닫으면 중단</div>
    </div>
  `);
  window.__tbCancel = false;
  let totalTranslated = 0;
  let batch = 0;
  const started = Date.now();
  const log = document.getElementById('tbLog');
  const logLine = (s) => { if (log) { log.textContent += s + '\n'; log.scrollTop = log.scrollHeight; } };
  try {
    while (!window.__tbCancel) {
      batch++;
      const bar = document.getElementById('tbBar');
      const st = document.getElementById('tbStatus');
      logLine(`[배치 ${batch}] Claude CLI 요청…`);
      const r = await api('/api/translate/batch', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ kind, limit: 50 }),
      });
      if (r.error) {
        logLine(`  ❌ ${r.error}`);
        if (st) st.textContent = '오류: ' + r.error;
        toast('번역 실패: ' + r.error, 'err');
        break;
      }
      totalTranslated += r.translated || 0;
      const total = r.total || 0;
      const remaining = r.remaining || 0;
      const completed = total - remaining;
      logLine(`  ✅ +${r.translated}건 (누적 ${totalTranslated}) · 남은 ${remaining} · 요청 ${r.requested}`);
      if (bar && total) bar.style.width = Math.round((completed / total) * 100) + '%';
      if (st) st.textContent = `진행 ${completed}/${total} · 배치 ${batch} · 경과 ${Math.round((Date.now()-started)/1000)}초`;
      if (r.done || r.translated === 0) break;
    }
    if (!window.__tbCancel) {
      logLine(`\n🎉 완료! ${label} ${totalTranslated}개 번역 (${batch}배치, ${Math.round((Date.now()-started)/1000)}초)`);
      toast(`${label} ${totalTranslated}개 번역 완료`, 'ok');
      setTimeout(() => { closeModal(); renderView(); }, 1500);
    }
  } catch (e) {
    logLine(`❌ ${e.message}`);
    toast('번역 중 오류: '+e.message, 'err');
  }
}

          groupIdx: existing.groupIdx, subIdx: existing.subIdx,
          op: 'update', payload,
        }),
      });
      toast(r.ok ? '플러그인 훅 저장됨' : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
      if (r.ok) closeModal();
    } else {
      await upsertHook(payload, existing);
    }
  };
}

async function upsertHook(payload, existing) {
  const s = await api('/api/settings');
  s.hooks = s.hooks || {};
  s.hooks[payload.event] = s.hooks[payload.event] || [];

  const newSubEntry = { type: payload.type, command: payload.command, timeout: payload.timeout };

  if (existing) {
    // 기존 수정
    const group = s.hooks[existing.event][existing.groupIdx];
    // 이벤트가 바뀐 경우 → 삭제 후 새로 추가
    if (existing.event !== payload.event) {
      if (existing.subIdx >= 0 && group && group.hooks) {
        group.hooks.splice(existing.subIdx, 1);
        if (!group.hooks.length) s.hooks[existing.event].splice(existing.groupIdx, 1);
      } else if (group) {
        s.hooks[existing.event].splice(existing.groupIdx, 1);
      }
      addHookEntry(s, payload, newSubEntry);
    } else {
      // 같은 이벤트 안에서 수정
      if (existing.subIdx >= 0 && group.hooks) {
        group.matcher = payload.matcher || group.matcher;
        group.hooks[existing.subIdx] = newSubEntry;
      } else {
        s.hooks[existing.event][existing.groupIdx] = payload.matcher
          ? { matcher: payload.matcher, hooks: [newSubEntry] }
          : { ...newSubEntry };
      }
    }
  } else {
    addHookEntry(s, payload, newSubEntry);
  }

  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  toast(r.ok ? '훅 저장됨' : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
  if (r.ok) { closeModal(); renderView(); }
}

function addHookEntry(s, payload, newSubEntry) {
  const list = s.hooks[payload.event];
  if (payload.matcher) {
    // matcher 일치하는 기존 그룹에 합류 or 새 그룹
    const existingGroup = list.find(g => g.matcher === payload.matcher && Array.isArray(g.hooks));
    if (existingGroup) existingGroup.hooks.push(newSubEntry);
    else list.push({ matcher: payload.matcher, hooks: [newSubEntry] });
  } else {
    list.push({ hooks: [newSubEntry] });
  }
}

async function deleteHook(payload) {
  const {scope, event, groupIdx, subIdx, pluginKey} = payload || {};
  if (scope === 'plugin') {
    if (!confirm(`플러그인 훅을 삭제하시겠습니까? (${pluginKey} → ${event}[${groupIdx}/${subIdx}])\n플러그인 업데이트 시 복원될 수 있습니다.`)) return;
    const r = await api('/api/hooks/plugin/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pluginKey, event, groupIdx, subIdx, op:'delete' }),
    });
    toast(r.ok ? '플러그인 훅 삭제됨' : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
    return;
  }
  if (!confirm('이 훅을 삭제할까요?')) return;
  const s = await api('/api/settings');
  if (!s.hooks || !s.hooks[event]) return;
  const group = s.hooks[event][groupIdx];
  if (!group) return;
  if (subIdx >= 0 && group.hooks) {
    group.hooks.splice(subIdx, 1);
    if (!group.hooks.length) s.hooks[event].splice(groupIdx, 1);
  } else {
    s.hooks[event].splice(groupIdx, 1);
  }
  if (!s.hooks[event].length) delete s.hooks[event];
  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  toast(r.ok ? '삭제됨' : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
}

};

async function autoFixPermissions() {
  const s = await api('/api/settings');
  // 서버의 put_settings 가 자동 교정해서 저장
  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  if (r.ok) {
    const n = (r.fixed||[]).length;
    toast(n ? `✅ ${n}개 규칙 자동 교정됨` : '교정할 항목 없음', 'ok');
  } else toast('실패: ' + (r.error||'unknown'), 'err');
}

async function quickAddPerm(kind) {
  const inp = document.getElementById(`perm-${kind}-input`);
  const v = (inp.value || '').trim();
  if (!v) { toast('규칙을 입력하세요', 'warn'); return; }
  await setPermAndSave(kind, 'add', v);
  inp.value = '';
}
async function addPermission(kind) {
  const v = prompt(`${kind==='allow'?'허용':'차단'} 규칙을 입력하세요 (예: Bash(git status:*))`);
  if (!v) return;
  await setPermAndSave(kind, 'add', v.trim());
}
async function removePermission(kind, i) {
  await setPermAndSave(kind, 'remove', i);
}
async function setPermAndSave(kind, op, value) {
  const s = await api('/api/settings');
  s.permissions = s.permissions || { allow: [], deny: [] };
  s.permissions[kind] = s.permissions[kind] || [];
  if (op === 'add') {
    if (!s.permissions[kind].includes(value)) s.permissions[kind].push(value);
  } else if (op === 'remove') {
    s.permissions[kind].splice(value, 1);
  }
  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  toast(r.ok ? '저장됨' : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
  if (r.ok) renderView();
}

    if (m.needsAuth) return '<span class="chip chip-warn text-[9px]" style="white-space:nowrap;">🔐 인증 필요</span>';
    if (m.connected === false) return '<span class="chip chip-err text-[9px]" style="white-space:nowrap;">✗ 실패</span>';
    return '';
  };
  return `

  const diffList = (arr, color) => arr.length
    ? `<ul class="text-xs space-y-0.5 mono">${arr.map(x=>`<li style="color:${color}">+ ${escapeHtml(x)}</li>`).join('')}</ul>`
    : '<div class="text-xs text-[var(--text-dim)]">없음</div>';

  const step2 = `
    <div class="card p-4">
      <div class="text-xs uppercase tracking-widest text-[var(--text-dim)] mb-3">2. 변경 미리보기</div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <div class="text-[11px] font-semibold text-[var(--ok)] mb-1.5">✅ 추가될 허용 (${diff.addedAllow.length})</div>
          ${diffList(diff.addedAllow, '#86efac')}
        </div>
        <div>
          <div class="text-[11px] font-semibold text-[var(--err)] mb-1.5">🚫 추가될 차단 (${diff.addedDeny.length})</div>
          ${diffList(diff.addedDeny, '#fca5a5')}
        </div>
      </div>
      ${diff.topChanged.length ? `<div class="mt-3 text-xs"><span class="text-[var(--text-mute)]">다른 변경 키:</span> ${diff.topChanged.map(k=>`<code class="mono">${escapeHtml(k)}</code>`).join(', ')}</div>` : ''}
      <details class="mt-4">
        <summary class="cursor-pointer text-xs text-[var(--text-mute)]">전체 병합 결과 보기 (raw JSON)</summary>
        <pre class="mono text-[10px] whitespace-pre-wrap bg-black/30 p-3 rounded mt-2 max-h-[240px] overflow-y-auto">${escapeHtml(JSON.stringify(preview.merged, null, 2))}</pre>
      </details>
    </div>`;

  const step3 = `
    <div class="card p-4 flex items-center justify-between gap-3">
      <div>
        <div class="text-xs uppercase tracking-widest text-[var(--text-dim)] mb-1">3. 적용</div>
        <div class="text-sm">${diff.addedAllow.length + diff.addedDeny.length === 0 ? '이미 동일한 규칙이 존재합니다 — 변경 없음.' : '확인하고 settings.json 에 즉시 저장합니다.'}</div>
      </div>
      <div class="flex gap-2">
        <button class="btn" onclick="closeModal()">취소</button>
        <button id="profileApplyBtn" class="btn-primary btn" ${!auth.connected ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>💾 적용</button>
      </div>
    </div>`;

  document.getElementById('profileFlowBody').innerHTML = step1 + step2 + step3;

  const applyBtn = document.getElementById('profileApplyBtn');
  if (applyBtn && auth.connected) {
    applyBtn.onclick = async () => {
      applyBtn.disabled = true;
      applyBtn.textContent = '적용 중…';
      try {
        const r = await api('/api/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(preview.merged),
        });
        if (r.ok) {
          toast(`"${prof.name}" 적용됨`, 'ok');
          closeModal();
          renderView();
        } else {
          toast('저장 실패: ' + (r.error||'알 수 없음'), 'err');
          applyBtn.disabled = false;
          applyBtn.textContent = '💾 적용';
        }
      } catch (e) {
        toast('실패: ' + e.message, 'err');
        applyBtn.disabled = false;
        applyBtn.textContent = '💾 적용';
      }
    };
  }
}

async function startGlobalClaudeMdRecommend() {
  showModalLoading('Claude 에게 글로벌 CLAUDE.md 초안 요청 중 (30~90초)…');
  try {
    const r = await api('/api/global/claude-md-recommend', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:'{}',
    });
    if (r.error) { closeModal(); toast(r.error, 'err'); return; }
    closeModal();
    openDiffApplyModal({
      title: '글로벌 CLAUDE.md 초안',
      relpath: '~/.claude/CLAUDE.md',
      reason: `비용 $${(r.costInfo?.costUsd||0).toFixed(4)} · ${Math.round((r.costInfo?.durationMs||0)/1000)}초 소요. 좌측은 현재 파일, 우측은 AI 제안. 편집 후 원하는 쪽 저장.`,
      cwd: '',
      currentRaw: r.existing || '',
      proposedRaw: r.content || '',
      badge: '🤖 글로벌 CLAUDE.md 추천',
      saveFn: async (newRaw) => api('/api/claude-md', {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ raw: newRaw }),
      }),
    });
  } catch (e) { closeModal(); toast(e.message, 'err'); }
}
AFTER.claudemd = () => {
  const e = document.getElementById('claudeMdEditor');
  const p = document.getElementById('claudeMdPreview');
  if (e && p) {
    e.addEventListener('input', () => { p.innerHTML = marked.parse(e.value); });
  }
};
async function saveClaudeMd() {
  const raw = document.getElementById('claudeMdEditor').value;
  const r = await api('/api/claude-md', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ raw }) });
  toast(r.ok ? '저장됨' : '저장 실패', r.ok ? 'ok' : 'err');
}

async function openProjectDetail(cwd) {
  showModalLoading('프로젝트 설정 불러오는 중…');
  try {
    const [d, tb] = await Promise.all([
      api('/api/project/detail?cwd=' + encodeURIComponent(cwd)),
      api('/api/project/tool-breakdown?cwd=' + encodeURIComponent(cwd)),
    ]);
    if (d.error) { toast(d.error, 'err'); closeModal(); return; }
    renderProjectDetail(d);
    renderProjectAgentsSection(tb, d.cwd);
  } catch (e) {
    closeModal(); toast(e.message, 'err');
  }
}

function renderProjectAgentsSection(tb, cwd) {
  const slot = document.getElementById('projectAgentsSlot');
  if (!slot) return;
  const subs = tb.subagents || [];
  const total = subs.reduce((a,b)=>a+b.n,0);
  if (!subs.length) {
    slot.innerHTML = `
      <div class="card p-4 mb-4" style="background: rgba(217,119,87,0.03);">
        <div class="flex items-center justify-between mb-1">
          <div class="font-semibold text-sm">🤝 이 프로젝트에서 사용된 서브에이전트</div>
          <span class="chip">0</span>
        </div>
        <div class="text-xs text-[var(--text-mute)]">이 프로젝트 세션들에서는 서브에이전트 위임이 없었습니다. 위의 🤖 AI 추천으로 프로젝트 전용 에이전트를 만들면 delegation 점수가 오릅니다.</div>
      </div>`;
    return;
  }
  slot.innerHTML = `
    <div class="card p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <div class="font-semibold text-sm">🤝 이 프로젝트에서 사용된 서브에이전트</div>
        <span class="text-xs text-[var(--text-dim)]">총 ${total}회 위임 · ${subs.length}종</span>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
        ${subs.map(a => `
          <div class="rounded bg-white/5 border border-[var(--border)] p-2.5 flex items-center justify-between cursor-pointer hover:bg-white/10"
               onclick="closeModal();viewAgent('${escapeHtml(a.name)}')">
            <div class="min-w-0">
              <div class="text-sm font-semibold truncate">${escapeHtml(a.name)}</div>
              <div class="text-[10px] text-[var(--text-dim)]">클릭 → 에이전트 정의 보기</div>
            </div>
            <div class="text-right">
              <div class="mono font-bold text-sm" style="color:var(--accent)">${a.n}</div>
              <div class="text-[9px] text-[var(--text-dim)]">호출</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

  const r = d.repo || {};

  const sessions = d.sessions || [];

  const section = (title, body, count) => `
    <div class="mb-4">
      <div class="flex items-center gap-2 mb-2">
        <h3 class="text-xs uppercase tracking-widest text-[var(--text-dim)]">${title}</h3>
        ${count != null ? `<span class="badge-n">${count}</span>` : ''}
      </div>

  const agentsHtml = r.agents.length ? r.agents.map(a => `
    <div class="card p-3">
      <div class="flex justify-between mb-1 gap-2"><b class="text-sm truncate">${escapeHtml(a.name)}</b><span class="chip text-[10px]">${escapeHtml(a.model)}</span></div>

  const cmdsHtml = r.commands.length ? r.commands.map(c => `
    <div class="card p-2 text-xs"><span class="mono">/${escapeHtml(c.name||c.id)}</span><div class="text-[var(--text-mute)] line-clamp-2 mt-0.5">${escapeHtml(c.description||'—')}</div></div>
  `).join('') : '<div class="text-xs text-[var(--text-dim)]">—</div>';

  const skillsHtml = r.skills.length ? r.skills.map(s => `
    <div class="card p-2"><b class="text-sm">${escapeHtml(s.name)}</b><div class="text-xs text-[var(--text-mute)] line-clamp-2 mt-0.5">${escapeHtml(s.description||'—')}</div></div>

  const hooksHtml = r.hooks.length ? r.hooks.map(h => `<div class="mono text-xs text-[var(--text-mute)]">${escapeHtml(h.name)}</div>`).join('') : '<div class="text-xs text-[var(--text-dim)]">—</div>';

  const settingsLocalHtml = r.settingsLocal
    ? `<pre class="mono text-[10px] whitespace-pre-wrap bg-black/30 p-3 rounded max-h-[220px] overflow-y-auto">${escapeHtml(JSON.stringify(r.settingsLocal, null, 2))}</pre>`
    : '<div class="text-xs text-[var(--text-dim)]">.claude/settings.local.json 없음</div>';

  const cjEntryHtml = Object.keys(e).length
    ? `<div class="card p-3 text-xs space-y-1">
        ${Object.entries(e).map(([k,v]) => `<div class="flex justify-between gap-2"><span class="text-[var(--text-mute)]">${k}</span><span class="mono truncate max-w-[240px]">${escapeHtml(JSON.stringify(v))}</span></div>`).join('')}
      </div>` : '<div class="text-xs text-[var(--text-dim)]">—</div>';

  const claudeMdHtml = r.claudeMd
    ? `<div class="card p-3 max-h-[260px] overflow-y-auto prose-claude text-xs">${marked.parse(r.claudeMd)}</div>`
    : '<div class="text-xs text-[var(--text-dim)]">프로젝트 루트에 CLAUDE.md 없음</div>';

  const sessionsHtml = sessions.length ? `
    <table class="data">
      <thead><tr><th>점수</th><th>첫 요청</th><th class="text-right">도구</th><th class="text-right">에이전트</th><th class="text-right">오류</th><th class="text-right">시작</th></tr></thead>
      <tbody>
        ${sessions.slice(0,20).map(s => `
          <tr class="link-row" onclick="closeModal();openSessionDetail('${s.session_id}')">
            <td><div class="inline-flex items-center justify-center w-9 h-7 rounded mono font-bold text-xs"
              style="background:${scoreColor(s.score)}22;color:${scoreColor(s.score)}">${s.score}</div></td>
            <td class="text-xs max-w-[320px] truncate">${escapeHtml((s.first_user_prompt||'').slice(0,120)||'—')}</td>
            <td class="text-right text-xs">${s.tool_use_count}</td>
            <td class="text-right text-xs">${s.agent_call_count || 0}</td>
            <td class="text-right text-xs">${s.error_count || 0}</td>
            <td class="text-right text-xs text-[var(--text-mute)]">${fmtRel(s.started_at)}</td>
          </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty text-xs">이 프로젝트에서 실행된 세션 없음</div>';

  window.__projectDetailData = d;

      <div class="flex-1 min-w-0">

        <div class="flex flex-wrap gap-2 mt-3">
          <button class="chip cursor-pointer hover:brightness-125" style="background:${scoreColor(st.avgScore)}22; color:${scoreColor(st.avgScore)}" onclick="openScoreDetail({cwd: ${JSON.stringify(d.cwd)}})" title="점수 계산식 상세">★ 평균 ${st.avgScore}</button>
          <button class="chip cursor-pointer hover:brightness-125" onclick="scrollToSessions()" title="세션 리스트로 스크롤">📊 세션 ${st.sessionCount}</button>
          <button class="chip cursor-pointer hover:brightness-125" onclick='openToolBreakdown(${JSON.stringify(d.cwd)})' title="도구 사용 드릴다운">🛠 도구 ${st.totalTools}</button>
          <button class="chip chip-accent cursor-pointer hover:brightness-125" onclick='openAgentBreakdown(${JSON.stringify(d.cwd)})' title="서브에이전트 위임 내역">🤝 에이전트 ${st.totalAgents}</button>
          ${st.totalErrors ? `<span class="chip chip-err">❌ ${st.totalErrors}</span>`:''}
          ${r.exists ? '<span class="chip chip-ok">.claude 존재</span>' : '<span class="chip">.claude 없음</span>'}
        </div>
        <div class="mt-3">
          <button class="btn-primary btn text-xs" onclick='startAiRecommend(${JSON.stringify(d.cwd)})'>
            🤖 Claude 기반 AI 추천 받기 (30~120초)
          </button>
          <span class="text-[10px] text-[var(--text-dim)] ml-2">이 프로젝트 컨텍스트로 실제 claude CLI 호출</span>
        </div>
      </div>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div id="aiRecSlot"></div>
    <div id="projectAgentsSlot" class="px-5"></div>
    <div class="flex-1 overflow-y-auto p-5 grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div>
        ${section('📜 프로젝트 CLAUDE.md', claudeMdHtml)}
        ${section('🤝 프로젝트 에이전트', `<div class="grid grid-cols-1 gap-2">${agentsHtml}</div>`, r.agents.length)}
        ${section('✨ 프로젝트 스킬', `<div class="grid grid-cols-1 gap-2">${skillsHtml}</div>`, r.skills.length)}
        ${section('/ 프로젝트 명령어', `<div class="grid grid-cols-1 gap-2">${cmdsHtml}</div>`, r.commands.length)}
        ${section('🪝 .claude/hooks 파일', hooksHtml, r.hooks.length)}
      </div>
      <div>
        ${section('⚙️ .claude/settings.local.json', settingsLocalHtml)}
        ${section('🗂 ~/.claude.json 프로젝트 엔트리', cjEntryHtml)}
        ${section('🕒 세션 히스토리 (점수 포함)', sessionsHtml, sessions.length)}
      </div>
    </div>
  `);
}

function scrollToSessions() {
  // 모달 내에서 스크롤 — 가장 가까운 스크롤 컨테이너 찾아 세션 섹션으로
  const header = [...document.querySelectorAll('.modal h3, .modal .text-xs')].find(el => el.textContent && el.textContent.includes('세션 히스토리'));
  if (header) header.scrollIntoView({ behavior:'smooth', block:'start' });
}

async function openToolBreakdown(cwd) {
  showModalLoading('도구 사용 내역 로딩…');
  try {
    const d = await api('/api/project/tool-breakdown?cwd=' + encodeURIComponent(cwd));
    if (d.error) { closeModal(); toast(d.error, 'err'); return; }
    const top = d.tools[0] ? d.tools[0].n : 1;
    const rows = d.tools.map(t => {
      const pct = Math.round((t.n / top) * 100);
      return `
        <div class="py-1.5 border-b border-[var(--border)]">
          <div class="flex justify-between items-center mb-1">
            <span class="mono text-xs truncate pr-2">${escapeHtml(t.tool)}</span>
            <span class="mono text-xs font-bold">${t.n}${t.errors ? ` <span class="text-[var(--err)]">✖${t.errors}</span>`:''}</span>

async function startAiRecommend(cwd) {
  const slot = document.getElementById('aiRecSlot');
  if (!slot) return;
  slot.innerHTML = `

      <div class="flex items-center gap-3">
        <div class="shimmer w-6 h-6 rounded-full"></div>
        <div class="flex-1">
          <div class="font-semibold text-sm gradient-text">🤖 Claude 에게 이 프로젝트 분석 요청 중…</div>
          <div class="text-xs text-[var(--text-mute)] mt-0.5">평균 30~120초 소요 · cwd=<span class="mono">${escapeHtml(cwd)}</span> 에서 claude CLI 실행</div>
          <div id="aiRecProgress" class="text-[10px] mono text-[var(--text-dim)] mt-1">요청 전송 중…</div>
        </div>
      </div>

  // 간단한 진행 표시 (실제 스트리밍은 아님 — 경과 초만 업데이트)
  const started = Date.now();
  const tick = setInterval(() => {
    const p = document.getElementById('aiRecProgress');
    if (p) p.textContent = `경과 ${Math.round((Date.now()-started)/1000)}초 · claude CLI 응답 대기…`;
  }, 1000);

  try {
    const r = await api('/api/project/ai-recommend', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ cwd })
    });
    clearInterval(tick);
    if (r.error) {
      slot.innerHTML = `
        <div class="p-5 border-b border-[var(--border)]">
          <div class="card p-4" style="border-color: rgba(248,113,113,0.4);">
            <div class="font-semibold text-sm text-[var(--err)] mb-1">❌ AI 추천 실패</div>
            <div class="text-xs text-[var(--text-mute)]">${escapeHtml(r.error)}</div>
            ${r.rawResponse ? `<details class="mt-2"><summary class="text-xs cursor-pointer">원본 응답 보기</summary><pre class="mono text-[10px] whitespace-pre-wrap bg-black/30 p-2 rounded mt-2 max-h-[260px] overflow-y-auto">${escapeHtml(r.rawResponse)}</pre></details>`:''}
            <button class="btn mt-3 text-xs" onclick='startAiRecommend(${JSON.stringify(cwd)})'>다시 시도</button>
          </div>
        </div>`;
      return;
    }
    renderAiRecommendations(r, cwd);
  } catch (e) {
    clearInterval(tick);
    slot.innerHTML = `<div class="p-5"><div class="card p-4"><div class="text-[var(--err)]">실패: ${escapeHtml(e.message)}</div></div></div>`;
  }
}

async function openAiRecEditor(recId) {
  const rec = (window.__aiRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__aiCwd || '';
  const isGlobal = rec.relpath === '~/.claude/settings.json';

  // 기존 파일 읽기
  let currentRaw = '';
  try {
    if (isGlobal) {
      const s = await api('/api/settings');
      currentRaw = JSON.stringify(s || {}, null, 2);
    } else if (rec.relpath === 'CLAUDE.md' && cwd) {
      const d = await api('/api/project/detail?cwd=' + encodeURIComponent(cwd));
      currentRaw = (d.repo && d.repo.claudeMd) || '';
    } else {
      // 프로젝트-로컬 파일 존재시 대략적으로: project/detail 에는 없으니 시도 생략, 빈값 표시
      currentRaw = '';
    }
  } catch {}

  const saveFn = async (newRaw) => {
    if (isGlobal) {
      let parsed; try { parsed = JSON.parse(newRaw); } catch (e) { return {ok:false, error: 'JSON: '+e.message}; }
      return api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(parsed) });
    }
    return api('/api/project/file', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath: rec.relpath, raw: newRaw }),
    });
  };

  openDiffApplyModal({
    title: rec.title,
    relpath: rec.relpath,
    reason: rec.reason,
    cwd,
    currentRaw, proposedRaw: rec.content || '',
    saveFn,
    badge: '🤖 AI 추천',
  });
}

/**
 * 좌(현재) / 우(제안) 2-컬럼 diff + 각 컬럼 에디터 + 적용/건너뛰기 / 병합 저장 UX.
 */
function openDiffApplyModal({ title, relpath, reason, cwd, currentRaw, proposedRaw, saveFn, badge }) {
  const isEmpty = !currentRaw || !currentRaw.trim();
  const hintEmpty = isEmpty ? '<span class="chip chip-warn">파일 없음 / 빈값</span>' : '';
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-start justify-between gap-3 flex-shrink-0">
      <div class="min-w-0 flex-1">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">${badge || '추천 비교 & 적용'}</div>
        <h2 class="text-lg font-bold truncate">${escapeHtml(title||'')}</h2>
        <div class="flex items-center gap-2 mt-1 flex-wrap">
          <span class="text-[11px] mono text-[var(--text-mute)] truncate">${escapeHtml(relpath||'')}</span>
          ${hintEmpty}
        </div>
        ${reason ? `<div class="text-xs text-[var(--text-mute)] mt-2 line-clamp-2"><b>근거:</b> ${escapeHtml(reason)}</div>` : ''}
      </div>
      <div class="flex gap-2 flex-shrink-0">
        <button class="btn" onclick="closeModal()">건너뛰기</button>
        <button class="btn" id="diffUseLeftBtn">◀ 좌측(현재값) 유지</button>
        <button class="btn-primary btn" id="diffUseRightBtn">우측(제안) 적용 ▶</button>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2" style="flex:1 1 0; min-height:0; overflow:hidden;">
      <div class="flex flex-col border-r border-[var(--border)]" style="min-height:0; overflow:hidden;">
        <div class="px-4 py-2 border-b border-[var(--border)] flex items-center justify-between flex-shrink-0">
          <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">현재 (왼쪽)</div>
          <span class="chip text-[10px]">${isEmpty ? '비어있음' : (currentRaw.length + '자')}</span>
        </div>
        <textarea id="diffLeftText" spellcheck="false" class="mono" style="flex:1 1 0; min-height:0; width:100%; padding:16px; border-radius:0; border:none; background:transparent; resize:none; color:var(--text); font-size:13px; line-height:1.55; outline:none;">${escapeHtml(currentRaw||'')}</textarea>
      </div>
      <div class="flex flex-col" style="background: rgba(217,119,87,0.04); min-height:0; overflow:hidden;">
        <div class="px-4 py-2 border-b border-[var(--border)] flex items-center justify-between flex-shrink-0">
          <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">제안 (오른쪽) · AI</div>
          <span class="chip chip-accent text-[10px]">${(proposedRaw||'').length}자</span>
        </div>
        <textarea id="diffRightText" spellcheck="false" class="mono" style="flex:1 1 0; min-height:0; width:100%; padding:16px; border-radius:0; border:none; background:transparent; resize:none; color:var(--text); font-size:13px; line-height:1.55; outline:none;">${escapeHtml(proposedRaw||'')}</textarea>
      </div>
    </div>
    <div class="p-3 border-t border-[var(--border)] flex items-center justify-between text-[11px] text-[var(--text-dim)] flex-shrink-0 flex-wrap gap-2">
      <div>저장 위치: <span class="mono">${relpath==='~/.claude/settings.json' ? relpath : escapeHtml((cwd||'')+'/'+(relpath||''))}</span></div>
      <div>양쪽 값을 자유롭게 편집한 뒤 어느 쪽을 저장할지 고르세요. · <kbd class="chip text-[9px]">Esc</kbd> 닫기</div>
    </div>
  `, { wide: true });

  const commit = async (which) => {
    const raw = (which === 'left' ? document.getElementById('diffLeftText') : document.getElementById('diffRightText')).value;
    try {
      const r = await saveFn(raw);
      toast(r.ok ? `저장됨 (${which==='left'?'현재 값 유지':'제안 적용'})` : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
      if (r.ok) { closeModal(); renderView(); }
    } catch (e) { toast('실패: '+e.message, 'err'); }
  };
  document.getElementById('diffUseLeftBtn').onclick = () => commit('left');
  document.getElementById('diffUseRightBtn').onclick = () => commit('right');
}

async function appendAiRecClaudeMd(recId) {
  const rec = (window.__aiRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__aiCwd || '';
  try {
    const d = await api('/api/project/detail?cwd=' + encodeURIComponent(cwd));
    const existing = (d.repo && d.repo.claudeMd) || '';
    const merged = (existing ? existing.replace(/\s+$/, '') : `# ${d.name}`) + '\n' + rec.content;
    const r = await api('/api/project/file', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath:'CLAUDE.md', raw: merged }),
    });
    toast(r.ok ? 'CLAUDE.md 갱신됨' : (r.error||'실패'), r.ok?'ok':'err');
  } catch (e) { toast('실패: '+e.message, 'err'); }
}

async function paRefreshViz() {
  const container = document.getElementById('paNetwork');
  if (!container || !window.vis) return;
  const cwd = window.__paCwd;
  if (!cwd) return;
  const r = await api('/api/project-agents/list?cwd=' + encodeURIComponent(cwd));
  const agents = r.agents || [];
  if (!agents.length) return;

  const nodes = new vis.DataSet([
    {
      id: '__claude', label: 'Claude', shape: 'hexagon', size: 34,
      color: { background: '#d97757', border: '#c96442', highlight: { background: '#c96442', border: '#f5b997' } },
      font: { color: '#000', size: 13, bold: true },
    },
    ...agents.map(a => ({
      id: a.id, label: a.name, shape: 'dot', size: 22,
      color: { background: 'rgba(217,119,87,0.18)', border: '#d97757', highlight: { background: '#d97757', border: '#ffffff' } },
      font: { color: '#f5f5f5', size: 11 },
      title: (a.description || '').slice(0, 120),
    })),
  ]);
  const edges = new vis.DataSet(agents.map(a => ({
    from: '__claude', to: a.id,
    color: { color: 'rgba(217,119,87,0.35)', highlight: '#d97757', opacity: 0.7 },
    arrows: 'to', smooth: { type: 'continuous' },
  })));
  const net = new vis.Network(container, { nodes, edges }, {
    physics: {
      enabled: true,
      barnesHut: { gravitationalConstant: -2500, springLength: 130, springConstant: 0.05 },
      stabilization: { iterations: 220, fit: true },
    },
    interaction: { hover: true, selectable: true, tooltipDelay: 120, zoomView: false, dragView: true, dragNodes: true },
  });
  container.style.cursor = 'pointer';
  net.once('stabilizationIterationsDone', () => {
    try { net.setOptions({ physics: { enabled: false } }); net.fit({ animation: false }); } catch {}
  });
  const handlePa = (id) => {
    if (id === '__claude') return;
    const ag = agents.find(x => x.id === id);
    if (ag) paEdit(ag.name);
  };
  net.on('click', params => { if (params.nodes && params.nodes.length) handlePa(params.nodes[0]); });
  net.on('selectNode', params => { if (params.nodes && params.nodes.length) handlePa(params.nodes[0]); });
}
AFTER.projectAgents = () => { setTimeout(paRefreshViz, 50); };

async function openScoreDetail(keyOrObj) {

  let cwd = '', projectDir = '';
  if (typeof keyOrObj === 'string') { projectDir = keyOrObj; }

  const qs = new URLSearchParams();

function openRecEditor(recId) {
  const rec = (window.__scoreRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__scoreCwd || '';

  const isGlobal = rec.relpath === '~/.claude/settings.json';
  const saveFn = async (newRaw) => {
    if (isGlobal) {
      let parsed;
      try { parsed = JSON.parse(newRaw); }
      catch (e) { return { ok:false, error: 'JSON: '+e.message }; }
      return api('/api/settings', {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(parsed),
      });
    }
    return api('/api/project/file', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath: rec.relpath, raw: newRaw }),
    });
  };

  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div class="min-w-0">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">추천 편집</div>
        <h2 class="text-lg font-bold truncate">${escapeHtml(rec.title)}</h2>
        <div class="text-[11px] mono text-[var(--text-mute)] truncate">${escapeHtml(rec.relpath)} · ${escapeHtml(rec.mode||'')} · 예상 ${escapeHtml(rec.impact)}</div>
      </div>
      <div class="flex gap-2">
        <button class="btn-primary btn" id="recSaveBtn">💾 이 내용으로 저장</button>
        <button class="btn" onclick="closeModal()">닫기</button>
      </div>
    </div>
    <div class="p-5 flex-1 overflow-y-auto">
      <div class="card p-3 text-xs text-[var(--text-mute)] mb-3"><b>왜 필요한가:</b> ${escapeHtml(rec.reason)}</div>
      <textarea id="recEditor" class="input" style="min-height: 480px;">${escapeHtml(rec.content||'')}</textarea>
      <div class="text-[11px] text-[var(--text-dim)] mt-2">
        저장 위치: ${isGlobal ? '<span class="mono">~/.claude/settings.json</span>' : `<span class="mono">${escapeHtml(cwd)}/${escapeHtml(rec.relpath)}</span>`}
      </div>
    </div>
  `);

  document.getElementById('recSaveBtn').onclick = async () => {
    const raw = document.getElementById('recEditor').value;
    try {
      const r = await saveFn(raw);
      if (r.ok) {
        toast('저장됨 — 다음 세션부터 적용', 'ok');
        closeModal();
      } else {
        toast('저장 실패: ' + (r.error||'알 수 없음'), 'err');
      }
    } catch (e) {
      toast('실패: ' + e.message, 'err');
    }
  };
}

async function appendToClaudeMd(recId) {
  const rec = (window.__scoreRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__scoreCwd || '';
  try {
    // 기존 CLAUDE.md 읽기
    const d = await api('/api/project/detail?cwd=' + encodeURIComponent(cwd));
    const existing = (d.repo && d.repo.claudeMd) || '';
    if (existing.includes(rec.content.trim().slice(0, 40))) {
      toast('이미 유사 내용이 있습니다', 'warn');
      return;
    }
    const merged = (existing ? existing.replace(/\s+$/, '') : `# ${d.name}`) + '\n' + rec.content;
    const r = await api('/api/project/file', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath: 'CLAUDE.md', raw: merged }),
    });
    toast(r.ok ? 'CLAUDE.md 갱신됨' : (r.error||'실패'), r.ok?'ok':'err');
  } catch (e) {
    toast('실패: ' + e.message, 'err');
  }
}

function editOutputStyle(existing) {
  const e = existing || { id: '', name: '', description: '', raw: '---\nname: my-style\ndescription: 한 줄 설명\n---\n\n## 톤\n- 항상 한국어로 답한다.\n- 불필요한 감탄사 생략.\n\n## 포맷\n- 긴 답변은 섹션 헤더 사용.\n' };
  const isEdit = !!existing;
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <h2 class="font-semibold">${isEdit ? '출력 스타일 편집' : '새 출력 스타일'}</h2>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div class="p-5 space-y-3">
      ${isEdit ? '' : `<div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">이름 (파일명, 소문자-하이픈)</div>
        <input id="osId" class="input" placeholder="예: terse-korean" />
      </div>`}
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">스타일 본문 (frontmatter + 지침)</div>
        <textarea id="osRaw" class="input" style="min-height:420px;">${escapeHtml(e.raw)}</textarea>
      </div>
    </div>
    <div class="p-4 border-t border-[var(--border)] flex justify-end gap-2">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn-primary btn" id="osSaveBtn">저장</button>
    </div>
  `);
  document.getElementById('osSaveBtn').onclick = async () => {
    const id = isEdit ? e.id : document.getElementById('osId').value.trim();
    const raw = document.getElementById('osRaw').value;
    if (!id) { toast('이름 입력', 'warn'); return; }
    const r = await api('/api/output-styles/save', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id, raw }),
    });
    if (r.ok) { toast('저장됨', 'ok'); closeModal(); renderView(); }
    else toast(r.error||'실패', 'err');
  };
}

async function deleteOutputStyle(id) {

}

VIEWS.plans = async () => {
  const d = await api('/api/plans/list');
  const plans = d.plans || [];
  return `
    ${viewHeader('플랜 보관소', `Plan Mode 로 작성된 계획 · ${plans.length}개`, 'plans')}
    <div class="grid-list">
      ${plans.map(p => `
        <div class="card p-4 hover-lift cursor-pointer" onclick='viewPlan(${JSON.stringify(p.id)})'>
          <div class="font-semibold text-sm mb-1 truncate">${escapeHtml(p.name)}</div>
          <div class="text-[10px] text-[var(--text-dim)] mb-2">${fmtRel(p.modifiedAt)} · ${p.size}자</div>
          <div class="text-xs text-[var(--text-mute)] line-clamp-4" style="min-height:4em;">${escapeHtml(p.preview)}</div>
        </div>`).join('') || `<div class="card empty" style="grid-column:1/-1;">아직 저장된 플랜 없음 — Claude Code 에서 <kbd class="kbd">⇧Tab</kbd> 으로 플랜 모드 진입 후 저장</div>`}
    </div>`;
};
async function viewPlan(id) {
  const d = await api('/api/plans/list');
  const p = (d.plans||[]).find(x => x.id === id);
  if (!p) return;
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">플랜</div>
        <h2 class="text-lg font-bold">${escapeHtml(p.name)}</h2>
      </div>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div class="p-5 overflow-y-auto prose-claude">${marked.parse(p.raw||'')}</div>
  `);
}

      ${statCard('출력 토큰', t.out?.toLocaleString?.() || t.out)}

            <tr>
              <td class="mono text-xs">${escapeHtml(m.model)}</td>
              <td class="text-right">${m.in?.toLocaleString?.() || m.in}</td>
              <td class="text-right">${m.out?.toLocaleString?.() || m.out}</td>
              <td class="text-right mono">${(m.cost||0).toFixed(4)}</td>

AFTER.metrics = () => {
  const d = state.data.metrics;
  const ctx = document.getElementById('metricsDaily');
  if (!ctx || !d?.timeline) return;
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: d.timeline.map(x => x.date.slice(5)),
      datasets: [
        { label: '입력', data: d.timeline.map(x=>x.in), borderColor: '#d97757', backgroundColor: 'rgba(217,119,87,0.15)', fill: true, tension: 0.4, yAxisID: 'y' },
        { label: '출력', data: d.timeline.map(x=>x.out), borderColor: '#7dd3fc', backgroundColor: 'rgba(125,211,252,0.1)', fill: true, tension: 0.4, yAxisID: 'y' },
        { label: '비용 ($)', data: d.timeline.map(x=>x.cost), borderColor: '#4ade80', tension: 0.4, yAxisID: 'y1', borderDash: [4,3] },
      ],
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#e7e7ea' } } },
      scales: {

        y: { position: 'left', ticks: { color: '#9aa0aa' }, grid: { color: 'rgba(255,255,255,0.03)' }, beginAtZero: true },
        y1: { position: 'right', ticks: { color: '#9aa0aa' }, grid: { display: false }, beginAtZero: true },

};
