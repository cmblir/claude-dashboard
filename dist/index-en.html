function openRecEditor(recId) {
  const rec = (window.__scoreRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__scoreCwd || '';

  const isGlobal = rec.relpath === '~/.claude/settings.json';
  const saveFn = async (newRaw) => {
    if (isGlobal) {
      let parsed;
      try { parsed = JSON.parse(newRaw); }
      catch (e) { return { ok:false, error: 'JSON: '+e.message }; }
      return api('/api/settings', {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(parsed),
      });
    }
    return api('/api/project/file', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath: rec.relpath, raw: newRaw }),
    });
  };

  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div class="min-w-0">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">Recommendations Edit</div>
        <h2 class="text-lg font-bold truncate">${escapeHtml(rec.title)}</h2>
        <div class="text-[11px] mono text-[var(--text-mute)] truncate">${escapeHtml(rec.relpath)} · ${escapeHtml(rec.mode||'')} · 예상 ${escapeHtml(rec.impact)}</div>
      </div>
      <div class="flex gap-2">
        <button class="btn-primary btn" id="recSaveBtn">💾 Save with this content</button>
        <button class="btn" onclick="closeModal()">Close</button>
      </div>
    </div>
    <div class="p-5 flex-1 overflow-y-auto">
      <div class="card p-3 text-xs text-[var(--text-mute)] mb-3"><b>Why is this needed:</b> ${escapeHtml(rec.reason)}</div>
      <textarea id="recEditor" class="input" style="min-height: 480px;">${escapeHtml(rec.content||'')}</textarea>
      <div class="text-[11px] text-[var(--text-dim)] mt-2">
        Save 위치: ${isGlobal ? '<span class="mono">~/.claude/settings.json</span>' : `<span class="mono">${escapeHtml(cwd)}/${escapeHtml(rec.relpath)}</span>`}
      </div>
    </div>
  `);

  document.getElementById('recSaveBtn').onclick = async () => {
    const raw = document.getElementById('recEditor').value;
    try {
      const r = await saveFn(raw);
      if (r.ok) {
        toast('Saved — applies from next session', 'ok');
        closeModal();
      } else {
        toast('Save failed: ' + (r.error||'Unknown'), 'err');
      }
    } catch (e) {
      toast('Failed: ' + e.message, 'err');
    }
  };
}

async function appendToClaudeMd(recId) {
  const rec = (window.__scoreRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__scoreCwd || '';
  try {
    // 기존 CLAUDE.md 읽기
    const d = await api('/api/project/detail?cwd=' + encodeURIComponent(cwd));
    const existing = (d.repo && d.repo.claudeMd) || '';
    if (existing.includes(rec.content.trim().slice(0, 40))) {
      toast('Similar content already exists', 'warn');
      return;
    }
    const merged = (existing ? existing.replace(/\s+$/, '') : `# ${d.name}`) + '\n' + rec.content;
    const r = await api('/api/project/file', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath: 'CLAUDE.md', raw: merged }),
    });
    toast(r.ok ? 'CLAUDE.md updated' : (r.error||'Failed'), r.ok?'ok':'err');
  } catch (e) {
    toast('Failed: ' + e.message, 'err');
  }
}

function editOutputStyle(existing) {
  const e = existing || { id: '', name: '', description: '', raw: '---\nname: my-style\ndescription: One-line description\n---\n\n## 톤\n- 항상 한국어로 답한다.\n- 불필요한 감탄사 생략.\n\n## 포맷\n- 긴 답변은 섹션 헤더 사용.\n' };

  showModal(`

    </div>

    </div>
  `);
  document.getElementById('osSaveBtn').onclick = async () => {
    const id = isEdit ? e.id : document.getElementById('osId').value.trim();

}

function formatBytes(n) {
  if (!n) return '0';
  if (n < 1024) return n + 'B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + 'KB';
  if (n < 1024*1024*1024) return (n/1024/1024).toFixed(2) + 'MB';
  return (n/1024/1024/1024).toFixed(2) + 'GB';
}

VIEWS.tasks = async () => {
  const d = await api('/api/tasks/list');
  const sess = d.sessions || [];
  // 수동 세션을 항상 최상단에 노출
  const manual = sess.find(s => s.id === 'dashboard-manual');
  const others = sess.filter(s => s.id !== 'dashboard-manual');
  const ordered = [manual || { id: 'dashboard-manual', taskCount: 0, completed: 0, inProgress: 0, tasks: [] }, ...others];

  const renderTaskRow = (sid, t) => {
    const iconMap = { completed:'✅', in_progress:'🔄', pending:'⏳' };
    const col = { completed:'#4ade80', in_progress:'#fbbf24', pending:'#9aa0aa' }[t.status] || '#9aa0aa';
    const canEdit = sid === 'dashboard-manual';
    return `
      <div class="group flex items-start gap-2 py-1 px-2 rounded hover:bg-white/5">
        ${canEdit
          ? `<button class="p-0 bg-transparent border-0 cursor-pointer text-lg" title="Status Toggle" onclick='toggleTaskStatus(${JSON.stringify(sid)}, ${JSON.stringify(t)})'>${iconMap[t.status]||'•'}</button>`
          : `<span style="color:${col}">${iconMap[t.status]||'•'}</span>`}
        <div class="flex-1 min-w-0">
          <div class="text-sm ${t.status==='completed'?'line-through text-[var(--text-dim)]':''}">${escapeHtml(t.subject)}</div>
          ${t.description ? `<div class="text-[10px] text-[var(--text-mute)] line-clamp-2">${escapeHtml(t.description)}</div>` : ''}
        </div>
        ${canEdit ? `
          <div class="flex gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100">
            <button class="btn text-[10px]" onclick='openTaskEditor(${JSON.stringify(sid)}, ${JSON.stringify(t)})'>Modify</button>
            <button class="btn text-[10px]" style="color:#fca5a5" onclick='deleteTask(${JSON.stringify(sid)}, ${JSON.stringify(t.id)})'>Delete</button>
          </div>` : ''}
      </div>`;
  };

  return `
    ${viewHeader('Tasks / TODO', 'Per-session TaskCreate storage. Manual tasks are in dashboard-manual accumulated in session.', 'tasks')}
    <div class="mb-4 card p-4" style="background: linear-gradient(135deg, rgba(217,119,87,0.06), transparent);">
      <div class="flex items-center justify-between gap-2 flex-wrap">
        <div>
          <div class="font-semibold text-sm">＋ 수동 TODO Add</div>
          <div class="text-xs text-[var(--text-mute)]">Tasks created from dashboard are saved in ~/.claude/tasks/dashboard-manual/ saved to</div>
        </div>
        <button class="btn-primary btn" onclick="openTaskEditor('dashboard-manual', null)">＋ 새 TODO</button>
      </div>
    </div>
    ${ordered.map(s => {
      const pct = s.taskCount ? Math.round((s.completed / s.taskCount) * 100) : 0;
      const isManual = s.id === 'dashboard-manual';
      return `
      <div class="card p-4 mb-3" ${isManual?'style="border-color: rgba(217,119,87,0.35);"':''}>
        <div class="flex items-center justify-between mb-3">
          <div>
            <div class="font-semibold text-sm mono">${isManual ? '<span class="chip chip-accent">수동</span> dashboard-manual' : escapeHtml(s.id.slice(0,8))+'…'}</div>
            ${s.updatedAt ? `<div class="text-[11px] text-[var(--text-mute)]">${fmtRel(s.updatedAt)}</div>` : ''}
          </div>
          <div class="text-right">
            <div class="text-xs"><b>${s.completed}</b> / ${s.taskCount} complete · ${s.inProgress} Progress</div>
            <div class="h-1.5 w-[160px] rounded-full bg-white/5 overflow-hidden mt-1"><div style="width:${pct}%; height:100%; background:var(--grad);"></div></div>
          </div>
        </div>
        ${s.tasks.length ? `<div class="space-y-1">${s.tasks.map(t => renderTaskRow(s.id, t)).join('')}</div>` : '<div class="empty text-xs">Empty</div>'}
      </div>`;
    }).join('')}
  `;
};

function openTaskEditor(sessionId, existing) {
  const e = existing || { id: '', subject: '', description: '', status: 'pending', activeForm: '' };
  const isEdit = !!existing;
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <h2 class="font-semibold">${isEdit ? 'TODO Modify' : '새 TODO Add'}</h2>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div class="p-5 space-y-3">
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">제목 (subject)</div>
        <input id="tkSubject" class="input" value="${escapeHtml(e.subject)}" placeholder="e.g.: Projects README 작성" />
      </div>
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">Description (optional)</div>
        <textarea id="tkDesc" class="input" style="min-height:100px;">${escapeHtml(e.description)}</textarea>
      </div>
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">Progress 중 표시문 (activeForm)</div>
        <input id="tkAF" class="input" value="${escapeHtml(e.activeForm||'')}" placeholder="e.g.: README In progress" />
      </div>
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">Status</div>
        <select id="tkStatus" class="input">
          <option value="pending" ${e.status==='pending'?'selected':''}>⏳ Waiting</option>
          <option value="in_progress" ${e.status==='in_progress'?'selected':''}>🔄 Progress 중</option>
          <option value="completed" ${e.status==='completed'?'selected':''}>✅ complete</option>
        </select>
      </div>
    </div>
    <div class="p-4 border-t border-[var(--border)] flex justify-end gap-2">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn-primary btn" id="tkSaveBtn">Save</button>
    </div>
  `);
  document.getElementById('tkSaveBtn').onclick = async () => {
    const payload = {
      sessionId,
      id: e.id || undefined,
      subject: document.getElementById('tkSubject').value.trim(),
      description: document.getElementById('tkDesc').value,
      activeForm: document.getElementById('tkAF').value,
      status: document.getElementById('tkStatus').value,
    };
    if (!payload.subject) { toast('Please enter a title', 'warn'); return; }
    const r = await api('/api/tasks/save', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    if (r.ok) { toast('Saved', 'ok'); closeModal(); renderView(); }
    else toast(r.error||'Failed', 'err');
  };
}

async function toggleTaskStatus(sessionId, t) {
  const next = { pending:'in_progress', in_progress:'completed', completed:'pending' }[t.status] || 'pending';
  const r = await api('/api/tasks/save', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sessionId, id: t.id, subject: t.subject, description: t.description, activeForm: t.activeForm, status: next }),
  });
  if (r.ok) renderView();
  else toast(r.error||'Failed', 'err');
}

async function deleteTask(sessionId, id) {
  if (!confirm(t('Delete this TODO?'))) return;
  const r = await api('/api/tasks/delete', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sessionId, id }),
  });
  if (r.ok) { toast('Deleted', 'ok'); renderView(); }
  else toast(r.error||'Failed', 'err');
}

  showModal(`

      <textarea id="editModalText" class="input" style="min-height: 560px;" ${ro?'readonly':''}>${escapeHtml(raw||'')}</textarea>

    document.getElementById('editSaveBtn').onclick = async () => {
      const v = document.getElementById('editModalText').value;

      } catch (e) {
        toast('Failed: ' + e.message, 'err');
      }

  }

async function reindex(force=false) {
  const s = document.getElementById('liveStatus');
  s.innerHTML = '<span class="pulse-dot"></span><span>Indexing…</span>';
  try {
    const r = await api('/api/sessions/reindex', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ force }) });
    toast(`Index complete — updated ${r.indexed}  / skipped ${r.skipped}`, 'ok');
    s.innerHTML = '<span class="pulse-dot"></span><span>Connected</span>';
    renderView();
  } catch (e) {
    toast('Reindex failed: ' + e.message, 'err');
    s.innerHTML = '<span class="pulse-dot off"></span><span>Error</span>';
  }
}

async function loadCliFoot() {
  try {
    const auth = await api('/api/auth/status');
    const cliOk = auth.cliInstalled;
    const connOk = auth.connected;
    const overallOk = cliOk && connOk;
    const badge = (ok, label) =>
      `<span class="inline-flex items-center gap-1 text-[10px]">
        <span class="w-1.5 h-1.5 rounded-full" style="background:${ok?'var(--ok)':'var(--err)'}"></span>${label}
      </span>`;
    document.getElementById('cliStatus').innerHTML = `
      <div class="card p-2.5 hover-lift cursor-pointer" onclick="openCliStatusModal()">
        <div class="flex items-center justify-between mb-1">
          <span class="cli-body text-[11px] font-semibold">${overallOk ? 'Claude CLI Connected' : 'Claude CLI Check'}</span>
          <span class="w-2 h-2 rounded-full" style="background:${overallOk?'var(--ok)':'var(--warn)'}; box-shadow:0 0 8px ${overallOk?'rgba(74,222,128,0.6)':'rgba(251,191,36,0.6)'};"></span>
        </div>
        <div class="cli-body flex items-center gap-2">
          ${badge(cliOk, cliOk ? `CLI ${escapeHtml((auth.cliVersion||'').split(' ')[0]||'')}` : 'CLI Not installed')}
          ${badge(connOk, connOk ? 'Subscription verified' : 'Not logged in')}
        </div>
        ${connOk ? `<div class="cli-body text-[10px] text-[var(--text-dim)] mt-1 truncate">${escapeHtml(auth.planLabel||'')} · ${escapeHtml(auth.email||'')}</div>` : ''}
        <div class="flex gap-1 mt-1.5">
          ${connOk ? `<button class="btn text-[9px] px-1.5 py-0.5 flex-1" onclick="event.stopPropagation();switchAccount()">🔄 Switch Account</button>`
                   : `<button class="btn-primary btn text-[9px] px-1.5 py-0.5 flex-1" onclick="event.stopPropagation();triggerLogin()">🚀 Login</button>`}
        </div>
      </div>
    `;
  } catch {
    document.getElementById('cliStatus').innerHTML = '<div class="text-[10px] text-[var(--text-dim)]">Status check failed</div>';
  }
}

async function triggerLogin() {

async function doSwitchLogin() {
  const btn = document.getElementById('switchLoginBtn');
  const msg = document.getElementById('switchMsg');
  btn.disabled = true;
  btn.innerHTML = '⏳ Logging out…';
  try {
    // 1) Logout
    await api('/api/auth/logout', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({})
    });
    btn.innerHTML = '⏳ Opening new login window…';
    // 2) Login 트리거
    const r = await api('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({})
    });
    if (r.ok) {
      msg.innerHTML = '✅ Complete browser auth in terminal. Auto-detected.';
      btn.innerHTML = '🔄 Checking login…';
      _pollAuthStatus();
    } else {
      msg.innerHTML = '❌ ' + escapeHtml(r.error || 'Failed');
      btn.disabled = false;
      btn.innerHTML = '🔄 Login with another account';
    }
  } catch (e) {
    msg.innerHTML = '❌ ' + escapeHtml(e.message);
    btn.disabled = false;
    btn.innerHTML = '🔄 Login with another account';
  }
}

async function doLogoutOnly() {
  if (!confirm(t('Are you sure you want to log out?'))) return;
  try {
    const r = await api('/api/auth/logout', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({})
    });
    if (r.ok) {
      toast('Logged out', 'ok');
      closeModal();
      await loadCliFoot();
    } else toast(r.error || 'Failed', 'err');
  } catch (e) { toast(e.message, 'err'); }
}

function _pollAuthStatus() {
  let attempts = 0;
  const poll = setInterval(async () => {
    attempts++;
    try {
      const s = await api('/api/auth/status');
      if (s.connected) {
        clearInterval(poll);
        toast(`🎉 ${s.displayName || s.email} Login success!`, 'ok');
        closeModal();
        await loadCliFoot();
        renderView();
      }
    } catch {}
    if (attempts >= 24) {
      clearInterval(poll);
      toast('Timeout — please refresh the page.', 'warn');
    }
  }, 5000);
}

function setTheme(th) {
  // 전환 애니메이션
  document.body.classList.add('theme-switching');
  setTimeout(() => {
    document.body.classList.remove('theme-dark', 'theme-light');
    document.body.classList.add('theme-' + th);
    // Chart.js 차트가 있으면 텍스트 색상 업데이트
    if (window.Chart) {
      Chart.defaults.color = th === 'light' ? '#555' : '#a0a0a8';
      Chart.defaults.borderColor = th === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.07)';
    }
  }, 50);
  setTimeout(() => {
    document.body.classList.remove('theme-switching');
    renderView(); // 차트 등 재렌더링
  }, 550);
  document.getElementById('checkDark').style.display = th === 'dark' ? '' : 'none';
  document.getElementById('checkLight').style.display = th === 'light' ? '' : 'none';
  try { localStorage.setItem('cc-theme', th); } catch {}
}
(function _initTheme() {
  try {
    const saved = localStorage.getItem('cc-theme');
    if (saved === 'light') {
      document.body.classList.add('theme-light');
      document.getElementById('checkDark').style.display = 'none';
      document.getElementById('checkLight').style.display = '';
      if (window.Chart) { Chart.defaults.color = '#555'; Chart.defaults.borderColor = 'rgba(0,0,0,0.08)'; }
    }
  } catch {}
})();

// ── DOM 자동 Translate 엔진 ──
// renderView() 후 DOM 내 한국어 텍스트 노드를 사전 기반으로 교체
const _KO_RE = /[가-힣]/;
let _domTranslateCache = {};

function _translateDOM(root) {
  if (_curLang === 'ko') return;
  const dict = I18N[_curLang];
  if (!dict) return;
  // 사전 키를 길이 내림차순으로 Sort (긴 문구 우선 매칭)
  if (!_domTranslateCache[_curLang]) {
    const keys = Object.keys(dict).filter(k => _KO_RE.test(k)).sort((a,b) => b.length - a.length);
    _domTranslateCache[_curLang] = keys;
  }
  const keys = _domTranslateCache[_curLang];
  if (!keys.length) return;

  // 텍스트 nodes 수집
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
  const nodes = [];
  let node;
  while (node = walker.nextNode()) {
    if (_KO_RE.test(node.textContent) && node.textContent.trim()) {
      nodes.push(node);
    }
  }

  // placeholder, title, alt 등 속성도 Translate
  root.querySelectorAll('[placeholder],[title],[alt]').forEach(el => {
    ['placeholder','title','alt'].forEach(attr => {
      const v = el.getAttribute(attr);
      if (v && _KO_RE.test(v)) {
        let translated = v;
        for (const k of keys) {
          if (translated.includes(k)) translated = translated.split(k).join(dict[k]);
        }
        if (translated !== v) el.setAttribute(attr, translated);
      }
    });
  });

  // 텍스트 nodes 교체 — All 일치 우선, Partial 치환은 5글자+ 키만
  for (const tn of nodes) {
    let txt = tn.textContent;
    const trimmed = txt.trim();
    // 1) All 일치 (공백 trim 후)
    if (dict[trimmed]) {
      tn.textContent = txt.replace(trimmed, dict[trimmed]);
      continue;
    }
    // 2) Partial 치환 — 긴 키부터, 5글자 미만 키는 건너뜀 (파편화 방지)
    let changed = false;
    for (const k of keys) {
      if (k.length < 5) continue;
      if (txt.includes(k)) {
        txt = txt.split(k).join(dict[k]);
        changed = true;
      }
    }
    if (changed) tn.textContent = txt;
  }
}
// t() Translate 함수 — 한국어 원문을 키로 사용, Current 언어의 Translate 반환
function t(ko) {
  if (_curLang === 'ko') return ko;
  const dict = I18N[_curLang];
  return (dict && dict[ko]) || ko;
}

  const m = document.cookie.match(/cc-lang=(\w+)/);
  if (m) _curLang = m[1];
  // ?lang= 쿼리 파라미터도 Confirm (우선)
  const ql = new URLSearchParams(location.search).get('lang');
  if (ql && ['en','zh'].includes(ql)) {
    _curLang = ql;
    document.cookie = `cc-lang=${ql};path=/;max-age=${365*86400}`;
  }
  // 체크마크 동기화
  document.querySelectorAll('.lang-check').forEach(el => {
    el.style.display = el.dataset.lang === _curLang ? '' : 'none';
  });
})();

function _syncNavToggleVisibility() {
  const isMobile = window.matchMedia('(max-width: 900px)').matches;
  const collapsed = document.body.classList.contains('sb-collapsed');
  // 모바일 OR 데스크톱에서 접힌 경우 → 헤더 Toggle shown. 펼친 데스크톱은 sbToggle 사용.
  document.getElementById('navToggle').style.display = (isMobile || collapsed) ? '' : 'none';
}
function _toggleSidebar() {
  const isMobile = window.matchMedia('(max-width: 900px)').matches;
  if (isMobile) {
    const sb = document.getElementById('sidebar');
    sb.classList.toggle('open');
    document.body.classList.toggle('sidebar-open', sb.classList.contains('open'));
  } else {
    document.body.classList.toggle('sb-collapsed');
    try { localStorage.setItem('sb-collapsed', document.body.classList.contains('sb-collapsed') ? '1' : '0'); } catch {}
  }
  _syncNavToggleVisibility();
}

function _pollAuthAndReload() {
  let attempts = 0;
  const poll = setInterval(async () => {
    attempts++;
    try {
      const s = await api('/api/auth/status');
      if (s.connected) {
        clearInterval(poll);
        const msg = document.getElementById('gateMsg');
        if (msg) msg.innerHTML = '🎉 Login success! 대시보드를 불러옵니다…';
        setTimeout(() => location.reload(), 600);
      }
    } catch {}
    if (attempts >= 36) { // 3min
      clearInterval(poll);
      const msg = document.getElementById('gateMsg');
      if (msg) msg.innerHTML = '⏰ Timeout — 페이지를 Refresh 하세요.';
    }
  }, 5000);
}

// ────────────────────────────────────────────────────────────────
// CHATBOT — SSE Streaming
// ────────────────────────────────────────────────────────────────
const _chatHistory = [];
let _chatOpen = false;
let _chatStreaming = false;

// ── 마스코트: 자유 Navigate + 드래그 + 클릭 + 말풍선 + 챗창 위 뛰기 ──
const _mascotBubbles = [
  'Ask me anything! 🤔',
  'How are your session scores today?',
  'Click me to chat!',
  'Curious about MCP settings? Click me',
  'Check out new features 🆕',
  'Agent graph looks great 🤝',
  '⌘K for quick search!',
  'Call me if you need help ✨',
  'You can drag me around!',
];
let _mascotDragging = false;
let _mascotDragMoved = false;
let _mascotWanderTimer = null;
let _mascotBubbleTimer = null;
let _mascotOnChat = false; // 챗창 위에 있는 Status
let _mascotChatBounceTimer = null;

function _initMascot() {
  const el = document.getElementById('claudeMascot');
  if (!el) return;
  let startX, startY, origL, origT;

  // 드래그 (mouse)
  el.addEventListener('mousedown', (e) => {
    e.preventDefault();
    _mascotDragging = true;
    _mascotDragMoved = false;
    _stopMascotWander();
    startX = e.clientX; startY = e.clientY;
    const r = el.getBoundingClientRect();
    origL = r.left; origT = r.top;
  });
  document.addEventListener('mousemove', (e) => {
    if (!_mascotDragging) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) _mascotDragMoved = true;
    const nx = origL + dx, ny = origT + dy;
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
    el.style.right = 'auto'; el.style.bottom = 'auto';
    if (dx < -2) el.classList.add('facing-left');
    else if (dx > 2) el.classList.remove('facing-left');
  });
  document.addEventListener('mouseup', () => {
    if (!_mascotDragging) return;
    _mascotDragging = false;
    if (!_mascotDragMoved) {
      toggleChat();
    } else {
      _startMascotWander();
    }
  });

  // 드래그 (touch)
  el.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    _mascotDragging = true; _mascotDragMoved = false;
    _stopMascotWander();
    startX = t.clientX; startY = t.clientY;
    const r = el.getBoundingClientRect();
    origL = r.left; origT = r.top;
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (!_mascotDragging) return;
    const t = e.touches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) _mascotDragMoved = true;
    el.style.left = (origL + dx) + 'px'; el.style.top = (origT + dy) + 'px';
    el.style.right = 'auto'; el.style.bottom = 'auto';
  }, { passive: true });
  document.addEventListener('touchend', () => {
    if (!_mascotDragging) return;
    _mascotDragging = false;
    if (!_mascotDragMoved) toggleChat();
    else _startMascotWander();
  });

  // 초기 위치 설정
  el.style.left = (window.innerWidth - 90) + 'px';
  el.style.top = (window.innerHeight - 100) + 'px';
  el.style.right = 'auto'; el.style.bottom = 'auto';

  _startMascotWander();
  _mascotBubbleTimer = setInterval(_showRandomBubble, 15000);
  setTimeout(_showRandomBubble, 2500);
}

// 화면 여기저기 자유 Navigate
function _startMascotWander() {
  _stopMascotWander();
  _mascotWanderTimer = setInterval(_mascotWanderStep, 6000 + Math.random() * 4000);
}
function _stopMascotWander() {
  if (_mascotWanderTimer) { clearInterval(_mascotWanderTimer); _mascotWanderTimer = null; }
}
function _mascotWanderStep() {
  if (_mascotDragging || _mascotOnChat) return;
  const el = document.getElementById('claudeMascot');
  if (!el || el.style.display === 'none') return;

  // 10% 확률로 멈추고 speaking 모드
  if (Math.random() < 0.10) {
    _mascotSetMode('speaking');
    // 3sec 후 다시 jumping 으로
    setTimeout(() => _mascotSetMode('jumping'), 3000);
    return;
  }

  _mascotSetMode('jumping');
  const maxX = window.innerWidth - 80;
  const maxY = window.innerHeight - 80;
  const targetX = 60 + Math.random() * (maxX - 60);
  const targetY = 100 + Math.random() * (maxY - 100);
  const curR = el.getBoundingClientRect();

  // 방향 결정
  if (targetX < curR.left) el.classList.add('facing-left');
  else el.classList.remove('facing-left');

  el.style.transition = 'left 2.5s cubic-bezier(0.25,1,0.5,1), top 2.5s cubic-bezier(0.25,1,0.5,1)';
  el.style.left = targetX + 'px';
  el.style.top = targetY + 'px';
  el.style.right = 'auto'; el.style.bottom = 'auto';
  setTimeout(() => { el.style.transition = ''; }, 2600);
}

function _mascotSetMode(mode) {
  const jumping = document.getElementById('mascotJumping');
  const speaking = document.getElementById('mascotSpeaking');
  if (!jumping || !speaking) return;
  if (mode === 'speaking') {
    jumping.style.display = 'none';
    speaking.style.display = '';
  } else {
    jumping.style.display = '';
    speaking.style.display = 'none';
  }
}

// 챗창 위에서 좌우로 뛰기
function _mascotJumpOnChat() {
  _mascotOnChat = true;
  _stopMascotWander();
  const el = document.getElementById('claudeMascot');
  const win = document.getElementById('chatWin');
  if (!el || !win) return;

  function _bounce() {
    if (!_chatOpen || !_mascotOnChat) return;
    const wr = win.getBoundingClientRect();
    const minX = wr.left + 10;
    const maxX = wr.right - 70;
    const topY = wr.top - 50;
    const tx = minX + Math.random() * (maxX - minX);
    if (tx < parseFloat(el.style.left || 0)) el.classList.add('facing-left');
    else el.classList.remove('facing-left');
    el.style.transition = 'left 1s cubic-bezier(0.34,1.56,0.64,1), top 0.5s cubic-bezier(0.34,1.56,0.64,1)';
    el.style.left = tx + 'px';
    el.style.top = topY + 'px';
    el.style.right = 'auto'; el.style.bottom = 'auto';
    setTimeout(() => { el.style.transition = ''; }, 1100);
  }
  // 즉시 챗창 위로 점프
  const wr = win.getBoundingClientRect();
  el.style.transition = 'left 0.4s cubic-bezier(0.34,1.56,0.64,1), top 0.4s cubic-bezier(0.34,1.56,0.64,1)';
  el.style.left = (wr.left + wr.width / 2 - 35) + 'px';
  el.style.top = (wr.top - 50) + 'px';
  el.style.right = 'auto'; el.style.bottom = 'auto';
  setTimeout(() => { el.style.transition = ''; }, 500);
  _mascotChatBounceTimer = setInterval(_bounce, 2500);
}

function _mascotLeaveChat() {
  _mascotOnChat = false;
  if (_mascotChatBounceTimer) { clearInterval(_mascotChatBounceTimer); _mascotChatBounceTimer = null; }
  _startMascotWander();
}

function _showRandomBubble() {
  if (_chatOpen || _mascotDragging) return;
  const bubble = document.getElementById('mascotBubble');
  if (!bubble) return;
  const msg = t(_mascotBubbles[Math.floor(Math.random() * _mascotBubbles.length)]);
  bubble.textContent = msg;
  bubble.style.display = 'block';
  bubble.style.animation = 'none';
  requestAnimationFrame(() => { bubble.style.animation = ''; });
  // 말풍선 나올 때 speaking Switch to mode
  _mascotSetMode('speaking');
  setTimeout(() => {
    bubble.style.display = 'none';
    _mascotSetMode('jumping');
  }, 4000);
}

function toggleChat() {
  const win = document.getElementById('chatWin');
  const mascot = document.getElementById('claudeMascot');
  const bubble = document.getElementById('mascotBubble');
  if (_chatOpen) {
    // Close
    win.classList.remove('chat-win-enter');
    win.classList.add('chat-win-exit');
    setTimeout(() => { win.style.display = 'none'; win.classList.remove('chat-win-exit'); }, 200);
    _chatOpen = false;
    _mascotLeaveChat();
  } else {
    // Open — 말풍선 Hide
    if (bubble) bubble.style.display = 'none';
    // 챗 창을 마스코트 위치 근처에 Batch
    const mr = mascot.getBoundingClientRect();
    const chatW = 420, chatH = 480;
    let chatLeft = mr.left + mr.width / 2 - chatW / 2;
    let chatTop = mr.top + 60;
    // 화면 밖으로 안 나가게
    chatLeft = Math.max(8, Math.min(chatLeft, window.innerWidth - chatW - 8));
    chatTop = Math.max(8, Math.min(chatTop, window.innerHeight - chatH - 8));
    win.style.left = chatLeft + 'px';
    win.style.top = chatTop + 'px';
    win.style.right = 'auto'; win.style.bottom = 'auto';
    win.style.display = 'flex';
    win.classList.remove('chat-win-exit');
    win.classList.add('chat-win-enter');
    _chatOpen = true;
    setTimeout(() => document.getElementById('chatInput').focus(), 100);
    const msgs = document.getElementById('chatMessages');
    msgs.scrollTop = msgs.scrollHeight;
    // 마스코트를 챗창 위로 점프
    setTimeout(() => _mascotJumpOnChat(), 150);
  }
}

function _chatToggleMax() {
  const win = document.getElementById('chatWin');
  const isMax = win.classList.toggle('feat-win-maxed');
  if (isMax) {
    win.style.left = '10vw'; win.style.top = '5vh'; win.style.right = '10vw'; win.style.bottom = '5vh';
    win.style.width = '80vw'; win.style.maxHeight = '90vh';
  } else {
    win.style.left = 'auto'; win.style.top = 'auto'; win.style.right = '24px'; win.style.bottom = '92px';
    win.style.width = '420px'; win.style.maxHeight = 'min(600px,80vh)';
  }
}

// 챗 창 드래그 — enterDashboard 시점에 Reset
let _chatDragInit = false;

function _appendChatMsg(role, html) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = role === 'user' ? 'chat-msg chat-user' : 'chat-msg chat-bot';
  div.innerHTML = role === 'user'
    ? `<div class="chat-bubble-user">${html}</div>`
    : `<div class="chat-bubble-bot">${html}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || _chatStreaming) return;
  input.value = '';
  _chatStreaming = true;
  _appendChatMsg('user', escapeHtml(msg));
  _chatHistory.push({ role: 'user', text: msg });

  // 스트리밍 버블 Create
  const botDiv = _appendChatMsg('bot', '<span class="streaming-cursor"></span>');
  const bubble = botDiv.querySelector('.chat-bubble-bot');
  let fullText = '';

  try {
    const _chatBody = JSON.stringify({ message: msg, history: _chatHistory.slice(-6), lang: _curLang });
    const _chatHeaders = { 'Content-Type': 'application/json' };

    // 스트리밍 시도 → Failed 시 일반 API 폴백
    let res;
    try {
      res = await fetch('/api/chat/stream', { method: 'POST', headers: _chatHeaders, body: _chatBody });
    } catch(e) { res = null; }

    if (!res || res.status === 404 || res.status === 405) {
      // 폴백: 일반 chat API (fetch 직접 사용)
      try {
        const fr = await fetch('/api/chat', { method: 'POST', headers: _chatHeaders, body: _chatBody });
        const r = await fr.json();
        if (r.error) {
          bubble.innerHTML = `<span style="color:var(--err);">${escapeHtml(r.error)}</span>`;
        } else {
          let navBtn = '';
          if (r.navigate) {
            const navItem = NAV.find(n => n.id === r.navigate);
            const label = navItem ? navItem.label : r.navigate;
            navBtn = `<button class="btn text-[10px] mt-2" onclick="go('${r.navigate}');toggleChat();">${navItem?navItem.icon+' ':''} ${escapeHtml(label)} Go to tab</button>`;
          }
          bubble.innerHTML = escapeHtml(r.answer||'').replace(/\n/g,'<br>') + navBtn;
          _chatHistory.push({ role: 'assistant', text: r.answer || '' });
        }
      } catch(e2) {
        bubble.innerHTML = `<span style="color:var(--err);">Error: ${escapeHtml(e2.message)}</span>`;
      }
      _chatStreaming = false;
      return;
    }
    if (!res.ok) {
      bubble.innerHTML = `<span style="color:var(--err);">Error: ${res.status}</span>`;
      _chatStreaming = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let navigate = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          var evtType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && evtType) {
          try {
            const data = JSON.parse(line.slice(6));
            if (evtType === 'delta') {
              fullText += data.text || '';
              bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>') + '<span class="streaming-cursor"></span>';
              const msgs = document.getElementById('chatMessages');
              msgs.scrollTop = msgs.scrollHeight;
            } else if (evtType === 'replace') {
              fullText = data.text || fullText;
              bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>') + '<span class="streaming-cursor"></span>';
            } else if (evtType === 'done') {
              navigate = data.navigate;
              if (data.text && data.text !== fullText) fullText = data.text;
              // 즉시 커서 remove + 네비 버튼 shown
              let doneNavBtn = '';
              if (navigate) {
                const ni = NAV.find(n => n.id === navigate);
                const nl = ni ? ni.label : navigate;
                doneNavBtn = `<button class="btn text-[10px] mt-2" onclick="go('${navigate}');toggleChat();">${ni?ni.icon+' ':''} ${escapeHtml(nl)} Go to tab</button>`;
              }
              bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>') + doneNavBtn;
              _chatHistory.push({ role: 'assistant', text: fullText });
              _chatStreaming = false;
            } else if (evtType === 'error') {
              bubble.innerHTML = `<span style="color:var(--err);">${escapeHtml(data.error||'Error')}</span>`;
              _chatStreaming = false;
              return;
            }
          } catch {}
          evtType = null;
        }
      }
    }

    // Streaming complete — 커서 remove + 네비 버튼
    let navBtn = '';
    if (navigate) {
      const navItem = NAV.find(n => n.id === navigate);
      const label = navItem ? navItem.label : navigate;
      navBtn = `<button class="btn text-[10px] mt-2" onclick="go('${navigate}');toggleChat();">${navItem?navItem.icon+' ':''} ${escapeHtml(label)} Go to tab</button>`;
    }
    bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>') + navBtn;
    _chatHistory.push({ role: 'assistant', text: fullText });
  } catch (e) {
    bubble.innerHTML = `<span style="color:var(--err);">연결 Error: ${escapeHtml(e.message)}</span>`;
  }
  _chatStreaming = false;
}

// ────────────────────────────────────────────────────────────────
// SPOTLIGHT — Cmd+K
// ────────────────────────────────────────────────────────────────
let _spotlightOpen = false;
let _spotlightIdx = 0;

function openSpotlight() {
  if (_spotlightOpen) return;
  _spotlightOpen = true;
  _spotlightIdx = 0;
  const winId = 'spotlight-win';
  // 이미 DOM에 있으면 재사용
  let w = document.getElementById(winId);
  if (!w) {
    w = document.createElement('div');
    w.id = winId;
    w.className = 'feat-win chat-win-enter';
    w.innerHTML = `
      <div class="feat-win-title">
        <div class="feat-win-lights">
          <button class="feat-light feat-light-close" title="Close" onclick="closeSpotlight()"></button>
        </div>
        <div class="feat-win-title-text">🔍 Search</div>
        <kbd style="font-size:0.6rem;color:var(--text-dim);background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:4px;margin-left:auto;">ESC</kbd>
      </div>
      <div class="feat-win-body" style="padding:0;display:flex;flex-direction:column;">
        <div style="padding:0 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="spotlightInput" style="flex:1;background:transparent;border:none;outline:none !important;box-shadow:none !important;color:var(--text);font-size:1.1rem;padding:16px 0;font-family:inherit;-webkit-appearance:none;" placeholder="Tab navigation, feature search…" autocomplete="off">
        </div>
        <div id="spotlightResults" style="flex:1;overflow-y:auto;"></div>
      </div>
    `;
    document.body.appendChild(w);
  } else {
    w.style.display = 'flex';
    w.classList.remove('chat-win-exit', 'feat-win-minimized');
    w.classList.add('chat-win-enter');
    document.getElementById('spotlightInput').value = '';
  }
  // 항상 정중앙 고정
  w.style.cssText = 'position:fixed;inset:0;margin:auto;width:min(680px,92vw);height:min(520px,75vh);z-index:1200;';
  const inp = document.getElementById('spotlightInput');
  setTimeout(() => inp.focus(), 50);
  _renderSpotlightResults('');
  inp.oninput = () => { _spotlightIdx = 0; _renderSpotlightResults(inp.value); };
  inp.onkeydown = _spotlightKeydown;
}

function closeSpotlight() {
  _spotlightOpen = false;
  const w = document.getElementById('spotlight-win');
  if (w) {
    w.classList.remove('chat-win-enter');
    w.classList.add('chat-win-exit');
    setTimeout(() => { if (w) w.style.display = 'none'; w.classList.remove('chat-win-exit'); }, 200);
  }
}

// 탭 연관 키워드 — 검색어와 탭을 연결
const _NAV_KEYWORDS = {
  features: ['New Features','design','디자인','artifact','아티팩트','mcp','tool use','vision','비전','web search','웹검색','extended thinking','Code execution','batch','Batch','citation','인용','prompt caching','캐싱','streaming','스트리밍','computer use','컴퓨터','pdf','File','업로드','image','이미지','model context protocol','agent','Agents','sub-agent','Sub-agents','hooks','훅','skills','Skills','max','opus','sonnet','haiku','claude 4','glasswing','routines'],
  overview: ['개요','Dashboard','Score','스코어','최적화','score','optimization','홈','home'],
  projects: ['Projects','project','CLAUDE.md','설정','세팅','Folder'],
  analytics: ['통계','analytics','Graph','chart','타임라인','timeline','Tools 분포'],
  aiEval: ['ai Evaluation','Diagnosis','evaluation','Overall','Analysis','우선순위'],
  sessions: ['Sessions','session','히스토리','history','대화','Search'],
  agents: ['Agents','agent','Graph','graph','상호작용','Delegations','delegation'],
  projectAgents: ['Sub-agents','sub-agent','역할','role','프리셋','preset'],
  skills: ['Skills','skill','User-defined'],
  commands: ['슬래시','slash','Commands','command','/'],
  hooks: ['훅','hook','Events','event','자동화','automation','pre-commit','post'],
  permissions: ['권한','permission','Allow','allow','Deny','deny','보안','security'],
  mcp: ['mcp','Connectors','connector','Server','server','외부 Tools','slack','github','database','db','postgres','sqlite'],
  plugins: ['Plugin','plugin','확장','extension','마켓'],
  settings: ['설정','settings','json','환경','config','설정 File'],
  claudemd: ['claude.md','마크다운','markdown','지침','Rules','Memory'],
  usage: ['Usage','Cost','cost','usage','Tokens','token','billing','결제'],
  metrics: ['메트릭','metric','Tokens','시계열'],
  memory: ['Memory','memory','기억','자동 기억'],
  tasks: ['Tasks','task','todo','할 days'],
  team: ['팀','team','Organization','organization','워크스페이스','멤버'],
  system: ['System','system','Device','device','Status'],
  statusline: ['Status Line','statusline','키바인딩','keybinding','단축키','shortcut'],
  mcp: ['mcp','Connectors','connector','외부 Tools','slack','github','database'],
};

function _getSpotlightItems(query) {
  const q = (query || '').toLowerCase().trim();
  const scored = []; // {item, score}

  // Score 계산 헬퍼
  const _score = (text, q) => {
    if (!q) return 1;
    const t = text.toLowerCase();
    if (t === q) return 100;
    if (t.startsWith(q)) return 80;
    if (t.includes(q)) return 60;
    // 각 단어 매칭
    const words = q.split(/\s+/);
    const matched = words.filter(w => t.includes(w)).length;
    if (matched === words.length) return 50;
    if (matched > 0) return 20 * matched;
    return 0;
  };

  // 1) 탭 목록 — Name + Description + 연관 키워드 Search
  for (const n of NAV) {
    const keywords = (_NAV_KEYWORDS[n.id] || []).join(' ');
    const text = `${n.label} ${n.desc||''} ${n.id} ${keywords}`;
    const s = _score(text, q);
    if (s > 0) {
      scored.push({ item: { type: 'nav', id: n.id, icon: n.icon, label: n.label, desc: n.desc || '', group: n.group }, score: s });
    }
  }

  // 2) New Features 개별 항목 — features Search in data
  const feats = state.data.features || {};
  const allFeats = [...(feats.builtin || []), ...(feats.dynamic || [])];
  for (const f of allFeats) {
    const text = `${f.label||''} ${f.summary||''} ${f.id||''} ${(f.keywords||[]).join(' ')}`;
    const s = _score(text, q);
    if (s > 0 && q) {
      scored.push({ item: { type: 'feature', id: f.id, icon: f.icon||'✨', label: f.label, desc: f.summary||'', feat: f }, score: s + 5 }); // 정확한 매칭 보너스
    }
  }

  // 3) Quick Actions
  const actions = [
    { id: 'act-reindex', icon: '🔄', label: 'Session Reindex', desc: 'Refresh session DB', fn: "reindex(false)" },
    { id: 'act-chat', icon: '💬', label: '챗봇 Open', desc: 'Chat with dashboard assistant', fn: "toggleChat()" },
    { id: 'act-cli', icon: '⚙️', label: 'CLI Status Confirm', desc: 'Check login status / plan', fn: "openCliStatusModal()" },
    { id: 'act-refresh', icon: '↻', label: 'Refresh', desc: 'Reload current view', fn: "renderView()" },
  ];
  for (const a of actions) {
    const text = `${a.label} ${a.desc}`;
    const s = _score(text, q);
    if (s > 0) scored.push({ item: { type: 'action', ...a }, score: s });
  }

  // Score 내림차순 Sort, 최대 15
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 15).map(s => s.item);
}

function _renderSpotlightResults(query) {
  const items = _getSpotlightItems(query);
  const el = document.getElementById('spotlightResults');
  if (!items.length) {
    el.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:0.85rem;">${t('No results')}</div>`;
    return;
  }
  el.innerHTML = items.map((it, i) => `
    <div class="spotlight-item ${i===_spotlightIdx?'active':''}" data-idx="${i}"
      onclick="_spotlightSelect(${i})" onmouseenter="_spotlightIdx=${i};_highlightSpotlight()">
      <span class="sl-icon">${it.icon}</span>
      <div>
        <div class="sl-label">${escapeHtml(it.label)}</div>
        ${it.desc ? `<div class="sl-desc">${escapeHtml(it.desc)}</div>` : ''}
      </div>
      ${it.type==='nav'?`<span class="sl-kbd">${t('Navigate')}</span>`:it.type==='feature'?`<span class="sl-kbd">${t('New Features')}</span>`:`<span class="sl-kbd">${t('Run')}</span>`}
    </div>
  `).join('');
}

function _highlightSpotlight() {
  const items = document.querySelectorAll('.spotlight-item');
  items.forEach((el, i) => el.classList.toggle('active', i === _spotlightIdx));
  const active = items[_spotlightIdx];
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function _spotlightSelect(idx) {
  const items = _getSpotlightItems(document.getElementById('spotlightInput')?.value || '');
  const item = items[idx];
  if (!item) return;
  closeSpotlight();
  if (item.type === 'nav') {
    go(item.id);
  } else if (item.type === 'feature' && item.feat) {
    go('features');
    setTimeout(() => { try { openFeatureWindow(item.feat); } catch {} }, 300);
  } else if (item.fn) {
    try { eval(item.fn); } catch {}
  }
}

function _spotlightKeydown(e) {
  const items = _getSpotlightItems(document.getElementById('spotlightInput')?.value || '');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _spotlightIdx = Math.min(_spotlightIdx + 1, items.length - 1);
    _highlightSpotlight();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _spotlightIdx = Math.max(_spotlightIdx - 1, 0);
    _highlightSpotlight();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    _spotlightSelect(_spotlightIdx);
  } else if (e.key === 'Escape') {
    closeSpotlight();
  }
}

// 글로벌 Cmd+K / Ctrl+K 핸들러
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    if (_spotlightOpen) closeSpotlight();
    else openSpotlight();
  }
  if (e.key === 'Escape' && _spotlightOpen) {
    closeSpotlight();
  }
});

(async function boot() {
  state.view = (location.hash.replace(/^#\//, '') || 'overview');
  if (!NAV.find(n => n.id === state.view)) state.view = 'overview';
  renderNav();
  // 항상 Login 게이트를 먼저 shown — 연결 Confirm 후 진입
  try {
    const auth = await api('/api/auth/status');
    showLoginGate(auth);
  } catch(e) {
    showLoginGate({ connected: false, cliInstalled: false, reason: 'Server Connection Failed: ' + e.message });
  }
})();
