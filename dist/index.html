VIEWS.backups = async () => {
  const d = await api('/api/backups/list');
  const renderGroup = (title, hint, data) => `
    <div class="card p-5 mb-4">
      <div class="flex items-center justify-between mb-3">
        <div>
          <h3 class="font-semibold text-sm">${title}</h3>
          <p class="text-[11px] text-[var(--text-mute)] mt-0.5">${hint}</p>
        </div>
        <span class="chip">${data.items.length} / 전체 ${data.total||'—'}</span>
      </div>
      ${data.exists ? `
        <table class="data">
          <thead><tr><th>이름</th><th class="text-right">크기</th><th class="text-right">수정</th></tr></thead>
          <tbody>
            ${data.items.map(x => `
              <tr>
                <td class="mono text-xs truncate" style="max-width:420px;">${x.isDir?'📁 ':'📄 '}${escapeHtml(x.name)}</td>
                <td class="text-right text-xs">${formatBytes(x.size)}</td>
                <td class="text-right text-xs text-[var(--text-mute)]">${fmtRel(x.modifiedAt)}</td>
              </tr>`).join('') || '<tr><td colspan="3" class="empty text-xs">없음</td></tr>'}
          </tbody>
        </table>` : '<div class="empty text-xs">디렉토리 없음</div>'}
    </div>`;
  return `
    ${viewHeader('백업 / 파일 히스토리', 'Claude Code 가 자동 생성하는 복구/롤백 데이터', 'backups')}
    ${renderGroup('💾 Backups', '~/.claude/backups/ — 세션 자동 백업', d.backups)}
    ${renderGroup('📝 File History', '~/.claude/file-history/<sessionId>/ — 세션 중 파일 편집 이력', d.fileHistory)}
    ${renderGroup('🖥 Shell Snapshots', '~/.claude/shell-snapshots/ — Claude Code 가 덮어쓴 쉘 환경 스냅샷', d.shellSnapshots)}`;
};
function formatBytes(n) {
  if (!n) return '0';
  if (n < 1024) return n + 'B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + 'KB';
  if (n < 1024*1024*1024) return (n/1024/1024).toFixed(2) + 'MB';
  return (n/1024/1024/1024).toFixed(2) + 'GB';
}

// ────────────────────────────────────────────────────────────────
// TASKS
// ────────────────────────────────────────────────────────────────
VIEWS.tasks = async () => {
  const d = await api('/api/tasks/list');
  const sess = d.sessions || [];
  // 수동 세션을 항상 최상단에 노출
  const manual = sess.find(s => s.id === 'dashboard-manual');
  const others = sess.filter(s => s.id !== 'dashboard-manual');
  const ordered = [manual || { id: 'dashboard-manual', taskCount: 0, completed: 0, inProgress: 0, tasks: [] }, ...others];

  const renderTaskRow = (sid, t) => {
    const iconMap = { completed:'✅', in_progress:'🔄', pending:'⏳' };
    const col = { completed:'#4ade80', in_progress:'#fbbf24', pending:'#9aa0aa' }[t.status] || '#9aa0aa';
    const canEdit = sid === 'dashboard-manual';
    return `
      <div class="group flex items-start gap-2 py-1 px-2 rounded hover:bg-white/5">
        ${canEdit
          ? `<button class="p-0 bg-transparent border-0 cursor-pointer text-lg" title="상태 토글" onclick='toggleTaskStatus(${JSON.stringify(sid)}, ${JSON.stringify(t)})'>${iconMap[t.status]||'•'}</button>`
          : `<span style="color:${col}">${iconMap[t.status]||'•'}</span>`}
        <div class="flex-1 min-w-0">
          <div class="text-sm ${t.status==='completed'?'line-through text-[var(--text-dim)]':''}">${escapeHtml(t.subject)}</div>
          ${t.description ? `<div class="text-[10px] text-[var(--text-mute)] line-clamp-2">${escapeHtml(t.description)}</div>` : ''}
        </div>
        ${canEdit ? `
          <div class="flex gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100">
            <button class="btn text-[10px]" onclick='openTaskEditor(${JSON.stringify(sid)}, ${JSON.stringify(t)})'>수정</button>
            <button class="btn text-[10px]" style="color:#fca5a5" onclick='deleteTask(${JSON.stringify(sid)}, ${JSON.stringify(t.id)})'>삭제</button>
          </div>` : ''}
      </div>`;
  };

  return `
    ${viewHeader('태스크 / TODO', '세션별 TaskCreate 저장소. 수동 태스크는 dashboard-manual 세션에 누적.', 'tasks')}
    <div class="mb-4 card p-4" style="background: linear-gradient(135deg, rgba(217,119,87,0.06), transparent);">
      <div class="flex items-center justify-between gap-2 flex-wrap">
        <div>
          <div class="font-semibold text-sm">＋ 수동 TODO 추가</div>
          <div class="text-xs text-[var(--text-mute)]">대시보드에서 직접 만든 태스크는 ~/.claude/tasks/dashboard-manual/ 로 저장</div>
        </div>
        <button class="btn-primary btn" onclick="openTaskEditor('dashboard-manual', null)">＋ 새 TODO</button>
      </div>
    </div>
    ${ordered.map(s => {
      const pct = s.taskCount ? Math.round((s.completed / s.taskCount) * 100) : 0;
      const isManual = s.id === 'dashboard-manual';
      return `
      <div class="card p-4 mb-3" ${isManual?'style="border-color: rgba(217,119,87,0.35);"':''}>
        <div class="flex items-center justify-between mb-3">
          <div>
            <div class="font-semibold text-sm mono">${isManual ? '<span class="chip chip-accent">수동</span> dashboard-manual' : escapeHtml(s.id.slice(0,8))+'…'}</div>
            ${s.updatedAt ? `<div class="text-[11px] text-[var(--text-mute)]">${fmtRel(s.updatedAt)}</div>` : ''}
          </div>
          <div class="text-right">
            <div class="text-xs"><b>${s.completed}</b> / ${s.taskCount} 완료 · ${s.inProgress} 진행</div>
            <div class="h-1.5 w-[160px] rounded-full bg-white/5 overflow-hidden mt-1"><div style="width:${pct}%; height:100%; background:var(--grad);"></div></div>
          </div>
        </div>
        ${s.tasks.length ? `<div class="space-y-1">${s.tasks.map(t => renderTaskRow(s.id, t)).join('')}</div>` : '<div class="empty text-xs">비어있음</div>'}
      </div>`;
    }).join('')}
  `;
};

function openTaskEditor(sessionId, existing) {
  const e = existing || { id: '', subject: '', description: '', status: 'pending', activeForm: '' };
  const isEdit = !!existing;
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <h2 class="font-semibold">${isEdit ? 'TODO 수정' : '새 TODO 추가'}</h2>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div class="p-5 space-y-3">
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">제목 (subject)</div>
        <input id="tkSubject" class="input" value="${escapeHtml(e.subject)}" placeholder="예: 프로젝트 README 작성" />
      </div>
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">설명 (optional)</div>
        <textarea id="tkDesc" class="input" style="min-height:100px;">${escapeHtml(e.description)}</textarea>
      </div>
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">진행 중 표시문 (activeForm)</div>
        <input id="tkAF" class="input" value="${escapeHtml(e.activeForm||'')}" placeholder="예: README 작성 중" />
      </div>
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">상태</div>
        <select id="tkStatus" class="input">
          <option value="pending" ${e.status==='pending'?'selected':''}>⏳ 대기</option>
          <option value="in_progress" ${e.status==='in_progress'?'selected':''}>🔄 진행 중</option>
          <option value="completed" ${e.status==='completed'?'selected':''}>✅ 완료</option>
        </select>
      </div>
    </div>
    <div class="p-4 border-t border-[var(--border)] flex justify-end gap-2">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn-primary btn" id="tkSaveBtn">저장</button>
    </div>
  `);
  document.getElementById('tkSaveBtn').onclick = async () => {
    const payload = {
      sessionId,
      id: e.id || undefined,
      subject: document.getElementById('tkSubject').value.trim(),
      description: document.getElementById('tkDesc').value,
      activeForm: document.getElementById('tkAF').value,
      status: document.getElementById('tkStatus').value,
    };
    if (!payload.subject) { toast('제목을 입력하세요', 'warn'); return; }
    const r = await api('/api/tasks/save', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    if (r.ok) { toast('저장됨', 'ok'); closeModal(); renderView(); }
    else toast(r.error||'실패', 'err');
  };
}

async function toggleTaskStatus(sessionId, t) {
  const next = { pending:'in_progress', in_progress:'completed', completed:'pending' }[t.status] || 'pending';
  const r = await api('/api/tasks/save', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sessionId, id: t.id, subject: t.subject, description: t.description, activeForm: t.activeForm, status: next }),
  });
  if (r.ok) renderView();
  else toast(r.error||'실패', 'err');
}

async function deleteTask(sessionId, id) {
  if (!confirm('TODO 를 삭제할까요?')) return;
  const r = await api('/api/tasks/delete', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sessionId, id }),
  });
  if (r.ok) { toast('삭제됨', 'ok'); renderView(); }
  else toast(r.error||'실패', 'err');
}

    <div class="card p-4 mt-4 text-xs text-[var(--text-mute)]">
      <b>참고:</b> ${escapeHtml(t.note||'')}<br>
      팀 멤버 목록·사용량·결제는 <a href="https://claude.ai/settings/organization" target="_blank" style="color:var(--accent); text-decoration:underline;">claude.ai/settings/organization</a> 에서 직접 관리합니다. Claude Code 로컬 설정에는 조직 식별자만 저장됩니다.
    </div>
  `;
};

// ────────────────────────────────────────────────────────────────
// SYSTEM
// ────────────────────────────────────────────────────────────────
VIEWS.system = async () => {
  const [status, devinfo] = await Promise.all([api('/api/system/status'), api('/api/device/info')]);
  const sess = status.sessions || [];
  return `
    ${viewHeader('시스템 상태', '디바이스 & 활성 세션 · 권한 요약', 'system')}

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5">
      <div class="card p-5">
        <h3 class="font-semibold text-sm mb-3">🖥 디바이스</h3>
        <table class="data">
          <tbody>
            ${Object.entries(devinfo).map(([k,v]) => `
              <tr><td class="text-[var(--text-mute)] text-xs w-[130px]">${k}</td><td class="mono text-xs">${escapeHtml(v)}</td></tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="card p-5">
        <h3 class="font-semibold text-sm mb-3">💾 권한 요약</h3>
        <div class="flex items-center gap-2 mb-3 flex-wrap">
          <span class="chip chip-ok">허용 ${status.permissions.allow.length}</span>
          <span class="chip chip-err">차단 ${status.permissions.deny.length}</span>
          <span class="chip">훅 ${status.hooks.length}</span>
        </div>
        <div class="text-xs text-[var(--text-mute)]">편집은 "Settings 편집" 또는 "권한" 탭에서.</div>
      </div>
    </div>

    <div class="card p-5">
      <h3 class="font-semibold text-sm mb-3">⚡ 활성 세션 (${sess.length})</h3>
      ${sess.length ? `
        <table class="data">
          <thead><tr><th>PID</th><th>프로젝트</th><th>경로</th><th>종류</th><th>버전</th><th class="text-right">시작</th><th></th></tr></thead>
          <tbody>
            ${sess.map(s => `
              <tr>
                <td><span class="pulse-dot ${s.alive?'':'off'} inline-block mr-1"></span><span class="mono text-xs">${s.pid||'—'}</span></td>
                <td class="text-xs">${escapeHtml(s.project||'—')}</td>
                <td class="mono text-[10px] text-[var(--text-mute)] truncate" style="max-width:300px;">${escapeHtml(s.workspace||'')}</td>
                <td class="text-xs">${escapeHtml(s.kind||'')}</td>
                <td class="mono text-xs">${escapeHtml(s.version||'')}</td>
                <td class="text-right text-xs text-[var(--text-mute)]">${fmtRel(s.startedAt)}</td>
                <td class="text-right"><button class="btn text-xs" onclick="openSessionTerminal('${s.sessionId}')">터미널</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>` : '<div class="empty text-sm">활성 세션이 없습니다.</div>'}
    </div>
  `;
};

// ────────────────────────────────────────────────────────────────
// MODALS
// ────────────────────────────────────────────────────────────────
function showModal(html, opts) {
  const root = document.getElementById('modal-root');
  const wide = opts && opts.wide ? ' modal-wide' : '';
  root.innerHTML = `<div class="modal-backdrop" onclick="if(event.target===this)closeModal()"><div class="modal${wide}">${html}</div></div>`;
}
function showModalLoading(msg) {
  showModal(`<div class="p-10 empty"><div class="shimmer h-4 w-48 mx-auto mb-2"></div><div>${escapeHtml(msg)}</div></div>`);
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}
function showEditModal({ title, raw, save, readOnly }) {
  const ro = !!readOnly;
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <h2 class="font-semibold">${escapeHtml(title)}</h2>
      <div class="flex gap-2">
        ${ro ? '' : '<button class="btn-primary btn" id="editSaveBtn">💾 저장</button>'}
        <button class="btn" onclick="closeModal()">닫기</button>
      </div>
    </div>
    <div class="p-5 flex-1 overflow-y-auto">
      <textarea id="editModalText" class="input" style="min-height: 560px;" ${ro?'readonly':''}>${escapeHtml(raw||'')}</textarea>
    </div>
  `);
  if (!ro && save) {
    document.getElementById('editSaveBtn').onclick = async () => {
      const v = document.getElementById('editModalText').value;
      try {
        const r = await save(v);
        toast(r.ok ? '저장됨' : '실패', r.ok ? 'ok' : 'err');
        if (r.ok) { closeModal(); renderView(); }
      } catch (e) {
        toast('실패: ' + e.message, 'err');
      }
    };
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ────────────────────────────────────────────────────────────────
// ACTIONS
// ────────────────────────────────────────────────────────────────
async function reindex(force=false) {
  const s = document.getElementById('liveStatus');
  s.innerHTML = '<span class="pulse-dot"></span><span>인덱싱 중…</span>';
  try {
    const r = await api('/api/sessions/reindex', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ force }) });
    toast(`인덱스 완료 — 갱신 ${r.indexed} / 스킵 ${r.skipped}`, 'ok');
    s.innerHTML = '<span class="pulse-dot"></span><span>연결됨</span>';
    renderView();
  } catch (e) {
    toast('재인덱스 실패: ' + e.message, 'err');
    s.innerHTML = '<span class="pulse-dot off"></span><span>오류</span>';
  }
}

// ────────────────────────────────────────────────────────────────
// BOOT
// ────────────────────────────────────────────────────────────────
async function loadCliFoot() {
  try {
    const auth = await api('/api/auth/status');
    const cliOk = auth.cliInstalled;
    const connOk = auth.connected;
    const overallOk = cliOk && connOk;
    const badge = (ok, label) =>
      `<span class="inline-flex items-center gap-1 text-[10px]">
        <span class="w-1.5 h-1.5 rounded-full" style="background:${ok?'var(--ok)':'var(--err)'}"></span>${label}
      </span>`;
    document.getElementById('cliStatus').innerHTML = `
      <div class="card p-2.5 hover-lift cursor-pointer" onclick="openCliStatusModal()">
        <div class="flex items-center justify-between mb-1">
          <span class="cli-body text-[11px] font-semibold">${overallOk ? 'Claude CLI 연결됨' : 'Claude CLI 점검'}</span>
          <span class="w-2 h-2 rounded-full" style="background:${overallOk?'var(--ok)':'var(--warn)'}; box-shadow:0 0 8px ${overallOk?'rgba(74,222,128,0.6)':'rgba(251,191,36,0.6)'};"></span>
        </div>
        <div class="cli-body flex items-center gap-2">
          ${badge(cliOk, cliOk ? `CLI ${escapeHtml((auth.cliVersion||'').split(' ')[0]||'')}` : 'CLI 미설치')}
          ${badge(connOk, connOk ? '구독 인증' : '미로그인')}
        </div>
        ${connOk ? `<div class="cli-body text-[10px] text-[var(--text-dim)] mt-1 truncate">${escapeHtml(auth.planLabel||'')} · ${escapeHtml(auth.email||'')}</div>` : ''}
      </div>
    `;
  } catch {
    document.getElementById('cliStatus').innerHTML = '<div class="text-[10px] text-[var(--text-dim)]">상태 확인 실패</div>';
  }
}

async function openCliStatusModal() {
  const auth = await api('/api/auth/status');
  const row = (k, v) => `<tr><td class="text-[var(--text-mute)] text-xs w-[150px]">${k}</td><td class="mono text-xs break-all">${escapeHtml(String(v ?? '—'))}</td></tr>`;
  const plans = auth.availablePlans || [];
  const claimed = auth.claimedPlanId || '';
  const planOptions = [
    `<option value="">— 선택 안 함 —</option>`,
    ...plans.map(p => `<option value="${p.id}" ${p.id===claimed?'selected':''}>${escapeHtml(p.label)}${p.note?` · ${escapeHtml(p.note)}`:''}</option>`)
  ].join('');
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">Claude CLI 연결 상태</div>
        <h2 class="text-lg font-bold">${auth.connected ? '✅ 연결됨' : '⚠️ 설정 필요'}</h2>
      </div>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div class="p-5 overflow-y-auto space-y-4">
      <div class="card p-4">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)] mb-2">CLI 바이너리</div>
        <table class="data"><tbody>
          ${row('설치 여부', auth.cliInstalled ? '✅' : '❌ (brew install 필요)')}
          ${row('경로', auth.cliPath)}
          ${row('버전', auth.cliVersion)}
        </tbody></table>
        ${!auth.cliInstalled ? '<div class="text-xs text-[var(--text-mute)] mt-2">설치: 터미널에서 <code class="mono">curl -fsSL claude.ai/install.sh | bash</code></div>' : ''}
      </div>
      <div class="card p-4">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)] mb-2">계정 / 구독</div>
        <table class="data"><tbody>
          ${row('이메일', auth.email)}
          ${row('이름', auth.displayName)}
          ${row('billingType (로컬)', auth.billingType || '—')}
          ${row('조직 역할', auth.organizationRole)}
          ${row('가입일', (auth.accountCreatedAt||'').slice(0,10))}
          ${row('구독 시작', (auth.subscriptionCreatedAt||'').slice(0,10))}
        </tbody></table>
        ${!auth.connected ? '<div class="text-xs text-[var(--text-mute)] mt-2">터미널에서 <code class="mono">claude login</code> 실행 후 새로고침.</div>' : ''}
      </div>
      <div class="card p-4" style="background: linear-gradient(135deg, rgba(217,119,87,0.06), transparent);">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)] mb-2">내 플랜</div>
        <div class="text-xs text-[var(--text-mute)] mb-2">
          Claude Code 는 로컬에 <b>구독 세부 플랜(Pro·Max·Team)을 저장하지 않습니다</b>. 정확한 표시를 원하면 여기서 직접 지정하세요.
        </div>
        <div class="flex gap-2">
          <select id="planSelect" class="input flex-1">${planOptions}</select>
          <button class="btn-primary btn" onclick="saveClaimedPlan()">저장</button>
        </div>
        <div class="text-[10px] text-[var(--text-dim)] mt-2">저장 위치: <span class="mono">~/.claude-dashboard-config.json</span> · 다른 앱에 영향 없음</div>
      </div>
      <div class="text-[10px] text-[var(--text-dim)]">AI 추천 등 claude CLI 가 필요한 기능은 위의 상태 두 개가 모두 초록일 때만 동작합니다.</div>
    </div>
  `);
}

async function saveClaimedPlan() {
  const planId = document.getElementById('planSelect').value;
  const r = await api('/api/auth/claimed-plan', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ planId })
  });
  if (r.ok) {
    toast(planId ? '플랜 저장됨' : '플랜 선택 해제됨', 'ok');
    closeModal();
    await loadCliFoot();
  } else toast(r.error||'실패', 'err');
}

document.getElementById('btn-reindex').onclick = () => reindex(false);
document.getElementById('btn-refresh').onclick = () => { toast('새로고침', 'info'); renderView(); };
function _syncNavToggleVisibility() {
  const isMobile = window.matchMedia('(max-width: 900px)').matches;
  const collapsed = document.body.classList.contains('sb-collapsed');
  // 모바일 OR 데스크톱에서 접힌 경우 → 헤더 토글 표시. 펼친 데스크톱은 sbToggle 사용.
  document.getElementById('navToggle').style.display = (isMobile || collapsed) ? '' : 'none';
}
function _toggleSidebar() {
  const isMobile = window.matchMedia('(max-width: 900px)').matches;
  if (isMobile) {
    document.getElementById('sidebar').classList.toggle('open');
  } else {
    document.body.classList.toggle('sb-collapsed');
    try { localStorage.setItem('sb-collapsed', document.body.classList.contains('sb-collapsed') ? '1' : '0'); } catch {}
  }
  _syncNavToggleVisibility();
}
document.getElementById('sbToggle').onclick = _toggleSidebar;
document.getElementById('navToggle').onclick = _toggleSidebar;
window.addEventListener('resize', _syncNavToggleVisibility);
try { if (localStorage.getItem('sb-collapsed') === '1') document.body.classList.add('sb-collapsed'); } catch {}
_syncNavToggleVisibility();
document.getElementById('globalSearch').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (!q) return;
    state.data.sessionsFilter = { q, sort: 'recent' };
    go('sessions');
  }
});

(async function boot() {
  state.view = (location.hash.replace(/^#\//, '') || 'overview');
  if (!NAV.find(n => n.id === state.view)) state.view = 'overview';
  renderNav();
  await loadCliFoot();
  renderView();
})();
</script>
