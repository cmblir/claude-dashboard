// ─── 미니맵 ────────────────────────────────────────────────
const _WF_MINIMAP_W = 150, _WF_MINIMAP_H = 100;
const _WF_NODE_COLORS = {
  start: '#d97757', session: '#d97757', subagent: '#d97757',
  aggregate: '#c084fc', branch: '#fbbf24', output: '#4ade80',
  http: '#4ade80', transform: '#c084fc', variable: '#fbbf24',
  subworkflow: '#7dd3fc', embedding: '#f472b6',
  loop: '#a78bfa', retry: '#fb923c', error_handler: '#f87171',
  merge: '#06b6d4', delay: '#94a3b8',
};
function _wfRenderMinimap() {
  const cvs = document.getElementById('wfMinimap');
  if (!cvs) return;
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, _WF_MINIMAP_W, _WF_MINIMAP_H);
  // 워크플로우 미선택 또는 노드 없음 → 빈 박스 숨김
  if (!__wf.current || !(__wf.current.nodes || []).length) {
    cvs.style.display = 'none';
    return;
  }
  cvs.style.display = '';
  const nodes = __wf.current.nodes;
  // bounding box
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + WF_NODE_W); maxY = Math.max(maxY, n.y + WF_NODE_H);
  });
  const pad = 40;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
  const scale = Math.min(_WF_MINIMAP_W / rangeX, _WF_MINIMAP_H / rangeY);
  const offX = (_WF_MINIMAP_W - rangeX * scale) / 2;
  const offY = (_WF_MINIMAP_H - rangeY * scale) / 2;
  function toMini(x, y) { return { mx: offX + (x - minX) * scale, my: offY + (y - minY) * scale }; }
  // edges
  ctx.strokeStyle = 'rgba(217,119,87,0.3)';
  ctx.lineWidth = 0.5;
  (__wf.current.edges || []).forEach(e => {
    const fromN = nodes.find(n => n.id === e.from);
    const toN = nodes.find(n => n.id === e.to);
    if (!fromN || !toN) return;
    const a = toMini(fromN.x + WF_NODE_W / 2, fromN.y + WF_NODE_H / 2);
    const b = toMini(toN.x + WF_NODE_W / 2, toN.y + WF_NODE_H / 2);
    ctx.beginPath(); ctx.moveTo(a.mx, a.my); ctx.lineTo(b.mx, b.my); ctx.stroke();
  });
  // nodes as dots — 실행 상태가 있으면 status 색 우선, 없으면 node 타입 색
  const statusColors = { running: '#a78bfa', ok: '#4ade80', err: '#f87171', skipped: 'rgba(255,255,255,0.25)' };
  const lastResults = __wf.lastRunResults || {};
  nodes.forEach(n => {
    const c = toMini(n.x + WF_NODE_W / 2, n.y + WF_NODE_H / 2);
    const r = lastResults[n.id];
    const color = (r && statusColors[r.status]) || _WF_NODE_COLORS[n.type] || '#d97757';
    ctx.fillStyle = color;
    // running 은 살짝 더 크게
    const size = (r && r.status === 'running') ? 5 : 3;
    const offset = size / 2;
    ctx.fillRect(c.mx - offset, c.my - offset, size, size);
  });
  // viewport rect
  const host = document.getElementById('wfCanvasHost');
  if (!host) return;
  const rect = host.getBoundingClientRect();
  const view = __wf.current.viewport || { panX: 0, panY: 0, zoom: 1 };
  const zoom = view.zoom || 1;
  // screen coords of top-left/bottom-right in world space
  const wX0 = (0 - (view.panX || 0)) / zoom;
  const wY0 = (0 - (view.panY || 0)) / zoom;
  const wX1 = (rect.width - (view.panX || 0)) / zoom;
  const wY1 = (rect.height - (view.panY || 0)) / zoom;
  const vp0 = toMini(wX0, wY0);
  const vp1 = toMini(wX1, wY1);
  ctx.strokeStyle = 'rgba(217,119,87,0.6)';
  ctx.lineWidth = 1;
  ctx.fillStyle = 'rgba(217,119,87,0.08)';
  const vw = vp1.mx - vp0.mx, vh = vp1.my - vp0.my;
  ctx.fillRect(vp0.mx, vp0.my, vw, vh);
  ctx.strokeRect(vp0.mx, vp0.my, vw, vh);

  // store mapping for click handler
  cvs._wfMiniData = { minX, minY, rangeX, rangeY, scale, offX, offY };
}
// 미니맵 클릭 → 뷰포트 이동
(function _wfMinimapBindOnce() {
  document.addEventListener('click', (e) => {
    const cvs = document.getElementById('wfMinimap');
    if (!cvs || e.target !== cvs) return;
    if (!__wf.current || !cvs._wfMiniData) return;
    const br = cvs.getBoundingClientRect();
    const mx = e.clientX - br.left, my = e.clientY - br.top;
    const d = cvs._wfMiniData;
    // minimap coord → world coord
    const wx = (mx - d.offX) / d.scale + d.minX;
    const wy = (my - d.offY) / d.scale + d.minY;
    const host = document.getElementById('wfCanvasHost');
    if (!host) return;
    const rect = host.getBoundingClientRect();
    const view = __wf.current.viewport || { panX: 0, panY: 0, zoom: 1 };
    const zoom = view.zoom || 1;
    // center the clicked world point on screen
    view.panX = rect.width / 2 - wx * zoom;
    view.panY = rect.height / 2 - wy * zoom;
    __wf.current.viewport = view;
    const vp = document.getElementById('wfViewport');
    if (vp) vp.setAttribute('transform', `translate(${view.panX},${view.panY}) scale(${zoom})`);
    _wfSchedulePatch();
    _wfRenderMinimap();
  });
})();

function _wfPortPos(node, port) {
  // port = 'in' | 'out' | 'out_y' | 'out_n'
  if (port === 'in') return { x: node.x, y: node.y + WF_NODE_H/2 };
  if (port === 'out' || port === 'out_y') return { x: node.x + WF_NODE_W, y: node.y + WF_NODE_H/2 };
  if (port === 'out_n') return { x: node.x + WF_NODE_W, y: node.y + WF_NODE_H - 10 };
  return { x: node.x + WF_NODE_W, y: node.y + WF_NODE_H/2 };
}

function _wfRenderNode(n) {
  const meta = WF_TYPE_MAP[n.type] || WF_TYPE_MAP.session;
  const sel = __wf.selectedNodeId === n.id ? ' selected' : '';
  const sub = n.type === 'session' || n.type === 'subagent'
    ? `<text class="wf-node-sub" x="40" y="48">@${escapeHtml((n.data||{}).assignee || 'auto')}</text>`
    : `<text class="wf-node-sub" x="40" y="48">${escapeHtml(meta.label)}</text>`;
  const portIn = meta.portIn
    ? `<circle class="wf-port wf-port-in" cx="0" cy="${WF_NODE_H/2}" r="6" data-port="in" data-node="${n.id}"></circle>` : '';
  let portsOut = '';
  if (n.type === 'branch') {
    portsOut = `
      <circle class="wf-port" cx="${WF_NODE_W}" cy="18" r="6" data-port="out_y" data-node="${n.id}"></circle>
      <text x="${WF_NODE_W-12}" y="22" class="wf-node-sub" text-anchor="end" style="fill:#4ade80;">Y</text>
      <circle class="wf-port" cx="${WF_NODE_W}" cy="${WF_NODE_H-18}" r="6" data-port="out_n" data-node="${n.id}"></circle>
      <text x="${WF_NODE_W-12}" y="${WF_NODE_H-14}" class="wf-node-sub" text-anchor="end" style="fill:#f87171;">N</text>
    `;
  } else if (meta.portOut) {
    portsOut = `<circle class="wf-port" cx="${WF_NODE_W}" cy="${WF_NODE_H/2}" r="6" data-port="out" data-node="${n.id}"></circle>`;
  }
  // 세션/서브에이전트 노드에는 우상단에 터미널 spawn 아이콘 표시
  const spawnBtn = (n.type === 'session' || n.type === 'subagent')
    ? `
      <g class="wf-node-spawn" data-spawn="${n.id}" transform="translate(${WF_NODE_W - 26},6)" style="cursor:pointer;">
        <title>${t('새 Claude 세션 spawn')}</title>
        <rect width="20" height="20" rx="6" ry="6" fill="rgba(217,119,87,0.18)" stroke="rgba(217,119,87,0.45)"></rect>
        <text x="10" y="15" text-anchor="middle" font-size="12" pointer-events="none">🖥️</text>
      </g>` : '';
  return `
    <g class="wf-node${sel}" data-node="${n.id}" data-type="${n.type}" transform="translate(${n.x},${n.y})">
      <rect class="wf-node-body" width="${WF_NODE_W}" height="${WF_NODE_H}" rx="12" ry="12"></rect>
      <rect class="wf-node-ring" x="-4" y="-4" width="${WF_NODE_W+8}" height="${WF_NODE_H+8}" rx="14" ry="14"></rect>
      <text class="wf-node-icon" x="14" y="30">${meta.icon}</text>
      <text class="wf-node-title" x="40" y="28">${escapeHtml(n.title || meta.label)}</text>
      <text class="wf-node-elapsed" x="${WF_NODE_W-12}" y="${WF_NODE_H-8}" text-anchor="end"></text>
      ${sub}
      ${spawnBtn}
      ${portIn}${portsOut}
    </g>
  `;
}

function _wfRenderEdge(e) {
  if (!__wf.current) return '';
  const fromN = __wf.current.nodes.find(x => x.id === e.from);
  const toN   = __wf.current.nodes.find(x => x.id === e.to);
  if (!fromN || !toN) return '';
  const p1 = _wfPortPos(fromN, e.fromPort || 'out');
  const p2 = _wfPortPos(toN, e.toPort || 'in');
  const sel = __wf.selectedEdgeId === e.id ? ' selected' : '';
  return `<path class="wf-edge${sel}" data-edge="${e.id}" d="${_wfBezier(p1.x, p1.y, p2.x, p2.y)}"></path>`;
}

function _wfBezier(x1, y1, x2, y2) {
  const diffX = x2 - x1;
  if (diffX >= 0) {
    // 정방향(또는 동일 x): 기존처럼 수평 베지어
    const dx = Math.max(20, diffX * 0.45);
    return `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`;
  }
  // 역류: 출발이 도착보다 오른쪽. 제어점을 수직 방향(y2 쪽)으로 크게
  // 꺼내 부드러운 S-curve 로 우회. 루프·교차 방지.
  const verticalGap = Math.max(70, Math.abs(diffX) * 0.3);
  const dirY = (y2 >= y1) ? 1 : -1;
  const c1x = x1 + 60;
  const c1y = y1 + verticalGap * dirY;
  const c2x = x2 - 60;
  const c2y = y2 - verticalGap * dirY;
  return `M ${x1} ${y1} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x2} ${y2}`;
}

// DAG 토폴로지 레이어 기반으로 노드 위치를 자동 정렬.
// 같은 레이어(진입 거리 동일)끼리 세로로 균등 배치 → 엣지 교차 최소화.
function _wfBeautifyLayout() {
  if (!__wf.current) return false;
  const nodes = __wf.current.nodes || [];
  const edges = __wf.current.edges || [];
  if (!nodes.length) return false;

  const incoming = {}, outgoing = {};
  nodes.forEach(n => { incoming[n.id] = []; outgoing[n.id] = []; });
  edges.forEach(e => {
    if (incoming[e.to])   incoming[e.to].push(e.from);
    if (outgoing[e.from]) outgoing[e.from].push(e.to);
  });

  // Longest-path layering (Kahn's 기반 + layer = max(incoming.layer)+1)
  const layer = {};
  const indeg = {};
  nodes.forEach(n => { indeg[n.id] = incoming[n.id].length; });
  const queue = [];
  nodes.forEach(n => { if (indeg[n.id] === 0) { layer[n.id] = 0; queue.push(n.id); } });
  while (queue.length) {
    const u = queue.shift();
    (outgoing[u] || []).forEach(v => {
      const candidate = layer[u] + 1;
      if (layer[v] === undefined || candidate > layer[v]) layer[v] = candidate;
      indeg[v]--;
      if (indeg[v] === 0) queue.push(v);
    });
  }
  // 사이클에 포함된 노드는 기본 0
  nodes.forEach(n => { if (layer[n.id] === undefined) layer[n.id] = 0; });

  // 레이어별로 그룹화
  const byLayer = {};
  nodes.forEach(n => {
    (byLayer[layer[n.id]] = byLayer[layer[n.id]] || []).push(n);
  });
  // 같은 레이어 내에서는 기존 y 순서 유지 (안정성)
  Object.values(byLayer).forEach(list => list.sort((a, b) => a.y - b.y));

  // 배치 파라미터
  const GAP_X = WF_NODE_W + 60;  // 180 + 60 = 240
  const GAP_Y = WF_NODE_H + 56;  // 64 + 56 = 120
  const ORIGIN_X = 60, ORIGIN_Y = 60;

  Object.keys(byLayer)
    .map(Number)
    .sort((a, b) => a - b)
    .forEach(L => {
      const list = byLayer[L];
      // 세로 중앙 정렬: layer 전체 높이 = list.length × GAP_Y
      const totalH = list.length * GAP_Y;
      // 모든 레이어의 최대 layer-height 중 가장 큰 값에 맞춰 상단 정렬은 복잡 →
      // 간단하게 ORIGIN_Y 부터 시작
      list.forEach((n, i) => {
        n.x = ORIGIN_X + L * GAP_X;
        n.y = ORIGIN_Y + i * GAP_Y;
      });
    });
  __wf.dirty = true;
  return true;
}

// 모든 노드 bounding box 를 캔버스에 맞춰 pan/zoom 을 계산해 적용.
// + 자동 정렬(beautify) — 여기저기 흩어진 노드를 DAG 레이어 기반으로 정돈.
function _wfFitView() {
  if (!__wf.current) return;
  const nodes = __wf.current.nodes || [];
  const host = document.getElementById('wfCanvasHost');
  if (!host) return;
  const rect = host.getBoundingClientRect();
  if (!nodes.length) {
    __wf.current.viewport = { panX: 0, panY: 0, zoom: 1 };
    const vp0 = document.getElementById('wfViewport');
    if (vp0) vp0.setAttribute('transform', 'translate(0,0) scale(1)');
    return;
  }
  // 1) 자동 정렬
  _wfBeautifyLayout();
  _wfRenderCanvas();
  // 2) bounding box 계산 + pan/zoom 맞춤
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + WF_NODE_W);
    maxY = Math.max(maxY, n.y + WF_NODE_H);
  });
  const pad = 48;
  const contentW = (maxX - minX) + pad * 2;
  const contentH = (maxY - minY) + pad * 2;
  const scaleRaw = Math.min(rect.width / contentW, rect.height / contentH);
  const zoom = Math.max(0.4, Math.min(1.6, scaleRaw));
  const contentCX = (minX + maxX) / 2;
  const contentCY = (minY + maxY) / 2;
  const panX = rect.width / 2 - contentCX * zoom;
  const panY = rect.height / 2 - contentCY * zoom;
  __wf.current.viewport = { panX, panY, zoom };
  const vp = document.getElementById('wfViewport');
  if (vp) vp.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
  _wfSchedulePatch();
  _wfUpdateToolbar();
  toast(t('자동 정렬 + 화면 맞춤'), 'ok');
}

// 노드/엣지 선택 하이라이트만 class 토글로 반영 — 전체 re-render 없음
function _wfSyncSelectionClasses() {
  document.querySelectorAll('#wfNodes g.wf-node').forEach(el => {
    el.classList.toggle('selected', el.getAttribute('data-node') === __wf.selectedNodeId);
  });
  document.querySelectorAll('#wfEdges path.wf-edge').forEach(el => {
    el.classList.toggle('selected', el.getAttribute('data-edge') === __wf.selectedEdgeId);
  });
}

// 드래그 중 깜빡임 방지 — innerHTML 재작성 대신 움직이는 노드의 transform 과
// 연관 엣지의 d 속성만 in-place 로 업데이트한다.
function _wfUpdateNodeTransform(nid) {
  if (!__wf.current) return;
  const n = __wf.current.nodes.find(x => x.id === nid);
  if (!n) return;
  const g = document.querySelector('#wfNodes g.wf-node[data-node="' + nid + '"]');
  if (g) g.setAttribute('transform', `translate(${n.x},${n.y})`);
  (__wf.current.edges || []).forEach(e => {
    if (e.from !== nid && e.to !== nid) return;
    const path = document.querySelector('#wfEdges path.wf-edge[data-edge="' + e.id + '"]');
    if (!path) return;
    const fromN = __wf.current.nodes.find(x => x.id === e.from);
    const toN   = __wf.current.nodes.find(x => x.id === e.to);
    if (!fromN || !toN) return;
    const p1 = _wfPortPos(fromN, e.fromPort || 'out');
    const p2 = _wfPortPos(toN, e.toPort || 'in');
    path.setAttribute('d', _wfBezier(p1.x, p1.y, p2.x, p2.y));
  });
}

// ─── Undo 스냅샷 ──────────────────────────────────────────────
function _wfPushUndo() {
  if (!__wf.current) return;
  const snap = {
    nodes: JSON.parse(JSON.stringify(__wf.current.nodes)),
    edges: JSON.parse(JSON.stringify(__wf.current.edges)),
  };
  __wf._undoStack.push(snap);
  if (__wf._undoStack.length > 30) __wf._undoStack.shift();
}

function _wfUndo() {
  if (!__wf.current || !__wf._undoStack.length) {
    toast(t('되돌릴 작업이 없습니다'), 'warn');
    return;
  }
  const snap = __wf._undoStack.pop();
  __wf.current.nodes = snap.nodes;
  __wf.current.edges = snap.edges;
  __wf.selectedNodeId = null;
  __wf.selectedEdgeId = null;
  __wf.dirty = true;
  _wfRenderCanvas();
  _wfRenderInspector();
  _wfUpdateToolbar();
}

  const shortcuts = [
    { key: 'Delete / Backspace', desc: t('선택 노드/엣지 삭제') },
    { key: 'Ctrl+C', desc: t('선택 노드 복사') },
    { key: 'Ctrl+V', desc: t('노드 붙여넣기') },

    { key: 'Ctrl+F', desc: t('노드 검색 포커스') },
    { key: 'Esc', desc: t('선택 해제') },
    { key: '?', desc: t('단축키 도움말 표시') },
  ];

  const rows = shortcuts.map(s => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">

        <button class="btn btn-ghost text-xs" onclick="document.getElementById('wfShortcutModal').remove()">✕</button>
      </div>
      <div style="padding:12px 20px 20px;">${rows}</div>
    </div>
  `;
  document.body.appendChild(modal);
}

// ─── 노드/엣지 추가·삭제 ──────────────────────────────────────
function _wfAddNode(type) {
  if (!__wf.current) { toast(t('워크플로우를 먼저 선택하세요'), 'warn'); return; }
  _wfPushUndo();
  const nid = 'n-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  const view = __wf.current.viewport || { panX: 0, panY: 0, zoom: 1 };
  // 캔버스 중앙 근처
  const host = document.getElementById('wfCanvasHost');
  const rect = host ? host.getBoundingClientRect() : { width: 600, height: 400 };
  const cx = (rect.width / 2 - (view.panX||0)) / (view.zoom||1) - WF_NODE_W/2;
  const cy = (rect.height / 2 - (view.panY||0)) / (view.zoom||1) - WF_NODE_H/2;
  const meta = WF_TYPE_MAP[type] || WF_TYPE_MAP.session;
  const newNode = {
    id: nid, type, x: Math.round(cx), y: Math.round(cy),
    title: meta.label, data: {},
  };
  if (type === 'session' || type === 'subagent') {
    newNode.data = { subject: '', description: '', assignee: 'sonnet-4.6', agentRole: '', cwd: '', inputsMode: 'concat' };
  } else if (type === 'branch') newNode.data = { condition: '' };
  else if (type === 'aggregate') newNode.data = { mode: 'concat' };
  else if (type === 'output') newNode.data = { exportTo: '' };
  else if (type === 'http') newNode.data = { url:'', method:'GET', headers:{}, body:'', extractPath:'', allowInternal: false };
  else if (type === 'transform') newNode.data = { transformType:'template', template:'{{input}}', jsonPath:'', regexPattern:'', regexReplacement:'', separator:'\\n' };
  else if (type === 'variable') newNode.data = { varName:'var1', defaultValue:'' };
  else if (type === 'subworkflow') newNode.data = { workflowId:'', passInput:true };
  else if (type === 'embedding') newNode.data = { provider:'ollama-api', model:'bge-m3', outputFormat:'json' };
  else if (type === 'loop') newNode.data = { loopType:'for_each', maxIterations:10, separator:'\\n', condition:'' };
  else if (type === 'retry') newNode.data = { maxRetries:3, backoffMs:1000, backoffMultiplier:2.0, retryOn:'error' };
  else if (type === 'error_handler') newNode.data = { onError:'skip', defaultOutput:'' };
  else if (type === 'merge') newNode.data = { mergeMode:'all', requiredCount:1, timeout:300 };
  else if (type === 'delay') newNode.data = { delayMs:1000, delayType:'fixed', maxDelayMs:5000 };
  __wf.current.nodes.push(newNode);
  __wf.selectedNodeId = nid;
  __wf.dirty = true;
  _wfRenderCanvas(); _wfRenderInspector(); _wfUpdateToolbar();
}

function _wfDeleteSelectedNode() {
  if (!__wf.current || !__wf.selectedNodeId) return;
  _wfPushUndo();
  const nid = __wf.selectedNodeId;
  __wf.current.nodes = __wf.current.nodes.filter(n => n.id !== nid);
  __wf.current.edges = __wf.current.edges.filter(e => e.from !== nid && e.to !== nid);
  __wf.selectedNodeId = null;
  __wf.dirty = true;
  _wfRenderCanvas(); _wfRenderInspector(); _wfUpdateToolbar();
}

function _wfDeleteSelectedEdge() {
  if (!__wf.current || !__wf.selectedEdgeId) return;
  _wfPushUndo();
  __wf.current.edges = __wf.current.edges.filter(e => e.id !== __wf.selectedEdgeId);
  __wf.selectedEdgeId = null;
  __wf.dirty = true;
  _wfRenderCanvas(); _wfUpdateToolbar();
}

// DAG 사이클 검사 (from → ... → to 경로가 이미 있는지)
function _wfHasPath(edges, from, to) {
  if (from === to) return true;
  const adj = {};
  edges.forEach(e => { (adj[e.from] = adj[e.from] || []).push(e.to); });
  const seen = new Set(); const stack = [from];
  while (stack.length) {
    const u = stack.pop();
    if (u === to) return true;
    if (seen.has(u)) continue; seen.add(u);
    (adj[u] || []).forEach(v => stack.push(v));
  }
  return false;
}

function _wfAddEdge(fromId, fromPort, toId, toPort) {
  if (!__wf.current) return false;
  if (fromId === toId) { toast(t('같은 노드에 연결할 수 없습니다'), 'warn'); return false; }
  _wfPushUndo();
  // 중복 방지
  if (__wf.current.edges.some(e => e.from===fromId && e.to===toId && e.fromPort===fromPort)) {
    toast(t('이미 연결되어 있습니다'), 'warn'); return false;
  }
  // 사이클 검사 — 이 edge 추가 후 to→from 경로가 있으면 cycle
  if (_wfHasPath(__wf.current.edges, toId, fromId)) {
    toast(t('순환 연결은 허용되지 않습니다'), 'err'); return false;
  }
  const eid = 'e-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  __wf.current.edges.push({ id: eid, from: fromId, to: toId, fromPort, toPort });
  __wf.dirty = true;
  _wfRenderCanvas(); _wfUpdateToolbar();
  return true;
}

// ─── 이벤트 바인딩 ───────────────────────────────────────────
function _wfBindCanvas() {
  const svg = document.getElementById('wfCanvas');
  if (!svg || svg.__wfBound) return;
  svg.__wfBound = true;

  // 좌표 변환 — 스크린 좌표를 SVG 뷰포트 좌표(팬/줌 적용 후)로
  function svgPt(evt) {
    const rect = svg.getBoundingClientRect();
    const view = (__wf.current && __wf.current.viewport) || { panX:0, panY:0, zoom:1 };
    return {
      x: (evt.clientX - rect.left - (view.panX||0)) / (view.zoom||1),
      y: (evt.clientY - rect.top  - (view.panY||0)) / (view.zoom||1),
    };
  }

  function onDown(e, touch) {
    if (!__wf.current) return;
    const pt = svgPt(e);
    const target = e.target;
    // spawn 아이콘 클릭 → 새 Claude 세션 spawn (드래그 시작 X)
    const spawnG = target.closest && target.closest('.wf-node-spawn');
    if (spawnG) {
      const nid = spawnG.getAttribute('data-spawn');
      if (touch) { try{e.preventDefault();}catch(_){} }
      _wfSpawnSession(nid);
      return;
    }
    // 포트 클릭 → 엣지 드래프트
    if (target.classList && target.classList.contains('wf-port')) {
      const port = target.getAttribute('data-port');
      const nodeId = target.getAttribute('data-node');
      if (port && port.startsWith('out') || port === 'out_y' || port === 'out_n') {
        __wf.drag = { kind: 'edge', fromId: nodeId, fromPort: port };
        __wf.edgeDraft = { x1: pt.x, y1: pt.y, x2: pt.x, y2: pt.y };
        _wfDraftRender();
        if (touch) { try{e.preventDefault();}catch(_){} }
        return;
      }
      // in-port 에서 시작하는 드래그는 무시
      return;
    }
    // 노드 클릭 → 선택 + 드래그 (Shift+클릭 = 다중 선택)
    const g = target.closest && target.closest('.wf-node');
    if (g) {
      const nid = g.getAttribute('data-node');
      const node = __wf.current.nodes.find(n => n.id === nid);
      if (!node) return;
      // Task 9: Shift+클릭 → 다중 선택
      if (e.shiftKey || (touch && __wfMultiSelected.size > 0)) {
        _wfToggleMultiSelect(nid);
        if (touch) { try{e.preventDefault();}catch(_){} }
        return;
      }
      // 다중 선택 클리어
      if (__wfMultiSelected.size > 0) { __wfMultiSelected.clear(); _wfSyncMultiSelectClasses(); }
      __wf.selectedNodeId = nid; __wf.selectedEdgeId = null;
      _wfPushUndo();
      __wf.drag = { kind: 'node', nodeId: nid, origX: node.x, origY: node.y, startX: pt.x, startY: pt.y };
      // 전체 re-render 대신 selected 클래스만 토글 (깜빡임 방지)
      _wfSyncSelectionClasses();
      _wfRenderInspector();
      if (touch) { try{e.preventDefault();}catch(_){} }
      return;
    }
    // 엣지 클릭
    if (target.classList && target.classList.contains('wf-edge')) {
      __wf.selectedEdgeId = target.getAttribute('data-edge');
      __wf.selectedNodeId = null;
      _wfSyncSelectionClasses();
      _wfRenderInspector();
      return;
    }
    // 빈 영역 → 팬 + 선택 해제
    __wf.selectedNodeId = null; __wf.selectedEdgeId = null;
    const view = __wf.current.viewport || { panX:0, panY:0, zoom:1 };
    __wf.drag = { kind: 'pan', startX: e.clientX, startY: e.clientY, origPanX: view.panX||0, origPanY: view.panY||0 };
    _wfSyncSelectionClasses();
    _wfRenderInspector();
    if (touch) { try{e.preventDefault();}catch(_){} }
  }

  function onMove(e, touch) {
    if (!__wf.drag || !__wf.current) return;
    const pt = svgPt(e);
    if (__wf.drag.kind === 'node') {
      const n = __wf.current.nodes.find(x => x.id === __wf.drag.nodeId);
      if (!n) return;
      n.x = Math.round(__wf.drag.origX + (pt.x - __wf.drag.startX));
      n.y = Math.round(__wf.drag.origY + (pt.y - __wf.drag.startY));
      // 깜빡임 방지 — 해당 노드 transform + 관련 엣지 d 만 in-place 업데이트
      _wfUpdateNodeTransform(__wf.drag.nodeId);
      if (!__wf.dirty) { __wf.dirty = true; _wfUpdateToolbar(); }
      _wfSchedulePatch();
      _wfRenderMinimap();
      if (touch) { try{e.preventDefault();}catch(_){} }
    } else if (__wf.drag.kind === 'pan') {
      const dx = e.clientX - __wf.drag.startX;
      const dy = e.clientY - __wf.drag.startY;
      __wf.current.viewport = __wf.current.viewport || { panX:0, panY:0, zoom:1 };
      __wf.current.viewport.panX = __wf.drag.origPanX + dx;
      __wf.current.viewport.panY = __wf.drag.origPanY + dy;
      const vp = document.getElementById('wfViewport');
      if (vp) vp.setAttribute('transform',
        `translate(${__wf.current.viewport.panX},${__wf.current.viewport.panY}) scale(${__wf.current.viewport.zoom||1})`);
      _wfSchedulePatch();
      _wfRenderMinimap();
    } else if (__wf.drag.kind === 'edge') {
      __wf.edgeDraft.x2 = pt.x; __wf.edgeDraft.y2 = pt.y;
      _wfDraftRender();
      if (touch) { try{e.preventDefault();}catch(_){} }
    }
  }

  function onUp(e, touch) {
    if (!__wf.drag) return;
    if (__wf.drag.kind === 'edge') {
      // 드롭 타겟 검사 — touch 면 changedTouches 사용
      let tx, ty;
      if (touch) {
        const ct = (e.changedTouches && e.changedTouches[0]);
        tx = ct ? ct.clientX : 0; ty = ct ? ct.clientY : 0;
      } else { tx = e.clientX; ty = e.clientY; }
      const el = document.elementFromPoint(tx, ty);
      if (el && el.classList && el.classList.contains('wf-port') && el.getAttribute('data-port') === 'in') {
        const toId = el.getAttribute('data-node');
        _wfAddEdge(__wf.drag.fromId, __wf.drag.fromPort, toId, 'in');
      }
      __wf.edgeDraft = null;
      _wfDraftRender();
    }
    __wf.drag = null;
  }

  // Mouse
  svg.addEventListener('mousedown', (e) => {
    if (Date.now() - __wf.lastTouchTs < 500) return;
    onDown(e, false);
  });
  // 노드 더블클릭 → 에디터 창 (우측 인스펙터 '편집' 버튼과 동일)
  svg.addEventListener('dblclick', (e) => {
    const g = e.target.closest && e.target.closest('.wf-node');
    if (!g) return;
    const nid = g.getAttribute('data-node');
    if (nid) _wfOpenNodeEditor(nid);
  });
  document.addEventListener('mousemove', (e) => {
    if (!__wf.drag) return;
    onMove(e, false);
  });
  document.addEventListener('mouseup', (e) => {
    if (!__wf.drag) return;
    onUp(e, false);
  });

  // Touch
  svg.addEventListener('touchstart', (e) => {
    __wf.lastTouchTs = Date.now();
    if (e.touches.length !== 1) return;
    const te = e.touches[0];
    onDown({ clientX: te.clientX, clientY: te.clientY, target: e.target }, true);
  }, { passive: false });
  document.addEventListener('touchmove', (e) => {
    if (!__wf.drag) return;
    __wf.lastTouchTs = Date.now();
    const te = e.touches[0];
    onMove({ clientX: te.clientX, clientY: te.clientY }, true);
    try { e.preventDefault(); } catch (_) {}
  }, { passive: false });
  document.addEventListener('touchend', (e) => {
    if (!__wf.drag) return;
    __wf.lastTouchTs = Date.now();
    onUp(e, true);
  }, { passive: false });

  // 키보드 단축키 (워크플로우 캔버스)
  document.addEventListener('keydown', (e) => {
    if (state.view !== 'workflows') return;
    const inInput = ['INPUT','TEXTAREA','SELECT'].includes((document.activeElement||{}).tagName);

    // ? → 단축키 도움말 (input 안에서는 무시)
    if (e.key === '?' && !inInput && !e.ctrlKey && !e.metaKey) {
      e.preventDefault(); _wfShowShortcutHelp(); return;
    }

    // Esc → 단축키 모달 닫기 / 선택 해제
    if (e.key === 'Escape') {
      const helpModal = document.getElementById('wfShortcutModal');
      if (helpModal) { helpModal.remove(); return; }
      if (!inInput) {
        __wf.selectedNodeId = null; __wf.selectedEdgeId = null;
        _wfSyncSelectionClasses(); _wfRenderInspector();
      }
      return;
    }

    // Ctrl/Cmd 단축키
    const mod = e.ctrlKey || e.metaKey;

    // Alt+C → 노드 편집기 카테고리 접기/펴기
    if (e.altKey && (e.key === 'c' || e.key === 'C')) {
      const topWin = document.querySelector('.feat-win[id^="wfNodeEdit_"]');
      if (topWin && topWin._wfDraft) { e.preventDefault(); _wfToggleCat(topWin.id); return; }
    }

    // Ctrl+Z → 실행 취소
    if (mod && e.key === 'z' && !e.shiftKey && !inInput) {
      e.preventDefault(); _wfUndo(); return;
    }

    // Ctrl+C → 노드 복사
    if (mod && e.key === 'c' && !inInput) {
      if (__wf.current && __wf.selectedNodeId) {
        const node = __wf.current.nodes.find(n => n.id === __wf.selectedNodeId);
        if (node) {
          __wf._clipboard = [JSON.parse(JSON.stringify(node))];
          toast(t('노드 복사됨'), 'ok');
        }
      }
      return;
    }

    // Ctrl+V → 노드 붙여넣기
    if (mod && e.key === 'v' && !inInput) {
      if (__wf.current && __wf._clipboard.length) {
        e.preventDefault();
        _wfPushUndo();
        const pasted = [];
        __wf._clipboard.forEach(src => {
          const nid = 'n-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
          const clone = JSON.parse(JSON.stringify(src));
          clone.id = nid;
          clone.x = (clone.x || 0) + 40;
          clone.y = (clone.y || 0) + 40;
          clone.title = clone.title || 'Copy';
          __wf.current.nodes.push(clone);
          pasted.push(clone);
        });
        // clipboard 업데이트 (연속 붙여넣기 시 점점 오프셋 누적)
        __wf._clipboard = pasted.map(n => JSON.parse(JSON.stringify(n)));
        __wf.selectedNodeId = pasted[pasted.length - 1].id;
        __wf.dirty = true;
        _wfRenderCanvas(); _wfRenderInspector(); _wfUpdateToolbar();
        toast(t('노드 붙여넣기 완료'), 'ok');
      }
      return;
    }

    // Ctrl+S → 저장
    if (mod && e.key === 's') {
      e.preventDefault(); _wfSave(); return;
    }

    // Ctrl+F → 노드 검색 포커스
    if (mod && e.key === 'f') {
      const si = document.getElementById('wfNodeSearch');
      if (si) { e.preventDefault(); si.focus(); }
      return;
    }

    // Delete / Backspace → 삭제
    if (['Delete','Backspace'].includes(e.key) && !inInput) {
      if (__wf.selectedNodeId) { e.preventDefault(); _wfDeleteSelectedNode(); }
      else if (__wf.selectedEdgeId) { e.preventDefault(); _wfDeleteSelectedEdge(); }
    }
  });

  // 휠 줌
  svg.addEventListener('wheel', (e) => {
    if (!__wf.current) return;
    e.preventDefault();
    const view = __wf.current.viewport || { panX:0, panY:0, zoom:1 };
    const dz = e.deltaY < 0 ? 1.1 : 0.9;
    view.zoom = Math.max(0.4, Math.min(2.5, (view.zoom||1) * dz));
    __wf.current.viewport = view;
    // 뷰포트 transform 만 갱신 (깜빡임 방지)
    const vp = document.getElementById('wfViewport');
    if (vp) vp.setAttribute('transform',
      `translate(${view.panX||0},${view.panY||0}) scale(${view.zoom||1})`);
    _wfSchedulePatch();
    _wfRenderMinimap();
  }, { passive: false });
}

function _wfDraftRender() {
  const g = document.getElementById('wfDraft');
  if (!g) return;
  if (!__wf.edgeDraft) { g.innerHTML = ''; return; }
  const d = __wf.edgeDraft;
  g.innerHTML = `<path class="wf-edge-draft" d="${_wfBezier(d.x1, d.y1, d.x2, d.y2)}"></path>`;
}

function _wfSchedulePatch() {
  if (!__wf.current) return;
  if (__wf.patchTimer) clearTimeout(__wf.patchTimer);
  __wf.patchTimer = setTimeout(async () => {
    __wf.patchTimer = null;
    if (!__wf.current) return;
    const patch = {
      nodes: __wf.current.nodes.map(n => ({ id: n.id, x: n.x, y: n.y })),
      viewport: __wf.current.viewport,
    };
    try {
      await api('/api/workflows/patch', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: __wf.current.id, patch }),
      });
    } catch (e) { /* silent — 다음 save 가 덮어씀 */ }
  }, 500);
}

          ${fbOptions}
        </select>
      ` : ''}
    </div>
  `;
  // 선택된 노드가 있으면 요약 + 편집/삭제 버튼
  let nodeBlock = '';
  if (__wf.selectedNodeId) {
    const n = __wf.current.nodes.find(x => x.id === __wf.selectedNodeId);
    if (n) {
      const typeMeta = WF_TYPE_MAP[n.type] || WF_TYPE_MAP.session;
      const d = n.data || {};
      const preview = (n.type === 'session' || n.type === 'subagent')
        ? `@${escapeHtml(d.assignee||'auto')} · ${escapeHtml((d.subject||'').slice(0,60) || t('(업무 없음)'))}`
        : escapeHtml(typeMeta.label);
      // 실행 결과에서 프로바이더/비용 정보 추출
      let runInfoBlock = '';
      const nr = (__wf.lastRunResults || {})[n.id];
      if (nr) {
        const providerName = nr.provider || nr.providerId || '';
        const providerIcon = ((__wfProviders||{providers:[]}).providers.find(p => p.id === providerName || p.name === providerName) || {}).icon || '';
        const model = nr.model || '';
        const dur = nr.durationMs ? fmtDur(nr.durationMs) : '';
        const tokens = nr.tokens || nr.tokenCount || (nr.output ? nr.output.length : 0);
        const cost = nr.cost != null ? ('$' + Number(nr.cost).toFixed(4)) : '';
        const chips = [
          providerName ? `<span class="chip text-[10px]">${providerIcon ? providerIcon + ' ' : ''}${escapeHtml(providerName)}</span>` : '',
          model ? `<span class="chip text-[10px]">${escapeHtml(model)}</span>` : '',
          dur ? `<span class="chip text-[10px]">⏱ ${dur}</span>` : '',
          tokens ? `<span class="chip text-[10px]">🔤 ${typeof tokens === 'number' ? tokens.toLocaleString() : tokens}</span>` : '',
          cost ? `<span class="chip chip-warn text-[10px]">${cost}</span>` : '',
        ].filter(Boolean).join('');
        if (chips) {
          runInfoBlock = `
            <div class="mt-2 pt-2 border-t border-[var(--border)]">
              <div class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mb-1">${t('실행 결과')}</div>
              <div class="flex flex-wrap gap-1">${chips}</div>
            </div>`;
        }
      }

      nodeBlock = `
        <div class="border-t border-[var(--border)] pt-3">
          <div class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mb-2">${t('선택된 노드')}</div>
          <div class="card p-3 mb-2" style="background:rgba(255,255,255,0.03);">
            <div class="flex items-center gap-2 mb-1">
              <span style="font-size:1.2rem;">${typeMeta.icon}</span>
              <div class="text-sm font-semibold truncate">${escapeHtml(n.title||typeMeta.label)}</div>
            </div>
            <div class="text-[11px] text-[var(--text-mute)]">${preview}</div>
            ${runInfoBlock}
          </div>
          <div class="flex gap-2 flex-wrap">
            <button class="btn-primary btn text-xs flex-1" onclick="_wfOpenNodeEditor('${n.id}')" aria-label="${t('노드 편집')}">✏️ ${t('편집')}</button>
            <button class="btn text-xs" onclick="_wfDeleteSelectedNode()" style="color:#fca5a5;border-color:rgba(248,113,113,0.3);" aria-label="${t('노드 삭제')}">🗑️</button>
          </div>
        </div>
      `;
    }
  } else {
    nodeBlock = `<div class="border-t border-[var(--border)] pt-3 text-xs text-[var(--text-dim)] text-center py-4">
      ${t('상단 ＋ 노드 추가 를 누르거나 기존 노드를 더블클릭해 편집하세요')}
    </div>`;
  }
  host.innerHTML = meta + nodeBlock;
  _wfRefreshWebhookSecret();
}

// ─── Webhook secret 패널 (v2.23.0) ────────────────────────
async function _wfRefreshWebhookSecret() {
  if (!__wf.current) return;
  const body = document.getElementById('wfWebhookSecretBody');
  const curl = document.getElementById('wfWebhookCurl');
  if (!body) return;
  try {
    const r = await api('/api/workflows/webhook-secret', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: __wf.current.id, action: 'get' }),
    });
    if (!r || !r.ok) {
      body.innerHTML = `<span style="color:var(--danger);">${escapeHtml(r && r.error || t('오류'))}</span>`;
      return;
    }
    const sec = r.secret || '';
    _wfRenderWebhookSecret(sec);
    if (curl) curl.textContent = _wfBuildCurlExample(__wf.current.id, sec);
  } catch (e) {
    body.innerHTML = `<span style="color:var(--danger);">${escapeHtml(String(e))}</span>`;
  }
}

function _wfRenderWebhookSecret(sec) {
  const body = document.getElementById('wfWebhookSecretBody');
  if (!body) return;
  if (!sec) {
    body.innerHTML = `
      <div class="flex items-center gap-2 flex-wrap">
        <span style="color:var(--danger);">⚠ ${escapeHtml(t('webhook_secret_not_set', '미발급 — 호출이 차단됩니다'))}</span>
        <button class="btn text-[10px]" onclick="_wfWebhookSecretAction('generate')">🔐 ${escapeHtml(t('webhook_secret_generate', '발급'))}</button>
      </div>`;
    return;
  }
  const masked = sec.slice(0, 4) + '••••••••' + sec.slice(-4);
  body.innerHTML = `
    <div class="flex items-center gap-1 flex-wrap">
      <input id="wfWebhookSecretInput" class="input flex-1 text-[11px] font-mono" readonly type="password" value="${escapeHtml(sec)}" style="min-width:140px;">
      <button class="btn text-[10px] flex-shrink-0" id="wfWebhookSecretToggle" onclick="_wfWebhookSecretToggleVis()" title="${escapeHtml(t('표시/숨김', '표시/숨김'))}">👁</button>
      <button class="btn text-[10px] flex-shrink-0" onclick="navigator.clipboard.writeText(document.getElementById('wfWebhookSecretInput').value).then(()=>toast(t('복사됨'),'ok')).catch(()=>toast(t('복사 실패'),'err'))" title="${escapeHtml(t('복사'))}">📋</button>
      <button class="btn text-[10px] flex-shrink-0" onclick="_wfWebhookSecretAction('rotate')" title="${escapeHtml(t('webhook_secret_rotate_tip', '새 값으로 교체 — 기존 호출자 모두 401'))}">🔄</button>
      <button class="btn text-[10px] flex-shrink-0" onclick="_wfWebhookSecretAction('clear')" style="color:#fca5a5;border-color:rgba(248,113,113,0.3);" title="${escapeHtml(t('webhook_secret_clear_tip', '제거 — webhook 완전 비활성화'))}">🚫</button>
    </div>
    <div class="text-[10px] mt-1" style="color:var(--text-dim)">${escapeHtml(masked)}</div>`;
}

function _wfWebhookSecretToggleVis() {
  const inp = document.getElementById('wfWebhookSecretInput');
  if (!inp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function _wfWebhookSecretAction(action) {
  if (!__wf.current) return;
  if (action === 'rotate') {
    const ok = await confirmModal(t('webhook_secret_rotate_confirm', '새 secret 으로 교체하면 기존 호출은 모두 401 이 됩니다. 계속할까요?'));
    if (!ok) return;
  }
  if (action === 'clear') {
    const ok = await confirmModal(t('webhook_secret_clear_confirm', 'secret 을 제거하면 webhook 이 비활성화됩니다. 계속할까요?'));
    if (!ok) return;
  }
  try {
    const r = await api('/api/workflows/webhook-secret', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: __wf.current.id, action }),
    });
    if (!r || !r.ok) {
      toast(r && r.error || t('오류'), 'err');
      return;
    }
    const sec = r.secret || '';
    _wfRenderWebhookSecret(sec);
    const curl = document.getElementById('wfWebhookCurl');
    if (curl) curl.textContent = _wfBuildCurlExample(__wf.current.id, sec);
    if (r.changed) toast(t('저장됨'), 'ok');
  } catch (e) {
    toast(String(e), 'err');
  }
}

function _wfBuildCurlExample(wfId, sec) {
  const placeholder = t('webhook_secret_placeholder', '위 Generate 버튼으로 발급');
  const secPart = sec || `<${placeholder}>`;
  return `curl -X POST http://localhost:8080/api/workflows/webhook/${wfId} \\
  -H "Content-Type: application/json" \\
  -H "X-Webhook-Secret: ${secPart}" \\
  -d '{"input": "your text"}'`;
}

// ─── 노드 에디터 — 맥 스타일 플로팅 창 ───────────────────────
// nid 가 null 이면 "새 노드" 모드, 있으면 편집 모드.
// 창 DOM 자체에 draft 를 붙여 여러 창 동시 열기 허용 (미래 확장).
function _wfOpenNodeEditor(nid) {
  if (!__wf.current) { toast(t('워크플로우를 먼저 선택하세요'), 'warn'); return; }
  const isNew = !nid;
  let draft;
  if (isNew) {
    draft = {
      id: 'n-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
      type: null, x: 0, y: 0, title: '', data: {},
    };
  } else {
    const existing = __wf.current.nodes.find(n => n.id === nid);
    if (!existing) return;
    draft = JSON.parse(JSON.stringify(existing));
  }
  // 같은 노드 편집창이 이미 열려 있으면 포커스만
  const winId = 'wfNodeWin-' + draft.id;
  const ex = document.getElementById(winId);
  if (ex) {
    ex.style.zIndex = ++_winMgr.zIndex;
    ex.classList.remove('feat-win-minimized');
    return;
  }
  const w = document.createElement('div');
  w.id = winId;
  w.className = 'feat-win';
  w.style.zIndex = ++_winMgr.zIndex;
  // 중앙 근처 + 여러 개 띄우면 살짝 계단식
  const offset = _winMgr.openIds.size * 24;
  // 초기 크기를 넉넉히 — 카테고리 grid + 선택한 카테고리의 전체 폼까지
  // 스크롤 없이 한눈에 들어오는 사이즈
  const initW = Math.min(620, window.innerWidth - 40);
  const initH = Math.min(720, window.innerHeight - 40);
  w.style.left = (Math.max(20, window.innerWidth / 2 - initW / 2) + offset) + 'px';
  w.style.top = (Math.max(20, window.innerHeight / 2 - initH / 2) + offset) + 'px';
  w.style.width = initW + 'px';
  w.style.height = initH + 'px';
  w.style.maxHeight = 'calc(100vh - 24px)';
  w.style.resize = 'both';
  w.style.overflow = 'hidden';
  w._wfDraft = draft;
  w._wfIsNew = isNew;
  _winMgr.openIds.add(winId);
  w.innerHTML = `
    <div class="feat-win-title">
      <div class="feat-win-lights">
        <button class="feat-light feat-light-close" title="${t('닫기')}" onclick="_wfCloseNodeEditor('${winId}')"></button>
        <button class="feat-light feat-light-min" title="${t('내리기')}" onclick="document.getElementById('${winId}').classList.toggle('feat-win-minimized')"></button>
        <button class="feat-light feat-light-max" title="${t('펼치기')}" onclick="_wfMaxNodeEditor('${winId}')"></button>
      </div>
      <div class="feat-win-title-text" id="${winId}-title">${isNew ? '✨ ' + t('새 노드') : '✏️ ' + t('노드 편집')}</div>
    </div>
    <div class="feat-win-body" style="padding:0;display:flex;flex-direction:column;">
      <div id="${winId}-cat" style="padding:14px 16px 8px 16px;"></div>
      <div id="${winId}-form" style="flex:1;padding:0 16px 8px 16px;overflow-y:auto;"></div>
      <div class="flex justify-end gap-2 p-3 border-t border-[var(--border)]" style="flex-shrink:0;">
        <button class="btn text-sm" onclick="_wfCloseNodeEditor('${winId}')" aria-label="${t('취소')}">${t('취소')}</button>
        ${!isNew ? `<button class="btn text-sm" onclick="_wfDeleteFromEditor('${winId}')" style="color:#fca5a5;border-color:rgba(248,113,113,0.3);" aria-label="${t('노드 삭제')}">🗑️ ${t('삭제')}</button>` : ''}
        <button class="btn-primary btn text-sm" onclick="_wfSaveNodeEditor('${winId}')" aria-label="${t('노드 저장')}">💾 ${t('저장')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(w);
  try { _makeDraggable(w); } catch (e) {}
  _translateDOM(w);
  _wfRenderEditorBody(winId);
}

function _wfCloseNodeEditor(winId) {
  const w = document.getElementById(winId);
  if (w) w.remove();
  _winMgr.openIds.delete(winId);
}

function _wfMaxNodeEditor(winId) {
  const w = document.getElementById(winId);
  if (!w) return;
  const isMax = w.classList.toggle('feat-win-maxed');
  if (isMax) {
    w.style.left = '5vw'; w.style.top = '5vh';
    w.style.width = '90vw'; w.style.maxHeight = '90vh';
  } else {
    w.style.width = '480px'; w.style.maxHeight = '82vh';
    w.style.left = Math.max(80, window.innerWidth/2 - 240) + 'px';
    w.style.top = '80px';
  }
}

function _wfPickNodeType(winId, type) {
  const w = document.getElementById(winId);
  if (!w) return;
  const draft = w._wfDraft;
  if (draft.type === type) return;
  draft.type = type;
  // 타입별 기본 data 세팅
  if (type === 'session' || type === 'subagent') {
    draft.data = { subject:'', description:'', assignee:'sonnet-4.6', agentRole:'', cwd:'', inputsMode:'concat' };
  } else if (type === 'branch')    draft.data = { condition:'', conditionType:'contains' };
  else if (type === 'aggregate') draft.data = { mode:'concat' };
  else if (type === 'output')    draft.data = { exportTo:'' };
  else if (type === 'http')      draft.data = { url:'', method:'GET', headers:{}, body:'', extractPath:'', allowInternal: false };
  else if (type === 'transform') draft.data = { transformType:'template', template:'{{input}}', jsonPath:'', regexPattern:'', regexReplacement:'', separator:'\\n' };
  else if (type === 'variable')  draft.data = { varName:'var1', defaultValue:'', scope:'global' };
  else if (type === 'subworkflow') draft.data = { workflowId:'', passInput:true };
  else if (type === 'embedding') draft.data = { provider:'ollama-api', model:'bge-m3', outputFormat:'json' };
  else if (type === 'loop') draft.data = { loopType:'for_each', maxIterations:10, separator:'\\n', condition:'' };
  else if (type === 'retry') draft.data = { maxRetries:3, backoffMs:1000, backoffMultiplier:2.0, retryOn:'error' };
  else if (type === 'error_handler') draft.data = { onError:'skip', defaultOutput:'' };
  else if (type === 'merge') draft.data = { mergeMode:'all', requiredCount:1, timeout:300 };
  else if (type === 'delay') draft.data = { delayMs:1000, delayType:'fixed', maxDelayMs:5000 };
  else draft.data = {};
  if (!draft.title) draft.title = WF_TYPE_MAP[type].label;
  // 타입 선택 직후 카테고리 그리드 자동 접힘 (UX 개선)
  try { localStorage.setItem('wfEditorCatExpanded', 'false'); } catch(e) {}
  _wfRenderEditorBody(winId);
  // 첫 입력 필드에 포커스 (제목 또는 subject)
  setTimeout(() => {
    const w2 = document.getElementById(winId);
    if (!w2) return;
    const first = w2.querySelector('.feat-win-body input, .feat-win-body textarea, .feat-win-body select');
    if (first) first.focus();
  }, 50);
}

function _wfCatIsExpanded(draft) {
  // 기존 노드(type 이미 정해짐)는 기본 접힘, 신규는 펼침.
  // 사용자 토글은 localStorage 에 per-type 기억.
  if (!draft.type) return true;
  const saved = localStorage.getItem('wfEditorCatExpanded');
  if (saved === 'true') return true;
  if (saved === 'false') return false;
  return false; // 기존 노드 기본 접힘
}

function _wfToggleCat(winId) {
  const w = document.getElementById(winId);
  if (!w) return;
  const draft = w._wfDraft;
  const cur = _wfCatIsExpanded(draft);
  localStorage.setItem('wfEditorCatExpanded', (!cur).toString());
  _wfRenderEditorBody(winId);
}

function _wfRenderEditorBody(winId) {
  const w = document.getElementById(winId);
  if (!w) return;
  const draft = w._wfDraft;
  const catHost  = document.getElementById(winId + '-cat');
  const formHost = document.getElementById(winId + '-form');
  if (!catHost || !formHost) return;

  const expanded = _wfCatIsExpanded(draft);
  const curMeta = draft.type ? WF_TYPE_MAP[draft.type] : null;

  if (expanded) {
    catHost.innerHTML = `
      <div class="flex items-center justify-between mb-2">
        <div class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider">${t('카테고리')}</div>
        ${curMeta ? `<button class="btn text-[11px]" onclick="_wfToggleCat('${winId}')" title="Alt+C">▾ ${t('접기')}</button>` : ''}
      </div>
      <div class="grid grid-cols-3 gap-2">
        ${WF_NODE_TYPES.map(tp => `
          <button class="btn text-[11px] ${draft.type === tp.id ? 'btn-active' : ''}"
                  onclick="_wfPickNodeType('${winId}','${tp.id}')"
                  title="${escapeHtml(t(tp.desc))}"
                  style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;">
            <div style="font-size:1.4rem;line-height:1;">${tp.icon}</div>
            <div style="font-size:11px;">${t(tp.label)}</div>
          </button>`).join('')}
      </div>
    `;
  } else if (curMeta) {
    // 접힌 상태: 현재 타입 칩 + "타입 변경" 버튼
    catHost.innerHTML = `
      <div class="flex items-center gap-2 flex-wrap py-1">
        <span class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider">${t('타입')}</span>
        <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg"
              style="background:rgba(217,119,87,0.12);border:1px solid rgba(217,119,87,0.35);">
          <span style="font-size:1.1rem;line-height:1;">${curMeta.icon}</span>
          <span class="text-[12px] font-semibold" style="color:var(--text)">${t(curMeta.label)}</span>
        </span>
        <button class="btn text-[11px]" onclick="_wfToggleCat('${winId}')" title="Alt+C">
          ▸ ${t('타입 변경')}
        </button>
      </div>
    `;
  } else {
    // type 없는데 접힘 상태로 진입한 경우 — 펼침 강제
    localStorage.setItem('wfEditorCatExpanded', 'true');
    return _wfRenderEditorBody(winId);
  }

  if (!draft.type) {
    formHost.innerHTML = `
      <div class="text-xs text-[var(--text-dim)] text-center py-4">${t('위에서 카테고리를 먼저 선택하세요')}</div>
      <div class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-4 mb-2">${t('카테고리별 설명')}</div>
      <div class="flex flex-col gap-2">
        ${WF_NODE_TYPES.map(tp => `
          <div class="card p-3" style="background:rgba(255,255,255,0.02);">
            <div class="flex items-center gap-2 mb-1">
              <span style="font-size:1.1rem;">${tp.icon}</span>
              <span class="text-sm font-semibold">${t(tp.label)}</span>
            </div>
            <div class="text-[11px] text-[var(--text-mute)] leading-relaxed">${escapeHtml(t(tp.desc))}</div>
          </div>`).join('')}
      </div>
    `;
    return;
  }

  // 선택된 타입 설명 카드
  const typeMeta = WF_TYPE_MAP[draft.type];
  const descCard = typeMeta && typeMeta.desc ? `
    <div class="card p-3 mb-3" style="background:rgba(167,139,250,0.06);border-color:rgba(167,139,250,0.25);">
      <div class="flex items-center gap-2 mb-1">
        <span style="font-size:1.1rem;">${typeMeta.icon}</span>
        <span class="text-sm font-semibold">${t(typeMeta.label)}</span>
      </div>
      <div class="text-[11px] text-[var(--text-mute)] leading-relaxed">${escapeHtml(t(typeMeta.desc))}</div>
    </div>
  ` : '';

  // 공통: 제목 (설명 카드 먼저)
  const d = draft.data || {};
  let body = descCard + `
    <div class="pt-3 border-t border-[var(--border)] mt-1">
      <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider block mb-1">${t('제목')}</label>
      <input class="input w-full" value="${escapeHtml(draft.title||'')}" oninput="_wfDraftSet('${winId}','title',this.value)">
    </div>
  `;
  if (draft.type === 'session' || draft.type === 'subagent') {
    body += `
      <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${t('업무 (subject)')}</label>
      <input class="input w-full mt-1" value="${escapeHtml(d.subject||'')}" oninput="_wfDraftSetData('${winId}','subject',this.value)" placeholder="${t('이 세션이 수행할 업무 한 줄')}">
      <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${t('설명 (description)')}</label>

        💡 ${t('재시도 간격: 1차=')}${d.backoffMs||1000}ms, ${t('2차=')}${(d.backoffMs||1000)*(d.backoffMultiplier||2)}ms, ${t('3차=')}${(d.backoffMs||1000)*Math.pow(d.backoffMultiplier||2,2)}ms ...
      </div>
    `;
  } else if (draft.type === 'error_handler') {
    body += `
      <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${t('에러 처리 전략')}</label>
      <select class="input w-full mt-1" onchange="_wfDraftSetData('${winId}','onError',this.value);_wfRenderEditorBody('${winId}');">
        <option value="skip" ${d.onError==='skip'?'selected':''}>${t('무시하고 계속 (skip)')}</option>
        <option value="default" ${d.onError==='default'?'selected':''}>${t('기본값 반환 (default)')}</option>
        <option value="route" ${d.onError==='route'?'selected':''}>${t('다른 노드로 분기 (route)')}</option>
      </select>
      ${d.onError === 'default' || d.onError === 'route' ? `
        <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${d.onError === 'default' ? t('기본 출력값') : t('라우팅 대상 (노드 ID 또는 출력)')}</label>
        <textarea class="input w-full mt-1" rows="3" oninput="_wfDraftSetData('${winId}','defaultOutput',this.value)" placeholder="${d.onError === 'default' ? t('에러 발생 시 반환할 기본값') : t('에러 발생 시 전달할 값')}">${escapeHtml(d.defaultOutput||'')}</textarea>
      ` : ''}
    `;
  } else if (draft.type === 'merge') {
    body += `
      <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${t('합류 모드')}</label>
      <select class="input w-full mt-1" onchange="_wfDraftSetData('${winId}','mergeMode',this.value);_wfRenderEditorBody('${winId}');">
        <option value="all" ${d.mergeMode==='all'?'selected':''}>${t('전체 대기 (all)')}</option>
        <option value="any" ${d.mergeMode==='any'?'selected':''}>${t('하나라도 도착 (any)')}</option>
        <option value="count" ${d.mergeMode==='count'?'selected':''}>${t('지정 개수 도착 (count)')}</option>
      </select>
      ${d.mergeMode === 'count' ? `
        <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${t('필요 입력 수')}</label>
        <input type="number" class="input w-full mt-1" min="1" value="${d.requiredCount||1}" oninput="_wfDraftSetData('${winId}','requiredCount',Math.max(1,parseInt(this.value)||1))">
      ` : ''}
      <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${t('타임아웃 (초)')}</label>
      <input type="number" class="input w-full mt-1" min="0" value="${d.timeout||300}" oninput="_wfDraftSetData('${winId}','timeout',parseInt(this.value)||300)">
    `;
  } else if (draft.type === 'delay') {
    body += `
      <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${t('대기 시간 (ms)')}</label>
      <input type="number" class="input w-full mt-1" min="0" value="${d.delayMs||1000}" oninput="_wfDraftSetData('${winId}','delayMs',parseInt(this.value)||1000)">
      <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${t('딜레이 유형')}</label>
      <select class="input w-full mt-1" onchange="_wfDraftSetData('${winId}','delayType',this.value);_wfRenderEditorBody('${winId}');">
        <option value="fixed" ${d.delayType==='fixed'?'selected':''}>${t('고정 (fixed)')}</option>
        <option value="random" ${d.delayType==='random'?'selected':''}>${t('랜덤 (random)')}</option>
      </select>
      ${d.delayType === 'random' ? `
        <label class="text-[10px] text-[var(--text-dim)] uppercase tracking-wider mt-3 block">${t('최대 대기 시간 (ms)')}</label>
        <input type="number" class="input w-full mt-1" min="0" value="${d.maxDelayMs||5000}" oninput="_wfDraftSetData('${winId}','maxDelayMs',parseInt(this.value)||5000)">
      ` : ''}
    `;
  } else if (draft.type === 'start') {
    body += `<div class="text-xs text-[var(--text-dim)] mt-4">${t('시작 노드는 추가 입력이 없습니다. 워크플로우 진입점이 됩니다.')}</div>`;
  }
  formHost.innerHTML = body;
}

function _wfDraftSet(winId, field, value) {
  const w = document.getElementById(winId);
  if (!w) return;
  w._wfDraft[field] = value;
}
function _wfDraftSetData(winId, field, value) {
  const w = document.getElementById(winId);
  if (!w) return;
  w._wfDraft.data = w._wfDraft.data || {};
  w._wfDraft.data[field] = value;
}

function _wfSaveNodeEditor(winId) {
  const w = document.getElementById(winId);
  if (!w || !__wf.current) return;
  const draft = w._wfDraft;
  if (!draft.type) { toast(t('카테고리를 선택하세요'), 'warn'); return; }
  if (w._wfIsNew) {
    // 캔버스 중앙에 좌표 계산
    const view = __wf.current.viewport || { panX:0, panY:0, zoom:1 };
    const host = document.getElementById('wfCanvasHost');
    const rect = host ? host.getBoundingClientRect() : { width:600, height:400 };
    draft.x = Math.round((rect.width/2 - (view.panX||0)) / (view.zoom||1) - WF_NODE_W/2);
    draft.y = Math.round((rect.height/2 - (view.panY||0)) / (view.zoom||1) - WF_NODE_H/2);
    __wf.current.nodes.push(draft);
    __wf.selectedNodeId = draft.id;
    toast(t('노드 추가됨'), 'ok');
  } else {
    const idx = __wf.current.nodes.findIndex(n => n.id === draft.id);
    if (idx >= 0) __wf.current.nodes[idx] = draft;
    toast(t('저장됨'), 'ok');
  }
  __wf.dirty = true;
  _wfRenderCanvas(); _wfRenderInspector(); _wfUpdateToolbar();
  _wfCloseNodeEditor(winId);
}

function _wfDeleteFromEditor(winId) {
  const w = document.getElementById(winId);
  if (!w || !__wf.current) return;
  const nid = w._wfDraft.id;
  __wf.current.nodes = __wf.current.nodes.filter(n => n.id !== nid);
  __wf.current.edges = __wf.current.edges.filter(e => e.from !== nid && e.to !== nid);
  if (__wf.selectedNodeId === nid) __wf.selectedNodeId = null;
  __wf.dirty = true;
  _wfRenderCanvas(); _wfRenderInspector(); _wfUpdateToolbar();
  _wfCloseNodeEditor(winId);
  toast(t('삭제됨'), 'ok');
}

function _wfNodeSet(nid, field, value) {

  const n = __wf.current.nodes.find(x => x.id === nid);
  if (!n) return;
  n[field] = value;
  __wf.dirty = true;
  _wfUpdateToolbar();
  // title 은 캔버스에도 반영
  if (field === 'title') _wfRenderCanvas();
}

function _wfNodeSetData(nid, field, value) {
  if (!__wf.current) return;
  const n = __wf.current.nodes.find(x => x.id === nid);
  if (!n) return;
  n.data = n.data || {};
  n.data[field] = value;
  __wf.dirty = true;
  _wfUpdateToolbar();
  if (field === 'assignee') _wfRenderCanvas();
}

// ─── 저장 / 실행 / spawn ───────────────────────────────────
async function _wfSave() {
  if (!__wf.current) return;
  const body = {
    id: __wf.current.id,
    name: __wf.current.name,
    description: __wf.current.description,
    nodes: __wf.current.nodes,
    edges: __wf.current.edges,
    viewport: __wf.current.viewport,
  };
  const r = await api('/api/workflows/save', {
    method: 'POST', headers: { 'Content-Type':'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  __wf.dirty = false;
  toast(t('저장됨'), 'ok');
  // 목록 refresh
  const list = await api('/api/workflows/list');
  __wf.workflows = list.workflows || [];
  _wfRenderList();
  _wfUpdateToolbar();
}

async function _wfExport() {
  if (!__wf.current) { toast(t('워크플로우를 먼저 선택하세요'), 'warn'); return; }
  try {
    const r = await api('/api/workflows/export', {
      method: 'POST', headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ id: __wf.current.id }),
    });
    if (!r.ok) { toast(errMsg(r), 'err'); return; }
    const payload = r.export || r;
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (__wf.current.name || 'workflow').replace(/[^a-zA-Z0-9가-힣_-]/g, '_') + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast(t('내보내기 완료'), 'ok');
  } catch (e) { toast(t('내보내기 실패'), 'err'); }
}

async function _wfImport(event) {
  const file = event.target.files && event.target.files[0];
  event.target.value = '';
  if (!file) return;
  try {
    const text = await file.text();
    const json = JSON.parse(text);
    const r = await api('/api/workflows/import', {
      method: 'POST', headers: { 'Content-Type':'application/json' },
      body: JSON.stringify(json),
    });
    if (!r.ok) { toast(errMsg(r), 'err'); return; }
    toast(t('가져오기 완료'), 'ok');
    const list = await api('/api/workflows/list');
    __wf.workflows = list.workflows || [];
    if (r.id) await _wfOpen(r.id);
    _wfRenderList();
    _wfUpdateToolbar();
  } catch (e) { toast(t('JSON 파싱 실패'), 'err'); }
}

async function _wfRun() {
  if (!__wf.current) return;
  // 저장 먼저
  if (__wf.dirty) await _wfSave();
  const r = await api('/api/workflows/run', {
    method: 'POST', headers: { 'Content-Type':'application/json' },
    body: JSON.stringify({ id: __wf.current.id }),
  });
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  toast(t('실행 시작됨'), 'ok');
  __wf.runId = r.runId;
  // 노드 상태 초기화
  document.querySelectorAll('.wf-node').forEach(el => el.removeAttribute('data-status'));
  // 폴링 시작
  _wfStartPolling();
}

function _wfApplyRunStatus(run) {
  const results = run.nodeResults || {};
  __wf.lastRunResults = results;
  __wf.lastRun = run;
  document.querySelectorAll('.wf-node').forEach(el => {
    const nid = el.getAttribute('data-node');
    const r = results[nid];
    if (r) el.setAttribute('data-status', r.status);
    // running 노드 라벨 옆 elapsed 초 업데이트
    if (r && r.status === 'running' && r.startedAt) {
      const secs = Math.max(0, Math.floor((Date.now() - r.startedAt) / 1000));
      const el2 = el.querySelector('.wf-node-elapsed');
      if (el2) el2.textContent = '⏱ ' + secs + 's';
    }
  });
  _wfRenderRunBanner(run);
  _wfRenderInspector();
  // 미니맵 상태 색 반영 (색상만 갱신 — 저비용 재렌더)
  if (_wfMinimapTimer) cancelAnimationFrame(_wfMinimapTimer);
  _wfMinimapTimer = requestAnimationFrame(() => { _wfMinimapTimer = null; _wfRenderMinimap(); });
  // Task 3: 브라우저 Notification — 실행 완료/실패 알림
  if (run.status === 'ok') {
    const wfName = (__wf.current && __wf.current.name) || t('워크플로우');
    _sendBrowserNotification(t('워크플로우 완료'), wfName + ' — ' + t('실행이 성공적으로 완료되었습니다'));
  } else if (run.status === 'err') {
    const wfName = (__wf.current && __wf.current.name) || t('워크플로우');
    _sendBrowserNotification(t('워크플로우 실패'), wfName + ' — ' + (run.error || t('실행 중 오류가 발생했습니다')));
  }
}

// 실행 배너 — workflows 탭 캔버스 상단 플로팅
function _wfRenderRunBanner(run) {
  const host = document.getElementById('wfCanvasHost');
  if (!host) return;
  let el = document.getElementById('wfRunBanner');
  const status = run && run.status;
  const results = (run && run.nodeResults) || {};
  const nodes = (__wf.current && __wf.current.nodes) || [];
  const total = nodes.length;
  const done = Object.values(results).filter(r => r && (r.status === 'ok' || r.status === 'err' || r.status === 'skipped')).length;
  const runningNid = run && run.currentNodeId;
  const runningNode = nodes.find(n => n.id === runningNid);
  const subject = (runningNode && ((runningNode.data && runningNode.data.subject) || runningNode.id)) || t('대기 중');
  const startedAt = (run && run.startedAt) || 0;
  const now = Date.now();
  const finishedAt = (run && run.finishedAt) || 0;
  const elapsedMs = status === 'running' ? (startedAt ? now - startedAt : 0) : Math.max(0, finishedAt - startedAt);
  const elapsedStr = (elapsedMs / 1000).toFixed(1) + 's';
  const pct = total ? Math.min(100, Math.round((done / total) * 100)) : 0;

  if (!status || status === 'idle') {
    if (el) el.classList.remove('visible');
    return;
  }

  if (!el) {
    el = document.createElement('div');
    el.id = 'wfRunBanner';
    host.appendChild(el);
  }

  let icon = '⏳';
  let stateClass = '';
  let title = t('실행 중');
  if (status === 'ok') { icon = '✅'; stateClass = 'state-ok'; title = t('완료'); }
  else if (status === 'err') { icon = '❌'; stateClass = 'state-err'; title = t('실패'); }

  el.className = 'visible ' + stateClass;
  el.innerHTML = `
    <div class="wfrb-row">
      <span style="font-size:16px;">${icon}</span>
      <span class="wfrb-title">${title}: <span style="color:var(--accent)">${escapeHtml(subject)}</span></span>
      <span class="wfrb-meta">${done}/${total} · ${elapsedStr}</span>
      ${status === 'running' && runningNid
        ? `<button class="wfrb-focus" onclick="_wfFocusNode('${runningNid}')">📍 ${t('위치로 이동')}</button>`
        : ''}
      <button class="wfrb-close" onclick="_wfHideRunBanner()" title="${t('닫기')}">×</button>
    </div>
    <div class="wfrb-row">
      <div class="wfrb-bar"><div class="wfrb-bar-fill" style="width:${pct}%"></div></div>

  let y = (evt.clientY || 0) + 14;

  if (y + h > window.innerHeight - 8) y = (evt.clientY || 0) - h - 14;

// delegation (canvas 가 한번만 붙이도록 IIFE)
(function _wfNodeTooltipBindOnce() {
  document.addEventListener('mouseover', (e) => {
    const nodeEl = e.target.closest && e.target.closest('.wf-node');
    if (!nodeEl) return;
    if (!document.getElementById('wfRoot')) return;
    const nid = nodeEl.getAttribute('data-node');
    if (!nid) return;
    if (_wfTooltipTimer) clearTimeout(_wfTooltipTimer);
    _wfTooltipTimer = setTimeout(() => _wfShowNodeTooltip(nid, e), 280);
  }, true);
  document.addEventListener('mousemove', (e) => {
    const el = document.getElementById('wfNodeTooltip');
    if (!el || !el.classList.contains('visible')) return;
    const nodeEl = e.target.closest && e.target.closest('.wf-node');
    if (!nodeEl) return;
    // 위치만 업데이트 (모양 유지)
    const w = el.offsetWidth, h = el.offsetHeight;
    let x = e.clientX + 14, y = e.clientY + 14;
    if (x + w > window.innerWidth - 8) x = e.clientX - w - 14;
    if (y + h > window.innerHeight - 8) y = e.clientY - h - 14;
    el.style.left = Math.max(8, x) + 'px';
    el.style.top = Math.max(8, y) + 'px';
  }, true);
  document.addEventListener('mouseout', (e) => {
    const nodeEl = e.target.closest && e.target.closest('.wf-node');
    if (!nodeEl) return;
    if (_wfTooltipTimer) { clearTimeout(_wfTooltipTimer); _wfTooltipTimer = null; }
    // related target 도 wf-node 내부면 유지
    const rel = e.relatedTarget;
    if (rel && rel.closest && rel.closest('.wf-node')) return;
    _wfHideNodeTooltip();
  }, true);
})();

// running 노드를 뷰포트 중앙으로 pan (zoom 유지)
function _wfFocusNode(nid) {
  const wf = __wf.current;
  if (!wf) return;
  const n = (wf.nodes || []).find(x => x.id === nid);
  if (!n) return;
  const host = document.getElementById('wfCanvasHost');
  if (!host) return;
  const rect = host.getBoundingClientRect();
  const zoom = (wf.viewport && wf.viewport.zoom) || 1;
  const cx = n.x + WF_NODE_W / 2;
  const cy = n.y + WF_NODE_H / 2;
  const panX = rect.width / 2 - cx * zoom;
  const panY = rect.height / 2 - cy * zoom;
  wf.viewport = { panX, panY, zoom };
  const vp = document.getElementById('wfViewport');
  if (vp) vp.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
  _wfSchedulePatch && _wfSchedulePatch();
  // 미니맵 뷰포트 사각형도 업데이트
  if (_wfMinimapTimer) cancelAnimationFrame(_wfMinimapTimer);
  _wfMinimapTimer = requestAnimationFrame(() => { _wfMinimapTimer = null; _wfRenderMinimap(); });
}

function _wfStopSSE() {
  if (__wf._sse) { try { __wf._sse.close(); } catch(e){} __wf._sse = null; }
}

function _wfStartPolling() {
  // 먼저 SSE 시도, 실패 시 폴링 fallback
  _wfStopSSE();
  if (__wf.pollTimer) { clearInterval(__wf.pollTimer); __wf.pollTimer = null; }

  if (!__wf.runId) return;

  try {
    const sse = new EventSource('/api/workflows/run-stream?runId=' + encodeURIComponent(__wf.runId));
    __wf._sse = sse;

    sse.addEventListener('status', (e) => {
      try {
        const data = JSON.parse(e.data);
        const run = data.run || data;
        _wfApplyRunStatus(run);
      } catch(ex) { /* silent */ }
    });

    sse.addEventListener('done', (e) => {
      try {
        const data = JSON.parse(e.data);
        const run = data.run || data;
        _wfApplyRunStatus(run);
        _wfShowRunResult(run);
      } catch(ex) { /* silent */ }
      __wf.runId = null;
      _wfStopSSE();
    });

    sse.addEventListener('error', (e) => {
      // SSE 프로토콜 에러 이벤트 (커스텀)
      if (e.data) {
        try {
          const data = JSON.parse(e.data);
          toast(errMsg(data), 'err');
        } catch(ex) { toast(t('실행 오류'), 'err'); }
        __wf.runId = null;
        _wfStopSSE();
      } else {
        // 연결 실패 — 폴링 fallback
        _wfStopSSE();
        _wfStartPollingFallback();
      }
    });

    sse.addEventListener('timeout', (e) => {
      toast(t('실행 시간 초과'), 'warn');
      __wf.runId = null;
      _wfStopSSE();
    });

    // 연결 실패 시 onerror 로 fallback
    sse.onerror = () => {
      if (sse.readyState === EventSource.CLOSED || sse.readyState === EventSource.CONNECTING) {
        // SSE 불가 — 폴링 fallback
        _wfStopSSE();
        if (__wf.runId) _wfStartPollingFallback();
      }
    };
  } catch(e) {
    // EventSource 생성 자체 실패 — 폴링 fallback
    _wfStartPollingFallback();
  }
}

function _wfStartPollingFallback() {
  if (__wf.pollTimer) { clearInterval(__wf.pollTimer); __wf.pollTimer = null; }
  __wf.pollTimer = setInterval(async () => {
    if (!__wf.runId) { clearInterval(__wf.pollTimer); __wf.pollTimer = null; return; }
    try {
      const s = await api('/api/workflows/run-status?runId=' + __wf.runId);
      if (!s.ok) return;
      const run = s.run || {};
      _wfApplyRunStatus(run);
      if (run.status === 'ok' || run.status === 'err') {
        clearInterval(__wf.pollTimer); __wf.pollTimer = null;
        _wfShowRunResult(run);
        __wf.runId = null;
      }
    } catch (e) { /* silent */ }
  }, 1200);
}

function _wfShowRunResult(run) {
  const ok = run.status === 'ok';
  const results = run.nodeResults || {};
  const iterInfo = (typeof run.iteration === 'number' && run.iteration > 0)
    ? `<div class="text-xs text-[var(--text-dim)] mb-2">🔁 ${t('최종 반복')}: ${run.iteration + 1}</div>` : '';
  const rows = Object.entries(results).map(([nid, r]) => {
    const node = (__wf.current.nodes || []).find(n => n.id === nid) || {};
    const icon = (WF_TYPE_MAP[node.type]||{}).icon || '•';
    const preview = (r.output||'').slice(0, 500);
    const err = r.error ? `<div class="text-[11px] text-red-400 mt-1">⚠ ${escapeHtml(r.error)}</div>` : '';
    const sid = r.sessionId || '';
    const sidRow = sid ? `
      <div class="mt-2 pt-2 border-t border-[var(--border)] flex items-center gap-2">
        <span class="text-[10px] text-[var(--text-dim)]">session_id</span>
        <code class="text-[10px] flex-1 truncate" style="color:#c4b5fd;">${escapeHtml(sid)}</code>
        <button class="btn text-[10px]" onclick="_copyToClipboard(this, ${JSON.stringify(sid).replace(/"/g,'&quot;')})">📋</button>
        <button class="btn text-[10px]" onclick="_wfUseAsResume('${nid}', ${JSON.stringify(sid).replace(/"/g,'&quot;')})" title="${t('다른 노드의 resume 필드에 붙여넣기')}">↪ ${t('이어쓰기')}</button>
      </div>` : '';
    return `<div class="card p-3">
      <div class="flex items-center justify-between mb-1">
        <div class="text-xs font-semibold">${icon} ${escapeHtml(node.title||nid)} <span class="text-[10px] text-[var(--text-dim)]">(${r.status})</span></div>
        <div class="text-[10px] text-[var(--text-dim)]">${r.durationMs||0}ms</div>
      </div>
      ${preview ? `<pre class="text-[11px] whitespace-pre-wrap break-words" style="max-height:160px;overflow-y:auto;">${escapeHtml(preview)}</pre>` : ''}
      ${err}
      ${sidRow}
    </div>`;
  }).join('');
  showModal(`
    <div class="modal p-5" style="max-width:720px;">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold">${ok ? '✅' : '❌'} ${t('실행 결과')}</h2>
        <button class="btn text-xs" onclick="closeModal()">${t('닫기')}</button>
      </div>
      ${run.error ? `<div class="text-sm text-red-400 mb-2">⚠ ${escapeHtml(run.error)}</div>` : ''}
      ${iterInfo}
      <div class="flex flex-col gap-2 max-h-[60vh] overflow-y-auto">${rows || '<div class="empty card p-4">'+t('결과 없음')+'</div>'}</div>
    </div>
  `);
}

async function _wfUseAsResume(sourceNid, sessionId) {
  if (!__wf.current) return;
  // 다른 세션/서브에이전트 노드 목록 제시
  const candidates = (__wf.current.nodes || []).filter(n =>
    (n.type === 'session' || n.type === 'subagent') && n.id !== sourceNid);
  if (!candidates.length) { toast(t('적용할 노드가 없습니다'), 'warn'); return; }
  const optionsText = candidates.map((n, i) =>
    `${i+1}. ${n.title || n.type} (${n.id})`).join('\n');
  const pick = await promptModal({
    title: t('resume 대상 노드'),
    message: t('이 session_id 를 어떤 노드의 resume 필드에 넣을까요? 번호 입력:') + '\n' + optionsText,
    placeholder: '1',
  });
  if (!pick) return;
  const idx = parseInt(pick, 10) - 1;
  if (isNaN(idx) || idx < 0 || idx >= candidates.length) { toast(t('잘못된 번호'), 'err'); return; }
  const target = candidates[idx];
  target.data = target.data || {};
  target.data.resumeSessionId = sessionId;
  __wf.dirty = true;
  toast(`'${target.title}' ` + t('에 session_id 적용됨'), 'ok');
  _wfUpdateToolbar();
  closeModal();
  // 인스펙터 오픈
  __wf.selectedNodeId = target.id;
  _wfRenderInspector();
}

async function _wfSpawnSession(nid) {
  if (!__wf.current) return;
  const n = __wf.current.nodes.find(x => x.id === nid);
  if (!n) return;
  const d = n.data || {};
  const cwd = d.cwd || '~';
  const prompt = [d.subject, d.description].filter(Boolean).join('\n\n');
  const body = {
    cwd, prompt,
    systemPrompt:        d.systemPrompt || '',
    appendSystemPrompt:  d.appendSystemPrompt || '',
    allowedTools:        d.allowedTools || '',
    disallowedTools:     d.disallowedTools || '',
    resumeSessionId:     d.resumeSessionId || '',
  };
  const r = await api('/api/session/spawn', {
    method: 'POST', headers: { 'Content-Type':'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  toast(t('Claude 세션 시작됨'), 'ok');
}

let __wfTplFilter = 'all';

function _wfFilterTemplates(cat) {
  __wfTplFilter = cat;
  document.querySelectorAll('.wf-tpl-cat-btn').forEach(btn => {
    btn.classList.toggle('btn-active', btn.dataset.cat === cat);
  });
  document.querySelectorAll('.wf-tpl-card').forEach(card => {
    const cardCat = card.dataset.category || '';
    card.style.display = (cat === 'all' || cardCat === cat) ? '' : 'none';
  });
}

async function _wfShowTemplates() {
  const customList = await api('/api/workflows/templates/list');

    ...WF_TEMPLATES.map(tpl => ({ ...tpl, source: 'builtin' })),

      ...tpl,

        <span class="chip chip-ok text-[9px]" style="font-weight:600;">BUILT-IN</span>

      <div class="text-[11px] text-[var(--text-mute)] leading-relaxed mb-2">${escapeHtml(t(tpl.desc))}</div>
      <div class="flex items-center gap-2">
        <span class="chip text-[9px]">${escapeHtml(t(WF_TPL_CATEGORIES.find(c=>c.id===tpl.category)?.label || tpl.category || ''))}</span>

      </div>
    </div>

  const customCards = customTemplates.length ? customTemplates.map(tpl => {
    const isBuiltin = !!tpl.builtin;

    <div class="card p-4 hover-lift wf-tpl-card" data-category="${escapeHtml(cat)}" style="cursor:pointer;position:relative;" onclick="_wfUseCustomTemplate('${tpl.id}')">

        <span style="font-size:1.5rem;">${escapeHtml(tpl.icon||'💾')}</span>
        <span class="text-sm font-semibold">${escapeHtml(tpl.name)}</span>
      </div>
      <div class="text-[11px] text-[var(--text-mute)] leading-relaxed mb-1">${escapeHtml(tpl.description || '')}</div>
      <div class="flex items-center justify-between mt-2">
        <div class="flex items-center gap-2">
          <span class="text-[10px] text-[var(--text-dim)]">${tpl.nodeCount || 0} ${t('노드')} · ${tpl.edgeCount || 0} ${t('연결')}</span>
          <span class="chip text-[9px]">${escapeHtml(t(WF_TPL_CATEGORIES.find(c=>c.id===cat)?.label || cat))}</span>
        </div>

async function _wfUseTemplate(tplId) {
  const tpl = WF_TEMPLATES.find(x => x.id === tplId);
  if (!tpl) return;
  closeModal();
  const body = tpl.build();
  const r = await api('/api/workflows/save', {
    method: 'POST', headers: { 'Content-Type':'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  toast(t('템플릿에서 생성됨'), 'ok');
  const list = await api('/api/workflows/list');
  __wf.workflows = list.workflows || [];
  await _wfOpen(r.id);
  _wfRenderList();
  setTimeout(() => _wfFitView(), 150);
}

async function _wfUseCustomTemplate(tplId) {
  const r = await api('/api/workflows/templates/' + encodeURIComponent(tplId));
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  closeModal();
  const tpl = r.template;
  // 템플릿을 바탕으로 새 워크플로우 생성 (id 제거해서 신규 ID 할당)
  const body = {
    name: tpl.name + ' (' + t('복제') + ')',
    description: tpl.description,
    nodes: tpl.nodes,
    edges: tpl.edges,
    viewport: tpl.viewport,
  };
  const s = await api('/api/workflows/save', {
    method: 'POST', headers: { 'Content-Type':'application/json' },
    body: JSON.stringify(body),
  });
  if (!s.ok) { toast(errMsg(s), 'err'); return; }
  toast(t('템플릿에서 생성됨'), 'ok');
  const list = await api('/api/workflows/list');
  __wf.workflows = list.workflows || [];
  await _wfOpen(s.id);
  _wfRenderList();
  setTimeout(() => _wfFitView(), 150);
}

async function _wfSaveCurrentAsTemplate() {
  if (!__wf.current) { toast(t('워크플로우를 먼저 선택하세요'), 'warn'); return; }
  const name = await promptModal({
    title: t('템플릿으로 저장'),
    message: t('템플릿 이름을 입력하세요'),
    placeholder: t('예: 내 리뷰 플로우'),
    defaultValue: __wf.current.name || '',
    confirmLabel: t('저장'),
  });
  if (!name || !name.trim()) return;
  const desc = await promptModal({
    title: t('템플릿 설명 (선택)'),
    message: t('이 템플릿이 무엇인지 한두 줄로 적어주세요. 비워도 됩니다.'),
    placeholder: '',
    defaultValue: __wf.current.description || '',
    confirmLabel: t('저장'),
  });
  const body = {
    name: name.trim(),
    description: (desc || '').trim(),
    icon: '💾',
    nodes: __wf.current.nodes,
    edges: __wf.current.edges,
    viewport: __wf.current.viewport,
  };
  const r = await api('/api/workflows/templates/save', {
    method: 'POST', headers: { 'Content-Type':'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  toast(t('커스텀 템플릿 저장됨'), 'ok');
  // 모달 다시 열어 목록 갱신
  closeModal();
  setTimeout(() => _wfShowTemplates(), 100);
}

async function _wfDeleteCustomTemplate(tplId) {
  const ok = await confirmModal({
    title: t('커스텀 템플릿 삭제'),
    message: t('이 커스텀 템플릿을 삭제할까요?'),
    confirmLabel: t('삭제'), danger: true,
  });
  if (!ok) return;
  const r = await api('/api/workflows/templates/delete', {
    method: 'POST', headers: { 'Content-Type':'application/json' },
    body: JSON.stringify({ id: tplId }),
  });
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  toast(t('삭제됨'), 'ok');
  closeModal();
  setTimeout(() => _wfShowTemplates(), 100);
}

async function _wfLoadVersionHistory() {
  if (!__wf.current) return;
  const body = document.getElementById('wfVersionHistoryBody');
  if (!body) return;
  body.innerHTML = `<div class="text-[10px]" style="color:var(--text-dim)">${t('로딩 중...')}</div>`;
  try {
    const r = await api('/api/workflows/history?id=' + encodeURIComponent(__wf.current.id));
    const versions = (r && r.versions) || [];
    if (!versions.length) {
      body.innerHTML = `<div class="text-[10px]" style="color:var(--text-dim)">${t('저장된 버전이 없습니다')}</div>`;
      return;
    }
    body.innerHTML = `
      <div class="flex items-center gap-2 mb-2">
        <span class="text-[10px] text-[var(--text-dim)]">${t('비교할 두 버전을 선택하세요')}:</span>
        <button class="btn text-[10px]" onclick="_wfDiffVersions()" aria-label="${t('선택된 버전 비교')}">🔍 ${t('비교')}</button>
      </div>
    ` + versions.map((v, idx) => `
      <div class="flex items-center justify-between py-2 border-b border-[var(--border)]" style="gap:6px;">
        <label class="flex items-center gap-1 flex-shrink-0">
          <input type="checkbox" class="wf-version-compare-cb" data-saved-at="${escapeHtml(v.savedAt)}" data-name="${escapeHtml(v.name||t('이름 없음'))}" data-node-count="${v.nodeCount||0}" style="accent-color:var(--accent);" />
        </label>
        <div class="flex-1 min-w-0">
          <div class="text-[11px] font-semibold truncate" style="color:var(--text)">${escapeHtml(v.name || t('이름 없음'))}</div>
          <div class="text-[10px]" style="color:var(--text-dim)">
            ${new Date(v.savedAt).toLocaleString()} · ${v.nodeCount || 0} ${t('노드')}
          </div>
        </div>
        <button class="btn text-[10px] flex-shrink-0" onclick="_wfRestoreVersion('${escapeHtml(__wf.current.id)}','${escapeHtml(v.savedAt)}')">
          ↩ ${t('복원')}
        </button>
      </div>
    `).join('');
  } catch (e) {
    body.innerHTML = `<div class="text-[10px]" style="color:var(--err)">${t('히스토리 로드 실패')}: ${escapeHtml(String(e))}</div>`;
  }
}

async function _wfRestoreVersion(wfId, savedAt) {
  const ok = await confirmModal({
    title: t('버전 복원'),
    message: t('이 버전으로 복원하시겠습니까? 현재 저장되지 않은 변경 사항은 사라집니다.'),
    confirmLabel: t('복원'), danger: true,
  });
  if (!ok) return;
  try {
    const r = await api('/api/workflows/restore', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: wfId, savedAt }),
    });
    if (!r.ok) { toast(errMsg(r), 'err'); return; }
    toast(t('버전이 복원되었습니다'), 'ok');
    await _wfOpen(wfId);
    _wfRenderList();
    _wfRenderCanvas();
    _wfRenderInspector();
  } catch (e) {
    toast(t('복원 실패') + ': ' + String(e), 'err');
  }
}
