<!-- GG1 (v2.66.19) — replaced cdn.tailwindcss.com (1MB JIT runtime that
     re-compiles on every DOM mutation) with a pre-built 26KB stylesheet.
     Single biggest workflow-tab lag fix. Rebuild via:
       /tmp/tailwindcss-v3 -c tools/tailwind.config.js \
         -i tools/tailwind.input.css -o dist/vendor/tailwind.css --minify -->
<link rel="stylesheet" href="/vendor/tailwind.css">
<!-- HH2 (v2.66.21) — vendor libs are now LAZY-LOADED on first use, not on
     page boot. Saves ~900KB of parse + execute cost when the user
     never opens the chart/graph/markdown-rendering tabs.
     `_loadVendor('chart')`, `_loadVendor('vis')`, `_loadVendor('marked')`
     return a Promise that resolves after the script tag loads. Marked
     is small (35KB) but loaded on demand for symmetry. -->
<!-- Marked is small (35KB) and used inside template strings (e.g.
     `marked.parse(raw)` in CLAUDE.md preview); keep it page-boot
     with `defer` so it's available without a top-level await. -->
<script src="/vendor/marked.min.js" defer></script>
<script>
window._loadVendor = (() => {
  const URLS = {
    chart:  '/vendor/chart.umd.min.js',
    vis:    '/vendor/vis-network.min.js',
    marked: '/vendor/marked.min.js',
  };
  const CHECKS = {
    chart:  () => typeof Chart !== 'undefined',
    vis:    () => typeof vis !== 'undefined' && !!vis.Network,
    marked: () => typeof marked !== 'undefined',
  };
  const cache = {};
  return function (key) {
    if (CHECKS[key] && CHECKS[key]()) return Promise.resolve();
    if (cache[key]) return cache[key];
    cache[key] = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = URLS[key];
      s.async = false;
      s.onload = () => resolve();
      s.onerror = (e) => { delete cache[key]; reject(e); };
      document.head.appendChild(s);
    });
    return cache[key];
  };
})();
</script>

  @keyframes lc-spin { to { transform: rotate(360deg); } }
  .lc-error { padding: 1rem; background: rgba(252,165,165,0.06); border: 1px solid rgba(252,165,165,0.3); border-radius: 10px; color: #fca5a5; font-size: 0.78rem; }
  .lc-grid-2 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
  @media (min-width: 1024px) { .lc-grid-2 { grid-template-columns: 1fr 1fr; } }
  .lc-stack > * + * { margin-top: 0.75rem; }
  /* V1 (v2.66.8) — toast styling. */
  .lc-toast {
    background: var(--card); border: 1px solid var(--border);
    border-left-width: 3px; border-radius: 12px;
    padding: 0.75rem 1rem; font-size: 0.85rem;
    display: flex; align-items: center; gap: 0.5rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    transition: opacity 0.4s ease, transform 0.4s ease;
    max-width: 480px;
  }
  .lc-toast-info { border-left-color: #60a5fa; }
  .lc-toast-ok   { border-left-color: #4ade80; }
  .lc-toast-warn { border-left-color: #fbbf24; }
  .lc-toast-err  { border-left-color: #fca5a5; }

  /* Y4 (v2.66.11) — inline Mac-style terminal viewer for session replay. */
  .mac-term { background: #1c1c1e; border-radius: 12px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5); border: 1px solid #2c2c2e; max-height: 80vh; display: flex; flex-direction: column; }
  .mac-term-titlebar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: linear-gradient(to bottom, #3a3a3c, #2c2c2e); border-bottom: 1px solid #1a1a1c; user-select: none; }
  .mac-term-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; cursor: pointer; }
  .mac-dot-red    { background: #ff5f57; }
  .mac-dot-yellow { background: #ffbd2e; }
  .mac-dot-green  { background: #28c941; }
  .mac-term-title { color: #c0c0c0; font-size: 12px; font-weight: 500; margin-left: 8px; flex: 1; text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; }
  .mac-term-spawn { background: rgba(255,255,255,0.08); color: #e0e0e0; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 3px 8px; font-size: 10px; cursor: pointer; }
  .mac-term-spawn:hover { background: rgba(255,255,255,0.14); }
  .mac-term-body { padding: 14px 18px; font-family: 'SF Mono', 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 12px; color: #e8e8e8; overflow-y: auto; max-height: 70vh; line-height: 1.55; }
  .mac-term-line { white-space: pre-wrap; word-break: break-word; padding: 1px 0; }
  .mac-term-line.meta   { color: #6b6b6f; font-size: 11px; }
  .mac-term-line.user   { color: #4ade80; padding: 4px 0 4px 8px; border-left: 2px solid #4ade80; margin: 6px 0; background: rgba(74,222,128,0.04); }
  .mac-term-line.assist { color: #e8e8e8; padding: 2px 0 2px 12px; }
  .mac-term-line .mac-prompt { color: #4ade80; margin-right: 6px; font-weight: 600; }
  .mac-term-tools { margin-top: 12px; padding-top: 10px; border-top: 1px dashed #3a3a3c; }
  /* S1 (v2.66.5) — mode-aware view-header accent. Subtle 2px top-bar
     tinted by current mode; helps the user remember which curated subset
     they're in. Applied via body[data-mode=*] selector so JS just toggles
     a single attribute on <body>. Keeps the rest of the chrome neutral. */
  body[data-mode="claude"]    .lc-view-header { border-top: 2px solid #a78bfa44; padding-top: 0.5rem; }
  body[data-mode="workflow"]  .lc-view-header { border-top: 2px solid #60a5fa44; padding-top: 0.5rem; }
  body[data-mode="providers"] .lc-view-header { border-top: 2px solid #fbbf2444; padding-top: 0.5rem; }
  body[data-mode="lazyclaw"]  .lc-view-header { border-top: 2px solid #fb718544; padding-top: 0.5rem; }
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 0.85rem; border-radius: 10px; font-size: 0.82rem; font-weight: 500; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); cursor: pointer; transition: background 0.15s, border-color 0.15s, filter 0.15s, transform 0.15s; }
  .btn:hover { background: rgba(255,255,255,0.12); border-color: var(--border-hi); }
  /* R2 (v2.66.4) — keyboard a11y. Always-visible outline on :focus-visible
     so tab-navigation stays obvious without affecting mouse use. */
  .btn:focus-visible, .chip:focus-visible, .nav-item:focus-visible,
  .nav-category:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .btn-primary { background: var(--grad); border: none; color: #0a0a0f; font-weight: 600; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: rgba(255,255,255,0.06); }
  .chip { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.7rem; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-mute); }
  .chip-accent { background: var(--grad-soft); border-color: rgba(167,139,250,0.35); color: #e9defc; }
  .chip-ok { background: rgba(74,222,128,0.15); border-color: rgba(74,222,128,0.35); color: #86efac; }
  .chip-warn { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.35); color: #fcd34d; }
  .chip-err { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.35); color: #fca5a5; }
  /* R1 (v2.66.4) — outline variant for low-emphasis tags. */
  .chip-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .chip-outline:hover { color: var(--text); border-color: var(--border-hi); }
  /* Larger, button-like chip */
  .chip-lg { padding: 0.35rem 0.85rem; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s; }
  .chip-lg:hover { background: rgba(255,255,255,0.1); }
  /* chatbot — macOS floating window */
  .chat-msg { display: flex; }
  .chat-user { justify-content: flex-end; }
  .chat-bot { justify-content: flex-start; }
  .chat-bubble-user { background: var(--grad); color: #0a0a0f; border-radius: 14px 14px 4px 14px; padding: 8px 12px; max-width: 85%; font-size: 0.82rem; line-height: 1.45; word-break: break-word; }
  .chat-bubble-bot { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; padding: 8px 12px; max-width: 85%; font-size: 0.82rem; line-height: 1.45; color: var(--text); word-break: break-word; }
  /* claude mascot */
  #claudeMascot { cursor: grab; user-select: none; pointer-events: auto; will-change: left, top; touch-action: none; -webkit-tap-highlight-color: transparent; }
  #claudeMascot:active { cursor: grabbing; }
  #claudeMascot:hover { filter: drop-shadow(0 0 14px rgba(224,124,76,0.7)); }
  #claudeMascot svg { transition: transform 0.15s; }
  #claudeMascot.facing-left svg { transform: scaleX(-1); }
  .mascot-bubble { position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card-hi);border:1px solid var(--border-hi);border-radius:12px 12px 12px 4px;padding:7px 12px;font-size:0.72rem;color:var(--text);white-space:nowrap;pointer-events:none;animation:bubblePop 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:0 4px 16px rgba(0,0,0,0.4); }
  .mascot-bubble::after { content:'';position:absolute;top:100%;left:18px;border:5px solid transparent;border-top-color:var(--border-hi); }
  @keyframes bubblePop { from{opacity:0;transform:translateX(-50%) scale(0.85);} to{opacity:1;transform:translateX(-50%) scale(1);} }
  /* streaming cursor */
  .streaming-cursor::after { content: '▍'; animation: blink-cursor 0.8s infinite; color: var(--accent); font-weight: 300; }
  @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }
  /* chat window animation */
  @keyframes chatSlideIn { from { opacity:0; transform:translateY(20px) scale(0.95); } to { opacity:1; transform:none; } }
  @keyframes chatSlideOut { from { opacity:1; transform:none; } to { opacity:0; transform:translateY(20px) scale(0.95); } }
  .chat-win-enter { animation: chatSlideIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
  .chat-win-exit { animation: chatSlideOut 0.2s ease-in forwards; }
  /* interactive counters */
  @keyframes countFadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .count-up { animation: countFadeIn 0.5s ease-out backwards; }
  /* card stagger entrance */
  @keyframes cardPop { from { opacity:0; transform:translateY(12px) scale(0.97); } to { opacity:1; transform:none; } }
  .card-animate { animation: cardPop 0.4s cubic-bezier(0.16,1,0.3,1) backwards; will-change: transform, opacity; }
  /* spotlight — macOS floating window style */
  #spotlightInput, #spotlightInput:focus,
  #chatInput, #chatInput:focus { outline:none !important; box-shadow:none !important; --tw-ring-shadow:none !important; }
  .spotlight-item { display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background 0.12s; }
  .spotlight-item:hover,.spotlight-item.active { background:rgba(255,255,255,0.06); }
  .spotlight-item .sl-icon { font-size:1.3rem;width:32px;text-align:center;flex-shrink:0; }
  .spotlight-item .sl-label { font-size:0.95rem;font-weight:500; }
  .spotlight-item .sl-desc { font-size:0.78rem;color:var(--text-dim);margin-top:2px; }
  .spotlight-item .sl-kbd { font-size:0.7rem;color:var(--text-dim);background:rgba(255,255,255,0.06);padding:3px 8px;border-radius:5px;margin-left:auto;flex-shrink:0; }
  .settings-item { display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;background:none;border:none;color:var(--text);font-size:0.82rem;cursor:pointer;text-align:left;font-family:inherit;transition:background 0.1s; }
  .settings-item:hover { background:rgba(255,255,255,0.06); }
  body.theme-light .settings-item:hover { background:rgba(0,0,0,0.05); }
  .settings-check { margin-left:auto;color:var(--accent);font-size:0.85rem; }
  .nav-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.8rem; border-radius: 10px; color: var(--text-mute); font-size: 0.88rem; cursor: pointer; transition: background 0.15s, color 0.15s, transform 0.1s; user-select: none; will-change: background; position: relative; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-item.active { background: var(--grad-soft); color: var(--text); border: 1px solid rgba(167,139,250,0.35); }
  /* Q3 (v2.66.3) — left-edge accent bar on the active tab so the user
     spots their location instantly even in dense flyouts. */
  .nav-item.active::before {
    content: ''; position: absolute; left: -3px; top: 6px; bottom: 6px;
    width: 3px; border-radius: 2px; background: var(--accent);
    box-shadow: 0 0 6px rgba(217,119,87,0.5);
  }

  /* v2.40.0 — Sidebar discovery aids: Favorites + Recent above the categorical groups */
  .nav-quick-block { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
  .nav-quick-header {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 8px; margin: 4px 0 2px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .nav-quick-item {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.4rem 0.7rem; border-radius: 8px;
    color: var(--text-mute); font-size: 0.84rem; cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .nav-quick-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-quick-item.active { background: var(--grad-soft); color: var(--text); border: 1px solid rgba(167,139,250,0.35); }
  .nav-quick-icon { font-size: 0.95rem; width: 18px; text-align: center; flex-shrink: 0; }
  body.theme-light .nav-quick-item:hover { background: rgba(0,0,0,0.04); }
  body.theme-light .nav-quick-item.active { background: rgba(217,119,87,0.15); border-color: rgba(217,119,87,0.3); }
  /* Star toggle button — appears on hover for non-favorites, always visible for favorites */
  .nav-fav-btn {
    background: transparent; border: 0; color: #fbbf24;
    padding: 2px 4px; font-size: 13px; line-height: 1; cursor: pointer;
    border-radius: 4px; transition: opacity 0.12s, background 0.12s;
    flex-shrink: 0;
  }
  .nav-item .nav-fav-btn { opacity: 0; }
  .nav-item:hover .nav-fav-btn,
  .nav-item:focus-within .nav-fav-btn { opacity: 1; }
  /* When already favorite (★ glyph), force visible regardless of hover. */
  .nav-quick-item .nav-fav-btn { opacity: 1; }
  .nav-fav-btn:hover { background: rgba(251,191,36,0.15); }
  @media (max-width: 900px) {
    .nav-quick-block { margin-bottom: 6px; padding-bottom: 6px; }
  }

  /* v2.26.0 — 상위 카테고리 + hover flyout */
  .nav-category { display:flex; align-items:center; gap:0.7rem; padding:0.6rem 0.8rem; border-radius:10px; color:var(--text-mute); cursor:pointer; transition:background 0.15s, color 0.15s; position:relative; user-select:none; }
  .nav-category:hover, .nav-category:focus-within, .nav-category.open { background: rgba(255,255,255,0.06); color: var(--text); }
  .nav-category.has-active { color: var(--text); }
  .nav-category.has-active .nav-cat-icon { filter: drop-shadow(0 0 6px rgba(217,119,87,0.5)); }
  .nav-cat-icon { font-size: 1.15rem; width: 22px; text-align: center; flex-shrink: 0; }
  .nav-cat-meta { display:flex; flex-direction:column; gap:2px; overflow:hidden; }
  .nav-cat-label { font-size: 0.9rem; font-weight: 600; }
  .nav-cat-dot { width:6px; height:6px; border-radius:50%; background: var(--accent); display:inline-block; flex-shrink:0; }
  .nav-cat-desc { font-size: 10px; }
  .nav-cat-count { flex-shrink: 0; padding: 1px 6px; border-radius: 8px; background: rgba(255,255,255,0.06); }
  .nav-cat-chevron { flex-shrink:0; color: var(--text-dim); transition: transform 0.15s; }
  .nav-category:hover .nav-cat-chevron,
  .nav-category:focus-within .nav-cat-chevron,
  .nav-category.open .nav-cat-chevron { transform: translateX(2px); color: var(--accent); }

  .nav-flyout {
    display:none; position:absolute; left: calc(100% + 8px); top: 0;
    min-width: 300px; max-width: 360px; max-height: 80vh; overflow-y: auto;
    background: var(--bg-soft); border: 1px solid var(--border-hi); border-radius: 12px;
    padding: 10px; box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    z-index: 1200;
    animation: navFlyoutIn 0.14s ease-out;
  }
  /* v2.33.1 — hover bridge: 카테고리 오른쪽에 투명 pseudo-element 를 두어
     gap(8px) 을 건너는 동안 :hover 상태를 유지. category 의 자식이므로
     마우스가 bridge 위에 있어도 .nav-category:hover 가 참. */
  .nav-category::after {
    content: ''; position: absolute; left: 100%; top: 0;
    width: 14px; height: 100%; background: transparent; z-index: 1201;
    pointer-events: none;
  }
  .nav-category:hover::after,
  .nav-category:focus-within::after,
  .nav-category.open::after { pointer-events: auto; }
  @keyframes navFlyoutIn {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .nav-flyout-header { padding: 2px 6px 8px; border-bottom: 1px solid var(--border); margin-bottom: 6px; display:flex; align-items:center; }
  .nav-category:hover > .nav-flyout,
  .nav-category:focus-within > .nav-flyout,
  .nav-category.open > .nav-flyout { display: block; }
  /* flyout 내부는 hover 유지를 위해 pointer-events 자연스럽게 */
  .nav-flyout .nav-item { margin-bottom: 2px; }

  /* 모바일: flyout 을 아코디언으로 (좌측에서 오른쪽으로 띄우면 영역 부족).
     v2.33.9 — nav-category 를 flex-wrap 하여 flyout 이 새 row 로 내려가며 100% 너비 차지.
     또한 데스크톱에서 _positionNavFlyout 이 박은 inline top/max-height 를 !important 로 덮어씀. */
  @media (max-width: 900px) {
    .nav-category {
      flex-wrap: wrap;
    }
    .nav-flyout {
      position: static !important;
      left: auto !important;
      top: auto !important;
      min-width: 0;
      max-width: none;
      max-height: none !important;   /* inline style 에서 px 로 박힌 값 무효화 */
      width: 100%;
      flex-basis: 100%;
      margin-top: 6px;
      box-shadow: none;
      background: rgba(255,255,255,0.03);
      animation: none;
    }
    .nav-category:hover > .nav-flyout { display: none; }
    .nav-category.open > .nav-flyout { display: block; }
    /* 브리지 pseudo-element 비활성 (좌→우 hover 이동 없음) */
    .nav-category::after { display: none; }
  }
  .badge-n { display: inline-block; min-width: 20px; height: 20px; line-height: 20px; text-align: center; padding: 0 6px; border-radius: 10px; font-size: 0.7rem; background: rgba(255,255,255,0.08); color: var(--text-mute); }
  .gradient-text { color: #d97757; }
  @property --p { syntax: '<number>'; inherits: false; initial-value: 0; }
  .score-ring { --p: 0; --col-a: #d97757; --col-b: #c96442; width: 180px; height: 180px; border-radius: 50%;
    background: conic-gradient(from 0deg, var(--col-a) 0deg, var(--col-b) calc(var(--p) * 3.6deg), rgba(255,255,255,0.05) calc(var(--p) * 3.6deg));
    display: grid; place-items: center; position: relative; transition: --p 1s cubic-bezier(0.16,1,0.3,1); }
  .score-ring::after { content: ""; position: absolute; inset: 10px; background: var(--bg); border-radius: 50%; }
  .score-ring > * { position: relative; z-index: 2; }
  @keyframes ringSpin { from { filter: brightness(0.6); } to { filter: brightness(1); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 1.4s infinite; display: inline-block; }
  .pulse-dot.off { background: #6b7280; animation: none; }
  .tab-enter { animation: tabFade 0.3s ease; will-change: transform, opacity; }
  @keyframes tabFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  table.data { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  table.data th { text-align: left; font-weight: 500; color: var(--text-mute); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  table.data td { padding: 0.65rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  table.data tr:hover td { background: var(--card-hi); }
  .link-row { cursor: pointer; }
  /* V3 (v2.66.8) — input polish: softer bg, smooth focus ring matching the
     screenshot reference. Box-shadow ring instead of outline so the radius
     stays clean. */
  .input { width: 100%; padding: 0.55rem 0.75rem; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.88rem; -webkit-appearance: none; transition: border-color 0.15s, box-shadow 0.15s, background 0.15s; }
  .input:hover { background: rgba(255,255,255,0.06); }
  .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,119,87,0.18); background: rgba(255,255,255,0.07); }
  .input::placeholder { color: var(--text-dim); opacity: 0.7; }
  /* number/password/text 등 모든 input 타입에 다크 테마 강제.
     X4 (v2.66.10) — Tailwind's `forms` plugin resets border-radius on
     bare <input>/<select>/<textarea>. Our .input class adds 8px back,
     but on equal specificity Tailwind wins. Bump the radius to a
     tag+class selector so it always lands. */
  input.input, select.input, textarea.input { background: rgba(255,255,255,0.04) !important; color: var(--text) !important; color-scheme: dark; border-radius: 8px !important; }
  input.input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px rgba(10,10,10,1) inset !important; -webkit-text-fill-color: var(--text) !important; }
  body.theme-light input.input, body.theme-light select.input { background: rgba(255,255,255,0.7) !important; color: var(--text) !important; color-scheme: light; }
  body.theme-light input.input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px rgba(245,245,240,1) inset !important; }
  textarea.input { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.8rem; line-height: 1.55; }
  .kbd { display: inline-block; padding: 0.1rem 0.45rem; border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; background: rgba(255,255,255,0.05); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
  /* V2 (v2.66.8) — modal polish: softer backdrop blur, slightly larger shadow */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 50; display: grid; place-items: center; padding: 24px; animation: lc-fade-in 0.18s ease-out; }
  .modal { background: var(--bg-soft); border: 1px solid var(--border-hi); border-radius: 18px; max-width: 1100px; width: 100%; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 24px 80px rgba(0,0,0,0.6); animation: lc-modal-in 0.22s cubic-bezier(0.16,1,0.3,1); }
  @keyframes lc-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes lc-modal-in { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal-wide { max-width: 1440px; height: 90vh; max-height: 90vh; }
  .modal-narrow { max-width: 520px !important; }
  .modal-wide textarea { font-size: 13px; line-height: 1.55; }
  .prose-claude { color: var(--text); font-size: 0.9rem; line-height: 1.6; }
  .prose-claude h1, .prose-claude h2, .prose-claude h3 { color: var(--text); margin-top: 1em; }
  .prose-claude code { background: rgba(255,255,255,0.08); padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.85em; }
  .prose-claude pre { background: var(--code-bg); padding: 1em; border-radius: 10px; overflow-x: auto; border: 1px solid var(--border); }
  .prose-claude ul { padding-left: 1.2em; }
  .hover-lift { transition: transform 0.15s, background 0.15s; will-change: transform; }
  .hover-lift:hover { transform: translateY(-2px); background: var(--card-hi); }
  .btn-active { background: var(--grad-soft) !important; border-color: rgba(167,139,250,0.45) !important; color: var(--text) !important; }
  .onboard-done { opacity: 0.78; }

  /* ─── 워크플로우 에디터 (n8n 스타일) ─── */
  /* 뷰포트 높이에서 상단 chrome(헤더·타이틀·통계 패널 ≈ 230px) 을 뺀 공간을 모두 사용 → 스크롤 없이 한눈에 */
  #wfRoot { display: flex; gap: 10px; height: calc(100vh - 230px); min-height: 420px; }
  #wfList { width: 260px; flex-shrink: 0; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  #wfCanvasWrap { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  #wfToolbar { display: flex; gap: 6px; padding: 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; background: var(--card); border-radius: 12px 12px 0 0; }
  #wfCanvasHost { flex: 1; position: relative; overflow: hidden; background:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0),
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
    background-size: 20px 20px, 60px 60px;
    background-position: 0 0, 10px 10px;
    border-radius: 0 0 12px 12px;
    border: 1px solid var(--border); border-top: 0;
  }
  #wfCanvas { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; user-select: none; }
  #wfCanvas:active { cursor: grabbing; }
  #wfInspector { width: 320px; flex-shrink: 0; overflow-y: auto; padding: 12px; position: relative; }
  /* LL23 (v2.66.52) — n8n-style draggable resize handle on the
     inspector's left edge. Width persists in localStorage. */
  .wf-inspector-resize {
    position: absolute; left: -3px; top: 0; bottom: 0; width: 6px;
    cursor: col-resize; z-index: 6; user-select: none;
    transition: background 0.12s;
  }
  .wf-inspector-resize:hover { background: rgba(217,119,87,0.25); }
  .wf-inspector-resize.dragging { background: rgba(217,119,87,0.45); }
  .wf-list-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; transition: background 0.12s, border-color 0.12s; }
  .wf-list-item:hover { background: rgba(255,255,255,0.04); }
  .wf-list-item.active { background: var(--grad-soft); border-color: rgba(167,139,250,0.35); }

  /* v2.34.1 — n8n-style accordion palette inside the node editor */
  /* Z2 (v2.66.12) — n8n-style fixed-width palette. Lives inside the
     editor's left aside; sticky search at top, scrollable category list
     below. No more accordion-pushes-window-down: the palette has its
     own scroll context. */
  .wf-pal-search {
    position: sticky; top: 0; z-index: 2;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px 10px 14px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .wf-pal-search-icon { font-size: 12px; color: var(--text-dim); }
  .wf-pal-search-input {
    flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; padding: 6px 10px; border-radius: 7px;
    outline: none; transition: border-color 0.12s, box-shadow 0.12s;
  }
  .wf-pal-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(217,119,87,0.15); }
  .wf-pal-empty { padding: 24px 16px; color: var(--text-dim); font-size: 11px; text-align: center; }

  .wf-palette { display: flex; flex-direction: column; padding: 6px 8px 14px 8px; gap: 4px; }
  .wf-pal-cat { border: 1px solid transparent; border-radius: 8px; overflow: hidden; transition: border-color 0.12s; }
  .wf-pal-cat.has-current { border-color: rgba(217,119,87,0.35); background: rgba(217,119,87,0.04); }
  .wf-pal-cat-header {
    display: grid; grid-template-columns: 22px 1fr auto auto; align-items: center;
    gap: 8px; width: 100%;
    padding: 7px 10px; background: transparent; border: 0; color: var(--text);
    cursor: pointer; text-align: left; font-size: 12px;
    transition: background 0.12s;
  }
  .wf-pal-cat-header:hover { background: rgba(255,255,255,0.04); }
  .wf-pal-cat-icon { font-size: 0.95rem; line-height: 1; text-align: center; }
  .wf-pal-cat-label { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wf-pal-cat-count {
    font-size: 9.5px; color: var(--text-dim); padding: 1px 6px;
    background: rgba(255,255,255,0.06); border-radius: 7px;
  }
  .wf-pal-cat-chev { font-size: 10px; color: var(--text-dim); width: 12px; text-align: center; transition: transform 0.12s; }
  .wf-pal-cat.open .wf-pal-cat-chev { color: var(--accent); }

  .wf-pal-cat-body {
    display: none;
    padding: 3px 0 6px 0;
    flex-direction: column;
    gap: 1px;
  }
  .wf-pal-cat.open .wf-pal-cat-body { display: flex; }

  .wf-pal-row {
    display: grid; grid-template-columns: 20px 1fr;
    column-gap: 9px; padding: 6px 12px;
    background: transparent; border: 0; border-radius: 6px;
    cursor: pointer; text-align: left; color: var(--text);
    transition: background 0.1s;
    align-items: center;
  }
  .wf-pal-row:hover { background: rgba(255,255,255,0.06); }
  .wf-pal-row-active {
    background: rgba(217,119,87,0.16) !important;
  }
  .wf-pal-icon { font-size: 0.95rem; line-height: 1; text-align: center; }
  .wf-pal-label { font-size: 12px; font-weight: 500; color: var(--text); }

  /* v2.36.0 — Run Center cards + filters */
  .rc-filter {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 6px 10px; border-radius: 8px; border: 1px solid transparent;
    background: transparent; color: var(--text); cursor: pointer; text-align: left;
    transition: background 0.1s, border-color 0.1s;
  }
  .rc-filter:hover { background: rgba(255,255,255,0.04); }
  .rc-filter-on { background: rgba(217,119,87,0.14); border-color: rgba(217,119,87,0.45); }
  .rc-count { font-size: 10px; color: var(--text-dim); padding: 1px 6px; background: rgba(255,255,255,0.06); border-radius: 8px; }

  .rc-cat {
    padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border); background: transparent;
    color: var(--text-mute); cursor: pointer; transition: all 0.1s;
  }
  .rc-cat:hover { color: var(--text); border-color: var(--border-hi); }
  .rc-cat-on { background: rgba(167,139,250,0.18); border-color: rgba(167,139,250,0.55); color: var(--text); }

  .rc-card {
    border: 1px solid var(--border); border-radius: 10px; padding: 12px;
    background: rgba(255,255,255,0.015); cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.12s;
    display: flex; flex-direction: column; gap: 6px; min-width: 0;
  }
  .rc-card:hover { background: rgba(255,255,255,0.04); border-color: var(--border-hi); transform: translateY(-1px); }
  .rc-card-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .rc-source { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; }
  .rc-fav { background: transparent; border: 0; color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 0; }
  .rc-fav:hover { color: var(--accent); }
  .rc-name { font-size: 13px; font-weight: 600; line-height: 1.3; word-break: break-word; }
  .rc-desc {
    font-size: 11.5px; color: var(--text-mute); line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .rc-card-foot { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; padding-top: 4px; }
  .rc-cat-tag, .rc-kind-tag {
    font-size: 10px; padding: 2px 6px; border-radius: 6px;
    background: rgba(255,255,255,0.06); color: var(--text-dim);
  }
  .rc-card-compact { padding: 8px 10px; }

  body.theme-light .rc-card { background: rgba(0,0,0,0.02); }
  body.theme-light .rc-card:hover { background: rgba(0,0,0,0.05); }
  body.theme-light .rc-cat-tag, body.theme-light .rc-kind-tag { background: rgba(0,0,0,0.06); }
  body.theme-light .rc-count { background: rgba(0,0,0,0.06); }

  body.theme-light .wf-pal-cat { background: rgba(0,0,0,0.02); }
  body.theme-light .wf-pal-cat-body { background: rgba(0,0,0,0.04); }
  /* JJ1 (v2.66.26) — CSS containment for workflow nodes. Each node
     becomes its own paint/layout boundary so per-node attribute
     mutations (data-status, transform, .wf-node-elapsed text) don't
     trigger a relayout cascade across siblings. Significant on
     20+ node graphs during a live run. */
  .wf-node { cursor: grab; contain: layout paint; will-change: transform; }
  .wf-node:active { cursor: grabbing; }
  .wf-node-body { fill: var(--card); stroke: var(--border); stroke-width: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
  .wf-node.selected .wf-node-body { stroke: var(--accent); stroke-width: 2; }
  /* 노드 타입별 색상 구분 */
  .wf-node[data-type="http"] .wf-node-body { stroke: #4ade80; stroke-width: 1.5; }
  .wf-node[data-type="http"].selected .wf-node-body { stroke: #4ade80; stroke-width: 2.5; }
  .wf-node[data-type="transform"] .wf-node-body { stroke: #c084fc; stroke-width: 1.5; }
  .wf-node[data-type="transform"].selected .wf-node-body { stroke: #c084fc; stroke-width: 2.5; }
  .wf-node[data-type="variable"] .wf-node-body { stroke: #fbbf24; stroke-width: 1.5; }
  .wf-node[data-type="variable"].selected .wf-node-body { stroke: #fbbf24; stroke-width: 2.5; }
  .wf-node[data-type="subworkflow"] .wf-node-body { stroke: #7dd3fc; stroke-width: 1.5; }
  .wf-node[data-type="subworkflow"].selected .wf-node-body { stroke: #7dd3fc; stroke-width: 2.5; }
  .wf-node[data-type="embedding"] .wf-node-body { stroke: #f472b6; stroke-width: 1.5; }
  .wf-node[data-type="embedding"].selected .wf-node-body { stroke: #f472b6; stroke-width: 2.5; }
  .wf-node[data-type="loop"] .wf-node-body { stroke: #a78bfa; stroke-width: 1.5; }
  .wf-node[data-type="loop"].selected .wf-node-body { stroke: #a78bfa; stroke-width: 2.5; }
  .wf-node[data-type="retry"] .wf-node-body { stroke: #fb923c; stroke-width: 1.5; }
  .wf-node[data-type="retry"].selected .wf-node-body { stroke: #fb923c; stroke-width: 2.5; }
  .wf-node[data-type="error_handler"] .wf-node-body { stroke: #f87171; stroke-width: 1.5; }
  .wf-node[data-type="error_handler"].selected .wf-node-body { stroke: #f87171; stroke-width: 2.5; }
  .wf-node[data-type="merge"] .wf-node-body { stroke: #06b6d4; stroke-width: 1.5; }
  .wf-node[data-type="merge"].selected .wf-node-body { stroke: #06b6d4; stroke-width: 2.5; }
  .wf-node[data-type="delay"] .wf-node-body { stroke: #94a3b8; stroke-width: 1.5; }
  .wf-node[data-type="delay"].selected .wf-node-body { stroke: #94a3b8; stroke-width: 2.5; }
  .wf-node[data-type="session"] .wf-node-body { stroke: var(--accent); stroke-width: 1.5; }
  .wf-node[data-type="subagent"] .wf-node-body { stroke: var(--accent); stroke-width: 1.5; }
  .wf-node[data-status="running"] .wf-node-body { stroke: #a78bfa; stroke-width: 2.5; animation: wfPulse 1.2s infinite; filter: drop-shadow(0 0 8px rgba(167,139,250,0.6)); }
  .wf-node[data-status="ok"] .wf-node-body { stroke: #4ade80; stroke-width: 2; }
  .wf-node[data-status="err"] .wf-node-body { stroke: #f87171; stroke-width: 2; }
  /* PP1 (v2.66.70) — sibling-cancelled (auto-cancel) gets amber dashed
     border to distinguish from real failures. The cancel state is set
     server-side when a node's subprocess is SIGTERM'd via MM1 fail-fast. */
  .wf-node[data-status="cancelled"] .wf-node-body { stroke: #fbbf24; stroke-width: 2; stroke-dasharray: 6 3; }
  .wf-node[data-status="skipped"] .wf-node-body { stroke: rgba(255,255,255,0.1); stroke-dasharray: 4 4; }
  /* 회전하는 점선 외곽 링 — running 상태만 표시 */
  .wf-node-ring { stroke: #a78bfa; stroke-width: 2; stroke-dasharray: 6 6; fill: none; opacity: 0; pointer-events: none; }
  .wf-node[data-status="running"] .wf-node-ring { opacity: 0.8; animation: wfSpinDash 2.5s linear infinite; }
  .wf-node-elapsed { fill: #a78bfa; font-size: 10px; font-weight: 700; pointer-events: none; opacity: 0; }
  .wf-node[data-status="running"] .wf-node-elapsed { opacity: 1; }
  @keyframes wfPulse { 0%,100%{stroke-opacity:0.55} 50%{stroke-opacity:1} }
  @keyframes wfSpinDash { to { stroke-dashoffset: -24; } }
  /* 실행 상태 배너 (캔버스 상단 플로팅) */
  #wfRunBanner {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 7; min-width: 360px; max-width: 640px;
    background: var(--card); border: 1.5px solid #a78bfa;
    border-radius: 10px; padding: 10px 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 12px rgba(167,139,250,0.3);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column; gap: 6px;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
    font-size: 12px;
  }
  #wfRunBanner.visible { opacity: 1; pointer-events: auto; }
  #wfRunBanner.state-ok { border-color: #4ade80; box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 12px rgba(74,222,128,0.3); }
  #wfRunBanner.state-err { border-color: #f87171; box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 12px rgba(248,113,113,0.3); }
  #wfRunBanner .wfrb-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #wfRunBanner .wfrb-title { font-weight: 600; color: var(--text); }
  #wfRunBanner .wfrb-meta { color: var(--text-dim); font-size: 11px; font-family: ui-monospace, Menlo, monospace; }
  #wfRunBanner .wfrb-bar { flex: 1; height: 6px; background: rgba(167,139,250,0.15); border-radius: 3px; overflow: hidden; min-width: 120px; }
  #wfRunBanner .wfrb-bar-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #c4b5fd); transition: width 0.3s; }
  #wfRunBanner.state-ok .wfrb-bar-fill { background: linear-gradient(90deg, #4ade80, #86efac); }
  #wfRunBanner.state-err .wfrb-bar-fill { background: linear-gradient(90deg, #f87171, #fca5a5); }
  #wfRunBanner .wfrb-focus { padding: 4px 10px; border-radius: 6px; background: rgba(167,139,250,0.2); color: #a78bfa; font-size: 11px; cursor: pointer; border: 1px solid rgba(167,139,250,0.4); white-space: nowrap; }
  #wfRunBanner .wfrb-focus:hover { background: rgba(167,139,250,0.35); }
  #wfRunBanner .wfrb-close { margin-left: auto; padding: 2px 6px; border-radius: 4px; cursor: pointer; color: var(--text-dim); font-size: 14px; line-height: 1; background: transparent; border: none; }
  #wfRunBanner .wfrb-close:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  /* v2.10.2 — 노드 hover 결과 tooltip */
  #wfNodeTooltip {
    position: fixed; z-index: 9000;
    max-width: 360px; min-width: 220px;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px;
    font-size: 11px; line-height: 1.5;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    pointer-events: none;
    opacity: 0; transition: opacity 0.15s;
  }
  #wfNodeTooltip.visible { opacity: 1; }
  #wfNodeTooltip.state-ok    { border-left: 3px solid #4ade80; }
  #wfNodeTooltip.state-err   { border-left: 3px solid #f87171; }
  #wfNodeTooltip.state-running { border-left: 3px solid #a78bfa; }
  #wfNodeTooltip.state-skipped { border-left: 3px solid rgba(255,255,255,0.3); }
  #wfNodeTooltip .wfnt-head { display: flex; align-items: center; gap: 6px; font-weight: 600; margin-bottom: 4px; }
  #wfNodeTooltip .wfnt-meta { color: var(--text-dim); font-family: ui-monospace, Menlo, monospace; font-size: 10px; }
  #wfNodeTooltip .wfnt-row  { display: flex; justify-content: space-between; gap: 8px; }
  #wfNodeTooltip .wfnt-out  { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); white-space: pre-wrap; color: var(--text-mute); max-height: 120px; overflow: auto; font-family: ui-monospace, Menlo, monospace; font-size: 10px; }
  #wfNodeTooltip .wfnt-err  { color: #fca5a5; }
  .wf-node-title { fill: var(--text); font-size: 13px; font-weight: 600; pointer-events: none; }
  .wf-node-sub { fill: var(--text-dim); font-size: 10px; pointer-events: none; }
  .wf-node-icon { font-size: 18px; pointer-events: none; }
  .wf-port { fill: var(--accent); stroke: var(--bg); stroke-width: 2; cursor: crosshair; transition: r 0.12s; }
  .wf-port:hover { r: 8; }
  .wf-port-in { fill: #a78bfa; }
  .wf-edge { stroke: var(--accent); stroke-width: 2; fill: none; marker-end: url(#wfArrow); pointer-events: stroke; cursor: pointer; }
  .wf-edge:hover { stroke: #fbbf24; stroke-width: 3; }
  .wf-edge.selected { stroke: #fbbf24; stroke-width: 3; }
  .wf-edge-draft { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 4 4; fill: none; pointer-events: none; opacity: 0.7; }
  .wf-dirty-dot { width: 8px; height: 8px; border-radius: 50%; background: #fbbf24; display: inline-block; margin-right: 4px; }
  .wf-ok-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 4px; }
  /* 미니맵 — 워크플로우·노드 존재 시에만 표시 (기본은 숨김) */
  #wfMinimap {
    position: absolute; right: 12px; bottom: 48px; z-index: 6;
    width: 150px; height: 100px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4); backdrop-filter: blur(4px);
    display: none;
  }
  /* 캔버스 내부 플로팅 컨트롤 (n8n 스타일) */
  .wf-floating { position: absolute; right: 12px; bottom: 12px; z-index: 5; display: flex; gap: 6px; }
  .wf-floating .btn { background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(4px); box-shadow: 0 4px 14px rgba(0,0,0,0.4); }
  .wf-floating .btn:hover { background: var(--card-hi); }
  /* 인스펙터 접기 */
  #wfInspector.wf-collapsed { display: none; }
  /* 튜토리얼 애니메이션 — 라이트/다크 모드 모두 일관되게 어두운 스테이지로 고정 */
  @keyframes wfTutFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes wfTutDraw { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes wfTutClickRipple {
    0%   { r: 0;  opacity: 0.9; stroke-width: 3; }
    100% { r: 28; opacity: 0;   stroke-width: 1; }
  }
  .wf-tut-node-pop { animation: none; opacity: 1; }
  #wfTutStage { background: #15151c !important; color: #fff; min-height: 280px; }

  .wf-floating-right { position: absolute; right: 12px; top: 12px; z-index: 5; }

  .empty { text-align: center; padding: 2rem 1rem; color: var(--text-dim); font-size: 0.78rem; }

  .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.12), rgba(255,255,255,0.04)); background-size: 200% 100%; animation: shimmerMove 1.6s infinite; border-radius: 6px; }
  @keyframes shimmerMove { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }

  /* 햄버거 토글 중복 방지: sb-collapsed 상태면 sbToggle 숨기고 navToggle 만, 평상시엔 반대 */
  body.sb-collapsed #sbToggle { display: none; }
  body.sb-collapsed #sidebar { width: 78px; }

  /* 🪟 macOS 스타일 플로팅 창 (신기능 전용) */
  .feat-win {
    position: fixed;
    width: min(640px, calc(100vw - 80px));
    min-width: 360px;
    max-width: calc(100vw - 40px);
    min-height: 180px;
    max-height: calc(100vh - 80px);
    background: var(--bg-soft);
    border: 1px solid var(--border-hi);

  body.sb-collapsed #sidebar .nav-label,
  body.sb-collapsed #sidebar .nav-desc,
  body.sb-collapsed #sidebar .brand-text,
  body.sb-collapsed #sidebar .cli-body { display: none; }
  body.sb-collapsed #sidebar .nav-item { justify-content: center; padding: 0.55rem 0.4rem; }
  /* v2.33.1 — collapsed 카테고리: 아이콘 + 짧은 라벨 세로 배치로 "뭐가 뭔지" 즉시 인지 가능 */
  body.sb-collapsed #sidebar .nav-category {
    flex-direction: column; gap: 2px; padding: 0.5rem 0.2rem; text-align: center;
  }
  body.sb-collapsed #sidebar .nav-cat-desc,
  body.sb-collapsed #sidebar .nav-cat-count,

  body.sb-collapsed #sidebar .nav-cat-label {
    font-size: 9.5px; font-weight: 600; line-height: 1.1; color: var(--text-mute);

    justify-content: center;
  }
  /* 기본(expanded): full 라벨만, short 숨김 */
  .nav-cat-label-short { display: none; }
  /* collapsed: short 만, full 숨김. `> span` 셀렉터보다 특이도를 높이기 위해 속성 셀렉터 이용 */
  body.sb-collapsed #sidebar .nav-cat-label span.nav-cat-label-full { display: none; }
  body.sb-collapsed #sidebar .nav-cat-label span.nav-cat-label-short { display: inline-block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
  body.sb-collapsed #sidebar .nav-category.has-active .nav-cat-label { color: var(--text); }
  body.sb-collapsed #sidebar .nav-cat-icon { font-size: 1.25rem; width: auto; }
  body.sb-collapsed #content { margin-left: 78px; }
  body.sb-collapsed #sidebar-foot { padding: 0.4rem; gap: 0.3rem; }

  body.sb-collapsed #sidebar-foot #cliStatus > .card { padding: 0.35rem !important; }
  body.sb-collapsed #sidebar-foot #cliStatus .cli-body,
  body.sb-collapsed #sidebar-foot #cliStatus .flex.items-center.justify-between > span:first-child { display: none; }
  body.sb-collapsed #sidebar-foot #cliStatus .flex { justify-content: center !important; margin: 0 !important; }
  /* CC7 (v2.66.14) — collapsed sidebar: keep "최근 사용 / 즐겨찾기" tidy.
     Hide the "최근 사용 5" header text (only the clock icon stays as a
     visual hint) and center+truncate the quick-link items so the 78px
     rail doesn't show wrapping text. */
  body.sb-collapsed #sidebar .nav-quick-header > span:not(:first-child) { display: none; }
  body.sb-collapsed #sidebar .nav-quick-header { justify-content: center; padding: 4px 0; }
  body.sb-collapsed #sidebar .nav-quick-item { justify-content: center; padding: 0.4rem 0.3rem; gap: 0; }
  body.sb-collapsed #sidebar .nav-quick-item > *:not(.nav-quick-icon) { display: none; }
  body.sb-collapsed #sidebar .nav-quick-block { padding: 4px 0 6px; margin-bottom: 6px; }
  #sidebar { transition: width 0.18s ease; }
  #content { transition: margin-left 0.18s ease; }

  /* ─── 모바일 반응형 ─── */
  @media (max-width: 900px) {
    /* v2.33.10 — 긴 카테고리 리스트가 뷰포트보다 길면 사이드바 내부 스크롤
       (기존에는 overflow 가 지정되지 않아 마지막 카테고리가 잘렸음) */
    #sidebar {
      position: fixed; left: 0; top: 0; height: 100vh; z-index: 40;
      transform: translateX(-100%); transition: transform 0.2s;
      /* v2.34.3 — 720px 미만 (모바일·태블릿 portrait·작은 데스크톱 창) 은
         사이드바를 100vw 로 풀스크린 → 우측 콘텐츠 노출 0%.
         720~900px 만 360px / 92vw 로 부분 노출 + 강한 백드롭 차단. */
      width: min(360px, 92vw) !important;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    @media (max-width: 720px) {
      #sidebar { width: 100vw !important; }
    }
    #sidebar.open { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,0.6); }
    #content { margin-left: 0 !important; }
    /* v2.34.3 — 백드롭을 거의 불투명(0.92) + 강한 blur 로 다크 테마에서도
       뒷 콘텐츠가 절대 읽히지 않도록. 0.78 + blur(2px) 는 부족하다는 사용자 보고. */
    body.sidebar-open { overflow: hidden; }
    body.sidebar-open::after {
      content: ''; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px) saturate(0.6);
      -webkit-backdrop-filter: blur(10px) saturate(0.6);
      z-index: 35; transition: opacity 0.2s;
    }
    body.theme-light.sidebar-open::after {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px) saturate(0.7);
      -webkit-backdrop-filter: blur(10px) saturate(0.7);
    }
    /* v2.34.1 — 모바일 사이드바 열림 시 floating mascot/chatBubble 등은 숨김.
       이전엔 z-index 1100~1150 라 백드롭 위로 그대로 떠 있어 "이상한 핑크 픽셀" 처럼
       보였음. */
    body.sidebar-open #claudeMascot,
    body.sidebar-open #chatBubble,
    body.sidebar-open #chatLauncher { display: none !important; }

    /* 헤더 / 본문 패딩 축소 */
    #content header { padding: 0.5rem 0.75rem !important; }
    #content #view { padding: 0.75rem !important; }

    /* 큰 타이포 축소 */
    h1.text-2xl { font-size: 1.25rem !important; }
    h2.text-lg, h2.text-xl { font-size: 1rem !important; }

    /* 카드 padding 축소 */
    .card.p-5, .card.p-6 { padding: 0.75rem !important; }
    .card.p-4 { padding: 0.625rem !important; }

    /* 테이블 가로 스크롤 */
    table.data { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; max-width: 100%; }
    table.data thead, table.data tbody { display: table; min-width: 100%; }

    /* 그리드 강제 1 컬럼 (md/lg breakpoint 무시) */
    .grid.grid-cols-2 { grid-template-columns: 1fr 1fr !important; }
    .grid.md\:grid-cols-2, .grid.md\:grid-cols-3, .grid.md\:grid-cols-4, .grid.md\:grid-cols-5,
    .grid.lg\:grid-cols-2, .grid.lg\:grid-cols-3, .grid.lg\:grid-cols-4, .grid.lg\:grid-cols-5 {
      grid-template-columns: 1fr !important;
    }
    .grid-list { grid-template-columns: 1fr !important; }

    /* 입력 필드 풀폭 */
    .input { font-size: 16px !important; } /* iOS 자동 줌 방지 */
    .max-w-\[260px\], .max-w-\[280px\], .max-w-\[300px\], .max-w-\[340px\], .max-w-\[420px\] { max-width: 100% !important; }
    #globalSearch { font-size: 14px !important; }

    /* 모달 */
    .modal-backdrop { padding: 8px !important; }
    .modal { max-height: 96vh !important; border-radius: 12px !important; }
    .modal-wide { height: 96vh !important; max-height: 96vh !important; }

    /* 신기능 창 / 챗 윈도우 — 화면 거의 전체 */
    .feat-win {
      width: calc(100vw - 16px) !important;
      max-width: calc(100vw - 16px) !important;
      left: 8px !important;
      top: 8px !important;
      right: auto !important;
      bottom: auto !important;
      height: auto !important;
      max-height: calc(100vh - 16px) !important;
      resize: none !important;
    }
    /* 튜토리얼·노드 에디터처럼 flex 기반 레이아웃 창은 화면 전체 높이 보장 */
    .feat-win.wf-tut-win,
    .feat-win[id^="wfNodeWin-"] {
      height: calc(100vh - 16px) !important;
    }
    .feat-win-title { touch-action: none; cursor: move; }

    /* 마스코트 — 모바일에서 기본 터치 타겟 보장 + 초기 위치 안전 */
    #claudeMascot { width: 64px !important; height: 58px !important; }

    /* Chip / 버튼 터치 타겟 */
    .btn, .btn-primary, .btn-ghost { min-height: 36px; }

    /* 사이드바 네비 항목 터치 타겟 */
    .nav-item { min-height: 44px; padding-top: 10px !important; padding-bottom: 10px !important; }

    /* 이미지/ pre 넘침 */
    pre { max-width: 100%; overflow-x: auto; }
  }

  /* 아주 좁은 화면 — iPhone SE 등 */
  @media (max-width: 420px) {
    .grid.grid-cols-2 { grid-template-columns: 1fr !important; }

  /* Ollama 모델 허브 */
  .ollama-cat-filter.active { background: var(--accent) !important; color: #fff !important; }

</style>

<body>

<aside id="sidebar" class="fixed left-0 top-0 h-screen w-[260px] border-r border-[var(--border)] bg-[var(--bg-soft)] flex flex-col z-30">

        <path d="M5.2 4.2 L7.4 9.6 L12 10.8 L7.4 12 L5.2 17.4 L3 12 L-1.6 10.8 L3 9.6 Z" fill="#000" opacity="0.55" transform="translate(2 2) rotate(30 6 10.8)"/>

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <div id="settingsDropdown" style="display:none;position:absolute;right:0;top:calc(100% + 8px);width:220px;background:var(--bg-soft);border:1px solid var(--border-hi);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.4);overflow:hidden;z-index:45;">
          <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);" data-i18n="settings.theme">테마</div>

          </button>
          <button class="settings-item" onclick="setTheme('dark')" id="themeOptDark">
            <span>🌙</span><span data-i18n="settings.dark">다크</span><span class="settings-check theme-check" data-theme="dark" id="checkDark">✓</span>
          </button>
          <button class="settings-item" onclick="setTheme('light')" id="themeOptLight">
            <span>☀️</span><span data-i18n="settings.light">라이트</span><span class="settings-check theme-check" data-theme="light" id="checkLight" style="display:none;">✓</span>
          </button>
          <button class="settings-item" onclick="setTheme('midnight')" id="themeOptMidnight">
            <span>🌌</span><span data-i18n="settings.midnight">미드나잇</span><span class="settings-check theme-check" data-theme="midnight" style="display:none;">✓</span>
          </button>
          <button class="settings-item" onclick="setTheme('forest')" id="themeOptForest">
            <span>🌲</span><span data-i18n="settings.forest">포레스트</span><span class="settings-check theme-check" data-theme="forest" style="display:none;">✓</span>
          </button>
          <button class="settings-item" onclick="setTheme('sunset')" id="themeOptSunset">
            <span>🌅</span><span data-i18n="settings.sunset">선셋</span><span class="settings-check theme-check" data-theme="sunset" style="display:none;">✓</span>
          </button>
          <div style="padding:10px 14px;border-bottom:1px solid var(--border);border-top:1px solid var(--border);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);" data-i18n="settings.language">언어</div>
          <button class="settings-item" onclick="setLang('ko')"><span>🇰🇷</span><span>한국어</span><span class="settings-check lang-check" data-lang="ko">✓</span></button>
          <button class="settings-item" onclick="setLang('en')"><span>🇺🇸</span><span>English</span><span class="settings-check lang-check" data-lang="en" style="display:none;">✓</span></button>
          <button class="settings-item" onclick="setLang('zh')"><span>🇨🇳</span><span>中文</span><span class="settings-check lang-check" data-lang="zh" style="display:none;">✓</span></button>
          <div style="border-top:1px solid var(--border);"></div>
          <button class="settings-item" onclick="toggleSettingsDropdown(); openQuickSettings()" title="⌘,">
            <span>⚡</span><span data-i18n="settings.quickSettings">빠른 설정 — 모든 파라미터</span>
            <span style="margin-left:auto;font-size:0.65rem;color:var(--text-dim);letter-spacing:0.04em;">⌘,</span>
          </button>
          <button class="settings-item" onclick="toggleSettingsDropdown(); _openModeUsageModal()">
            <span>📊</span><span>모드별 사용량</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div id="view" class="px-7 py-6" style="min-width:0; overflow-x:hidden;"></div>
</main>

<div id="toast" class="fixed right-6 z-[60] space-y-2" style="bottom: 72px;"></div>
<div id="modal-root"></div>

<!-- Claude Mascot -->
<div id="claudeMascot" style="position:fixed;z-index:1150;width:70px;height:63px;">
  <div id="mascotBubble" class="mascot-bubble" style="display:none;"></div>
  <!-- jumping (기본) -->
  <div id="mascotJumping">

      <style>
        .mj-body{animation:mj-jump .5s ease-in-out infinite;transform-origin:center bottom}
        .mj-shadow{animation:mj-sh .5s ease-in-out infinite}
        .mj-la{animation:mj-wl .5s ease-in-out infinite;transform-origin:right center}
        .mj-ra{animation:mj-wr .5s ease-in-out infinite;transform-origin:left center}
        .mj-le{animation:mj-ear .5s ease-in-out infinite;transform-origin:center bottom}
        .mj-re{animation:mj-ear .5s ease-in-out infinite .1s;transform-origin:center bottom}
        @keyframes mj-jump{0%,100%{transform:translateY(0) scaleY(1) scaleX(1)}30%{transform:translateY(-16px) scaleY(1.1) scaleX(.95)}50%{transform:translateY(-18px) scaleY(1.05) scaleX(.98)}80%{transform:translateY(-5px) scaleY(.95) scaleX(1.05)}}
        @keyframes mj-sh{0%,100%{transform:scaleX(1);opacity:.25}50%{transform:scaleX(.4);opacity:.08}}
        @keyframes mj-wl{0%,100%{transform:rotate(0)}50%{transform:rotate(-25deg)}}
        @keyframes mj-wr{0%,100%{transform:rotate(0)}50%{transform:rotate(25deg)}}
        @keyframes mj-ear{0%,100%{transform:scaleY(1)}40%{transform:scaleY(1.2)}60%{transform:scaleY(.85)}}
      </style>
      <ellipse class="mj-shadow" cx="50" cy="82" rx="22" ry="5" fill="#000"/>
      <g class="mj-body">
        <rect class="mj-le" x="22" y="10" width="8" height="14" fill="#E07C4C"/>
        <rect class="mj-re" x="70" y="10" width="8" height="14" fill="#E07C4C"/>
        <rect x="18" y="24" width="64" height="4" fill="#E07C4C"/>
        <rect x="14" y="28" width="72" height="32" fill="#E07C4C"/>
        <rect x="30" y="34" width="8" height="10" fill="#000"/>
        <rect x="62" y="34" width="8" height="10" fill="#000"/>
        <rect class="mj-la" x="2" y="36" width="12" height="8" fill="#E07C4C"/>
        <rect class="mj-ra" x="86" y="36" width="12" height="8" fill="#E07C4C"/>
        <rect x="24" y="60" width="12" height="14" fill="#E07C4C"/>
        <rect x="64" y="60" width="12" height="14" fill="#E07C4C"/>
      </g>
    </svg>
  </div>
  <!-- speaking (가끔) -->
  <div id="mascotSpeaking" style="display:none;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" width="85" height="55">
      <style>
        .ms-body{animation:ms-bob .8s ease-in-out infinite;transform-origin:center bottom}
        .ms-shadow{animation:ms-sp .8s ease-in-out infinite}
        .ms-mouth{animation:ms-talk .3s ease-in-out infinite;transform-origin:center center}
        .ms-le{animation:ms-etl .8s ease-in-out infinite;transform-origin:center bottom}
        .ms-re{animation:ms-etr .8s ease-in-out infinite;transform-origin:center bottom}
        .ms-w1{animation:ms-wave .8s ease-out infinite;transform-origin:left center}
        .ms-w2{animation:ms-wave .8s ease-out infinite .2s;transform-origin:left center}
        .ms-w3{animation:ms-wave .8s ease-out infinite .4s;transform-origin:left center}
        .ms-n1{animation:ms-fn1 1.5s ease-out infinite}
        .ms-n2{animation:ms-fn2 1.5s ease-out infinite .3s}
        .ms-n3{animation:ms-fn3 1.5s ease-out infinite .6s}
        @keyframes ms-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
        @keyframes ms-sp{0%,100%{transform:scaleX(1);opacity:.25}50%{transform:scaleX(.9);opacity:.2}}
        @keyframes ms-talk{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.5)}}
        @keyframes ms-etl{0%,100%{transform:rotate(0)}50%{transform:rotate(-5deg)}}
        @keyframes ms-etr{0%,100%{transform:rotate(0)}50%{transform:rotate(5deg)}}
        @keyframes ms-wave{0%{opacity:.8;transform:scaleX(.3) scaleY(.8)}100%{opacity:0;transform:scaleX(1.2) scaleY(1)}}
        @keyframes ms-fn1{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(15px,-25px) rotate(15deg)}}
        @keyframes ms-fn2{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(20px,-30px) rotate(-10deg)}}
        @keyframes ms-fn3{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(10px,-35px) rotate(20deg)}}
      </style>
      <ellipse class="ms-shadow" cx="50" cy="82" rx="22" ry="5" fill="#000"/>
      <g class="ms-w1"><path d="M 92 44 Q 100 44, 100 52 Q 100 60, 92 60" fill="none" stroke="#E07C4C" stroke-width="3" stroke-linecap="round"/></g>
      <g class="ms-w2"><path d="M 96 38 Q 108 38, 108 52 Q 108 66, 96 66" fill="none" stroke="#E07C4C" stroke-width="3" stroke-linecap="round"/></g>
      <g class="ms-w3"><path d="M 100 32 Q 116 32, 116 52 Q 116 72, 100 72" fill="none" stroke="#E07C4C" stroke-width="3" stroke-linecap="round"/></g>
      <g class="ms-n1"><ellipse cx="108" cy="28" rx="4" ry="3" fill="#E07C4C" transform="rotate(-20,108,28)"/><rect x="111" y="12" width="2" height="16" fill="#E07C4C"/><path d="M 113 12 Q 118 14, 118 18 Q 118 22, 113 20" fill="#E07C4C"/></g>
      <g class="ms-n2"><ellipse cx="122" cy="22" rx="4" ry="3" fill="#E07C4C" transform="rotate(-20,122,22)"/><rect x="125" y="6" width="2" height="16" fill="#E07C4C"/></g>
      <g class="ms-n3"><ellipse cx="115" cy="42" rx="3" ry="2.5" fill="#E07C4C" transform="rotate(-20,115,42)"/><ellipse cx="125" cy="40" rx="3" ry="2.5" fill="#E07C4C" transform="rotate(-20,125,40)"/><rect x="117" y="26" width="2" height="16" fill="#E07C4C"/><rect x="127" y="24" width="2" height="16" fill="#E07C4C"/><rect x="117" y="26" width="12" height="2" fill="#E07C4C"/></g>
      <g class="ms-body">
        <rect class="ms-le" x="22" y="10" width="8" height="14" fill="#E07C4C"/>
        <rect class="ms-re" x="70" y="10" width="8" height="14" fill="#E07C4C"/>
        <rect x="18" y="24" width="64" height="4" fill="#E07C4C"/>
        <rect x="14" y="28" width="72" height="32" fill="#E07C4C"/>
        <rect x="30" y="34" width="8" height="10" fill="#000"/>
        <rect x="62" y="34" width="8" height="10" fill="#000"/>
        <rect class="ms-mouth" x="44" y="50" width="12" height="6" fill="#000"/>
        <rect x="2" y="40" width="12" height="8" fill="#E07C4C"/>
        <rect x="86" y="40" width="12" height="8" fill="#E07C4C"/>
        <rect x="24" y="60" width="12" height="14" fill="#E07C4C"/>
        <rect x="64" y="60" width="12" height="14" fill="#E07C4C"/>
      </g>
    </svg>
  </div>
</div>
<!-- Chatbot macOS floating window -->
<div id="chatWin" class="feat-win" style="display:none;right:24px;bottom:92px;left:auto;top:auto;width:420px;min-height:400px;max-height:min(600px,80vh);z-index:1100;">
  <div class="feat-win-title" id="chatWinTitle">
    <div class="feat-win-lights">
      <button class="feat-light feat-light-close" title="닫기" onclick="toggleChat()"></button>
      <button class="feat-light feat-light-min" title="내리기" onclick="document.getElementById('chatWin').classList.toggle('feat-win-minimized')"></button>
      <button class="feat-light feat-light-max" title="펼치기" onclick="_chatToggleMax()"></button>
    </div>
    <div class="feat-win-title-text" style="display:flex;align-items:center;gap:6px;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90" width="24" height="22" style="flex-shrink:0;">
        <style>.cb2{animation:j2 .6s ease-in-out infinite;transform-origin:center bottom}.la2{animation:wl2 .6s ease-in-out infinite;transform-origin:right center}.ra2{animation:wr2 .6s ease-in-out infinite;transform-origin:left center}@keyframes j2{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes wl2{0%,100%{transform:rotate(0)}50%{transform:rotate(-20deg)}}@keyframes wr2{0%,100%{transform:rotate(0)}50%{transform:rotate(20deg)}}</style>
        <g class="cb2"><rect x="22" y="10" width="8" height="14" fill="#E07C4C"/><rect x="70" y="10" width="8" height="14" fill="#E07C4C"/><rect x="18" y="24" width="64" height="4" fill="#E07C4C"/><rect x="14" y="28" width="72" height="32" fill="#E07C4C"/><rect x="30" y="34" width="8" height="10" fill="#000"/><rect x="62" y="34" width="8" height="10" fill="#000"/><rect class="la2" x="2" y="36" width="12" height="8" fill="#E07C4C"/><rect class="ra2" x="86" y="36" width="12" height="8" fill="#E07C4C"/><rect x="24" y="60" width="12" height="14" fill="#E07C4C"/><rect x="64" y="60" width="12" height="14" fill="#E07C4C"/></g>
      </svg>
      대시보드 도우미
    </div>
  </div>
  <div class="feat-win-body" style="padding:0;display:flex;flex-direction:column;">
    <div id="chatMessages" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;">
      <div class="chat-msg chat-bot">
        <div class="chat-bubble-bot">안녕하세요! 대시보드 기능에 대해 무엇이든 물어보세요.<br>해당 탭으로 바로 안내해 드릴게요.</div>
      </div>
    </div>
    <div style="border-top:1px solid var(--border);padding:10px;display:flex;gap:8px;flex-shrink:0;">
      <input id="chatInput" class="input" style="flex:1;font-size:0.82rem;" placeholder="예: MCP 어디서 설정해?" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}">
      <button onclick="sendChat()" class="btn-primary btn" style="padding:6px 14px;font-size:0.82rem;" aria-label="채팅 전송">전송</button>
    </div>
  </div>
</div>

<script src="/app.js" defer></script>
