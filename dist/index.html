    const checked = !!sel;
    return `<label class="card p-2 flex items-start gap-2 cursor-pointer text-[11px]" style="${checked?'border-color:rgba(217,119,87,0.5);background:rgba(217,119,87,0.06);':''} ${p.available?'':'opacity-60'}">
      <input type="checkbox" ${checked?'checked':''} onchange="elToggleProvider('${p.id}')" style="margin-top:2px;">
      <div style="flex:1;">
        <div class="font-semibold">${p.icon} ${escapeHtml(p.label)}</div>
        <div class="text-[10px] text-[var(--text-dim)] mt-0.5">${p.available ? (sel ? escapeHtml(sel.model) : escapeHtml(p.defaultModel)) : t('키 미설정')}</div>
        ${checked ? `
          <select class="input mt-1" style="font-size:10px;padding:2px 4px;" onchange="elSetModel('${p.id}', this.value); event.stopPropagation()">
            ${p.modelOptions.map(m => `<option value="${m}" ${sel.model===m?'selected':''}>${m}</option>`).join('')}
          </select>` : ''}
      </div>
    </label>`;
  }).join('');

  const exBtns = examples.map(e =>
    `<button class="chip" onclick="elLoadExample('${e.id}')">${t(e.label)}</button>`
  ).join('');

  const docInputs = el.docs.map((d, i) => `
    <div class="flex items-center gap-1 mb-1">
      <span class="text-[10px] text-[var(--text-dim)] font-mono w-6 text-right">${i+1}</span>
      <input class="input flex-1 text-[12px]" value="${escapeHtml(d||'')}" oninput="elSetDoc(${i}, this.value)" placeholder="${t('문서 텍스트')}">
      <button class="btn btn-sm" onclick="elRemoveDoc(${i})" ${el.docs.length<=1?'disabled':''}>✕</button>
    </div>
  `).join('');

  // 결과 매트릭스
  const last = el.lastResult;
  let resultCards = '';
  if (last && last.ok) {
    const docs = last.docs || [];
    const ranksByProvider = (last.results || []).map(r => ({
      id: r.providerId, ok: r.ok, model: r.model, dims: r.dimensions || 0,
      sims: r.sims || [], ranks: r.ranks || [], error: r.error, duration: r.durationMs,
    }));
    // 각 문서의 rank 들이 얼마나 차이 나는지 — max rank - min rank
    const rankSpans = docs.map((_, di) => {
      const rs = ranksByProvider.filter(r => r.ok).map(r => r.ranks[di]);
      if (rs.length < 2) return 0;
      return Math.max(...rs) - Math.min(...rs);
    });

    resultCards = `
      <div class="overflow-x-auto">
        <table class="w-full text-[11px] border-collapse">
          <thead>
            <tr class="border-b border-[var(--border)]">
              <th class="text-left py-1 px-2">#</th>
              <th class="text-left py-1 px-2">${t('문서')}</th>
              ${ranksByProvider.map(r => `<th class="text-center py-1 px-2 font-mono">${escapeHtml(r.id)}<br><span class="text-[9px] text-[var(--text-dim)]">${r.ok ? (r.dims+'d · '+r.duration+'ms') : '❌'}</span></th>`).join('')}
              <th class="text-center py-1 px-2">${t('rank 차이')}</th>
            </tr>
          </thead>
          <tbody>
            ${docs.map((d, di) => `
              <tr class="border-b border-[var(--border)] ${rankSpans[di]>=2?'bg-[var(--bg-hover)]':''}">
                <td class="py-1 px-2 font-mono text-[var(--text-dim)]">${di+1}</td>
                <td class="py-1 px-2" style="max-width:320px;">${escapeHtml(d).slice(0,120)}${d.length>120?'…':''}</td>
                ${ranksByProvider.map(r => r.ok ? `
                  <td class="py-1 px-2 text-center font-mono ${r.ranks[di]===1?'text-[var(--ok)] font-bold':''}">
                    <span class="text-[10px]">#${r.ranks[di]}</span>
                    <span class="text-[9px] text-[var(--text-dim)] block">${(r.sims[di]||0).toFixed(3)}</span>
                  </td>` : `<td class="py-1 px-2 text-center text-[var(--text-dim)]">-</td>`).join('')}
                <td class="py-1 px-2 text-center font-mono ${rankSpans[di]>=2?'text-[var(--warn)] font-bold':'text-[var(--text-dim)]'}">±${rankSpans[di]}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="text-[10px] text-[var(--text-dim)] mt-2">${t('rank 차이 ≥ 2 인 문서는 하이라이트. 프로바이더간 의견이 크게 갈리는 항목.')}</div>
      ${ranksByProvider.filter(r => !r.ok).map(r => `
        <div class="text-[11px] text-[var(--danger)] mt-1">❌ ${escapeHtml(r.id)}: ${escapeHtml(r.error||'failed')}</div>
      `).join('')}
    `;
  } else if (last && !last.ok) {
    resultCards = `<div class="text-[11px] text-[var(--danger)]">${escapeHtml(last.error||'failed')}</div>`;
  } else {
    resultCards = `<div class="text-[11px] text-[var(--text-dim)]">${t('프로바이더 + 문서를 채우고 비교를 눌러주세요.')}</div>`;
  }

  return `
    <div class="mb-4">
      <h1 class="text-2xl font-bold">🧬 ${t('Embedding 비교 실험실')}</h1>
      <p class="text-sm text-[var(--text-mute)] mt-1">
        ${t('같은 쿼리/문서를 여러 임베딩 프로바이더에 돌려 cosine similarity 와 rank 를 비교합니다. 프로바이더간 rank 차이가 큰 문서는 자동 하이라이트.')}
      </p>
    </div>

    <div class="mb-3 flex items-center gap-2 flex-wrap">
      <span class="text-[11px] text-[var(--text-dim)] uppercase tracking-wider">${t('예시')}</span>
      ${exBtns}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="space-y-3">
        <div>
          <label class="text-[11px] text-[var(--text-dim)] uppercase tracking-wider">${t('쿼리')}</label>
          <input class="input" value="${escapeHtml(el.query||'')}" oninput="elSet('query', this.value)" placeholder="${t('쿼리 문장')}">
        </div>
        <div>
          <div class="flex items-center justify-between mb-1">
            <label class="text-[11px] text-[var(--text-dim)] uppercase tracking-wider">${t('문서 리스트')} (${el.docs.length})</label>
            <button class="btn btn-sm" onclick="elAddDoc()" ${el.docs.length>=10?'disabled':''}>+ ${t('추가')}</button>
          </div>
          ${docInputs}
          <div class="text-[10px] text-[var(--text-dim)]">${t('최대 10개')}</div>
        </div>
        <div>
          <label class="text-[11px] text-[var(--text-dim)] uppercase tracking-wider mb-1 block">${t('프로바이더 선택')}</label>
          <div class="space-y-2">${providerCards}</div>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn btn-primary" onclick="elRun()">▶ ${t('비교 실행')}</button>
          <button class="btn" onclick="elReset()">${t('초기화')}</button>
          <span id="elStatus" class="text-[11px] text-[var(--text-dim)]"></span>
        </div>
      </div>

      <div class="space-y-3">
        <div class="card p-3">
          <div class="text-[11px] text-[var(--text-dim)] uppercase tracking-wider mb-2">${t('rank 매트릭스')}</div>
          ${resultCards}
        </div>
      </div>
    </div>
  `;
};

function elSet(k, v) { state.data.el = state.data.el || {}; state.data.el[k] = v; }
function elSetDoc(i, v) {
  state.data.el = state.data.el || { docs: [] };
  state.data.el.docs[i] = v;
}
function elAddDoc() {
  state.data.el = state.data.el || { docs: [] };
  if (state.data.el.docs.length >= 10) return;
  state.data.el.docs.push('');
  renderView();
}
function elRemoveDoc(i) {
  state.data.el.docs.splice(i, 1);
  renderView();
}
function elToggleProvider(pid) {
  state.data.el = state.data.el || { selections: [] };
  const i = state.data.el.selections.findIndex(s => s.providerId === pid);
  if (i >= 0) state.data.el.selections.splice(i, 1);
  else {
    // default model — fetch providers cache 는 간단히 무시, 기본은 선택 시 default 설정을 서버가 알림
    state.data.el.selections.push({ providerId: pid, model: _elDefaultModel(pid) });
  }
  renderView();
}
function _elDefaultModel(pid) {
  return ({ voyage: 'voyage-3-large', 'openai-api': 'text-embedding-3-large', 'ollama-api': 'bge-m3' }[pid]) || '';
}
function elSetModel(pid, model) {
  const s = (state.data.el.selections || []).find(x => x.providerId === pid);
  if (s) s.model = model;
}
function elReset() { state.data.el = null; renderView(); }
async function elLoadExample(id) {
  const r = await api('/api/embedding-lab/examples');
  const e = (r.examples || []).find(x => x.id === id);
  if (!e) return;
  const provs = await api('/api/embedding-lab/providers');
  state.data.el = {
    query: e.query,
    docs: e.docs.slice(),
    selections: (provs.providers || []).filter(p => p.available).map(p => ({ providerId: p.id, model: p.defaultModel })),
    lastResult: null,
  };
  renderView();
}
async function elRun() {
  const el = state.data.el || {};
  const docs = (el.docs || []).filter(d => (d||'').trim());
  if (!(el.query||'').trim()) { toast(t('쿼리를 입력하세요'), 'err'); return; }
  if (docs.length < 2) { toast(t('문서 2개 이상 필요'), 'err'); return; }
  if (!(el.selections||[]).length) { toast(t('프로바이더 1개 이상 선택'), 'err'); return; }
  const st = document.getElementById('elStatus');
  if (st) st.textContent = t('호출 중…');
  try {
    const r = await fetch('/api/embedding-lab/compare', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ query: el.query, docs, selections: el.selections }),
    }).then(x => x.json());
    if (!r.ok) { toast(r.error || t('실행 실패'), 'err'); if (st) st.textContent=''; return; }
    state.data.el.lastResult = r;
    if (st) st.textContent = `${r.totalDurationMs||0}ms`;
    renderView();
  } catch (e) {
    toast(t('네트워크 오류') + ': ' + e.message, 'err');
    if (st) st.textContent = '';
  }
}

// ────────────────────────────────────────────────────────────────
// CITATIONS LAB (v2.13.0) — 문서 + citations.enabled → 인용 span
// ────────────────────────────────────────────────────────────────
VIEWS.citationsLab = async () => {
  const [ex, hist] = await Promise.all([
    api('/api/citations-lab/examples'),
    api('/api/citations-lab/history'),
  ]);
  state.data.ci = state.data.ci || {
    model: 'claude-sonnet-4-6',
    maxTokens: 1024,
    title: '',
    document: '',
    prompt: '',
    lastResult: null,
    hoveredCitIndex: -1,
  };
  const ci = state.data.ci;
  const examples = ex.examples || [];

  const exBtns = examples.map(e =>
    `<button class="chip" onclick="ciLoadExample('${e.id}')">${t(e.label)}</button>`
  ).join('');

  // 답변 렌더: text 세그먼트 + 각 citation pill
  const last = ci.lastResult;
  const segs = last && last.textSegments || [];
  const allCits = [];
  segs.forEach((seg, si) => {
    (seg.citations || []).forEach((c) => {
      allCits.push({
        segIdx: si,
        cited_text: c.cited_text || '',
        start: c.start_char_index ?? c.start_page_number ?? null,
        end: c.end_char_index ?? c.end_page_number ?? null,
        type: c.type || 'char_location',
      });
    });
  });

  const answerHtml = segs.map((seg, si) => {
    const pills = (seg.citations || []).map((c) => {
      const idx = allCits.findIndex(a => a.segIdx === si && a.cited_text === (c.cited_text||''));
      return `<sup class="wf-cite-pill" style="color:var(--accent);cursor:pointer;font-weight:600;margin-left:2px;" onmouseover="ciHoverCit(${idx})" onmouseout="ciHoverCit(-1)" title="${escapeHtml((c.cited_text||'').slice(0,200))}">[${idx+1}]</sup>`;
    }).join('');
    return `<span>${escapeHtml(seg.text||'').replace(/\n/g,'<br>')}${pills}</span>`;
  }).join('');

  // 문서 하이라이트: hoveredCitIndex 가 설정되면 해당 span 을 배경색으로
  const doc = ci.document || '';
  let docHtml;
  if (ci.hoveredCitIndex >= 0 && allCits[ci.hoveredCitIndex]) {
    const c = allCits[ci.hoveredCitIndex];
    const s = c.start || 0;
    const e = c.end != null ? c.end : (s + (c.cited_text||'').length);
    const safe = (x) => escapeHtml(x).replace(/\n/g,'<br>');
    docHtml = safe(doc.slice(0, s)) +
      `<mark style="background:rgba(217,119,87,0.4);border-radius:3px;padding:1px 2px;">${safe(doc.slice(s, e))}</mark>` +
      safe(doc.slice(e));
  } else {
    docHtml = escapeHtml(doc).replace(/\n/g,'<br>');
  }

  const histList = ((hist && hist.items) || []).slice(0, 8).map(h => {
    const ts = new Date((h.ts||0)*1000).toLocaleString();
    const icon = h.status === 'ok' ? '✅' : '❌';
    return `<div class="text-[11px] py-1 border-b border-[var(--border)]">
      ${icon} <span class="text-[var(--text-dim)]">${ts}</span> · ${escapeHtml(h.title||'(no title)')}
    </div>`;
  }).join('') || `<div class="text-[11px] text-[var(--text-dim)]">${t('이력 없음')}</div>`;

  return `
    <div class="mb-4">
      <h1 class="text-2xl font-bold">📑 ${t('Citations 플레이그라운드')}</h1>
      <p class="text-sm text-[var(--text-mute)] mt-1">

}
async function ciLoadExample(id) {

async function ciRun() {
  const ci = state.data.ci || {};
  if (!(ci.document||'').trim()) { toast(t('문서를 입력하세요'), 'err'); return; }

function stSet(key, val) {
  state.data.st = state.data.st || {};
  state.data.st[key] = val;
}
function stReset() { state.data.st = null; renderView(); }
function stToggleTool(tid) {
  const st = state.data.st;
  const i = st.enabled.indexOf(tid);
  if (i >= 0) st.enabled.splice(i, 1);
  else st.enabled.push(tid);
  renderView();
}
async function stLoadExample(id) {
  const r = await api('/api/server-tools/catalog');
  const e = (r.examples || []).find(x => x.id === id);
  if (!e) return;
  state.data.st = {
    model: e.model,
    maxTokens: 2048,
    prompt: e.prompt,
    enabled: e.enabledTools.slice(),
    lastResult: null,
  };
  renderView();
}
async function stRun() {
  const st = state.data.st || {};
  if (!(st.prompt||'').trim()) { toast(t('프롬프트를 입력하세요'), 'err'); return; }
  if (!(st.enabled||[]).length) { toast(t('도구를 1개 이상 활성화하세요'), 'err'); return; }
  const sEl = document.getElementById('stStatus');
  if (sEl) sEl.textContent = t('호출 중…');

      body: JSON.stringify(st),
    }).then(x => x.json());
    if (r.needKey) { toast(t('ANTHROPIC_API_KEY 미설정 — AI 프로바이더 탭에서 저장하세요'), 'err'); if (sEl) sEl.textContent=''; return; }
    if (r.unsupported) { toast(r.error, 'err'); if (sEl) sEl.textContent=''; return; }
    if (!r.ok) { toast(r.error || t('실행 실패'), 'err'); if (sEl) sEl.textContent=''; return; }
    state.data.st.lastResult = r;
    if (sEl) sEl.textContent = `${r.durationMs||0}ms`;
    renderView();
  } catch (e) {
    toast(t('네트워크 오류') + ': ' + e.message, 'err');
    if (sEl) sEl.textContent = '';
  }
}

// HOOKS + PERMISSIONS
// ────────────────────────────────────────────────────────────────
const HOOK_EVENTS = ['SessionStart', 'SessionEnd', 'UserPromptSubmit', 'PreToolUse', 'PostToolUse', 'Stop', 'SubagentStop', 'Notification'];
VIEWS.hooks = async () => {
  const [s, hooksAll] = await Promise.all([api('/api/settings'), api('/api/hooks')]);
  window.__settingsSnapshot = s;
  const rawHooks = s.hooks || {};
  // 사용자 훅(편집 가능): settings.json 에서 인덱스 보존하며 평탄화
  const userFlat = [];
  Object.keys(rawHooks).sort().forEach(ev => {
    (rawHooks[ev] || []).forEach((item, i) => {
      const matcher = item.matcher || '';
      const subs = item.hooks || [];
      if (subs.length) {
        subs.forEach((sh, j) => userFlat.push({ event: ev, scope: 'user', groupIdx: i, subIdx: j, matcher, ...sh }));
      } else {
        userFlat.push({ event: ev, scope: 'user', groupIdx: i, subIdx: -1, matcher, ...item });
      }
    });
  });
  // 플러그인 훅(read-only)
  const pluginFlat = (hooksAll.hooks || []).filter(h => h.scope === 'plugin');
  const counts = hooksAll.counts || {};

  const allEvents = Array.from(new Set([...userFlat, ...pluginFlat].map(h => h.event))).sort();
  const orderedEvents = HOOK_EVENTS.filter(ev => allEvents.includes(ev)).concat(allEvents.filter(ev => !HOOK_EVENTS.includes(ev)));

  const renderUserCard = (x) => `
    <div class="rounded-lg bg-white/5 p-3 text-xs border border-[var(--border)]" style="display:flex; align-items:flex-start; gap:0.75rem; min-width:0; max-width:100%; overflow:hidden;">
      <div style="flex:1 1 0; min-width:0; max-width:100%; overflow:hidden;">
        <div class="flex items-center gap-2 mb-1 flex-wrap"><span class="chip chip-ok text-[9px]" style="white-space:nowrap;">✓ 사용자 설정</span></div>
        ${x.matcher ? `<div class="mb-1" style="overflow-wrap:anywhere;"><span class="text-[var(--text-dim)]">matcher:</span> <span class="mono">${escapeHtml(x.matcher)}</span></div>`:''}
        ${x.type ? `<div class="mb-1"><span class="text-[var(--text-dim)]">type:</span> <span class="mono">${escapeHtml(x.type)}</span></div>`:''}
        ${x.command ? `<div class="mb-1"><div class="text-[var(--text-dim)] mb-1">cmd:</div><pre class="mono" style="display:block; box-sizing:border-box; width:100%; max-width:100%; margin:0; white-space:pre-wrap; overflow-wrap:anywhere; word-break:break-word; max-height:200px; overflow-y:auto; overflow-x:hidden; background:rgba(0,0,0,0.3); padding:6px 8px; border-radius:6px; font-size:11px;">${escapeHtml(x.command)}</pre></div>`:''}
        ${x.timeout ? `<div><span class="text-[var(--text-dim)]">timeout:</span> ${x.timeout}ms</div>`:''}
      </div>
      <div class="flex flex-col gap-1 flex-shrink-0">
        <button class="btn text-[10px]" onclick="openHookEditor(JSON.parse(this.dataset.payload))" data-payload="${jsonAttr({scope:"user", event:x.event, groupIdx:x.groupIdx, subIdx:x.subIdx, matcher:x.matcher||"", type:x.type||"command", command:x.command||"", timeout:x.timeout})}">수정</button>
        <button class="btn text-[10px]" style="color:#fca5a5" onclick="deleteHook(JSON.parse(this.dataset.payload))" data-payload="${jsonAttr({scope:"user", event:x.event, groupIdx:x.groupIdx, subIdx:x.subIdx})}">삭제</button>
      </div>
    </div>`;

  const renderPluginCard = (x) => {
    const badge = x.pluginEnabled

        }),
      });

    } else {

    }

async function upsertHook(payload, existing) {
  const s = await api('/api/settings');
  s.hooks = s.hooks || {};
  s.hooks[payload.event] = s.hooks[payload.event] || [];

  const newSubEntry = { type: payload.type, command: payload.command, timeout: payload.timeout };

  if (existing) {
    // 기존 수정
    const group = s.hooks[existing.event][existing.groupIdx];
    // 이벤트가 바뀐 경우 → 삭제 후 새로 추가
    if (existing.event !== payload.event) {
      if (existing.subIdx >= 0 && group && group.hooks) {
        group.hooks.splice(existing.subIdx, 1);
        if (!group.hooks.length) s.hooks[existing.event].splice(existing.groupIdx, 1);
      } else if (group) {
        s.hooks[existing.event].splice(existing.groupIdx, 1);
      }
      addHookEntry(s, payload, newSubEntry);
    } else {
      // 같은 이벤트 안에서 수정
      if (existing.subIdx >= 0 && group.hooks) {
        group.matcher = payload.matcher || group.matcher;
        group.hooks[existing.subIdx] = newSubEntry;
      } else {
        s.hooks[existing.event][existing.groupIdx] = payload.matcher
          ? { matcher: payload.matcher, hooks: [newSubEntry] }
          : { ...newSubEntry };
      }
    }
  } else {
    addHookEntry(s, payload, newSubEntry);
  }

  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  toast(r.ok ? '훅 저장됨' : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
  if (r.ok) { closeModal(); renderView(); }
}

function addHookEntry(s, payload, newSubEntry) {
  const list = s.hooks[payload.event];
  if (payload.matcher) {
    // matcher 일치하는 기존 그룹에 합류 or 새 그룹
    const existingGroup = list.find(g => g.matcher === payload.matcher && Array.isArray(g.hooks));
    if (existingGroup) existingGroup.hooks.push(newSubEntry);
    else list.push({ matcher: payload.matcher, hooks: [newSubEntry] });
  } else {
    list.push({ hooks: [newSubEntry] });
  }
}

async function deleteHook(payload) {
  const {scope, event, groupIdx, subIdx, pluginKey} = payload || {};
  if (scope === 'plugin') {
    const ok = await confirmModal({
      title: t('플러그인 훅 삭제'),
      message: t('플러그인 훅을 삭제하시겠습니까?') + ` (${pluginKey} → ${event}[${groupIdx}/${subIdx}]) — ` + t('플러그인 업데이트 시 복원될 수 있습니다.'),
      confirmLabel: t('삭제'), danger: true,
    });
    if (!ok) return;
    const r = await api('/api/hooks/plugin/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pluginKey, event, groupIdx, subIdx, op:'delete' }),
    });
    toast(r.ok ? '플러그인 훅 삭제됨' : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
    return;
  }
  if (!await confirmModal({ title: t('훅 삭제'), message: t('이 훅을 삭제할까요?'), confirmLabel: t('삭제'), danger: true })) return;
  const s = await api('/api/settings');
  if (!s.hooks || !s.hooks[event]) return;
  const group = s.hooks[event][groupIdx];
  if (!group) return;
  if (subIdx >= 0 && group.hooks) {
    group.hooks.splice(subIdx, 1);
    if (!group.hooks.length) s.hooks[event].splice(groupIdx, 1);
  } else {
    s.hooks[event].splice(groupIdx, 1);
  }
  if (!s.hooks[event].length) delete s.hooks[event];
  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  toast(r.ok ? '삭제됨' : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
}

async function autoFixPermissions() {
  const s = await api('/api/settings');
  // 서버의 put_settings 가 자동 교정해서 저장
  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  if (r.ok) {
    const n = (r.fixed||[]).length;
    toast(n ? `✅ ${n}개 규칙 자동 교정됨` : '교정할 항목 없음', 'ok');
  } else toast('실패: ' + (r.error||'unknown'), 'err');
}

async function quickAddPerm(kind) {
  const inp = document.getElementById(`perm-${kind}-input`);
  const v = (inp.value || '').trim();
  if (!v) { toast('규칙을 입력하세요', 'warn'); return; }
  await setPermAndSave(kind, 'add', v);
  inp.value = '';
}
async function addPermission(kind) {
  const v = await promptModal({
    title: kind === 'allow' ? t('허용 규칙 추가') : t('차단 규칙 추가'),
    message: t('규칙을 입력하세요 (예: Bash(git status:*))'),
    placeholder: 'Bash(git status:*)',
  });
  if (!v || !v.trim()) return;
  await setPermAndSave(kind, 'add', v.trim());
}
async function removePermission(kind, i) {
  await setPermAndSave(kind, 'remove', i);
}
async function setPermAndSave(kind, op, value) {
  const s = await api('/api/settings');
  s.permissions = s.permissions || { allow: [], deny: [] };
  s.permissions[kind] = s.permissions[kind] || [];
  if (op === 'add') {
    if (!s.permissions[kind].includes(value)) s.permissions[kind].push(value);
  } else if (op === 'remove') {
    s.permissions[kind].splice(value, 1);
  }
  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  toast(r.ok ? '저장됨' : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
  if (r.ok) renderView();
}

  el.addEventListener('input', e => {
    clearTimeout(d);
    d = setTimeout(() => { state.data.mcpFilter = e.target.value; renderView(); }, 200);
  });
};

async function installMcp(id) {
  // 1) prepare — 필요한 env/값 조회
  const prep = await api('/api/mcp/install/prepare', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id })
  });
  if (prep.error) { toast(errMsg(prep), 'err'); return; }
  const placeholders = prep.placeholders || [];

  // 2) 모달로 이름 + 각 env 값 입력
  const fieldHtml = placeholders.map(p => {
    const hint = p.hint || '';
    const example = {
      GITHUB_TOKEN: 'ghp_xxxxxxxxxxxxxxxxxxxx',
      GITHUB_PERSONAL_ACCESS_TOKEN: 'ghp_xxxxxxxxxxxxxxxxxxxx',
      PATH: '/Users/yoo/projects',
      PROJECT_ROOT: '/Users/yoo/my-project',
    }[p.key] || '';
    const isSecret = /TOKEN|KEY|SECRET|PASSWORD/i.test(p.key);
    return `
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">${escapeHtml(p.key)} ${isSecret?'<span class="chip chip-warn text-[9px]">secret</span>':''}</div>
        <input class="input mcp-ph-input" data-key="${escapeHtml(p.key)}" type="${isSecret?'password':'text'}" placeholder="${escapeHtml(example)}" />
        ${hint ? `<div class="text-[10px] text-[var(--text-dim)] mt-1">${escapeHtml(hint)}</div>` : ''}
        <div class="text-[10px] text-[var(--text-mute)] mt-1 mono truncate">where: ${escapeHtml(p.where)} · 원본: ${escapeHtml(p.raw||'')}</div>
      </div>`;
  }).join('');

  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">＋ MCP 설치</div>
        <h2 class="text-lg font-bold">${escapeHtml(prep.name || id)}</h2>
      </div>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div class="p-5 space-y-3">
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">등록할 이름</div>
        <input id="mcpAsName" class="input" value="${escapeHtml(id)}" />
      </div>
      ${placeholders.length ? `
        <div class="card p-3" style="background:rgba(251,191,36,0.08);">
          <div class="text-sm font-semibold mb-2">⚠️ 필수 값 ${placeholders.length}개 입력</div>
          <div class="space-y-3">${fieldHtml}</div>
        </div>` : '<div class="text-xs text-[var(--text-dim)]">추가 설정 없이 바로 설치 가능합니다.</div>'}
      <details class="text-[11px]">
        <summary class="cursor-pointer text-[var(--text-dim)]">📋 설치 spec 미리보기</summary>
        <pre class="mono text-[10px] whitespace-pre-wrap bg-[var(--code-bg)] p-2 rounded mt-2">${escapeHtml(JSON.stringify(prep.preview, null, 2))}</pre>
      </details>
    </div>
    <div class="p-4 border-t border-[var(--border)] flex justify-end gap-2">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn-primary btn" id="mcpInstallBtn">설치</button>
    </div>
  `);
  document.getElementById('mcpInstallBtn').onclick = async () => {
    const asName = document.getElementById('mcpAsName').value.trim() || id;
    const values = {};
    document.querySelectorAll('.mcp-ph-input').forEach(el => {
      const k = el.dataset.key; const v = el.value.trim();
      if (v) values[k] = v;
    });
    const missing = placeholders.filter(p => !values[p.key]).map(p => p.key);
    if (missing.length) { toast('필수 값 누락: ' + missing.join(', '), 'warn'); return; }
    const r = await api('/api/mcp/install', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id, as: asName, values }),
    });
    if (r.ok) {
      toast(`'${r.name}' 설치됨`, 'ok');
      closeModal();
    } else {
      toast(errMsg(r), 'err');
    }
  };
}

async function removeMcp(name) {
  const ok = await confirmModal({
    title: t('MCP 서버 제거'),
    message: `'${name}' — ~/.claude.json ` + t('에서 제거됩니다.'),
    confirmLabel: t('제거'), danger: true,
  });
  if (!ok) return;
  const r = await api('/api/mcp/remove', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name }) });
  if (r.ok) toast(`'${name}' 제거됨`, 'ok');
  else toast(errMsg(r), 'err');
}

async function removeProjectMcp(cwd, name) {
  const ok = await confirmModal({
    title: t('프로젝트 MCP 제거'),
    message: `'${name}' — ${cwd}/.mcp.json ` + t('에서 삭제됩니다.'),
    confirmLabel: t('제거'), danger: true,
  });
  if (!ok) return;
  const r = await api('/api/mcp/project/remove', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ cwd, name }),
  });
  if (r.ok) toast(`'${name}' 제거됨 (${r.configPath})`, 'ok');
  else toast(errMsg(r), 'err');
}

function renderConnectorGroup(title, list, allowRemove) {
  const statusBadge = (m) => {
    if (m.connected === true) return '<span class="chip chip-ok text-[9px]" style="white-space:nowrap;">✓ 연결됨</span>';
    if (m.needsAuth) return '<span class="chip chip-warn text-[9px]" style="white-space:nowrap;">🔐 인증 필요</span>';
    if (m.connected === false) return '<span class="chip chip-err text-[9px]" style="white-space:nowrap;">✗ 실패</span>';
    return '';
  };
  return `
    <div class="card p-5 mb-4">
      <h3 class="font-semibold text-sm mb-3">${title} · ${list.length}</h3>
      <div class="grid-list">
        ${list.map(m => `
          <div class="card p-3 hover-lift" style="overflow:hidden;">
            <div class="flex items-center justify-between mb-2 gap-2">
              <div class="flex items-center gap-2 min-w-0 flex-1">
                <span class="pulse-dot ${m.connected===false?'off':''}"></span>
                <div class="font-semibold text-sm truncate" title="${escapeHtml(m.name)}">${escapeHtml(m.name)}</div>
              </div>
              <div class="flex items-center gap-1 flex-shrink-0">
                ${statusBadge(m)}
                ${m.scope === 'project' && m.projectCwd
                  ? `<button class="btn text-[10px]" style="color:#fca5a5" onclick="removeProjectMcp(JSON.parse(this.dataset.cwd), JSON.parse(this.dataset.name))" data-cwd="${jsonAttr(m.projectCwd)}" data-name="${jsonAttr(m.name)}">제거</button>`
                  : (allowRemove ? `<button class="btn text-[10px]" style="color:#fca5a5" onclick="removeMcp(JSON.parse(this.dataset.payload))" data-payload="${jsonAttr(m.name)}">제거</button>` : '')}
              </div>
            </div>
            ${m.endpoint ? `<div class="text-[10px] mono text-[var(--text-dim)] truncate" title="${escapeHtml(m.endpoint)}">${escapeHtml(m.endpoint)}</div>` : ''}
            ${(m.type || m.command) ? `<div class="text-[10px] mono text-[var(--text-dim)] truncate">${escapeHtml(m.type||'')} · ${escapeHtml(m.command||'')}</div>`:''}
            ${m.args && m.args.length ? `<div class="text-[10px] mono text-[var(--text-mute)] truncate mt-1">${escapeHtml(m.args.join(' '))}</div>`: ''}
            ${m.missingEnv && m.missingEnv.length ? `<div class="text-[10px] mt-2 p-1.5 rounded" style="background:rgba(248,113,113,0.1); color:#fca5a5;">⚠️ 환경변수 누락: ${m.missingEnv.map(k=>`<code class="mono">${escapeHtml(k)}</code>`).join(', ')}</div>` : ''}
            ${m.projectCwd ? `<div class="text-[10px] text-[var(--text-dim)] mt-1 truncate">📁 ${escapeHtml(m.projectCwd)}</div>` : ''}
            ${m.description ? `<div class="text-[10px] text-[var(--text-mute)] mt-1 line-clamp-2">${escapeHtml(m.description)}</div>` : ''}
          </div>
        `).join('') || `<div class="empty text-xs" style="grid-column:1/-1;">없음</div>`}
      </div>
    </div>
  `;
}

function copySettings() {
  const t = document.getElementById('settingsEditor').value;
  navigator.clipboard.writeText(t).then(() => toast('복사됨', 'ok'));
}
async function saveSettings() {
  const t = document.getElementById('settingsEditor').value;
  let parsed;
  try { parsed = JSON.parse(t); } catch (e) { toast('JSON 오류: ' + e.message, 'err'); return; }
  const r = await api('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(parsed) });
  toast(r.ok ? '저장됨' : '저장 실패', r.ok ? 'ok' : 'err');
}
function applyProfile(i) {
  // 구 버전 호환용 — editor에 직접 머지만 (저장 클릭 필요)
  const prof = (window.__recProfiles||[])[i];
  if (!prof) return;
  const cur = document.getElementById('settingsEditor');
  try {
    const existing = JSON.parse(cur.value || '{}');
    const merged = { ...existing, ...prof.settings, permissions: { ...(existing.permissions||{}), ...prof.settings.permissions } };
    cur.value = JSON.stringify(merged, null, 2);
    toast(`"${prof.name}" 프로파일 적용됨 — 저장을 눌러 반영`, 'info');
  } catch {
    cur.value = JSON.stringify(prof.settings, null, 2);
  }
}

async function startProfileFlow(i) {

  // 스텝 1: Auth 확인 화면 (로딩)
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">

        <div class="shimmer w-5 h-5 rounded-full"></div>
        <span class="text-sm">Claude 계정 연결 확인 중…</span>
      </div>

  let auth, preview;
  try {
    [auth, preview] = await Promise.all([
      api('/api/auth/status'),
      api('/api/settings/preview', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ patch: prof.settings }) }),

  } catch (e) {
    document.getElementById('profileFlowBody').innerHTML = `<div class="empty text-sm">불러오기 실패: ${escapeHtml(e.message)}</div>`;
    return;
  }

  const step1 = auth.connected
    ? `<div class="card p-4 flex items-center gap-3" style="border-color: rgba(74,222,128,0.35);">
         <div class="text-2xl">✅</div>
         <div class="flex-1">
           <div class="text-xs uppercase tracking-widest text-[var(--text-dim)]">1. 계정 연결</div>
           <div class="font-semibold text-sm">${escapeHtml(auth.displayName || auth.email)} · ${escapeHtml(auth.planLabel)}</div>
           <div class="text-xs text-[var(--text-mute)] mt-0.5">${escapeHtml(auth.email)} · 조직 역할: ${escapeHtml(auth.organizationRole||'—')}</div>
         </div>
         <span class="chip chip-ok">연결됨</span>
       </div>`
    : `<div class="card p-4 flex items-center gap-3" style="border-color: rgba(248,113,113,0.35);">
         <div class="text-2xl">❌</div>
         <div class="flex-1">
           <div class="text-xs uppercase tracking-widest text-[var(--text-dim)]">1. 계정 연결</div>
           <div class="font-semibold text-sm">연결되지 않음</div>
           <div class="text-xs text-[var(--text-mute)] mt-0.5">${escapeHtml(auth.reason||'Claude에 로그인되지 않음')}</div>
           <div class="text-xs mt-2 mono">터미널에서 <code>claude login</code> 실행 후 다시 시도하세요.</div>
         </div>
       </div>`;

  const diff = preview.diff || {};
  const diffList = (arr, color) => arr.length
    ? `<ul class="text-xs space-y-0.5 mono">${arr.map(x=>`<li style="color:${color}">+ ${escapeHtml(x)}</li>`).join('')}</ul>`
    : '<div class="text-xs text-[var(--text-dim)]">없음</div>';

  const step2 = `
    <div class="card p-4">
      <div class="text-xs uppercase tracking-widest text-[var(--text-dim)] mb-3">2. 변경 미리보기</div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <div class="text-[11px] font-semibold text-[var(--ok)] mb-1.5">✅ 추가될 허용 (${diff.addedAllow.length})</div>
          ${diffList(diff.addedAllow, '#86efac')}
        </div>
        <div>
          <div class="text-[11px] font-semibold text-[var(--err)] mb-1.5">🚫 추가될 차단 (${diff.addedDeny.length})</div>
          ${diffList(diff.addedDeny, '#fca5a5')}
        </div>
      </div>
      ${diff.topChanged.length ? `<div class="mt-3 text-xs"><span class="text-[var(--text-mute)]">다른 변경 키:</span> ${diff.topChanged.map(k=>`<code class="mono">${escapeHtml(k)}</code>`).join(', ')}</div>` : ''}
      <details class="mt-4">
        <summary class="cursor-pointer text-xs text-[var(--text-mute)]">전체 병합 결과 보기 (raw JSON)</summary>
        <pre class="mono text-[10px] whitespace-pre-wrap bg-[var(--code-bg)] p-3 rounded mt-2 max-h-[240px] overflow-y-auto">${escapeHtml(JSON.stringify(preview.merged, null, 2))}</pre>
      </details>
    </div>`;

  const step3 = `
    <div class="card p-4 flex items-center justify-between gap-3">
      <div>
        <div class="text-xs uppercase tracking-widest text-[var(--text-dim)] mb-1">3. 적용</div>
        <div class="text-sm">${diff.addedAllow.length + diff.addedDeny.length === 0 ? '이미 동일한 규칙이 존재합니다 — 변경 없음.' : '확인하고 settings.json 에 즉시 저장합니다.'}</div>
      </div>
      <div class="flex gap-2">
        <button class="btn" onclick="closeModal()">취소</button>
        <button id="profileApplyBtn" class="btn-primary btn" ${!auth.connected ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>💾 적용</button>
      </div>
    </div>`;

  document.getElementById('profileFlowBody').innerHTML = step1 + step2 + step3;

  const applyBtn = document.getElementById('profileApplyBtn');
  if (applyBtn && auth.connected) {
    applyBtn.onclick = async () => {
      applyBtn.disabled = true;
      applyBtn.textContent = '적용 중…';
      try {
        const r = await api('/api/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(preview.merged),
        });
        if (r.ok) {
          toast(`"${prof.name}" 적용됨`, 'ok');
          closeModal();
          renderView();
        } else {
          toast('저장 실패: ' + (r.error||'알 수 없음'), 'err');
          applyBtn.disabled = false;
          applyBtn.textContent = '💾 적용';
        }
      } catch (e) {
        toast('실패: ' + e.message, 'err');
        applyBtn.disabled = false;
        applyBtn.textContent = '💾 적용';
      }
    };
  }
}

async function startGlobalClaudeMdRecommend() {
  showModalLoading(t('Claude 에게 초안 요청 중 (30~90초)…'));
  try {
    const r = await api('/api/global/claude-md-recommend', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ lang: _curLang }),
    });
    if (r.error) { closeModal(); toast(errMsg(r), 'err'); return; }
    closeModal();
    openDiffApplyModal({
      title: '글로벌 CLAUDE.md 초안',
      relpath: '~/.claude/CLAUDE.md',
      reason: `비용 $${(r.costInfo?.costUsd||0).toFixed(4)} · ${Math.round((r.costInfo?.durationMs||0)/1000)}초 소요. 좌측은 현재 파일, 우측은 AI 제안. 편집 후 원하는 쪽 저장.`,
      cwd: '',
      currentRaw: r.existing || '',
      proposedRaw: r.content || '',
      badge: '🤖 글로벌 CLAUDE.md 추천',
      saveFn: async (newRaw) => api('/api/claude-md', {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ raw: newRaw }),
      }),
    });

}
AFTER.claudemd = () => {

async function saveClaudeMd() {

}

async function openProjectDetail(cwd) {
  showModalLoading(t('프로젝트 설정 불러오는 중…'));
  try {
    const [d, tb] = await Promise.all([
      api('/api/project/detail?cwd=' + encodeURIComponent(cwd)),
      api('/api/project/tool-breakdown?cwd=' + encodeURIComponent(cwd)),
    ]);
    if (d.error) { toast(errMsg(d), 'err'); closeModal(); return; }
    renderProjectDetail(d);
    renderProjectAgentsSection(tb, d.cwd);
  } catch (e) {
    closeModal(); toast(e.message, 'err');
  }
}

function renderProjectAgentsSection(tb, cwd) {
  const slot = document.getElementById('projectAgentsSlot');
  if (!slot) return;
  const subs = tb.subagents || [];
  const total = subs.reduce((a,b)=>a+b.n,0);
  // 프로젝트에 정의된 에이전트 (.claude/agents/*.md) — 별도로 가져옴
  const definedAgents = (window.__projectDetailData && window.__projectDetailData.repo && window.__projectDetailData.repo.agents) || [];
  const definedHtml = definedAgents.length ? `
    <div class="mb-3">
      <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)] mb-2">📂 프로젝트에 정의된 에이전트 (${definedAgents.length})</div>
      <div class="flex flex-wrap gap-1">
        ${definedAgents.map(a => {
          const cnt = (subs.find(s => s.name === a.name) || {}).n || 0;
          return `<span class="chip ${cnt>0?'chip-accent':''}" title="${escapeHtml(a.description||a.id||'')}">${escapeHtml(a.name)} ${cnt?`<span class="ml-1">×${cnt}</span>`:'<span class="ml-1 text-[var(--text-dim)]">미사용</span>'}</span>`;
        }).join('')}
      </div>
    </div>` : '';
  if (!subs.length) {
    slot.innerHTML = `
      <div class="card p-4 mb-4" style="background: rgba(217,119,87,0.03);">
        ${definedHtml}
        <div class="flex items-center justify-between mb-1">
          <div class="font-semibold text-sm">🤝 세션에서 위임된 서브에이전트 (Agent 도구 호출)</div>
          <span class="chip">0회</span>
        </div>
        <div class="text-xs text-[var(--text-mute)]">${definedAgents.length ? `정의된 에이전트 ${definedAgents.length}개가 있지만 세션에서 한 번도 위임되지 않았습니다. AI 추천으로 활용 시나리오를 받아보세요.` : '이 프로젝트 세션들에서는 서브에이전트 위임이 없었습니다. 위의 🤖 AI 추천으로 프로젝트 전용 에이전트를 만들면 delegation 점수가 오릅니다.'}</div>
      </div>`;
    _translateDOM(slot);
    return;
  }
  slot.innerHTML = `
    <div class="card p-4 mb-4">
      ${definedHtml}
      <div class="flex items-center justify-between mb-3">
        <div class="font-semibold text-sm">🤝 세션에서 위임된 서브에이전트 (Agent 도구 호출)</div>
        <span class="text-xs text-[var(--text-dim)]">총 ${total}회 위임 · ${subs.length}종</span>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
        ${subs.map(a => `
          <div class="rounded bg-white/5 border border-[var(--border)] p-2.5 flex items-center justify-between cursor-pointer hover:bg-white/10"
               onclick="closeModal();viewAgent('${escapeHtml(a.name)}')">
            <div class="min-w-0">
              <div class="text-sm font-semibold truncate">${escapeHtml(a.name)}</div>
              <div class="text-[10px] text-[var(--text-dim)]">클릭 → 에이전트 정의 보기</div>
            </div>
            <div class="text-right">
              <div class="mono font-bold text-sm" style="color:var(--accent)">${a.n}</div>
              <div class="text-[9px] text-[var(--text-dim)]">호출</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  _translateDOM(slot);
}

function scrollToSessions() {
  // 모달 내에서 스크롤 — 가장 가까운 스크롤 컨테이너 찾아 세션 섹션으로
  const header = [...document.querySelectorAll('.modal h3, .modal .text-xs')].find(el => el.textContent && el.textContent.includes('세션 히스토리'));
  if (header) header.scrollIntoView({ behavior:'smooth', block:'start' });
}

async function openToolBreakdown(cwd) {
  showModalLoading(t('도구 사용 내역 로딩…'));
  try {
    const d = await api('/api/project/tool-breakdown?cwd=' + encodeURIComponent(cwd));
    if (d.error) { closeModal(); toast(errMsg(d), 'err'); return; }
    const top = d.tools[0] ? d.tools[0].n : 1;
    const rows = d.tools.map(t => {
      const pct = Math.round((t.n / top) * 100);
      return `

  if (!slot) return;

      <div class="flex items-center gap-3">
        <div class="shimmer w-6 h-6 rounded-full"></div>
        <div class="flex-1">
          <div class="font-semibold text-sm gradient-text">🤖 Claude 에게 이 프로젝트 분석 요청 중…</div>
          <div class="text-xs text-[var(--text-mute)] mt-0.5">평균 30~120초 소요 · cwd=<span class="mono">${escapeHtml(cwd)}</span> 에서 claude CLI 실행</div>
          <div id="aiRecProgress" class="text-[10px] mono text-[var(--text-dim)] mt-1">요청 전송 중…</div>
        </div>

  // 간단한 진행 표시 (실제 스트리밍은 아님 — 경과 초만 업데이트)
  const started = Date.now();
  const tick = setInterval(() => {
    const p = document.getElementById('aiRecProgress');
    if (p) p.textContent = `경과 ${Math.round((Date.now()-started)/1000)}초 · claude CLI 응답 대기…`;
  }, 1000);

  try {
    const r = await api('/api/project/ai-recommend', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ cwd, lang: _curLang })
    });
    clearInterval(tick);
    if (r.error) {
      slot.innerHTML = `
        <div class="p-5 border-b border-[var(--border)]">
          <div class="card p-4" style="border-color: rgba(248,113,113,0.4);">
            <div class="font-semibold text-sm text-[var(--err)] mb-1">❌ AI 추천 실패</div>
            <div class="text-xs text-[var(--text-mute)]">${escapeHtml(r.error)}</div>
            ${r.rawResponse ? `<details class="mt-2"><summary class="text-xs cursor-pointer">원본 응답 보기</summary><pre class="mono text-[10px] whitespace-pre-wrap bg-[var(--code-bg)] p-2 rounded mt-2 max-h-[260px] overflow-y-auto">${escapeHtml(r.rawResponse)}</pre></details>`:''}
            <button class="btn mt-3 text-xs" onclick='startAiRecommend(${JSON.stringify(cwd)})'>다시 시도</button>
          </div>
        </div>`;
      return;
    }
    renderAiRecommendations(r, cwd);

  }

async function openAiRecEditor(recId) {
  const rec = (window.__aiRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__aiCwd || '';
  const isGlobal = rec.relpath === '~/.claude/settings.json';

  // 기존 파일 읽기
  let currentRaw = '';
  try {
    if (isGlobal) {
      const s = await api('/api/settings');
      currentRaw = JSON.stringify(s || {}, null, 2);
    } else if (rec.relpath === 'CLAUDE.md' && cwd) {
      const d = await api('/api/project/detail?cwd=' + encodeURIComponent(cwd));
      currentRaw = (d.repo && d.repo.claudeMd) || '';
    } else {
      // 프로젝트-로컬 파일 존재시 대략적으로: project/detail 에는 없으니 시도 생략, 빈값 표시
      currentRaw = '';
    }
  } catch {}

  const saveFn = async (newRaw) => {
    if (isGlobal) {
      let parsed; try { parsed = JSON.parse(newRaw); } catch (e) { return {ok:false, error: 'JSON: '+e.message}; }
      return api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(parsed) });
    }
    return api('/api/project/file', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath: rec.relpath, raw: newRaw }),
    });
  };

  openDiffApplyModal({
    title: rec.title,
    relpath: rec.relpath,
    reason: rec.reason,
    cwd,
    currentRaw, proposedRaw: rec.content || '',
    saveFn,
    badge: '🤖 AI 추천',
  });
}

/**
 * 좌(현재) / 우(제안) 2-컬럼 diff + 각 컬럼 에디터 + 적용/건너뛰기 / 병합 저장 UX.
 */
function openDiffApplyModal({ title, relpath, reason, cwd, currentRaw, proposedRaw, saveFn, badge }) {
  const isEmpty = !currentRaw || !currentRaw.trim();
  const hintEmpty = isEmpty ? '<span class="chip chip-warn">파일 없음 / 빈값</span>' : '';
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-start justify-between gap-3 flex-shrink-0">
      <div class="min-w-0 flex-1">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">${badge || '추천 비교 & 적용'}</div>
        <h2 class="text-lg font-bold truncate">${escapeHtml(title||'')}</h2>
        <div class="flex items-center gap-2 mt-1 flex-wrap">
          <span class="text-[11px] mono text-[var(--text-mute)] truncate">${escapeHtml(relpath||'')}</span>
          ${hintEmpty}
        </div>
        ${reason ? `<div class="text-xs text-[var(--text-mute)] mt-2 line-clamp-2"><b>근거:</b> ${escapeHtml(reason)}</div>` : ''}
      </div>
      <div class="flex gap-2 flex-shrink-0">
        <button class="btn" onclick="closeModal()">건너뛰기</button>
        <button class="btn" id="diffUseLeftBtn">◀ 좌측(현재값) 유지</button>
        <button class="btn-primary btn" id="diffUseRightBtn">우측(제안) 적용 ▶</button>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2" style="flex:1 1 0; min-height:0; overflow:hidden;">
      <div class="flex flex-col border-r border-[var(--border)]" style="min-height:0; overflow:hidden;">
        <div class="px-4 py-2 border-b border-[var(--border)] flex items-center justify-between flex-shrink-0">
          <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">현재 (왼쪽)</div>
          <span class="chip text-[10px]">${isEmpty ? '비어있음' : (currentRaw.length + '자')}</span>
        </div>
        <textarea id="diffLeftText" spellcheck="false" class="mono" style="flex:1 1 0; min-height:0; width:100%; padding:16px; border-radius:0; border:none; background:transparent; resize:none; color:var(--text); font-size:13px; line-height:1.55; outline:none;">${escapeHtml(currentRaw||'')}</textarea>
      </div>
      <div class="flex flex-col" style="background: rgba(217,119,87,0.04); min-height:0; overflow:hidden;">
        <div class="px-4 py-2 border-b border-[var(--border)] flex items-center justify-between flex-shrink-0">
          <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">제안 (오른쪽) · AI</div>
          <span class="chip chip-accent text-[10px]">${(proposedRaw||'').length}자</span>
        </div>
        <textarea id="diffRightText" spellcheck="false" class="mono" style="flex:1 1 0; min-height:0; width:100%; padding:16px; border-radius:0; border:none; background:transparent; resize:none; color:var(--text); font-size:13px; line-height:1.55; outline:none;">${escapeHtml(proposedRaw||'')}</textarea>
      </div>
    </div>
    <div class="p-3 border-t border-[var(--border)] flex items-center justify-between text-[11px] text-[var(--text-dim)] flex-shrink-0 flex-wrap gap-2">
      <div>저장 위치: <span class="mono">${relpath==='~/.claude/settings.json' ? relpath : escapeHtml((cwd||'')+'/'+(relpath||''))}</span></div>
      <div>양쪽 값을 자유롭게 편집한 뒤 어느 쪽을 저장할지 고르세요. · <kbd class="chip text-[9px]">Esc</kbd> 닫기</div>
    </div>
  `, { wide: true });

  const commit = async (which) => {
    const raw = (which === 'left' ? document.getElementById('diffLeftText') : document.getElementById('diffRightText')).value;
    try {
      const r = await saveFn(raw);
      toast(r.ok ? `저장됨 (${which==='left'?'현재 값 유지':'제안 적용'})` : ('실패: '+(r.error||'unknown')), r.ok?'ok':'err');
      if (r.ok) { closeModal(); renderView(); }
    } catch (e) { toast('실패: '+e.message, 'err'); }
  };
  document.getElementById('diffUseLeftBtn').onclick = () => commit('left');
  document.getElementById('diffUseRightBtn').onclick = () => commit('right');
}

async function appendAiRecClaudeMd(recId) {
  const rec = (window.__aiRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__aiCwd || '';
  try {
    const d = await api('/api/project/detail?cwd=' + encodeURIComponent(cwd));
    const existing = (d.repo && d.repo.claudeMd) || '';
    const merged = (existing ? existing.replace(/\s+$/, '') : `# ${d.name}`) + '\n' + rec.content;
    const r = await api('/api/project/file', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath:'CLAUDE.md', raw: merged }),
    });
    toast(r.ok ? 'CLAUDE.md 갱신됨' : (r.error||'실패'), r.ok?'ok':'err');
  } catch (e) { toast('실패: '+e.message, 'err'); }
}

async function paRefreshViz() {
  const container = document.getElementById('paNetwork');
  if (!container || !window.vis) return;
  const cwd = window.__paCwd;
  if (!cwd) return;
  const r = await api('/api/project-agents/list?cwd=' + encodeURIComponent(cwd));
  const agents = r.agents || [];
  if (!agents.length) return;

  const nodes = new vis.DataSet([
    {
      id: '__claude', label: 'Claude', shape: 'hexagon', size: 34,
      color: { background: '#d97757', border: '#c96442', highlight: { background: '#c96442', border: '#f5b997' } },
      font: { color: '#000', size: 13, bold: true },
    },
    ...agents.map(a => ({
      id: a.id, label: a.name, shape: 'dot', size: 22,
      color: { background: 'rgba(217,119,87,0.18)', border: '#d97757', highlight: { background: '#d97757', border: '#ffffff' } },
      font: { color: '#f5f5f5', size: 11 },
      title: (a.description || '').slice(0, 120),
    })),
  ]);
  const edges = new vis.DataSet(agents.map(a => ({
    from: '__claude', to: a.id,
    color: { color: 'rgba(217,119,87,0.35)', highlight: '#d97757', opacity: 0.7 },
    arrows: 'to', smooth: { type: 'continuous' },
  })));
  const net = new vis.Network(container, { nodes, edges }, {
    physics: {
      enabled: true,
      barnesHut: { gravitationalConstant: -2500, springLength: 130, springConstant: 0.05 },
      stabilization: { iterations: 220, fit: true },
    },
    interaction: { hover: true, selectable: true, tooltipDelay: 120, zoomView: false, dragView: true, dragNodes: true },
  });
  container.style.cursor = 'pointer';
  net.once('stabilizationIterationsDone', () => {
    try { net.setOptions({ physics: { enabled: false } }); net.fit({ animation: false }); } catch {}
  });
  const handlePa = (id) => {
    if (id === '__claude') return;
    const ag = agents.find(x => x.id === id);
    if (ag) paEdit(ag.name);
  };
  net.on('click', params => { if (params.nodes && params.nodes.length) handlePa(params.nodes[0]); });
  net.on('selectNode', params => { if (params.nodes && params.nodes.length) handlePa(params.nodes[0]); });
}
AFTER.projectAgents = () => { setTimeout(paRefreshViz, 50); };

function openRecEditor(recId) {
  const rec = (window.__scoreRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__scoreCwd || '';

  const isGlobal = rec.relpath === '~/.claude/settings.json';
  const saveFn = async (newRaw) => {
    if (isGlobal) {
      let parsed;
      try { parsed = JSON.parse(newRaw); }
      catch (e) { return { ok:false, error: 'JSON: '+e.message }; }
      return api('/api/settings', {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(parsed),
      });
    }
    return api('/api/project/file', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath: rec.relpath, raw: newRaw }),
    });
  };

  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div class="min-w-0">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">추천 편집</div>
        <h2 class="text-lg font-bold truncate">${escapeHtml(rec.title)}</h2>
        <div class="text-[11px] mono text-[var(--text-mute)] truncate">${escapeHtml(rec.relpath)} · ${escapeHtml(rec.mode||'')} · 예상 ${escapeHtml(rec.impact)}</div>
      </div>
      <div class="flex gap-2">
        <button class="btn-primary btn" id="recSaveBtn">💾 이 내용으로 저장</button>
        <button class="btn" onclick="closeModal()">닫기</button>
      </div>
    </div>
    <div class="p-5 flex-1 overflow-y-auto">
      <div class="card p-3 text-xs text-[var(--text-mute)] mb-3"><b>왜 필요한가:</b> ${escapeHtml(rec.reason)}</div>
      <textarea id="recEditor" class="input" style="min-height: 480px;">${escapeHtml(rec.content||'')}</textarea>
      <div class="text-[11px] text-[var(--text-dim)] mt-2">
        저장 위치: ${isGlobal ? '<span class="mono">~/.claude/settings.json</span>' : `<span class="mono">${escapeHtml(cwd)}/${escapeHtml(rec.relpath)}</span>`}
      </div>
    </div>
  `);

  document.getElementById('recSaveBtn').onclick = async () => {
    const raw = document.getElementById('recEditor').value;
    try {
      const r = await saveFn(raw);
      if (r.ok) {
        toast('저장됨 — 다음 세션부터 적용', 'ok');
        closeModal();
      } else {
        toast('저장 실패: ' + (r.error||'알 수 없음'), 'err');
      }
    } catch (e) {
      toast('실패: ' + e.message, 'err');
    }
  };
}

async function appendToClaudeMd(recId) {
  const rec = (window.__scoreRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__scoreCwd || '';
  try {
    // 기존 CLAUDE.md 읽기
    const d = await api('/api/project/detail?cwd=' + encodeURIComponent(cwd));
    const existing = (d.repo && d.repo.claudeMd) || '';
    if (existing.includes(rec.content.trim().slice(0, 40))) {
      toast('이미 유사 내용이 있습니다', 'warn');
      return;
    }
    const merged = (existing ? existing.replace(/\s+$/, '') : `# ${d.name}`) + '\n' + rec.content;
    const r = await api('/api/project/file', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath: 'CLAUDE.md', raw: merged }),
    });
    toast(r.ok ? 'CLAUDE.md 갱신됨' : (r.error||'실패'), r.ok?'ok':'err');
  } catch (e) {
    toast('실패: ' + e.message, 'err');
  }
}

// 프로바이더 헬스 체크
async function _aiRefreshHealth() {
  const host = document.getElementById('aiHealthIndicators');
  const summary = document.getElementById('aiHealthSummary');
  if (!host) return;
  host.innerHTML = `<span class="text-xs" style="color:var(--text-dim)">${t('로딩 중...')}</span>`;
  try {
    const d = await cachedApi('/api/ai-providers/health');
    const items = d.results || d.providers || d.health || [];
    if (!items.length) {
      host.innerHTML = `<span class="text-xs" style="color:var(--text-dim)">${t('프로바이더 없음')}</span>`;
      if (summary) summary.textContent = '';
      return;
    }
    // ollama + ollama-api 는 같은 서버이므로 하나로 합침
    const merged = [];
    const seenOllama = { local: false, api: false };
    for (const p of items) {
      const pid = p.provider || p.id || '';
      if (pid === 'ollama-api') { seenOllama.api = true; continue; } // ollama 로컬이 대표
      if (pid === 'ollama') seenOllama.local = true;
      merged.push(p);
    }
    host.innerHTML = merged.map(p => {
      const ok = p.available || p.status === 'available';
      const dotColor = ok ? 'var(--ok)' : 'var(--err)';
      const icon = p.icon || '🔌';
      const pid = p.provider || p.id || '';
      const name = escapeHtml(p.name || pid);
      const chipCls = ok ? 'chip chip-ok' : 'chip chip-err';
      const ep = p.endpoint || '';
      const ptype = p.type || '';
      // endpoint 표시 로직
      let epHtml = '';
      if (ok) {
        if (ptype === 'cli' && ep.includes('/')) {
          // CLI: 짧은 경로만 (마지막 부분)
          epHtml = `<span class="text-[9px]" style="color:var(--cyan);font-family:monospace">CLI ✓</span>`;
        } else if (ep.startsWith('http')) {
          const epShort = ep.replace('https://','').replace('http://','');
          epHtml = `<span class="text-[9px]" style="color:var(--cyan);font-family:monospace">${escapeHtml(epShort)}</span>`;
        }
      }
      return `<div class="flex items-center gap-1.5" title="${escapeHtml(ep||pid)}">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${dotColor};flex-shrink:0;"></span>
        <span class="text-sm">${icon}</span>
        <span class="${chipCls} text-[11px]">${name}</span>
        ${epHtml}
      </div>`;
    }).join('');
    // 헬스 카운트도 merged 기준으로 재계산
    const mergedAvail = merged.filter(p => p.available || p.status === 'available');
    if (summary) summary.textContent = `${mergedAvail.length}/${merged.length} ${t('프로바이더 사용 가능')}`;
  } catch (e) {
    // health 엔드포인트가 없으면 기존 리스트 데이터로 폴백
    const cached = state.data._aiProviders;
    if (cached && cached.providers) {
      const items = cached.providers;
      const avail = items.filter(p => p.available);
      if (summary) summary.textContent = `${avail.length}/${items.length} ${t('프로바이더 사용 가능')}`;
      host.innerHTML = items.map(p => {
        const ok = p.available;
        const dotColor = ok ? 'var(--ok)' : 'var(--err)';
        const icon = p.icon || '🔌';
        const name = escapeHtml(p.name || p.id || '');
        const chipCls = ok ? 'chip chip-ok' : 'chip chip-err';
        return `<div class="flex items-center gap-1.5">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${dotColor};flex-shrink:0;"></span>
          <span class="text-sm">${icon}</span>
          <span class="${chipCls} text-[11px]">${name}</span>
        </div>`;
      }).join('');
    } else {
      host.innerHTML = `<span class="text-xs" style="color:var(--err)">${t('헬스 체크 실패')}</span>`;
      if (summary) summary.textContent = '';
    }
  }
}

// 사용량 알림 설정
async function _saveUsageAlert() {
  const maxCostEl = document.getElementById('usageAlertMaxCost');
  const maxTokensEl = document.getElementById('usageAlertMaxTokens');
  const maxDailyCostUsd = parseFloat(maxCostEl?.value) || 0;
  const maxDailyTokens = parseInt(maxTokensEl?.value) || 0;
  if (maxDailyCostUsd <= 0 && maxDailyTokens <= 0) {
    toast(t('한도를 하나 이상 입력하세요'), 'warn');
    return;
  }
  try {
    await api('/api/ai-providers/usage-alert/set', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ maxDailyCostUsd, maxDailyTokens })
    });
    toast(t('사용량 알림 설정이 저장되었습니다'), 'ok');
    _loadUsageAlertStatus();
  } catch (e) {
    toast(t('사용량 알림 저장 실패') + ': ' + (e.message || e), 'err');
  }
}

async function _loadUsageAlertStatus() {
  const banner = document.getElementById('usageAlertBanner');
  const costInput = document.getElementById('usageAlertMaxCost');
  const tokensInput = document.getElementById('usageAlertMaxTokens');
  if (!banner) return;
  try {
    const d = await api('/api/ai-providers/usage-alert');
    if (costInput && d.maxDailyCostUsd) costInput.value = d.maxDailyCostUsd;
    if (tokensInput && d.maxDailyTokens) tokensInput.value = d.maxDailyTokens;
    const fired = d.firedAlerts || [];
    if (fired.length > 0) {
      // Task 3: 사용량 초과 시 브라우저 Notification 발송
      fired.forEach(a => {
        const msg = a.type === 'cost' ? t('비용 한도 초과') : t('토큰 한도 초과');
        if (typeof _sendBrowserNotification === 'function') {
          _sendBrowserNotification(t('사용량 알림'), msg + ': ' + (a.message || ''));
        }
      });
      banner.innerHTML = `
        <div class="mb-4 p-3 rounded" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);">
          <div class="flex items-center gap-2 mb-1">
            <span style="font-size:1.1rem;">⚠️</span>
            <span class="text-sm font-semibold" style="color:var(--err)">${t('사용량 알림 발생')}</span>
          </div>
          ${fired.map(a => `
            <div class="text-xs mt-1" style="color:var(--text-mute)">
              ${escapeHtml(a.type === 'cost' ? t('비용 한도 초과') : t('토큰 한도 초과'))}: ${escapeHtml(a.message || '')}
              <span style="color:var(--text-dim)"> — ${escapeHtml(a.timestamp || '')}</span>
            </div>
          `).join('')}
        </div>`;
    } else if (d.maxDailyCostUsd || d.maxDailyTokens) {
      banner.innerHTML = `
        <div class="mb-4 p-2 rounded text-[11px]" style="background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);color:var(--ok);">
          ✅ ${t('알림 활성')} — ${d.maxDailyCostUsd ? t('비용 한도') + ': $' + d.maxDailyCostUsd : ''} ${d.maxDailyTokens ? t('토큰 한도') + ': ' + Number(d.maxDailyTokens).toLocaleString() : ''}
        </div>`;
    } else {
      banner.innerHTML = '';
    }
  } catch (e) {
    banner.innerHTML = '';
  }
}

      const outPreview = (resp.output || '').substring(0, 80);

      result.innerHTML = `<span style="color:var(--err)">✗ ${escapeHtml(errTxt)}</span>`;

    // 서버 재시작이 필요한 신규 라우트 누락 케이스 친절하게 안내

      ? ' — ' + t('대시보드 서버를 재시작하면 최신 기능이 적용됩니다')
      : '';
    result.innerHTML = `<span style="color:var(--err)">✗ ${escapeHtml(msg)}${hint}</span>`;
  }
};

  try {
    const r = await api('/api/cli/install', { method: 'POST', body: JSON.stringify({ tool: toolId }) });
    if (r.ok) {
      if (r.alreadyInstalled) {
        toast(t('이미 설치되어 있습니다'), 'ok');
      } else {
        toast(t('터미널에서 설치가 진행 중입니다. 완료 후 새로고침하세요.'), 'ok');
      }
      // 10초마다 상태 재확인 (완료 시 자동 UI 갱신)
      let tries = 0;
      const poll = setInterval(async () => {
        tries += 1;
        try {
          const s = await api('/api/cli/status');
          if (s && s.tools && s.tools[toolId] && s.tools[toolId].installed) {
            clearInterval(poll);
            toast(t('설치가 감지되었습니다 — 새로고침합니다'), 'ok');
            if (state.view === 'aiProviders') renderView();
          } else if (tries >= 30) { // 5분 후 중단
            clearInterval(poll);
          }
        } catch {}
      }, 10000);
    } else {
      toast(errMsg(r) || t('설치 실패'), 'err');
    }
  } catch (e) { toast(String(e), 'err'); }
};

async function _ollamaServeCheckStatus() {
  const dot = document.getElementById('ollamaServeDot');
  const hostEl = document.getElementById('ollamaServeHost');
  const msgEl = document.getElementById('ollamaServeMsg');
  const startBtn = document.getElementById('ollamaServeStartBtn');
  const stopBtn = document.getElementById('ollamaServeStopBtn');
  if (!dot) return;
  try {
    const s = await api('/api/ollama/serve/status');
    if (s.running) {
      dot.style.background = 'var(--ok)';
      hostEl.textContent = s.host || '';
      msgEl.textContent = t('실행 중');
      startBtn.style.display = 'none';
      stopBtn.style.display = s.managedByDashboard ? '' : 'none';
    } else {
      dot.style.background = 'var(--err)';
      hostEl.textContent = '';
      msgEl.textContent = t('미실행');
      startBtn.style.display = '';
      stopBtn.style.display = 'none';
    }
    // 로그 표시
    if (s.log && s.log.length) {
      const logEl = document.getElementById('ollamaServeLog');
      if (logEl) {
        logEl.style.display = '';
        logEl.textContent = s.log.join('\n');
        logEl.scrollTop = logEl.scrollHeight;
      }
    }
  } catch(e) {
    dot.style.background = 'var(--text-dim)';
    msgEl.textContent = t('상태 확인 실패');
  }
}

async function _ollamaServeStart() {
  const msgEl = document.getElementById('ollamaServeMsg');
  if (msgEl) msgEl.textContent = t('시작 중...');
  const startBtn = document.getElementById('ollamaServeStartBtn');
  if (startBtn) startBtn.disabled = true;
  try {
    const r = await api('/api/ollama/serve/start', { method: 'POST', body: '{}' });
    if (r.ok) {

  } catch(e) {
    toast(String(e), 'err');
  }
  if (startBtn) startBtn.disabled = false;
}

async function _ollamaLoadInstalled() {
  try {
    const d = await api('/api/ollama/models');
    _ollamaInstalledData = d.models || [];
    // 카탈로그에 installed 플래그 갱신
    const installedNames = new Set(_ollamaInstalledData.map(m => (m.name || m.model || '').replace(/:latest$/, '')));
    _ollamaCatalogData.forEach(m => {
      m._installed = installedNames.has(m.name) || installedNames.has(m.id);
    });
    _ollamaRenderCatalog();
  } catch (e) {
    // installed 로드 실패 — silent
  }
}

function _ollamaRenderCatalog() {
  const grid = document.getElementById('ollamaCatalogGrid');
  if (!grid) return;
  const searchVal = (document.getElementById('ollamaCatalogSearch')?.value || '').toLowerCase();
  let items = _ollamaCatalogData;

  if (_ollamaCurrentCat !== 'all') {
    items = items.filter(m => {
      const cat = (m.category || m.type || '').toLowerCase();
      const tags = (m.tags || []).map(tg => tg.toLowerCase());
      return cat === _ollamaCurrentCat || tags.includes(_ollamaCurrentCat);
    });
  }

  if (searchVal) {
    items = items.filter(m =>
      (m.name || '').toLowerCase().includes(searchVal) ||
      (m.description || '').toLowerCase().includes(searchVal) ||
      (m.id || '').toLowerCase().includes(searchVal)
    );
  }

  if (items.length === 0) {
    grid.innerHTML = `<div class="text-sm" style="color:var(--text-dim)">${t('일치하는 모델이 없습니다.')}</div>`;
    return;
  }

  grid.innerHTML = items.map(m => {
    const installed = m._installed;
    const sizeStr = m.size ? _formatBytes(m.size) : (m.sizeLabel || '—');
    const tags = (m.tags || []).slice(0, 4);
    const tagChips = tags.map(tg => `<span class="chip text-[10px]">${escapeHtml(tg)}</span>`).join(' ');
    const statusChip = installed
      ? `<span class="chip chip-ok text-[10px]">${t('설치됨')}</span>`
      : `<span class="chip text-[10px]" style="color:var(--text-dim)">${t('미설치')}</span>`;
    const actionBtn = installed
      ? `<button class="btn btn-sm text-xs" style="color:var(--err);border-color:rgba(248,113,113,0.3);" onclick="_ollamaDelete('${escapeHtml(m.name || m.id)}')">${t('삭제')}</button>`
      : `<button class="btn btn-sm btn-primary text-xs" onclick="_ollamaPull('${escapeHtml(m.name || m.id)}')">⬇ ${t('다운로드')}</button>`;

    return `<div class="card p-4 hover-lift" style="display:flex;flex-direction:column;justify-content:space-between;">
      <div>
        <div class="flex items-center justify-between mb-2">
          <h4 class="font-semibold text-sm" style="color:var(--text)">${escapeHtml(m.name || m.id)}</h4>
          ${statusChip}
        </div>
        <p class="text-xs mb-2" style="color:var(--text-mute);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${escapeHtml(m.description || '')}</p>
        <div class="flex flex-wrap gap-1 mb-2">${tagChips}</div>
        <div class="text-[11px]" style="color:var(--text-dim)">${t('크기')}: ${escapeHtml(sizeStr)}</div>
      </div>
      <div class="mt-3 flex justify-end">${actionBtn}</div>
    </div>`;
  }).join('');
}

function _ollamaRenderInstalled() {
  const tbody = document.getElementById('ollamaInstalledBody');
  if (!tbody) return;

  if (_ollamaInstalledData.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center text-sm" style="color:var(--text-dim)">${t('설치된 Ollama 모델이 없습니다.')}</td></tr>`;
    return;
  }

  tbody.innerHTML = _ollamaInstalledData.map(m => {
    const name = m.name || m.model || '—';
    const size = m.size ? _formatBytes(m.size) : '—';
    const family = m.details?.family || m.family || '—';
    const paramSize = m.details?.parameter_size || m.parameter_size || '—';
    const quant = m.details?.quantization_level || m.quantization_level || '—';
    const modified = m.modified_at ? new Date(m.modified_at).toLocaleDateString() : '—';

    return `<tr>
      <td class="font-semibold text-sm" style="color:var(--text)">${escapeHtml(name)}</td>
      <td class="text-xs">${escapeHtml(size)}</td>
      <td class="text-xs">${escapeHtml(family)}</td>
      <td class="text-xs">${escapeHtml(paramSize)}</td>
      <td class="text-xs">${escapeHtml(quant)}</td>
      <td class="text-xs">${escapeHtml(modified)}</td>
      <td>
        <div class="flex gap-1">
          <button class="btn btn-sm text-xs" onclick="_ollamaShowInfo('${escapeHtml(name)}')">${t('상세')}</button>
          <button class="btn btn-sm text-xs" style="color:var(--err);" onclick="_ollamaDelete('${escapeHtml(name)}')">${t('삭제')}</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function _ollamaPull(modelName) {
  try {
    const r = await api('/api/ollama/pull', {
      method: 'POST',
      body: JSON.stringify({ name: modelName })
    });
    const pullId = r.pullId || r.id || modelName;

    // 진행률 UI 표시
    const progressEl = document.getElementById('ollamaPullProgress');
    const nameEl = document.getElementById('ollamaPullModelName');
    const barEl = document.getElementById('ollamaPullBar');
    const percentEl = document.getElementById('ollamaPullPercent');
    const statusEl = document.getElementById('ollamaPullStatus');

    if (progressEl) progressEl.style.display = '';
    if (nameEl) nameEl.textContent = modelName;
    if (barEl) barEl.style.width = '0%';
    if (percentEl) percentEl.textContent = '0%';
    if (statusEl) statusEl.textContent = t('다운로드 시작...');

    toast(t('모델 다운로드를 시작합니다') + ': ' + modelName, 'ok');

    // 2초 간격 폴링
    if (_ollamaPullTimers[pullId]) clearInterval(_ollamaPullTimers[pullId]);
    _ollamaPullTimers[pullId] = setInterval(async () => {
      try {
        const s = await api('/api/ollama/pull-status?pullId=' + encodeURIComponent(pullId));
        const pct = Math.min(100, Math.max(0, s.percent || s.progress || 0));
        const status = s.status || '';

        if (barEl) barEl.style.width = pct + '%';
        if (percentEl) percentEl.textContent = Math.round(pct) + '%';
        if (statusEl) statusEl.textContent = status || t('다운로드 중...');

        if (pct >= 100 || status === 'success' || status === 'complete' || s.done) {
          clearInterval(_ollamaPullTimers[pullId]);
          delete _ollamaPullTimers[pullId];
          if (barEl) barEl.style.width = '100%';
          if (percentEl) percentEl.textContent = '100%';
          if (statusEl) statusEl.textContent = t('완료');
          toast(t('모델 다운로드 완료') + ': ' + modelName, 'ok');
          setTimeout(() => {
            if (progressEl) progressEl.style.display = 'none';
            _ollamaRefresh();
          }, 1500);
        } else if (s.error) {
          clearInterval(_ollamaPullTimers[pullId]);
          delete _ollamaPullTimers[pullId];
          if (statusEl) statusEl.textContent = t('오류') + ': ' + (s.error || '');
          toast(t('모델 다운로드 실패') + ': ' + (s.error || ''), 'err');
        }
      } catch (e) {
        clearInterval(_ollamaPullTimers[pullId]);
        delete _ollamaPullTimers[pullId];
        if (statusEl) statusEl.textContent = t('상태 확인 실패');
      }
    }, 2000);
  } catch (e) {
    toast(t('모델 다운로드 요청 실패') + ': ' + (e.message || e), 'err');
  }
}
window._ollamaPull = _ollamaPull;

function _formatBytes(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

// ── 멀티 AI 비교 모드 ──
window.runMultiCompare = async () => {
  const prompt = (document.getElementById('multiComparePrompt')?.value || '').trim();
  if (!prompt) { toast(t('프롬프트를 입력하세요'), 'warn'); return; }
  const cbs = document.querySelectorAll('.multi-compare-cb:checked');
  const selectedIds = Array.from(cbs).map(cb => cb.value);
  if (!selectedIds.length) { toast(t('프로바이더를 선택하세요'), 'warn'); return; }

  const resultsEl = document.getElementById('multiCompareResults');
  if (!resultsEl) return;
  resultsEl.innerHTML = `<div class="text-sm" style="color:var(--text-dim)">${t('비교 실행 중...')} (${selectedIds.length} ${t('프로바이더')})</div>`;

  // 모든 프로바이더에 동시에 요청
  const promises = selectedIds.map(async (pid) => {
    const start = Date.now();
    try {
      const r = await api('/api/ai-providers/test', {
        method: 'POST',
        body: JSON.stringify({ providerId: pid, prompt }),
      });
      const elapsed = Date.now() - start;
      const resp = r.response || {};
      return {
        providerId: pid,
        ok: !!r.ok,
        output: resp.output || r.error || t('응답 없음'),
        duration: resp.duration_ms || elapsed,
        tokens: resp.tokens || 0,
        error: r.ok ? null : (r.error || resp.error || t('실패')),
      };
    } catch(e) {
      return { providerId: pid, ok: false, output: '', duration: Date.now() - start, tokens: 0, error: String(e) };
    }
  });

  const results = await Promise.allSettled(promises);
  const providers = (state.data._aiProviders?.providers) || [];

  const cards = results.map(r => {
    const v = r.status === 'fulfilled' ? r.value : { providerId: '?', ok: false, output: '', duration: 0, tokens: 0, error: t('요청 실패') };
    const p = providers.find(x => x.id === v.providerId) || {};
    const statusChip = v.ok
      ? '<span class="chip chip-ok text-xs">' + t('성공') + '</span>'
      : '<span class="chip chip-err text-xs">' + t('실패') + '</span>';
    return `
      <div class="card p-4 flex-1 min-w-[260px]">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <span class="text-lg">${p.icon || '🔌'}</span>
            <span class="font-semibold text-sm" style="color:var(--text)">${escapeHtml(p.name || v.providerId)}</span>
          </div>
          ${statusChip}
        </div>
        <div class="flex gap-3 mb-2">
          <span class="chip text-xs">${v.duration}ms</span>
          <span class="chip text-xs">${(v.tokens || 0).toLocaleString()} ${t('토큰')}</span>
        </div>
        ${v.error ? `<div class="text-xs mb-2" style="color:var(--err)">${escapeHtml(v.error)}</div>` : ''}
        <pre class="text-xs whitespace-pre-wrap break-words" style="max-height:200px;overflow-y:auto;color:var(--text-mute);background:var(--code-bg);padding:8px;border-radius:8px;">${escapeHtml((v.output || '').substring(0, 2000))}</pre>
      </div>`;
  }).join('');

  resultsEl.innerHTML = `<div class="flex flex-wrap gap-4">${cards}</div>`;
};

function editOutputStyle(existing) {
  const e = existing || { id: '', name: '', description: '', raw: '---\nname: my-style\ndescription: 한 줄 설명\n---\n\n## 톤\n- 항상 한국어로 답한다.\n- 불필요한 감탄사 생략.\n\n## 포맷\n- 긴 답변은 섹션 헤더 사용.\n' };

      <button class="btn-primary btn" id="osSaveBtn">저장</button>

  `);

        { label: '캐시 read', data: d.timeline.map(x=>x.cacheRead||0), borderColor: '#a78bfa', tension: 0.4, yAxisID: 'y' },
        { label: '전체', data: d.timeline.map(x=>x.total||0), borderColor: '#d97757', tension: 0.4, yAxisID: 'y', borderWidth: 2 },
        { label: '비용 ($)', data: d.timeline.map(x=>x.cost), borderColor: '#4ade80', tension: 0.4, yAxisID: 'y1', borderDash: [4,3] },
      ],
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#e7e7ea' } },
        tooltip: { callbacks: { label: c => {
          const l = c.dataset.label;
          if (l === '비용 ($)') return `${l}: $${c.parsed.y.toFixed(2)}`;
          return `${l}: ${fmtTokens(c.parsed.y)}`;
        }}},
      },
      scales: {
        x: { ticks: { color: document.body.classList.contains('theme-light') ? '#666' : '#9aa0aa' }, grid: { color: document.body.classList.contains('theme-light') ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)' } },
        y: { position: 'left', ticks: { color: document.body.classList.contains('theme-light') ? '#666' : '#9aa0aa', callback: v => fmtTokens(v) }, grid: { color: document.body.classList.contains('theme-light') ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)' }, beginAtZero: true },
        y1: { position: 'right', ticks: { color: document.body.classList.contains('theme-light') ? '#666' : '#9aa0aa' }, grid: { display: false }, beginAtZero: true },
      },
    },
  });
};

function formatBytes(n) {
  if (!n) return '0';
  if (n < 1024) return n + 'B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + 'KB';
  if (n < 1024*1024*1024) return (n/1024/1024).toFixed(2) + 'MB';
  return (n/1024/1024/1024).toFixed(2) + 'GB';
}

function _srSelect(path) {
  state.data._srSelected = path;
  renderView();
  setTimeout(() => _srLoad(path), 20);
}

async function _srLoad(path) {
  const host = document.getElementById('srDetail');
  if (!host) return;
  try {
    const r = await api('/api/session-replay/load?path=' + encodeURIComponent(path));
    if (!r.ok) { host.innerHTML = `<div class="card p-4 text-[12px]" style="color:var(--danger)">${escapeHtml(r.error||'error')}</div>`; return; }
    const events = r.events || [];
    // 토큰 누적 스파크라인 계산
    let acc = 0;
    const points = events.map(e => { acc += (e.tokensIn||0) + (e.tokensOut||0); return acc; });
    const maxAcc = Math.max(1, ...points);
    const spark = points.length ? events.map((e, i) => {
      const x = (i / Math.max(1, points.length - 1)) * 600;
      const y = 40 - (points[i] / maxAcc) * 36;
      return `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ') : '';
    const evtRows = events.map(e => {
      const roleColor = e.role === 'assistant' ? '#60a5fa' : e.role === 'user' ? '#fbbf24' : '#9ca3af';
      const time = e.ts ? new Date(e.ts).toLocaleTimeString() : '';
      const hasToolUse = (e.summary||'').includes('[tool_use:');
      const bg = hasToolUse ? 'background:rgba(168, 139, 250, 0.08);' : '';
      return `
        <div class="text-[10px] flex gap-2 py-1 border-b border-[var(--border)]" style="${bg}">
          <span class="font-mono flex-shrink-0" style="color:var(--text-dim);width:80px;">${time}</span>
          <span class="font-semibold flex-shrink-0" style="color:${roleColor};width:70px;">${escapeHtml(e.role || e.type || '-')}</span>
          <span class="flex-1 break-all">${escapeHtml(e.summary || e.operation || '')}</span>
          <span class="flex-shrink-0 font-mono" style="color:var(--text-mute);">${e.tokensIn||0}↓ ${e.tokensOut||0}↑</span>
        </div>`;
    }).join('');
    host.innerHTML = `
      <div class="card p-3 mb-3">
        <div class="grid grid-cols-3 gap-3 mb-2">
          <div><div class="text-[10px]" style="color:var(--text-dim)">${t('이벤트')}</div><div class="text-lg font-semibold">${events.length}${r.truncated?'+':''}</div></div>
          <div><div class="text-[10px]" style="color:var(--text-dim)">${t('토큰 입력')}</div><div class="text-lg font-semibold" style="color:#60a5fa">${(r.totalTokensIn||0).toLocaleString()}</div></div>
          <div><div class="text-[10px]" style="color:var(--text-dim)">${t('토큰 출력')}</div><div class="text-lg font-semibold" style="color:#f472b6">${(r.totalTokensOut||0).toLocaleString()}</div></div>
        </div>
        ${spark ? `<svg viewBox="0 0 600 40" width="100%" height="40"><path d="${spark}" fill="none" stroke="var(--accent)" stroke-width="1.5" /></svg>` : ''}
        <div class="text-[10px] font-mono break-all" style="color:var(--text-dim)">${escapeHtml(r.path)}</div>
      </div>
      <div class="card p-3" style="max-height:60vh;overflow-y:auto;">
        ${evtRows || `<div class="text-[11px]" style="color:var(--text-dim)">(empty)</div>`}
      </div>
    `;
  } catch (e) { host.innerHTML = `<div class="card p-4 text-[12px]" style="color:var(--danger)">${escapeHtml(String(e))}</div>`; }
}
