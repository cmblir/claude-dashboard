<script>
// Tailwind CDN 런타임 JIT 최적화 — 불필요한 스캔 범위 축소
tailwind.config = {
  darkMode: 'class',
  // corePlugins 중 사용하지 않는 기능 비활성화 → JIT 컴파일 속도 향상
  corePlugins: {
    float: false,
    clear: false,
    skew: false,
    caretColor: false,
    sepia: false,
    hueRotate: false,
    saturate: false,
    backdropBlur: false,
    backdropBrightness: false,
    backdropContrast: false,
    backdropGrayscale: false,
    backdropHueRotate: false,
    backdropInvert: false,
    backdropOpacity: false,
    backdropSaturate: false,
    backdropSepia: false,
    ringOffsetWidth: false,
    ringOffsetColor: false,
    scrollSnapType: false,
    scrollSnapAlign: false,
    touchAction: false,
  },
};
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
  :root, body.theme-dark {
    --bg: #000000;
    --bg-soft: #0a0a0a;
    --card: rgba(255, 255, 255, 0.025);
    --card-hi: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.07);
    --border-hi: rgba(255, 255, 255, 0.14);
    --text: #f5f5f5;
    --text-mute: #a0a0a8;
    --text-dim: #6b6b72;
    --accent: #d97757;
    --accent-2: #c96442;
    --cyan: #7dd3fc;
    --ok: #4ade80;
    --warn: #fbbf24;
    --err: #f87171;
    --grad: linear-gradient(135deg, #d97757 0%, #c96442 100%);
    --grad-soft: linear-gradient(135deg, rgba(217,119,87,0.12), rgba(201,100,66,0.08));
    --code-bg: rgba(0,0,0,0.3);
  }
  body.theme-light {
    --bg: #f5f5f0;
    --bg-soft: #eeeee8;
    --card: rgba(0, 0, 0, 0.03);
    --card-hi: rgba(0, 0, 0, 0.06);
    --border: rgba(0, 0, 0, 0.1);
    --border-hi: rgba(0, 0, 0, 0.18);
    --text: #1a1a1a;
    --text-mute: #555560;
    --text-dim: #888892;
    --accent: #c96442;
    --accent-2: #b85535;
    --cyan: #0284c7;
    --ok: #16a34a;
    --warn: #ca8a04;
    --err: #dc2626;
    --grad: linear-gradient(135deg, #d97757 0%, #c96442 100%);
    --grad-soft: linear-gradient(135deg, rgba(217,119,87,0.1), rgba(201,100,66,0.06));
    --code-bg: rgba(0,0,0,0.05);
  }
  body.theme-light { -webkit-font-smoothing: auto; }
  body.theme-light::before { background: none !important; }
  /* 테마 전환 애니메이션 */
  body.theme-switching::after {
    content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
    background: var(--bg);
    animation: themeSweep 0.5s ease-out forwards;
  }
  @keyframes themeSweep {
    0% { clip-path: inset(0 0 100% 0); opacity:1; }
    100% { clip-path: inset(0 0 0 0); opacity:0; }
  }
  /* 라이트 모드 — 포괄적 오버라이드 */
  body.theme-light .feat-win { border-color: rgba(0,0,0,0.12); }
  body.theme-light .btn-primary { color: #fff; }
  body.theme-light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
  body.theme-light .chat-bubble-user { color: #fff; }
  body.theme-light .chat-bubble-bot { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }
  body.theme-light .modal-backdrop { background: rgba(0,0,0,0.35); }
  body.theme-light #sidebar { background: #e8e8e2 !important; border-color: rgba(0,0,0,0.1); }
  body.theme-light .nav-item.active { background: rgba(217,119,87,0.15) !important; border-color: rgba(217,119,87,0.3) !important; color: var(--text) !important; }
  body.theme-light .nav-item:hover { background: rgba(0,0,0,0.04); }
  body.theme-light .card { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.08); }
  body.theme-light .card-hi, body.theme-light .hover-lift:hover { background: rgba(255,255,255,0.8); }
  body.theme-light .chip { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); color: var(--text-mute); }
  body.theme-light .chip-ok { background: rgba(22,163,74,0.1); border-color: rgba(22,163,74,0.25); color: #15803d; }
  body.theme-light .chip-warn { background: rgba(202,138,4,0.1); border-color: rgba(202,138,4,0.25); color: #a16207; }
  body.theme-light .chip-err { background: rgba(220,38,38,0.1); border-color: rgba(220,38,38,0.25); color: #dc2626; }
  body.theme-light .btn { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.12); color: var(--text); }
  body.theme-light .btn:hover { background: rgba(0,0,0,0.1); }
  body.theme-light .btn-ghost:hover { background: rgba(0,0,0,0.06); }
  body.theme-light .input { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.12); color: var(--text); }
  body.theme-light .input:focus { border-color: var(--accent); }
  body.theme-light table.data th { color: var(--text-mute); border-color: rgba(0,0,0,0.08); }
  body.theme-light table.data td { border-color: rgba(0,0,0,0.05); }
  body.theme-light table.data tr:hover td { background: rgba(0,0,0,0.02); }
  body.theme-light .tag-tool { background: rgba(217,119,87,0.12); color: #b85535; }
  body.theme-light .gradient-text { color: #b85535; }
  body.theme-light .shimmer { background: linear-gradient(90deg, rgba(0,0,0,0.04), rgba(0,0,0,0.08), rgba(0,0,0,0.04)); background-size: 200% 100%; }
  body.theme-light .mascot-bubble { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.12); color: var(--text); }
  body.theme-light .mascot-bubble::after { border-top-color: rgba(0,0,0,0.12); }
  body.theme-light .settings-item:hover { background: rgba(0,0,0,0.05); }
  body.theme-light #settingsDropdown { background: #eaeae4; border-color: rgba(0,0,0,0.12); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
  body.theme-light .spotlight-item:hover, body.theme-light .spotlight-item.active { background: rgba(0,0,0,0.05); }
  body.theme-light .prose-claude code { background: rgba(0,0,0,0.06); }
  body.theme-light .prose-claude pre { background: #f0f0ea; border-color: rgba(0,0,0,0.08); }
  body.theme-light .pulse-dot { background: #16a34a; }
  body.theme-light .empty { color: var(--text-dim); }
  body.theme-light #sidebar-foot { border-color: rgba(0,0,0,0.08); }

  /* ─── Task 4: 커스텀 테마 — midnight / forest / sunset ─── */
  body.theme-midnight {
    --bg: #0b0f1a;
    --bg-soft: #101828;
    --card: rgba(100,140,255,0.04);
    --card-hi: rgba(100,140,255,0.08);
    --border: rgba(100,140,255,0.1);
    --border-hi: rgba(100,140,255,0.2);
    --text: #e0e6f0;
    --text-mute: #8898b8;
    --text-dim: #5a6a88;
    --accent: #6b8aff;
    --accent-2: #4e6ee0;
    --cyan: #7dd3fc;
    --ok: #4ade80;
    --warn: #fbbf24;
    --err: #f87171;
    --grad: linear-gradient(135deg, #6b8aff 0%, #4e6ee0 100%);
    --grad-soft: linear-gradient(135deg, rgba(107,138,255,0.12), rgba(78,110,224,0.08));
    --code-bg: rgba(0,0,0,0.35);
    color-scheme: dark;
  }
  body.theme-midnight #sidebar { background: #0e1425 !important; border-color: rgba(100,140,255,0.1); }
  body.theme-midnight .nav-item.active { background: rgba(107,138,255,0.15) !important; border-color: rgba(107,138,255,0.3) !important; }
  body.theme-midnight .btn-primary { color: #fff; }
  body.theme-midnight .chat-bubble-user { color: #fff; }

  body.theme-forest {
    --bg: #0a1410;
    --bg-soft: #0f1e16;
    --card: rgba(80,200,120,0.04);
    --card-hi: rgba(80,200,120,0.08);
    --border: rgba(80,200,120,0.1);
    --border-hi: rgba(80,200,120,0.2);
    --text: #dff0e4;
    --text-mute: #88b898;
    --text-dim: #5a8868;
    --accent: #50c878;
    --accent-2: #3aad5e;
    --cyan: #7dd3fc;
    --ok: #4ade80;
    --warn: #fbbf24;
    --err: #f87171;
    --grad: linear-gradient(135deg, #50c878 0%, #3aad5e 100%);
    --grad-soft: linear-gradient(135deg, rgba(80,200,120,0.12), rgba(58,173,94,0.08));
    --code-bg: rgba(0,0,0,0.35);
    color-scheme: dark;
  }
  body.theme-forest #sidebar { background: #0d1a14 !important; border-color: rgba(80,200,120,0.1); }
  body.theme-forest .nav-item.active { background: rgba(80,200,120,0.15) !important; border-color: rgba(80,200,120,0.3) !important; }
  body.theme-forest .btn-primary { color: #fff; }
  body.theme-forest .chat-bubble-user { color: #fff; }

  body.theme-sunset {
    --bg: #1a0f0a;
    --bg-soft: #241410;
    --card: rgba(255,150,80,0.04);
    --card-hi: rgba(255,150,80,0.08);
    --border: rgba(255,150,80,0.1);
    --border-hi: rgba(255,150,80,0.2);
    --text: #f5e0d0;
    --text-mute: #c8a888;
    --text-dim: #8a6a50;
    --accent: #ff9650;
    --accent-2: #e07830;
    --cyan: #7dd3fc;
    --ok: #4ade80;
    --warn: #fbbf24;
    --err: #f87171;
    --grad: linear-gradient(135deg, #ff9650 0%, #e07830 100%);
    --grad-soft: linear-gradient(135deg, rgba(255,150,80,0.12), rgba(224,120,48,0.08));
    --code-bg: rgba(0,0,0,0.35);
    color-scheme: dark;
  }
  body.theme-sunset #sidebar { background: #1e1210 !important; border-color: rgba(255,150,80,0.1); }
  body.theme-sunset .nav-item.active { background: rgba(255,150,80,0.15) !important; border-color: rgba(255,150,80,0.3) !important; }
  body.theme-sunset .btn-primary { color: #fff; }
  body.theme-sunset .chat-bubble-user { color: #fff; }

  /* ─── Task 9: 노드 그룹핑 ─── */
  .wf-group-box { fill: rgba(167,139,250,0.06); stroke: rgba(167,139,250,0.3); stroke-width: 1.5; stroke-dasharray: 6 3; rx: 16; ry: 16; cursor: move; }
  .wf-group-box:hover { fill: rgba(167,139,250,0.1); }
  .wf-group-label { fill: var(--text-mute); font-size: 11px; font-weight: 600; pointer-events: none; }
  .wf-group-toggle { cursor: pointer; fill: var(--text-mute); font-size: 14px; }
  .wf-group-toggle:hover { fill: var(--text); }
  .wf-node.multi-selected .wf-node-body { stroke: #a78bfa; stroke-width: 2.5; stroke-dasharray: 4 2; }

  /* ─── Task 1: 모바일 반응형 — 모달 전체 화면 ─── */
  @media (max-width: 768px) {
    .modal-backdrop { padding: 0 !important; }
    .modal { max-width: 100vw !important; width: 100vw !important; max-height: 100vh !important; height: 100vh !important; border-radius: 0 !important; }
    .modal-wide { max-width: 100vw !important; width: 100vw !important; height: 100vh !important; max-height: 100vh !important; }
  }

  /* ─── Task 2: 포커스 트랩 시각 ─── */
  .modal-backdrop:focus-within .modal { box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px var(--accent); }
  *, *::before, *::after { box-sizing: border-box; }
  html { color-scheme: dark; }
  body.theme-light { color-scheme: light; }
  html, body { background: var(--bg); color: var(--text); margin: 0; height: 100%; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(55% 40% at 0% 0%, rgba(217,119,87,0.04), transparent 60%),
      radial-gradient(40% 35% at 100% 100%, rgba(255,255,255,0.02), transparent 60%);
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  ::-webkit-scrollbar-track { background: transparent; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; min-width: 0; max-width: 100%; }
  .card-hi { background: var(--card-hi); border-color: var(--border-hi); }
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 0.85rem; border-radius: 10px; font-size: 0.82rem; font-weight: 500; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); cursor: pointer; transition: background 0.15s, border-color 0.15s, filter 0.15s, transform 0.15s; }
  .btn:hover { background: rgba(255,255,255,0.12); border-color: var(--border-hi); }
  .btn-primary { background: var(--grad); border: none; color: #0a0a0f; font-weight: 600; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: rgba(255,255,255,0.06); }
  .chip { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.7rem; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-mute); }
  .chip-accent { background: var(--grad-soft); border-color: rgba(167,139,250,0.35); color: #e9defc; }
  .chip-ok { background: rgba(74,222,128,0.15); border-color: rgba(74,222,128,0.35); color: #86efac; }
  .chip-warn { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.35); color: #fcd34d; }
  .chip-err { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.35); color: #fca5a5; }
  /* chatbot — macOS floating window */
  .chat-msg { display: flex; }
  .chat-user { justify-content: flex-end; }
  .chat-bot { justify-content: flex-start; }
  .chat-bubble-user { background: var(--grad); color: #0a0a0f; border-radius: 14px 14px 4px 14px; padding: 8px 12px; max-width: 85%; font-size: 0.82rem; line-height: 1.45; word-break: break-word; }
  .chat-bubble-bot { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; padding: 8px 12px; max-width: 85%; font-size: 0.82rem; line-height: 1.45; color: var(--text); word-break: break-word; }
  /* claude mascot */
  #claudeMascot { cursor: grab; user-select: none; pointer-events: auto; will-change: left, top; touch-action: none; -webkit-tap-highlight-color: transparent; }
  #claudeMascot:active { cursor: grabbing; }
  #claudeMascot:hover { filter: drop-shadow(0 0 14px rgba(224,124,76,0.7)); }
  #claudeMascot svg { transition: transform 0.15s; }
  #claudeMascot.facing-left svg { transform: scaleX(-1); }
  .mascot-bubble { position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card-hi);border:1px solid var(--border-hi);border-radius:12px 12px 12px 4px;padding:7px 12px;font-size:0.72rem;color:var(--text);white-space:nowrap;pointer-events:none;animation:bubblePop 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:0 4px 16px rgba(0,0,0,0.4); }
  .mascot-bubble::after { content:'';position:absolute;top:100%;left:18px;border:5px solid transparent;border-top-color:var(--border-hi); }
  @keyframes bubblePop { from{opacity:0;transform:translateX(-50%) scale(0.85);} to{opacity:1;transform:translateX(-50%) scale(1);} }
  /* streaming cursor */
  .streaming-cursor::after { content: '▍'; animation: blink-cursor 0.8s infinite; color: var(--accent); font-weight: 300; }
  @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }
  /* chat window animation */
  @keyframes chatSlideIn { from { opacity:0; transform:translateY(20px) scale(0.95); } to { opacity:1; transform:none; } }
  @keyframes chatSlideOut { from { opacity:1; transform:none; } to { opacity:0; transform:translateY(20px) scale(0.95); } }
  .chat-win-enter { animation: chatSlideIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
  .chat-win-exit { animation: chatSlideOut 0.2s ease-in forwards; }
  /* interactive counters */
  @keyframes countFadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .count-up { animation: countFadeIn 0.5s ease-out backwards; }
  /* card stagger entrance */
  @keyframes cardPop { from { opacity:0; transform:translateY(12px) scale(0.97); } to { opacity:1; transform:none; } }
  .card-animate { animation: cardPop 0.4s cubic-bezier(0.16,1,0.3,1) backwards; will-change: transform, opacity; }
  /* spotlight — macOS floating window style */
  #spotlightInput, #spotlightInput:focus,
  #chatInput, #chatInput:focus { outline:none !important; box-shadow:none !important; --tw-ring-shadow:none !important; }
  .spotlight-item { display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background 0.12s; }
  .spotlight-item:hover,.spotlight-item.active { background:rgba(255,255,255,0.06); }
  .spotlight-item .sl-icon { font-size:1.3rem;width:32px;text-align:center;flex-shrink:0; }
  .spotlight-item .sl-label { font-size:0.95rem;font-weight:500; }
  .spotlight-item .sl-desc { font-size:0.78rem;color:var(--text-dim);margin-top:2px; }
  .spotlight-item .sl-kbd { font-size:0.7rem;color:var(--text-dim);background:rgba(255,255,255,0.06);padding:3px 8px;border-radius:5px;margin-left:auto;flex-shrink:0; }
  .settings-item { display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;background:none;border:none;color:var(--text);font-size:0.82rem;cursor:pointer;text-align:left;font-family:inherit;transition:background 0.1s; }
  .settings-item:hover { background:rgba(255,255,255,0.06); }
  body.theme-light .settings-item:hover { background:rgba(0,0,0,0.05); }
  .settings-check { margin-left:auto;color:var(--accent);font-size:0.85rem; }
  .divider { height: 1px; background: var(--border); margin: 0.75rem 0; }
  .nav-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.8rem; border-radius: 10px; color: var(--text-mute); font-size: 0.88rem; cursor: pointer; transition: background 0.15s, color 0.15s; user-select: none; will-change: background; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-item.active { background: var(--grad-soft); color: var(--text); border: 1px solid rgba(167,139,250,0.35); }
  .badge-n { display: inline-block; min-width: 20px; height: 20px; line-height: 20px; text-align: center; padding: 0 6px; border-radius: 10px; font-size: 0.7rem; background: rgba(255,255,255,0.08); color: var(--text-mute); }
  .gradient-text { color: #d97757; }
  @property --p { syntax: '<number>'; inherits: false; initial-value: 0; }
  .score-ring { --p: 0; --col-a: #d97757; --col-b: #c96442; width: 180px; height: 180px; border-radius: 50%;
    background: conic-gradient(from 0deg, var(--col-a) 0deg, var(--col-b) calc(var(--p) * 3.6deg), rgba(255,255,255,0.05) calc(var(--p) * 3.6deg));
    display: grid; place-items: center; position: relative; transition: --p 1s cubic-bezier(0.16,1,0.3,1); }
  .score-ring::after { content: ""; position: absolute; inset: 10px; background: var(--bg); border-radius: 50%; }
  .score-ring > * { position: relative; z-index: 2; }
  @keyframes ringSpin { from { filter: brightness(0.6); } to { filter: brightness(1); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 1.4s infinite; display: inline-block; }
  .pulse-dot.off { background: #6b7280; animation: none; }
  .tab-enter { animation: tabFade 0.3s ease; will-change: transform, opacity; }
  @keyframes tabFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  table.data { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  table.data th { text-align: left; font-weight: 500; color: var(--text-mute); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  table.data td { padding: 0.65rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  table.data tr:hover td { background: var(--card-hi); }
  .link-row { cursor: pointer; }
  .input { width: 100%; padding: 0.55rem 0.75rem; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.88rem; -webkit-appearance: none; }
  .input:focus { outline: none; border-color: var(--accent); }
  /* number/password/text 등 모든 input 타입에 다크 테마 강제 */
  input.input, select.input { background: rgba(255,255,255,0.04) !important; color: var(--text) !important; color-scheme: dark; }
  input.input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px rgba(10,10,10,1) inset !important; -webkit-text-fill-color: var(--text) !important; }
  body.theme-light input.input, body.theme-light select.input { background: rgba(255,255,255,0.7) !important; color: var(--text) !important; color-scheme: light; }
  body.theme-light input.input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px rgba(245,245,240,1) inset !important; }
  textarea.input { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.8rem; line-height: 1.55; }
  .kbd { display: inline-block; padding: 0.1rem 0.45rem; border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; background: rgba(255,255,255,0.05); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(4px); z-index: 50; display: grid; place-items: center; padding: 24px; }
  .modal { background: var(--bg-soft); border: 1px solid var(--border-hi); border-radius: 18px; max-width: 1100px; width: 100%; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal-wide { max-width: 1440px; height: 90vh; max-height: 90vh; }
  .modal-narrow { max-width: 520px !important; }
  .modal-wide textarea { font-size: 13px; line-height: 1.55; }
  .prose-claude { color: var(--text); font-size: 0.9rem; line-height: 1.6; }
  .prose-claude h1, .prose-claude h2, .prose-claude h3 { color: var(--text); margin-top: 1em; }
  .prose-claude code { background: rgba(255,255,255,0.08); padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.85em; }
  .prose-claude pre { background: var(--code-bg); padding: 1em; border-radius: 10px; overflow-x: auto; border: 1px solid var(--border); }
  .prose-claude ul { padding-left: 1.2em; }
  .hover-lift { transition: transform 0.15s, background 0.15s; will-change: transform; }
  .hover-lift:hover { transform: translateY(-2px); background: var(--card-hi); }
  .btn-active { background: var(--grad-soft) !important; border-color: rgba(167,139,250,0.45) !important; color: var(--text) !important; }
  .onboard-done { opacity: 0.78; }

  /* ─── 워크플로우 에디터 (n8n 스타일) ─── */
  /* 뷰포트 높이에서 상단 chrome(헤더·타이틀·통계 패널 ≈ 230px) 을 뺀 공간을 모두 사용 → 스크롤 없이 한눈에 */
  #wfRoot { display: flex; gap: 10px; height: calc(100vh - 230px); min-height: 420px; }
  #wfList { width: 260px; flex-shrink: 0; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  #wfCanvasWrap { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  #wfToolbar { display: flex; gap: 6px; padding: 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; background: var(--card); border-radius: 12px 12px 0 0; }
  #wfCanvasHost { flex: 1; position: relative; overflow: hidden; background:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0),
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
    background-size: 20px 20px, 60px 60px;
    background-position: 0 0, 10px 10px;
    border-radius: 0 0 12px 12px;
    border: 1px solid var(--border); border-top: 0;
  }
  #wfCanvas { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; user-select: none; }
  #wfCanvas:active { cursor: grabbing; }
  #wfInspector { width: 320px; flex-shrink: 0; overflow-y: auto; padding: 12px; }
  .wf-list-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; transition: background 0.12s, border-color 0.12s; }
  .wf-list-item:hover { background: rgba(255,255,255,0.04); }
  .wf-list-item.active { background: var(--grad-soft); border-color: rgba(167,139,250,0.35); }
  .wf-node { cursor: grab; }
  .wf-node:active { cursor: grabbing; }
  .wf-node-body { fill: var(--card); stroke: var(--border); stroke-width: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
  .wf-node.selected .wf-node-body { stroke: var(--accent); stroke-width: 2; }
  /* 노드 타입별 색상 구분 */
  .wf-node[data-type="http"] .wf-node-body { stroke: #4ade80; stroke-width: 1.5; }
  .wf-node[data-type="http"].selected .wf-node-body { stroke: #4ade80; stroke-width: 2.5; }
  .wf-node[data-type="transform"] .wf-node-body { stroke: #c084fc; stroke-width: 1.5; }
  .wf-node[data-type="transform"].selected .wf-node-body { stroke: #c084fc; stroke-width: 2.5; }
  .wf-node[data-type="variable"] .wf-node-body { stroke: #fbbf24; stroke-width: 1.5; }
  .wf-node[data-type="variable"].selected .wf-node-body { stroke: #fbbf24; stroke-width: 2.5; }
  .wf-node[data-type="subworkflow"] .wf-node-body { stroke: #7dd3fc; stroke-width: 1.5; }
  .wf-node[data-type="subworkflow"].selected .wf-node-body { stroke: #7dd3fc; stroke-width: 2.5; }
  .wf-node[data-type="embedding"] .wf-node-body { stroke: #f472b6; stroke-width: 1.5; }
  .wf-node[data-type="embedding"].selected .wf-node-body { stroke: #f472b6; stroke-width: 2.5; }
  .wf-node[data-type="loop"] .wf-node-body { stroke: #a78bfa; stroke-width: 1.5; }
  .wf-node[data-type="loop"].selected .wf-node-body { stroke: #a78bfa; stroke-width: 2.5; }
  .wf-node[data-type="retry"] .wf-node-body { stroke: #fb923c; stroke-width: 1.5; }
  .wf-node[data-type="retry"].selected .wf-node-body { stroke: #fb923c; stroke-width: 2.5; }
  .wf-node[data-type="error_handler"] .wf-node-body { stroke: #f87171; stroke-width: 1.5; }
  .wf-node[data-type="error_handler"].selected .wf-node-body { stroke: #f87171; stroke-width: 2.5; }
  .wf-node[data-type="merge"] .wf-node-body { stroke: #06b6d4; stroke-width: 1.5; }
  .wf-node[data-type="merge"].selected .wf-node-body { stroke: #06b6d4; stroke-width: 2.5; }
  .wf-node[data-type="delay"] .wf-node-body { stroke: #94a3b8; stroke-width: 1.5; }
  .wf-node[data-type="delay"].selected .wf-node-body { stroke: #94a3b8; stroke-width: 2.5; }
  .wf-node[data-type="session"] .wf-node-body { stroke: var(--accent); stroke-width: 1.5; }
  .wf-node[data-type="subagent"] .wf-node-body { stroke: var(--accent); stroke-width: 1.5; }
  .wf-node[data-status="running"] .wf-node-body { stroke: #a78bfa; stroke-width: 2.5; animation: wfPulse 1.2s infinite; filter: drop-shadow(0 0 8px rgba(167,139,250,0.6)); }
  .wf-node[data-status="ok"] .wf-node-body { stroke: #4ade80; stroke-width: 2; }
  .wf-node[data-status="err"] .wf-node-body { stroke: #f87171; stroke-width: 2; }
  .wf-node[data-status="skipped"] .wf-node-body { stroke: rgba(255,255,255,0.1); stroke-dasharray: 4 4; }
  /* 회전하는 점선 외곽 링 — running 상태만 표시 */
  .wf-node-ring { stroke: #a78bfa; stroke-width: 2; stroke-dasharray: 6 6; fill: none; opacity: 0; pointer-events: none; }
  .wf-node[data-status="running"] .wf-node-ring { opacity: 0.8; animation: wfSpinDash 2.5s linear infinite; }
  .wf-node-elapsed { fill: #a78bfa; font-size: 10px; font-weight: 700; pointer-events: none; opacity: 0; }
  .wf-node[data-status="running"] .wf-node-elapsed { opacity: 1; }
  @keyframes wfPulse { 0%,100%{stroke-opacity:0.55} 50%{stroke-opacity:1} }
  @keyframes wfSpinDash { to { stroke-dashoffset: -24; } }
  /* 실행 상태 배너 (캔버스 상단 플로팅) */
  #wfRunBanner {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 7; min-width: 360px; max-width: 640px;
    background: var(--card); border: 1.5px solid #a78bfa;
    border-radius: 10px; padding: 10px 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 12px rgba(167,139,250,0.3);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column; gap: 6px;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
    font-size: 12px;
  }
  #wfRunBanner.visible { opacity: 1; pointer-events: auto; }
  #wfRunBanner.state-ok { border-color: #4ade80; box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 12px rgba(74,222,128,0.3); }
  #wfRunBanner.state-err { border-color: #f87171; box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 12px rgba(248,113,113,0.3); }
  #wfRunBanner .wfrb-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #wfRunBanner .wfrb-title { font-weight: 600; color: var(--text); }
  #wfRunBanner .wfrb-meta { color: var(--text-dim); font-size: 11px; font-family: ui-monospace, Menlo, monospace; }
  #wfRunBanner .wfrb-bar { flex: 1; height: 6px; background: rgba(167,139,250,0.15); border-radius: 3px; overflow: hidden; min-width: 120px; }
  #wfRunBanner .wfrb-bar-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #c4b5fd); transition: width 0.3s; }
  #wfRunBanner.state-ok .wfrb-bar-fill { background: linear-gradient(90deg, #4ade80, #86efac); }
  #wfRunBanner.state-err .wfrb-bar-fill { background: linear-gradient(90deg, #f87171, #fca5a5); }
  #wfRunBanner .wfrb-focus { padding: 4px 10px; border-radius: 6px; background: rgba(167,139,250,0.2); color: #a78bfa; font-size: 11px; cursor: pointer; border: 1px solid rgba(167,139,250,0.4); white-space: nowrap; }
  #wfRunBanner .wfrb-focus:hover { background: rgba(167,139,250,0.35); }
  #wfRunBanner .wfrb-close { margin-left: auto; padding: 2px 6px; border-radius: 4px; cursor: pointer; color: var(--text-dim); font-size: 14px; line-height: 1; background: transparent; border: none; }
  #wfRunBanner .wfrb-close:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  /* v2.10.2 — 노드 hover 결과 tooltip */
  #wfNodeTooltip {
    position: fixed; z-index: 9000;
    max-width: 360px; min-width: 220px;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px;
    font-size: 11px; line-height: 1.5;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    pointer-events: none;
    opacity: 0; transition: opacity 0.15s;
  }
  #wfNodeTooltip.visible { opacity: 1; }
  #wfNodeTooltip.state-ok    { border-left: 3px solid #4ade80; }
  #wfNodeTooltip.state-err   { border-left: 3px solid #f87171; }
  #wfNodeTooltip.state-running { border-left: 3px solid #a78bfa; }
  #wfNodeTooltip.state-skipped { border-left: 3px solid rgba(255,255,255,0.3); }
  #wfNodeTooltip .wfnt-head { display: flex; align-items: center; gap: 6px; font-weight: 600; margin-bottom: 4px; }
  #wfNodeTooltip .wfnt-meta { color: var(--text-dim); font-family: ui-monospace, Menlo, monospace; font-size: 10px; }
  #wfNodeTooltip .wfnt-row  { display: flex; justify-content: space-between; gap: 8px; }
  #wfNodeTooltip .wfnt-out  { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); white-space: pre-wrap; color: var(--text-mute); max-height: 120px; overflow: auto; font-family: ui-monospace, Menlo, monospace; font-size: 10px; }
  #wfNodeTooltip .wfnt-err  { color: #fca5a5; }
  .wf-node-title { fill: var(--text); font-size: 13px; font-weight: 600; pointer-events: none; }
  .wf-node-sub { fill: var(--text-dim); font-size: 10px; pointer-events: none; }
  .wf-node-icon { font-size: 18px; pointer-events: none; }
  .wf-port { fill: var(--accent); stroke: var(--bg); stroke-width: 2; cursor: crosshair; transition: r 0.12s; }
  .wf-port:hover { r: 8; }
  .wf-port-in { fill: #a78bfa; }
  .wf-edge { stroke: var(--accent); stroke-width: 2; fill: none; marker-end: url(#wfArrow); pointer-events: stroke; cursor: pointer; }
  .wf-edge:hover { stroke: #fbbf24; stroke-width: 3; }
  .wf-edge.selected { stroke: #fbbf24; stroke-width: 3; }
  .wf-edge-draft { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 4 4; fill: none; pointer-events: none; opacity: 0.7; }
  .wf-dirty-dot { width: 8px; height: 8px; border-radius: 50%; background: #fbbf24; display: inline-block; margin-right: 4px; }
  .wf-ok-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 4px; }
  /* 미니맵 — 워크플로우·노드 존재 시에만 표시 (기본은 숨김) */
  #wfMinimap {
    position: absolute; right: 12px; bottom: 48px; z-index: 6;
    width: 150px; height: 100px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4); backdrop-filter: blur(4px);
    display: none;
  }
  /* 캔버스 내부 플로팅 컨트롤 (n8n 스타일) */
  .wf-floating { position: absolute; right: 12px; bottom: 12px; z-index: 5; display: flex; gap: 6px; }
  .wf-floating .btn { background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(4px); box-shadow: 0 4px 14px rgba(0,0,0,0.4); }
  .wf-floating .btn:hover { background: var(--card-hi); }
  /* 인스펙터 접기 */
  #wfInspector.wf-collapsed { display: none; }
  /* 튜토리얼 애니메이션 — 라이트/다크 모드 모두 일관되게 어두운 스테이지로 고정 */
  @keyframes wfTutFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes wfTutDraw { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes wfTutClickRipple {
    0%   { r: 0;  opacity: 0.9; stroke-width: 3; }
    100% { r: 28; opacity: 0;   stroke-width: 1; }
  }
  .wf-tut-node-pop { animation: none; opacity: 1; }
  #wfTutStage { background: #15151c !important; color: #fff; min-height: 280px; }
  #wfTutStage .wf-node-body { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.14); stroke-width: 1; }
  #wfTutStage .wf-node[data-status="running"] .wf-node-body { stroke: #a78bfa; stroke-width: 2; animation: wfPulse 2s infinite; }
  #wfTutStage .wf-node[data-status="ok"] .wf-node-body { stroke: #4ade80; stroke-width: 2; }
  #wfTutStage .wf-node-title { fill: #fafafa !important; font-weight: 600; }
  #wfTutStage .wf-node-sub { fill: rgba(255,255,255,0.55) !important; }
  #wfTutStage .wf-node-icon { fill: #fff; }
  #wfTutStage text { font-family: inherit; }
  #wfTutCursor { transition: transform 0.35s ease-out; pointer-events: none; }
  .wf-tut-ripple { animation: wfTutClickRipple 0.7s ease-out both; }
  #wfTutStage .wf-tut-port-in { fill: #a78bfa; stroke: #15151c; stroke-width: 2; }
  #wfTutStage .wf-tut-port-out { fill: #d97757; stroke: #15151c; stroke-width: 2; }
  .wf-floating-right { position: absolute; right: 12px; top: 12px; z-index: 5; }
  .wf-floating-right .btn { background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(4px); box-shadow: 0 4px 14px rgba(0,0,0,0.4); }
  .wf-floating-right .btn:hover { background: var(--card-hi); }

  @media (max-width: 900px) {
    #wfRoot { flex-direction: column; height: auto; min-height: 0; max-height: none; }
    #wfList, #wfInspector { width: 100%; max-height: 220px; }
    #wfCanvasWrap { height: min(55vh, 520px); min-height: 240px; }
  }
  .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.75rem; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-dim); }
  .tag-tool { display: inline-block; padding: 1px 7px; font-size: 0.68rem; border-radius: 4px; background: rgba(217,119,87,0.14); color: #f5b997; font-family: 'JetBrains Mono', monospace; margin: 1px; }
  .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.12), rgba(255,255,255,0.04)); background-size: 200% 100%; animation: shimmerMove 1.6s infinite; border-radius: 6px; }
  @keyframes shimmerMove { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .line-clamp-6 { display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; }
  /* 햄버거 토글 중복 방지: sb-collapsed 상태면 sbToggle 숨기고 navToggle 만, 평상시엔 반대 */
  body.sb-collapsed #sbToggle { display: none; }
  body.sb-collapsed #sidebar { width: 58px; }

  /* 🪟 macOS 스타일 플로팅 창 (신기능 전용) */
  .feat-win {
    position: fixed;
    width: min(640px, calc(100vw - 80px));
    min-width: 360px;
    max-width: calc(100vw - 40px);
    min-height: 180px;
    max-height: calc(100vh - 80px);
    background: var(--bg-soft);
    border: 1px solid var(--border-hi);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    resize: both;
    transition: box-shadow 0.15s;
  }
  .feat-win:hover { box-shadow: 0 24px 72px rgba(0,0,0,0.7), 0 0 0 1px rgba(217,119,87,0.15); }
  .feat-win-title {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid var(--border);
    cursor: move;
    user-select: none;
    flex-shrink: 0;
  }
  .feat-win-lights { display: flex; gap: 7px; }
  .feat-light {
    width: 12px; height: 12px; border-radius: 50%;
    border: none; padding: 0; cursor: pointer;
    transition: filter 0.1s;
  }
  .feat-light:hover { filter: brightness(1.25); }
  .feat-light-close { background: #ff5f57; }
  .feat-light-min   { background: #febc2e; }
  .feat-light-max   { background: #28c840; }
  .feat-win-title-text { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; truncate: overflow; }
  .feat-win-body {
    padding: 16px;
    overflow-y: auto;
    flex: 1 1 0;
    min-height: 0;
  }
  .feat-win-minimized { height: 40px !important; min-height: 40px !important; overflow: hidden; }
  .feat-win-minimized .feat-win-body { display: none; }
  .feat-win-maxed { border-radius: 8px; resize: none; }
  body.sb-collapsed #sidebar .nav-label,
  body.sb-collapsed #sidebar .nav-desc,
  body.sb-collapsed #sidebar .brand-text,
  body.sb-collapsed #sidebar .group-label,
  body.sb-collapsed #sidebar .cli-body { display: none; }
  body.sb-collapsed #sidebar .nav-item { justify-content: center; padding: 0.55rem 0.4rem; }
  body.sb-collapsed #content { margin-left: 58px; }
  body.sb-collapsed #sidebar-foot { padding: 0.4rem; gap: 0.3rem; }
  body.sb-collapsed #sidebar-foot .btn { display: none; }  /* 접힌 상태에서 버튼 숨김 */
  body.sb-collapsed #sidebar-foot #cliStatus > .card { padding: 0.35rem !important; }
  body.sb-collapsed #sidebar-foot #cliStatus .cli-body,
  body.sb-collapsed #sidebar-foot #cliStatus .flex.items-center.justify-between > span:first-child { display: none; }
  body.sb-collapsed #sidebar-foot #cliStatus .flex { justify-content: center !important; margin: 0 !important; }
  #sidebar { transition: width 0.18s ease; }
  #content { transition: margin-left 0.18s ease; }

  /* ─── 모바일 반응형 ─── */
  @media (max-width: 900px) {
    #sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 40; transform: translateX(-100%); transition: transform 0.2s; width: min(300px, 85vw) !important; }
    #sidebar.open { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,0.6); }
    #content { margin-left: 0 !important; }
    /* 사이드바 열렸을 때 배경 오버레이 */
    body.sidebar-open::after {
      content: ''; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 35; transition: opacity 0.2s;
    }

    /* 헤더 / 본문 패딩 축소 */
    #content header { padding: 0.5rem 0.75rem !important; }
    #content #view { padding: 0.75rem !important; }

    /* 큰 타이포 축소 */
    h1.text-2xl { font-size: 1.25rem !important; }
    h2.text-lg, h2.text-xl { font-size: 1rem !important; }

    /* 카드 padding 축소 */
    .card.p-5, .card.p-6 { padding: 0.75rem !important; }
    .card.p-4 { padding: 0.625rem !important; }

    /* 테이블 가로 스크롤 */
    table.data { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; max-width: 100%; }
    table.data thead, table.data tbody { display: table; min-width: 100%; }

    /* 그리드 강제 1 컬럼 (md/lg breakpoint 무시) */
    .grid.grid-cols-2 { grid-template-columns: 1fr 1fr !important; }
    .grid.md\:grid-cols-2, .grid.md\:grid-cols-3, .grid.md\:grid-cols-4, .grid.md\:grid-cols-5,
    .grid.lg\:grid-cols-2, .grid.lg\:grid-cols-3, .grid.lg\:grid-cols-4, .grid.lg\:grid-cols-5 {
      grid-template-columns: 1fr !important;
    }
    .grid-list { grid-template-columns: 1fr !important; }

    /* 입력 필드 풀폭 */
    .input { font-size: 16px !important; } /* iOS 자동 줌 방지 */
    .max-w-\[260px\], .max-w-\[280px\], .max-w-\[300px\], .max-w-\[340px\], .max-w-\[420px\] { max-width: 100% !important; }
    #globalSearch { font-size: 14px !important; }

    /* 모달 */
    .modal-backdrop { padding: 8px !important; }
    .modal { max-height: 96vh !important; border-radius: 12px !important; }
    .modal-wide { height: 96vh !important; max-height: 96vh !important; }

    /* 신기능 창 / 챗 윈도우 — 화면 거의 전체 */
    .feat-win {
      width: calc(100vw - 16px) !important;
      max-width: calc(100vw - 16px) !important;
      left: 8px !important;
      top: 8px !important;
      right: auto !important;
      bottom: auto !important;
      height: auto !important;
      max-height: calc(100vh - 16px) !important;
      resize: none !important;
    }
    /* 튜토리얼·노드 에디터처럼 flex 기반 레이아웃 창은 화면 전체 높이 보장 */
    .feat-win.wf-tut-win,
    .feat-win[id^="wfNodeWin-"] {
      height: calc(100vh - 16px) !important;
    }
    .feat-win-title { touch-action: none; cursor: move; }

    /* 마스코트 — 모바일에서 기본 터치 타겟 보장 + 초기 위치 안전 */
    #claudeMascot { width: 64px !important; height: 58px !important; }

    /* Chip / 버튼 터치 타겟 */
    .btn, .btn-primary, .btn-ghost { min-height: 36px; }
    .chip { min-height: 22px; }

    /* 사이드바 네비 항목 터치 타겟 */
    .nav-item { min-height: 44px; padding-top: 10px !important; padding-bottom: 10px !important; }

    /* 이미지/ pre 넘침 */
    pre { max-width: 100%; overflow-x: auto; }
  }

  /* 아주 좁은 화면 — iPhone SE 등 */
  @media (max-width: 420px) {
    .grid.grid-cols-2 { grid-template-columns: 1fr !important; }
    #content header { gap: 0.5rem !important; }
    #content #view { padding: 0.5rem !important; }
  }
  /* Ollama 모델 허브 */
  .ollama-cat-filter.active { background: var(--accent) !important; color: #fff !important; }
  #ollamaCatalogGrid { max-height: 720px; overflow-y: auto; }
  #ollamaCatalogGrid .card { transition: transform 0.15s, box-shadow 0.15s; }
  #ollamaCatalogGrid .card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  #ollamaInstalledTable th { text-align: left; white-space: nowrap; }
  #ollamaInstalledTable td { white-space: nowrap; }
</style>
</head>

// 변경(POST/PUT/DELETE) 후 자동 페이지 리로드 — 디바운스로 연속 호출 합치기
let __autoReloadTimer = null;
let __lastRenderedView = null;
let __lastRenderTs = 0;
function _scheduleAutoReload() {
  if (__autoReloadTimer) clearTimeout(__autoReloadTimer);
  __autoReloadTimer = setTimeout(() => {
    __autoReloadTimer = null;
    // 같은 뷰에서 500ms 이내 중복 렌더 방지
    const now = Date.now();
    if (state.view === __lastRenderedView && now - __lastRenderTs < 500) return;
    __lastRenderedView = state.view;
    __lastRenderTs = now;
    try { renderView && renderView(); } catch (e) { console.warn('autoReload renderView failed', e); }
  }, 500);
}
// 데이터 갱신과 무관한 엔드포인트는 자동 리로드 제외 (LLM 호출, 단순 미리보기, 외부 IO 등)
const __noReloadPaths = [
  '/api/feature/recommend', '/api/file/recommend', '/api/recommend',
  '/api/translate/batch', '/api/translate', '/api/settings/preview',
  '/api/open-folder', '/api/open-session', '/api/sessions/reindex',
  '/api/login', '/api/auth', '/api/chat',
  // 워크플로우 에디터는 프론트가 권위 상태를 들고 있으므로 서버 응답 후
  // renderView() 로 뷰를 리셋하면 드래그 중 깜빡임·선택 초기화 발생
  '/api/workflows/', '/api/session/spawn',
  // AI 프로바이더 — 테스트/비교/헬스/설정 저장은 리로드 불필요
  '/api/ai-providers/',
  // Ollama — pull/serve/info/settings 는 인라인 상태 업데이트
  '/api/ollama/',
];
// ── 인메모리 GET 캐시 — 빈번한 GET 호출의 중복 네트워크 비용 제거 ──
const _apiCache = {};
const _apiCacheTTL = {
  '/api/ai-providers/list': 30000,
  '/api/ai-providers/health': 20000,
  '/api/ollama/catalog': 60000,
  '/api/workflows/stats': 30000,
};
function _apiCacheInvalidate(path) {
  // POST/PUT/DELETE 시 관련 캐시 무효화
  for (const key of Object.keys(_apiCache)) {
    if (key.startsWith(path) || path.startsWith(key.replace(/\/[^/]*$/, ''))) {
      delete _apiCache[key];
    }
  }
}
function cachedApi(path, ttlMs) {
  const ttl = ttlMs || _apiCacheTTL[path] || 30000;
  const c = _apiCache[path];
  if (c && Date.now() - c.ts < ttl) return Promise.resolve(c.data);
  return api(path).then(d => { _apiCache[path] = { data: d, ts: Date.now() }; return d; });
}

async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok && r.status !== 200) {
    let msg = r.status.toString();
    try {
      const j = await r.json();
      msg = errMsg(j);
    } catch {}
    throw new Error(msg);
  }
  const data = await r.json();
  const method = ((opts && opts.method) || 'GET').toUpperCase();
  if (method !== 'GET') {
    // POST/PUT/DELETE 성공 시 관련 GET 캐시 무효화
    _apiCacheInvalidate(path.replace(/\/[^/]*$/, ''));
    const ok = data && (data.ok === true || data.ok === undefined && !data.error);
    const skip = __noReloadPaths.some(p => path.startsWith(p));
    if (ok && !skip) _scheduleAutoReload();
  }
  return data;
}
// error_key 기반 i18n 에러 메시지 헬퍼
function errMsg(r) {
  if (!r) return 'error';
  return (r.error_key && t(r.error_key) !== r.error_key) ? t(r.error_key) : (r.error || 'error');
}

function toast(msg, kind='info') {
  const div = document.createElement('div');
  div.className = `card px-4 py-3 text-sm flex items-center gap-2`;
  div.innerHTML = `<span>${({info:'ℹ️', ok:'✅', err:'❌', warn:'⚠️'})[kind]||'ℹ️'}</span><span>${escapeHtml(msg)}</span>`;
  _translateDOM(div);
  document.getElementById('toast').appendChild(div);
  setTimeout(() => div.style.opacity='0', 2600);
  setTimeout(() => div.remove(), 3200);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
// JSON 객체를 HTML 속성(작은/큰따옴표 모두 안전) 으로 인코딩
function jsonAttr(obj) {
  return escapeHtml(JSON.stringify(obj));
}
function fmtMs(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function fmtRel(ms) {
  if (!ms) return '—';
  const d = Math.max(0, Math.floor((Date.now() - ms) / 1000));
  if (d < 60) return `${d}초 전`;
  if (d < 3600) return `${Math.floor(d/60)}분 전`;
  if (d < 86400) return `${Math.floor(d/3600)}시간 전`;
  return `${Math.floor(d/86400)}일 전`;
}
function fmtDur(ms) {
  if (!ms) return '—';
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}
function scoreColor(n) {
  n = Number(n) || 0;
  if (n >= 80) return '#4ade80';
  if (n >= 60) return '#a78bfa';
  if (n >= 40) return '#fbbf24';
  return '#f87171';
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.setAttribute('role', 'menu');
  nav.setAttribute('aria-label', t('메인 네비게이션'));
  nav.innerHTML = '';
  GROUPS.forEach(g => {
    const items = NAV.filter(n => n.group === g.id);
    if (!items.length) return;
    const label = document.createElement('div');
    label.className = 'group-label text-[10px] uppercase tracking-widest text-[var(--text-dim)] px-3 mt-3 mb-1';
    label.setAttribute('role', 'presentation');
    label.textContent = g.label;
    nav.appendChild(label);
    items.forEach(n => {
      const el = document.createElement('div');
      el.className = 'nav-item' + (state.view === n.id ? ' active' : '');
      el.setAttribute('role', 'menuitem');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', n.label + (n.desc ? ' — ' + n.desc : ''));
      el.title = n.label + (n.desc ? ' — ' + n.desc : '');
      const descHtml = n.desc ? `<div class="nav-desc text-[10px] text-[var(--text-dim)] mt-0.5 leading-tight">${escapeHtml(t(n.desc))}</div>` : '';
      el.innerHTML = `
        <span class="w-5 text-center self-start mt-0.5 flex-shrink-0">${n.icon}</span>
        <div class="nav-label flex-1 min-w-0">
          <div>${n.label}</div>
          ${descHtml}
        </div>`;
      el.onclick = () => {
        go(n.id);
        if (window.matchMedia('(max-width: 900px)').matches) {
          document.getElementById('sidebar').classList.remove('open');
          document.body.classList.remove('sidebar-open');
          _syncNavToggleVisibility();
        }
      };
      el.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); } };
      nav.appendChild(el);
    });
  });
  _translateDOM(nav);
}

// 모바일 오버레이 클릭 → 사이드바 닫기
document.addEventListener('click', (e) => {
  if (!window.matchMedia('(max-width: 900px)').matches) return;
  const sb = document.getElementById('sidebar');
  if (!sb || !sb.classList.contains('open')) return;
  // 클릭이 사이드바 내부가 아니고 토글 버튼도 아니면 닫기

  sb.classList.remove('open');
  document.body.classList.remove('sidebar-open');
});
function go(id) {
  if (state.view === 'rtk' && id !== 'rtk' && typeof _rtkStopPolling === 'function') _rtkStopPolling();
  state.view = id;
  location.hash = '#/' + id;

}
window.addEventListener('hashchange', () => {
  const h = location.hash.replace(/^#\//, '') || 'overview';
  if (h !== state.view) {
    if (state.view === 'rtk' && h !== 'rtk' && typeof _rtkStopPolling === 'function') _rtkStopPolling();

const VIEWS = {};
const AFTER = {};

let __renderLock = false;
let __renderQueued = false;
async function renderView() {
  // 동시 렌더 방지 — 이전 렌더 완료 전 호출 시 큐잉
  if (__renderLock) { __renderQueued = true; return; }
  __renderLock = true;
  __renderQueued = false;
  const v = document.getElementById('view');
  v.innerHTML = `<div class="tab-enter"><div class="shimmer h-32 mb-4"></div><div class="shimmer h-64"></div></div>`;
  try {
    const fn = VIEWS[state.view] || VIEWS.overview;
    const html = await fn();
    v.innerHTML = `<div class="tab-enter">${html}</div>`;
    const after = AFTER[state.view];
    if (after) await after();
    // 인터랙티브 효과
    _animateCounters(v);
    _animateCards(v);
    _translateDOM(v);
  } catch (e) {
    console.error(e);
    v.innerHTML = `<div class="card p-8 empty">${t('뷰 렌더 실패:')} ${escapeHtml(e.message)}</div>`;
  } finally {
    __renderLock = false;
    // 큐에 쌓인 렌더 요청 처리
    if (__renderQueued) { __renderQueued = false; renderView(); }
  }
}

// 숫자 카운트업 애니메이션 — data-count 속성이 있는 요소 자동 적용
function _animateCounters(root) {
  root.querySelectorAll('[data-count]').forEach((el, i) => {
    const target = parseInt(el.dataset.count, 10);
    if (isNaN(target)) return;
    el.classList.add('count-up');
    el.style.animationDelay = (i * 80) + 'ms';
    const duration = 600;
    const start = performance.now();
    const step = (now) => {
      const p = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
      el.textContent = Math.round(target * ease);
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });
}

// 카드 스태거 입장 애니메이션
function _animateCards(root) {
  root.querySelectorAll('.card').forEach((el, i) => {
    if (i > 10) return; // 성능: 처음 10개만 애니메이션
    el.classList.add('card-animate');
    el.style.animationDelay = (i * 40) + 'ms';
  });
  // 프로그레스 바 + 스코어 링 애니메이션
  setTimeout(() => {
    root.querySelectorAll('[data-bar]').forEach(el => {
      el.style.width = el.dataset.bar + '%';
    });
    root.querySelectorAll('[data-ring]').forEach(el => {
      const target = parseInt(el.dataset.ring, 10);
      el.style.transition = '--p 1s cubic-bezier(0.16,1,0.3,1)';
      el.style.setProperty('--p', target);
    });
  }, 100);
}

// 창 관리자
const _winMgr = { zIndex: 1000, openIds: new Set() };
function openFeatureWindow(feat) {
  const winId = 'feat-win-' + feat.id;
  // 이미 열려 있으면 foreground 로
  const existing = document.getElementById(winId);
  if (existing) {
    existing.style.zIndex = ++_winMgr.zIndex;

    return;
  }
  const w = document.createElement('div');
  w.id = winId;
  w.className = 'feat-win';
  w.style.zIndex = ++_winMgr.zIndex;
  // 초기 위치: 화면 중앙에서 오프셋 (여러 창 띄우면 살짝 계단식)
  const offset = _winMgr.openIds.size * 30;
  w.style.left = (80 + offset) + 'px';
  w.style.top = (60 + offset) + 'px';
  w.innerHTML = `
    <div class="feat-win-title" data-winid="${winId}">
      <div class="feat-win-lights">
        <button class="feat-light feat-light-close" title="닫기" onclick="closeFeatureWindow('${winId}')"></button>
        <button class="feat-light feat-light-min" title="내리기" onclick="minimizeFeatureWindow('${winId}')"></button>
        <button class="feat-light feat-light-max" title="펼치기" onclick="maximizeFeatureWindow('${winId}')"></button>
      </div>
      <div class="feat-win-title-text">${feat.icon||'✨'} ${escapeHtml(feat.label)}</div>
    </div>
    <div class="feat-win-body">
      <div class="mb-3">
        <div class="text-[10px] uppercase tracking-widest text-[var(--text-dim)] mb-1">${feat.released?'출시일 '+escapeHtml(feat.released):''} ${feat.isDynamic?'· 🤖 AI 발견':''}</div>
        <div class="text-sm">${escapeHtml(feat.summary||'')}</div>
      </div>
      <div class="flex gap-2 mb-4 flex-wrap">
        ${feat.launchUrl ? `<a class="btn-primary btn text-xs" href="${escapeHtml(feat.launchUrl)}" target="_blank" rel="noopener">🚀 사용하기</a>` : ''}
        ${feat.docUrl ? `<a class="btn text-xs" href="${escapeHtml(feat.docUrl)}" target="_blank" rel="noopener">📖 공식 문서 ↗</a>` : ''}
      </div>
      ${feat.id === 'design' ? '<div id="feat-win-design-extras" class="mt-3 pt-3 border-t border-[var(--border)]"><div class="text-xs text-[var(--text-mute)]">로딩 중…</div></div>' : ''}
      ${feat.isDynamic ? '<div class="card p-3 text-[10px] mt-3" style="background:rgba(167,139,250,0.08);">🤖 AI 가 자동 발견한 항목 — 공식 문서 링크로 확인 권장</div>' : ''}
      <details class="mt-3 text-[10px]">
        <summary class="cursor-pointer text-[var(--text-dim)]">📋 원본 JSON</summary>
        <pre class="mono whitespace-pre-wrap bg-[var(--code-bg)] p-2 rounded mt-2">${escapeHtml(JSON.stringify(feat, null, 2))}</pre>
      </details>
    </div>
  `;
  document.body.appendChild(w);
  _winMgr.openIds.add(winId);
  // 콘텐츠 크기에 맞춰 자동 조정 (DOM 붙인 뒤 한 프레임 후)
  requestAnimationFrame(() => _autoSizeWindow(w));
  // 제목바로 드래그
  _makeDraggable(w);
  // 포커스 — 클릭 시 z-index 상승
  w.addEventListener('mousedown', () => { w.style.zIndex = ++_winMgr.zIndex; });

  // Design 창은 로컬 export 목록 추가 로드
  if (feat.id === 'design') {
    api('/api/design/exports').then(r => {
      const slot = document.getElementById('feat-win-design-extras');
      if (!slot) return;
      const files = r.files || [];

        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)] mb-2">📁 로컬 export (${files.length})</div>

          <div class="flex justify-between py-1 text-xs">
            <span class="truncate">${escapeHtml(f.name)}</span>

}

function closeFeatureWindow(winId) {
  const w = document.getElementById(winId); if (!w) return;
  w.remove(); _winMgr.openIds.delete(winId);
}
function minimizeFeatureWindow(winId) {
  const w = document.getElementById(winId); if (!w) return;
  w.classList.toggle('feat-win-minimized');
}
function maximizeFeatureWindow(winId) {
  const w = document.getElementById(winId); if (!w) return;
  w.classList.toggle('feat-win-maxed');
  if (w.classList.contains('feat-win-maxed')) {
    w.dataset.prevLeft = w.style.left; w.dataset.prevTop = w.style.top;
    w.dataset.prevW = w.style.width; w.dataset.prevH = w.style.height;
    w.style.left = '24px'; w.style.top = '24px';
    w.style.width = 'calc(100vw - 48px)'; w.style.height = 'calc(100vh - 48px)';
  } else {
    w.style.left = w.dataset.prevLeft || '80px';
    w.style.top = w.dataset.prevTop || '60px';
    w.style.width = w.dataset.prevW || '';
    w.style.height = w.dataset.prevH || '';
  }
}
function _autoSizeWindow(w) {
  const isMobile = window.matchMedia('(max-width: 900px)').matches;
  if (isMobile) {
    // 모바일: CSS 가 이미 100vw 로 덮어쓰므로 높이만 설정
    w.style.height = 'calc(100vh - 16px)';
    return;
  }
  const body = w.querySelector('.feat-win-body');
  const title = w.querySelector('.feat-win-title');
  if (!body || !title) return;
  const titleH = title.offsetHeight;
  const contentH = body.scrollHeight;
  const desired = titleH + contentH + 8;
  const maxH = window.innerHeight - 80;
  const minH = 180;
  const finalH = Math.max(minH, Math.min(maxH, desired));
  w.style.height = finalH + 'px';
  const rect = w.getBoundingClientRect();
  if (rect.bottom > window.innerHeight - 20) {
    w.style.top = Math.max(20, window.innerHeight - finalH - 20) + 'px';
  }
  if (rect.right > window.innerWidth - 20) {
    w.style.left = Math.max(20, window.innerWidth - rect.width - 20) + 'px';
  }
}

function _makeDraggable(w) {
  const title = w.querySelector('.feat-win-title');
  if (!title) return;
  let startX, startY, origLeft, origTop, dragging = false;
  title.addEventListener('mousedown', e => {
    // 트래픽라이트 클릭은 드래그 시작 X
    if (e.target.classList.contains('feat-light')) return;
    if (w.classList.contains('feat-win-maxed')) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    origLeft = parseInt(w.style.left) || 0;
    origTop = parseInt(w.style.top) || 0;
    w.style.zIndex = ++_winMgr.zIndex;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    w.style.left = (origLeft + (e.clientX - startX)) + 'px';
    w.style.top = Math.max(0, origTop + (e.clientY - startY)) + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

function _copyToClipboard(btn, text) {
  try {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.innerHTML;
      btn.innerHTML = '✓ ' + t('복사됨');
      setTimeout(() => { btn.innerHTML = orig; }, 1400);
      toast(t('클립보드에 복사됨'), 'ok');
    });
  } catch (e) {
    toast(t('복사 실패'), 'err');
  }
}

let __wfProviders = null; // {providers:[{id,name,icon,type,available,models:[]}]}
async function _wfLoadProviders() {
  if (__wfProviders) return __wfProviders;
  try { __wfProviders = await cachedApi('/api/ai-providers/list'); } catch(e) { __wfProviders = {providers:[]}; }
  return __wfProviders;
}
function _wfAssigneeOptions(selectedValue) {
  const p = __wfProviders || {providers:[]};
  const groups = {};
  for (const prov of p.providers) {
    if (!prov.available || !prov.models?.length) continue;
    const gLabel = prov.icon + ' ' + prov.name;
    groups[gLabel] = (groups[gLabel]||[]);
    for (const m of prov.models) {
      const val = prov.id === 'claude-cli'
        ? (m.id.replace('claude-','').replace('-4-7','4.7').replace('-4-6','4.6').replace('-4-5','4.5').replace('opus','opus-').replace('sonnet','sonnet-').replace('haiku','haiku-').replace('--','-'))
        : (prov.id.replace('-cli','').replace('-api','') + ':' + m.id);
      // Claude CLI alias 정리
      const displayVal = prov.id === 'claude-cli' ? m.id : val;
      groups[gLabel].push({ value: val, label: m.label || m.id, note: m.note || '' });
    }
  }
  // Claude 기본 3개는 항상 포함 (프로바이더 로드 전 fallback)
  if (!Object.keys(groups).length) {
    return ['opus-4.7','sonnet-4.6','haiku-4.5'].map(m =>
      `<option value="${m}" ${selectedValue===m?'selected':''}>${m}</option>`
    ).join('');
  }
  let html = '';
  const isCustom = selectedValue && !Object.values(groups).flat().some(o => o.value === selectedValue);
  for (const [gLabel, opts] of Object.entries(groups)) {
    html += `<optgroup label="${escapeHtml(gLabel)}">`;
    for (const o of opts) {
      const sel = o.value === selectedValue ? 'selected' : '';
      html += `<option value="${escapeHtml(o.value)}" ${sel}>${escapeHtml(o.label)}${o.note?' — '+escapeHtml(t(o.note)):''}</option>`;
    }
    html += '</optgroup>';
  }
  // 자유 입력값이 목록에 없으면 표시 유지
  if (isCustom && selectedValue) {
    html += `<option value="${escapeHtml(selectedValue)}" selected>${escapeHtml(selectedValue)} (custom)</option>`;
  }
  html += `<optgroup label="⌨️ 직접 입력"><option value="__custom__">직접 입력...</option></optgroup>`;
  return html;
}

AFTER.workflows = async () => {
  _wfRenderList();
  _wfApplyInspectorState();
  // 워크플로우 통계 로드
  _wfLoadStats();
  // 검색 바인딩
  const se = document.getElementById('wfSearch');
  if (se) se.oninput = (e) => { __wf.search = e.target.value.toLowerCase(); _wfRenderList(); };
  // 캔버스 이벤트 바인딩
  _wfBindCanvas();
  // current 자동 선택
  if (!__wf.current && __wf.workflows.length) {
    await _wfOpen(__wf.workflows[0].id);
  } else if (__wf.current) {
    _wfRenderCanvas();
    _wfRenderInspector();
    _wfUpdateToolbar();
  }
};

function _wfRenderList() {
  const host = document.getElementById('wfListItems');
  if (!host) return;
  const q = (__wf.search || '').trim();
  const list = __wf.workflows.filter(w => !q || (w.name||'').toLowerCase().includes(q));
  if (!list.length) {
    host.innerHTML = `<div class="text-[11px] text-[var(--text-dim)] text-center py-4">${t('워크플로우 없음')}</div>`;
    return;
  }
  host.innerHTML = list.map(w => `
    <div class="wf-list-item ${__wf.current && __wf.current.id === w.id ? 'active' : ''}" onclick="_wfOpen('${w.id}')">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0 flex-1">
          <div class="text-sm font-medium truncate">${escapeHtml(w.name || 'Untitled')}</div>
          <div class="text-[10px] text-[var(--text-dim)] mt-0.5">
            ${w.nodeCount} ${t('노드')} · ${w.edgeCount} ${t('연결')} · ${fmtRel(w.updatedAt)}
          </div>
        </div>
        <button class="text-[var(--text-dim)] hover:text-[var(--cyan)] text-sm" onclick="event.stopPropagation();_wfClone('${w.id}')" title="${t('복제')}">📋</button>
        <button class="text-[var(--text-dim)] hover:text-red-400 text-sm" onclick="event.stopPropagation();_wfDelete('${w.id}')" title="${t('삭제')}">🗑️</button>
      </div>
    </div>
  `).join('');
}

async function _wfCreateNew() {
  const name = await promptModal({
    title: t('새 워크플로우'),
    message: t('이름을 입력하세요'),
    placeholder: t('예: README 작성 파이프라인'),
    defaultValue: 'New workflow',
    confirmLabel: t('생성'),
  });
  if (!name || !name.trim()) return;
  const body = {
    name,
    nodes: [{ id: 'n-start', type: 'start', x: 80, y: 160, title: t('시작') }],
    edges: [],
  };
  const r = await api('/api/workflows/save', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  toast(t('생성됨'), 'ok');
  // 목록 새로 불러오고 새 항목 선택
  const list = await api('/api/workflows/list');
  __wf.workflows = list.workflows || [];
  await _wfOpen(r.id);
  _wfRenderList();
}

async function _wfDelete(wfId) {
  const ok = await confirmModal({
    title: t('삭제 확인'),
    message: t('이 워크플로우를 삭제할까요?'),
    confirmLabel: t('삭제'),
    danger: true,
  });
  if (!ok) return;
  const r = await api('/api/workflows/delete', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: wfId }),
  });
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  toast(t('삭제됨'), 'ok');
  if (__wf.current && __wf.current.id === wfId) {
    __wf.current = null; __wf.selectedNodeId = null;
  }
  const list = await api('/api/workflows/list');
  __wf.workflows = list.workflows || [];
  _wfRenderList();
  _wfRenderCanvas();
  _wfRenderInspector();
  _wfUpdateToolbar();
}

async function _wfClone(wfId) {
  const r = await api('/api/workflows/clone', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: wfId }),
  });
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  toast(t('복제됨'), 'ok');
  const list = await api('/api/workflows/list');
  __wf.workflows = list.workflows || [];
  _wfRenderList();
  if (r.id) await _wfOpen(r.id);
}

async function _wfOpen(wfId) {
  const r = await api('/api/workflows/' + wfId);
  if (!r.ok) { toast(errMsg(r), 'err'); return; }
  __wf.current = { id: wfId, ...r.workflow };
  __wf.selectedNodeId = null;
  __wf.selectedEdgeId = null;
  __wf.dirty = false;
  _wfRenderList();
  _wfRenderCanvas();
  _wfRenderInspector();
  _wfUpdateToolbar();
  // 저장된 viewport 가 기본값이면 자동으로 노드들이 화면에 들어오게 맞춤
  const v = __wf.current.viewport || { panX:0, panY:0, zoom:1 };
  const isDefault = (Math.abs(v.panX) < 1 && Math.abs(v.panY) < 1 && Math.abs((v.zoom||1) - 1) < 0.01);
  if (isDefault && (__wf.current.nodes || []).length) {
    // host DOM 이 아직 레이아웃 확정 전일 수 있으므로 next frame 에 호출
    requestAnimationFrame(() => _wfFitView());
  }
}

function _wfRepeatSet(field, value) {
  if (!__wf.current) return;
  __wf.current.repeat = __wf.current.repeat || {};
  __wf.current.repeat[field] = value;
  __wf.dirty = true;
  _wfUpdateToolbar();
  // 체크박스 토글 시 하위 필드가 바뀌므로 인스펙터 부분만 재렌더
  if (field === 'enabled' || field === 'scheduleEnabled') _wfRenderInspector();
}

async function _wfSaveCronSchedule() {
  if (!__wf.current) return;
  const sched = __wf.current.schedule || { enabled: false, cron: '' };
  try {
    await api('/api/workflows/schedule/set', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: __wf.current.id, schedule: { enabled: sched.enabled, cron: sched.cron } })
    });
    toast(t('스케줄이 저장되었습니다'), 'ok');
  } catch (e) {
    toast(t('스케줄 저장 실패') + ': ' + (e.message || e), 'err');
  }
}

function _wfToggleInspector() {
  const el = document.getElementById('wfInspector');
  if (!el) return;
  const collapsed = el.classList.toggle('wf-collapsed');
  try { localStorage.setItem('wfInspectorCollapsed', collapsed ? '1' : '0'); } catch (e) {}
  // 토글 버튼 라벨 업데이트
  const tog = document.getElementById('wfInspectorToggle');
  if (tog) tog.innerHTML = collapsed ? `📋 ${t('메타')}` : `📋 ${t('메타')}`;
}

function _wfApplyInspectorState() {
  const el = document.getElementById('wfInspector');
  if (!el) return;
  let collapsed = false;
  try { collapsed = localStorage.getItem('wfInspectorCollapsed') === '1'; } catch (e) {}
  el.classList.toggle('wf-collapsed', collapsed);
}

function _wfUpdateToolbar() {
  const nameEl = document.getElementById('wfCurName');
  const dirtyEl = document.getElementById('wfDirty');
  if (!nameEl || !dirtyEl) return;
  if (!__wf.current) {
    nameEl.textContent = t('워크플로우를 선택하거나 생성하세요');
    dirtyEl.innerHTML = '';
    return;
  }
  nameEl.textContent = __wf.current.name || 'Untitled';
  dirtyEl.innerHTML = __wf.dirty
    ? `<span class="wf-dirty-dot"></span>${t('변경사항 있음')}`
    : `<span class="wf-ok-dot"></span>${t('저장됨')}`;

function _wfRenderCanvas() {
  const nodesG = document.getElementById('wfNodes');
  const edgesG = document.getElementById('wfEdges');
  const vp = document.getElementById('wfViewport');
  if (!nodesG || !edgesG || !vp) return;
  if (!__wf.current) {
    nodesG.innerHTML = ''; edgesG.innerHTML = ''; _wfRenderMinimap(); return;
  }
  const view = __wf.current.viewport || { panX: 0, panY: 0, zoom: 1 };
  vp.setAttribute('transform', `translate(${view.panX},${view.panY}) scale(${view.zoom||1})`);
  // 노드
  nodesG.innerHTML = (__wf.current.nodes || []).map(n => _wfRenderNode(n)).join('');
  // 엣지
  edgesG.innerHTML = (__wf.current.edges || []).map(e => _wfRenderEdge(e)).join('');
  // 노드 검색 필터 반영 (검색어 있을 때만)
  if (__wfNodeSearchQuery) _wfApplyNodeSearchHighlight();
  // 미니맵 업데이트 (debounce — 연속 렌더 시 마지막만)
  if (_wfMinimapTimer) cancelAnimationFrame(_wfMinimapTimer);
  _wfMinimapTimer = requestAnimationFrame(() => { _wfMinimapTimer = null; _wfRenderMinimap(); });
}
let _wfMinimapTimer = null;

let __wfNodeSearchQuery = '';
function _wfNodeSearchFilter(q) {
  __wfNodeSearchQuery = (q || '').trim().toLowerCase();
  _wfApplyNodeSearchHighlight();
}
function _wfApplyNodeSearchHighlight() {
  const q = __wfNodeSearchQuery;
  document.querySelectorAll('#wfNodes .wf-node').forEach(el => {
    if (!q) {
      el.style.opacity = ''; el.querySelector('.wf-node-body').style.strokeDasharray = '';
      return;
    }
    const nid = el.getAttribute('data-node');
    const ntype = el.getAttribute('data-type');
    const n = (__wf.current && __wf.current.nodes || []).find(x => x.id === nid);
    const title = (n && n.title || '').toLowerCase();
    const typeMeta = WF_TYPE_MAP[ntype];
    const label = typeMeta ? typeMeta.label.toLowerCase() : '';
    const matched = title.includes(q) || ntype.includes(q) || label.includes(q);
    el.style.opacity = matched ? '1' : '0.2';
    const body = el.querySelector('.wf-node-body');
    if (body) body.style.strokeDasharray = matched ? '6 3' : '';
  });
}
