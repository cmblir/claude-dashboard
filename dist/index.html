// Terminal 설치/훅 완료를 polling 으로 감지해 자동 renderView (v2.24.1)
let _rtkPollTimer = null;

function _rtkStopPolling() {
  if (_rtkPollTimer) { clearInterval(_rtkPollTimer); _rtkPollTimer = null; }
}

function _rtkStartPolling(mode) {
  _rtkStopPolling();
  const started = Date.now();
  const timeout = mode === 'hook' ? 120000 : 300000;   // 훅 2분, 설치 5분
  const interval = mode === 'hook' ? 1500 : 2500;
  toast(
    mode === 'hook'
      ? t('rtk_polling_hook', '훅 활성화 감지 중 — 완료되면 자동 새로고침')
      : t('rtk_polling_install', '설치 완료 감지 중 — 완료되면 자동 새로고침'),
    'info',
  );
  _rtkPollTimer = setInterval(async () => {
    if (Date.now() - started > timeout) {
      _rtkStopPolling();
      toast(t('rtk_polling_timeout', '감지 시간 초과 — 직접 새로고침해 주세요'), 'warn');
      return;
    }
    try {
      const r = await api('/api/rtk/status');
      const hit = mode === 'hook' ? !!r.hookInstalled : !!r.installed;
      if (hit) {
        _rtkStopPolling();
        toast(
          mode === 'hook'
            ? t('rtk_detected_hook', '훅 활성 감지 — 탭 새로고침')
            : t('rtk_detected_install', 'rtk 설치 감지 — 탭 새로고침'),
          'ok',
        );
        if (state.view === 'rtk') renderView();
      }
    } catch {}
  }, interval);
}

async function _rtkInstall(method) {
  const ok = await confirmModal(t('rtk_install_confirm', `Terminal 창을 열고 ${method} 로 설치합니다. 계속할까요?`));
  if (!ok) return;
  try {
    const r = await api('/api/rtk/install', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ method }),
    });
    if (!r.ok) { toast(errMsg(r), 'err'); return; }
    if (r.already) { toast(t('이미 설치됨'), 'info'); return; }
    toast(t('rtk_install_launched', 'Terminal 창이 열렸습니다 — 설치 완료 후 이 탭을 새로고침하세요'), 'ok');
    _rtkStartPolling('install');
  } catch (e) { toast(String(e), 'err'); }
}

async function _wfNotifyTest(target) {
  if (!__wf.current) return;
  const nf = __wf.current.notify || {};
  const url = (target === 'slack' ? nf.slack : nf.discord) || '';
  if (!url.trim()) { toast(t('notify_url_empty', 'URL 을 먼저 입력하세요'), 'err'); return; }
  try {
    const r = await api('/api/notify/test', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target, url }),

function _costsSetBucket(mode) {
  state.data._costsBucket = mode;
  renderView();
}

function _costsBucket(days, mode) {
  // days: [{day:'YYYY-MM-DD', count, usd, sources:{...}}]
  if (mode === 'day' || !mode) return days;
  const buckets = new Map();
  for (const d of days) {
    let key;
    if (mode === 'month') {
      key = d.day.slice(0, 7);  // YYYY-MM
    } else {
      // week: ISO week key (Monday-start)
      const dt = new Date(d.day + 'T00:00:00Z');
      const tmp = new Date(Date.UTC(dt.getUTCFullYear(), dt.getUTCMonth(), dt.getUTCDate()));
      const dayNum = (tmp.getUTCDay() + 6) % 7;  // Mon=0
      tmp.setUTCDate(tmp.getUTCDate() - dayNum + 3);
      const jan4 = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 4));
      const week = 1 + Math.round(((tmp - jan4) / 86400000 - 3 + ((jan4.getUTCDay() + 6) % 7)) / 7);
      key = `${tmp.getUTCFullYear()}-W${String(week).padStart(2, '0')}`;
    }
    let b = buckets.get(key);
    if (!b) { b = { day: key, count: 0, usd: 0, sources: {} }; buckets.set(key, b); }
    b.count += d.count || 0;
    b.usd = +(b.usd + (d.usd || 0)).toFixed(6);
    for (const [src, usd] of Object.entries(d.sources || {})) {
      b.sources[src] = +(((b.sources[src] || 0) + usd)).toFixed(6);
    }
  }
  return [...buckets.values()].sort((a, b) => a.day.localeCompare(b.day));
}

VIEWS.tasks = async () => {
  const d = await api('/api/tasks/list');
  const sess = d.sessions || [];
  // 수동 세션을 항상 최상단에 노출
  const manual = sess.find(s => s.id === 'dashboard-manual');
  const others = sess.filter(s => s.id !== 'dashboard-manual');
  const ordered = [manual || { id: 'dashboard-manual', taskCount: 0, completed: 0, inProgress: 0, tasks: [] }, ...others];

  const renderTaskRow = (sid, t) => {
    const iconMap = { completed:'✅', in_progress:'🔄', pending:'⏳' };
    const col = { completed:'#4ade80', in_progress:'#fbbf24', pending:'#9aa0aa' }[t.status] || '#9aa0aa';
    const canEdit = sid === 'dashboard-manual';
    return `
      <div class="group flex items-start gap-2 py-1 px-2 rounded hover:bg-white/5">
        ${canEdit
          ? `<button class="p-0 bg-transparent border-0 cursor-pointer text-lg" title="상태 토글" onclick='toggleTaskStatus(${JSON.stringify(sid)}, ${JSON.stringify(t)})'>${iconMap[t.status]||'•'}</button>`
          : `<span style="color:${col}">${iconMap[t.status]||'•'}</span>`}
        <div class="flex-1 min-w-0">
          <div class="text-sm ${t.status==='completed'?'line-through text-[var(--text-dim)]':''}">${escapeHtml(t.subject)}</div>
          ${t.description ? `<div class="text-[10px] text-[var(--text-mute)] line-clamp-2">${escapeHtml(t.description)}</div>` : ''}
        </div>
        ${canEdit ? `
          <div class="flex gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100">
            <button class="btn text-[10px]" onclick='openTaskEditor(${JSON.stringify(sid)}, ${JSON.stringify(t)})'>수정</button>
            <button class="btn text-[10px]" style="color:#fca5a5" onclick='deleteTask(${JSON.stringify(sid)}, ${JSON.stringify(t.id)})'>삭제</button>
          </div>` : ''}
      </div>`;
  };

  return `
    ${viewHeader('태스크 / TODO', '세션별 TaskCreate 저장소. 수동 태스크는 dashboard-manual 세션에 누적.', 'tasks')}
    <div class="mb-4 card p-4" style="background: linear-gradient(135deg, rgba(217,119,87,0.06), transparent);">
      <div class="flex items-center justify-between gap-2 flex-wrap">
        <div>
          <div class="font-semibold text-sm">＋ 수동 TODO 추가</div>
          <div class="text-xs text-[var(--text-mute)]">대시보드에서 직접 만든 태스크는 ~/.claude/tasks/dashboard-manual/ 로 저장</div>
        </div>
        <button class="btn-primary btn" onclick="openTaskEditor('dashboard-manual', null)">＋ 새 TODO</button>
      </div>
    </div>
    ${ordered.map(s => {
      const pct = s.taskCount ? Math.round((s.completed / s.taskCount) * 100) : 0;
      const isManual = s.id === 'dashboard-manual';
      return `
      <div class="card p-4 mb-3" ${isManual?'style="border-color: rgba(217,119,87,0.35);"':''}>
        <div class="flex items-center justify-between mb-3">
          <div>
            <div class="font-semibold text-sm mono">${isManual ? '<span class="chip chip-accent">수동</span> dashboard-manual' : escapeHtml(s.id.slice(0,8))+'…'}</div>
            ${s.updatedAt ? `<div class="text-[11px] text-[var(--text-mute)]">${fmtRel(s.updatedAt)}</div>` : ''}
          </div>
          <div class="text-right">
            <div class="text-xs"><b>${s.completed}</b> / ${s.taskCount} 완료 · ${s.inProgress} 진행</div>
            <div class="h-1.5 w-[160px] rounded-full bg-white/5 overflow-hidden mt-1"><div style="width:${pct}%; height:100%; background:var(--grad);"></div></div>
          </div>
        </div>
        ${s.tasks.length ? `<div class="space-y-1">${s.tasks.map(t => renderTaskRow(s.id, t)).join('')}</div>` : '<div class="empty text-xs">비어있음</div>'}
      </div>`;
    }).join('')}
  `;

function openTaskEditor(sessionId, existing) {
  const e = existing || { id: '', subject: '', description: '', status: 'pending', activeForm: '' };
  const isEdit = !!existing;
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <h2 class="font-semibold">${isEdit ? 'TODO 수정' : '새 TODO 추가'}</h2>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div class="p-5 space-y-3">
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">제목 (subject)</div>
        <input id="tkSubject" class="input" value="${escapeHtml(e.subject)}" placeholder="예: 프로젝트 README 작성" />
      </div>
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">설명 (optional)</div>
        <textarea id="tkDesc" class="input" style="min-height:100px;">${escapeHtml(e.description)}</textarea>
      </div>
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">진행 중 표시문 (activeForm)</div>
        <input id="tkAF" class="input" value="${escapeHtml(e.activeForm||'')}" placeholder="예: README 작성 중" />
      </div>
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">상태</div>
        <select id="tkStatus" class="input">
          <option value="pending" ${e.status==='pending'?'selected':''}>⏳ 대기</option>
          <option value="in_progress" ${e.status==='in_progress'?'selected':''}>🔄 진행 중</option>
          <option value="completed" ${e.status==='completed'?'selected':''}>✅ 완료</option>
        </select>
      </div>
    </div>
    <div class="p-4 border-t border-[var(--border)] flex justify-end gap-2">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn-primary btn" id="tkSaveBtn">저장</button>
    </div>
  `);
  document.getElementById('tkSaveBtn').onclick = async () => {
    const payload = {
      sessionId,
      id: e.id || undefined,
      subject: document.getElementById('tkSubject').value.trim(),
      description: document.getElementById('tkDesc').value,
      activeForm: document.getElementById('tkAF').value,
      status: document.getElementById('tkStatus').value,
    };
    if (!payload.subject) { toast('제목을 입력하세요', 'warn'); return; }
    const r = await api('/api/tasks/save', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    if (r.ok) { toast('저장됨', 'ok'); closeModal(); renderView(); }
    else toast(errMsg(r), 'err');
  };
}

async function toggleTaskStatus(sessionId, t) {
  const next = { pending:'in_progress', in_progress:'completed', completed:'pending' }[t.status] || 'pending';
  const r = await api('/api/tasks/save', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sessionId, id: t.id, subject: t.subject, description: t.description, activeForm: t.activeForm, status: next }),
  });
  if (r.ok) renderView();
  else toast(errMsg(r), 'err');
}

async function deleteTask(sessionId, id) {
  if (!await confirmModal({ title: t('TODO 삭제'), message: t('TODO 를 삭제할까요?'), confirmLabel: t('삭제'), danger: true })) return;
  const r = await api('/api/tasks/delete', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sessionId, id }),
  });
  if (r.ok) { toast('삭제됨', 'ok'); renderView(); }
  else toast(errMsg(r), 'err');
}

function showModal(html, opts) {
  const root = document.getElementById('modal-root');
  const wide = opts && opts.wide ? ' modal-wide' : '';
  const narrow = opts && opts.narrow ? ' modal-narrow' : '';
  root.innerHTML = `<div class="modal-backdrop" onclick="if(event.target===this)closeModal()"><div class="modal${wide}${narrow}" role="dialog" aria-modal="true">${html}</div></div>`;
  _translateDOM(root);
  // 결과 모달이 떴으면 (loading 이 아니면) 마스코트 점프 종료
  if (typeof _mascotLeaveModal === 'function' && !(opts && opts.keepMascot)) _mascotLeaveModal();

  _setupFocusTrap(root.querySelector('.modal'));

// 맥 스타일 커스텀 프롬프트 — 브라우저 기본 prompt() 대체
// resolve 값: 문자열(확인) 또는 null(취소/닫기)
function promptModal({ title, message, placeholder, defaultValue, confirmLabel, cancelLabel, multiline }) {
  return new Promise((resolve) => {
    const mid = 'pm-' + Math.random().toString(36).slice(2, 8);
    const inputTag = multiline
      ? `<textarea id="${mid}-input" class="input w-full" rows="4" placeholder="${escapeHtml(placeholder||'')}">${escapeHtml(defaultValue||'')}</textarea>`
      : `<input id="${mid}-input" class="input w-full" placeholder="${escapeHtml(placeholder||'')}" value="${escapeHtml(defaultValue||'')}">`;
    showModal(`
      <div class="p-5">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-base font-semibold">${escapeHtml(title || t('입력'))}</h3>
          <button class="btn text-xs" onclick="__pmResolve('${mid}', null)">✕</button>
        </div>
        ${message ? `<div class="text-sm text-[var(--text-mute)] mb-3">${escapeHtml(message)}</div>` : ''}
        ${inputTag}
        <div class="flex justify-end gap-2 mt-4">
          <button class="btn text-sm" onclick="__pmResolve('${mid}', null)">${escapeHtml(cancelLabel || t('취소'))}</button>
          <button class="btn-primary btn text-sm" onclick="__pmResolve('${mid}', 'ok')">${escapeHtml(confirmLabel || t('확인'))}</button>
        </div>
      </div>
    `, { keepMascot: true, narrow: true });
    window.__pmResolve = (id, kind) => {
      if (id !== mid) return;
      const el = document.getElementById(mid + '-input');
      const val = el ? el.value : null;
      closeModal();
      resolve(kind === 'ok' ? (val || '') : null);
    };
    // 자동 포커스 + Enter = 확인 (multiline 이 아닐 때만)
    setTimeout(() => {
      const el = document.getElementById(mid + '-input');
      if (!el) return;
      el.focus(); el.select && el.select();
      if (!multiline) {
        el.onkeydown = (e) => {
          if (e.key === 'Enter') { e.preventDefault(); window.__pmResolve(mid, 'ok'); }
          if (e.key === 'Escape') { e.preventDefault(); window.__pmResolve(mid, null); }
        };
      } else {
        el.onkeydown = (e) => {
          if (e.key === 'Escape') { e.preventDefault(); window.__pmResolve(mid, null); }
        };
      }
    }, 30);
  });
}

// 맥 스타일 커스텀 확인 — 브라우저 기본 confirm() 대체
// resolve 값: true(확인) 또는 false(취소)
function confirmModal({ title, message, confirmLabel, cancelLabel, danger }) {
  return new Promise((resolve) => {
    const mid = 'cm-' + Math.random().toString(36).slice(2, 8);
    const btnCls = danger ? 'btn text-sm' : 'btn-primary btn text-sm';
    const btnStyle = danger ? 'style="background:rgba(248,113,113,0.18);color:#fca5a5;border-color:rgba(248,113,113,0.4);"' : '';
    showModal(`
      <div class="p-5">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-base font-semibold">${escapeHtml(title || t('확인'))}</h3>
          <button class="btn text-xs" onclick="__cmResolve('${mid}', false)">✕</button>
        </div>
        <div class="text-sm text-[var(--text-mute)] mb-5">${escapeHtml(message || '')}</div>
        <div class="flex justify-end gap-2">
          <button class="btn text-sm" onclick="__cmResolve('${mid}', false)">${escapeHtml(cancelLabel || t('취소'))}</button>
          <button class="${btnCls}" ${btnStyle} onclick="__cmResolve('${mid}', true)">${escapeHtml(confirmLabel || t('확인'))}</button>
        </div>
      </div>
    `, { keepMascot: true, narrow: true });
    window.__cmResolve = (id, v) => {
      if (id !== mid) return;
      closeModal();
      resolve(!!v);
    };
    // Enter = 확인 / Esc = 취소
    setTimeout(() => {
      const root = document.getElementById('modal-root');
      if (!root) return;
      const handler = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); window.__cmResolve(mid, true); document.removeEventListener('keydown', handler); }
        else if (e.key === 'Escape') { e.preventDefault(); window.__cmResolve(mid, false); document.removeEventListener('keydown', handler); }
      };
      document.addEventListener('keydown', handler);
    }, 30);
  });
}

function _pollAuthStatus() {
  let attempts = 0;
  const poll = setInterval(async () => {
    attempts++;
    try {
      const s = await api('/api/auth/status');
      if (s.connected) {
        clearInterval(poll);
        toast(`🎉 ${s.displayName || s.email} 로그인 성공!`, 'ok');
        closeModal();
        await loadCliFoot();
        renderView();
      }
    } catch {}
    if (attempts >= 24) {
      clearInterval(poll);
      toast('시간 초과 — 페이지를 새로고침 해주세요.', 'warn');
    }
  }, 5000);
}

// ── 언어 (i18n) ──
// 런타임 로더: /api/locales/{lang}.json 을 fetch 하여 I18N[lang] 에 채움.
// 과거 인라인 I18N.en · zhMap 사전은 dist/locales/*.json 으로 분리됨.
const I18N = { ko: {} };

async function _loadLocale(lang) {
  if (!lang || lang === 'ko') return I18N.ko;
  if (I18N[lang] && Object.keys(I18N[lang]).length) return I18N[lang];
  try {
    const r = await fetch(`/api/locales/${encodeURIComponent(lang)}.json`, { cache: 'no-store' });
    if (!r.ok) {
      console.warn('[i18n] locale fetch failed', lang, r.status);
      I18N[lang] = {};
      return I18N[lang];
    }
    I18N[lang] = await r.json();
    return I18N[lang];
  } catch (e) {
    console.warn('[i18n] locale load error', lang, e);
    I18N[lang] = {};
    return I18N[lang];
  }
}


// ── DOM 자동 번역 엔진 ──
// renderView() 후 DOM 내 한국어 텍스트 노드를 사전 기반으로 교체
const _KO_RE = /[가-힣]/;
let _domTranslateCache = {};

// 정규식 특수문자 이스케이프
function _escReForI18n(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// 각 키에 대해 "한글 경계 인식 치환 패턴" 을 미리 만들어 둔다.
// 긴 키(5+)는 바로 includes + split 으로, 짧은 키(1-4)는 Hangul boundary 보호 regex 로.
function _buildKeyPatterns(keys) {
  return keys.map(k => {
    if (k.length >= 5) return { k, short: false };
    const pat = new RegExp(
      `(?<![\\uAC00-\\uD7A3])${_escReForI18n(k)}(?![\\uAC00-\\uD7A3])`,
      'g'
    );
    return { k, short: true, pat };
  });
}

function _translateDOM(root) {
  if (_curLang === 'ko') return;
  const dict = I18N[_curLang];
  if (!dict) return;
  if (!_domTranslateCache[_curLang]) {
    const keys = Object.keys(dict).filter(k => _KO_RE.test(k)).sort((a,b) => b.length - a.length);
    _domTranslateCache[_curLang] = { keys, patterns: _buildKeyPatterns(keys) };
  }
  const { keys, patterns } = _domTranslateCache[_curLang];

  const applyAll = (txt) => {
    for (const { k, short, pat } of patterns) {
      if (!txt.includes(k)) continue;
      if (short) {
        txt = txt.replace(pat, dict[k]);
      } else {
        txt = txt.split(k).join(dict[k]);
      }
    }
    return txt;
  };

  // ── 1단계: data-i18n 속성 직접 처리 (영문 키 + 한글 키 모두) ──
  root.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (key && dict[key]) {
      el.textContent = dict[key];
    }
  });
  root.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (key && dict[key]) {
      el.setAttribute('placeholder', dict[key]);
    }
  });

  // ── 2단계: 한글 텍스트 속성 치환 ──
  if (keys.length) {
    root.querySelectorAll('[placeholder],[title],[alt],[aria-label]').forEach(el => {
      ['placeholder','title','alt','aria-label'].forEach(attr => {
        const v = el.getAttribute(attr);
        if (v && _KO_RE.test(v)) {
          const nv = applyAll(v);
          if (nv !== v) el.setAttribute(attr, nv);
        }
      });
    });

    // ── 3단계: 텍스트 노드 수집 · 교체 ──
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
    let node;
    while (node = walker.nextNode()) {
      const t = node.textContent;
      if (!t || !_KO_RE.test(t) || !t.trim()) continue;
      const trimmed = t.trim();
      // 1) 전체 일치 우선
      if (dict[trimmed]) {
        node.textContent = t.replace(trimmed, dict[trimmed]);
        continue;
      }
      // 2) 패턴 순차 적용 (긴 키 우선 + 짧은 키는 Hangul boundary 보호)
      const next = applyAll(t);
      if (next !== t) node.textContent = next;
    }
  }
}
// t() 번역 함수 — Korean 원문 또는 구조화 키를 받는다.
//   1-arg: single Korean argument - ko 에서는 그대로, 다른 언어는 dict 조회
//   2-arg: structured key + fallback - ko/미번역 시 fallback 사용
// 구조화 키(영문만) 가 ko 모드에 오면 리터럴로 새는 것을 방지.
function t(key, fallback) {
  if (_curLang === 'ko') {
    // 한글 원문은 그대로, 구조화 키는 fallback > key 순
    if (_KO_RE && _KO_RE.test(key)) return key;
    return fallback != null ? fallback : key;
  }
  const dict = I18N[_curLang];
  if (dict && dict[key]) return dict[key];
  return fallback != null ? fallback : key;
}

(function _initLang() {

  if (_curLang !== 'ko' && typeof MutationObserver !== 'undefined') {
    let _i18nPending = new Set();
    let _i18nTimer = null;
    const _i18nFlush = () => {
      _i18nTimer = null;
      const nodes = Array.from(_i18nPending);
      _i18nPending.clear();
      for (const n of nodes) {
        if (n.isConnected) _translateDOM(n);
      }
    };
    // SVG 캔버스 + 코드 블록은 번역 불필요 — MutationObserver에서 제외
    const _i18nSkipTags = new Set(['SVG','svg','CODE','code','PRE','pre','SCRIPT','STYLE','CANVAS']);
    const _i18nSkipIds = new Set(['wfNodes','wfEdges','wfViewport','wfTutNodes','wfTutEdges','wfTutSvg','wfMinimap']);
    const mo = new MutationObserver(muts => {

          if (_i18nSkipTags.has(node.tagName)) continue;
          if (_i18nSkipIds.has(node.id)) continue;
          // SVG 내부 요소도 제외
          if (node.closest && node.closest('svg')) continue;
          _i18nPending.add(node);
        }
      }
      if (_i18nPending.size && !_i18nTimer) {
        _i18nTimer = requestAnimationFrame(_i18nFlush);

function _pollAuthAndReload() {
  let attempts = 0;
  const poll = setInterval(async () => {
    attempts++;
    try {
      const s = await api('/api/auth/status');
      if (s.connected) {
        clearInterval(poll);
        const msg = document.getElementById('gateMsg');
        if (msg) msg.innerHTML = '🎉 로그인 성공! 대시보드를 불러옵니다…';
        setTimeout(() => location.reload(), 600);
      }
    } catch {}
    if (attempts >= 36) { // 3분
      clearInterval(poll);
      const msg = document.getElementById('gateMsg');
      if (msg) msg.innerHTML = '⏰ 시간 초과 — 페이지를 새로고침 하세요.';
    }
  }, 5000);
}

let _mascotWanderTimer = null;
let _mascotBubbleTimer = null;
let _mascotOnChat = false; // 챗창 위에 있는 상태
let _mascotLastTouchTs = 0; // touch 이후 합성 mouse 이벤트 억제용
let _mascotChatBounceTimer = null;

function _initMascot() {
  const el = document.getElementById('claudeMascot');
  if (!el) return;
  let startX, startY, origL, origT;

  // 드래그 (mouse) — 터치 직후의 합성(synthetic) 마우스 이벤트는 무시
  el.addEventListener('mousedown', (e) => {
    if (_mascotOnModal) return;
    if (Date.now() - _mascotLastTouchTs < 500) return; // 합성 이벤트 억제
    e.preventDefault();
    _mascotDragging = true;
    _mascotDragMoved = false;
    _stopMascotWander();
    startX = e.clientX; startY = e.clientY;
    const r = el.getBoundingClientRect();
    origL = r.left; origT = r.top;
  });
  document.addEventListener('mousemove', (e) => {
    if (!_mascotDragging) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) _mascotDragMoved = true;
    const nx = origL + dx, ny = origT + dy;
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
    el.style.right = 'auto'; el.style.bottom = 'auto';
    if (dx < -2) el.classList.add('facing-left');
    else if (dx > 2) el.classList.remove('facing-left');
  });
  document.addEventListener('mouseup', () => {
    if (!_mascotDragging) return;
    _mascotDragging = false;
    if (!_mascotDragMoved) {
      toggleChat();
    } else {
      _startMascotWander();
    }
  });

  // 드래그 (touch) — passive:false 로 해서 스크롤/합성 이벤트 억제
  el.addEventListener('touchstart', (e) => {
    if (_mascotOnModal) return;
    _mascotLastTouchTs = Date.now();
    const t = e.touches[0];
    _mascotDragging = true; _mascotDragMoved = false;
    _stopMascotWander();
    startX = t.clientX; startY = t.clientY;
    const r = el.getBoundingClientRect();
    origL = r.left; origT = r.top;
    try { e.preventDefault(); } catch (_) {}
  }, { passive: false });
  document.addEventListener('touchmove', (e) => {
    if (!_mascotDragging) return;
    _mascotLastTouchTs = Date.now();
    const t = e.touches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) _mascotDragMoved = true;
    // 화면 경계 내로 클램프 — 모바일에서 화면 밖 이탈 방지
    const maxL = window.innerWidth - (el.offsetWidth || 70);
    const maxT = window.innerHeight - (el.offsetHeight || 63);
    el.style.left = Math.max(0, Math.min(origL + dx, maxL)) + 'px';
    el.style.top  = Math.max(0, Math.min(origT + dy, maxT)) + 'px';
    el.style.right = 'auto'; el.style.bottom = 'auto';
    if (dx < -2) el.classList.add('facing-left');
    else if (dx > 2) el.classList.remove('facing-left');
    try { e.preventDefault(); } catch (_) {}
  }, { passive: false });
  document.addEventListener('touchend', (e) => {
    if (!_mascotDragging) return;
    _mascotLastTouchTs = Date.now();
    _mascotDragging = false;
    if (!_mascotDragMoved) {
      toggleChat();
      // 합성 mouse 이벤트가 click/mousedown/mouseup 로 연달아 발행되어
      // toggleChat 이 재호출되는 것을 막는다.
      try { e.preventDefault(); } catch (_) {}
    } else {
      _startMascotWander();
    }
  }, { passive: false });
  // 안전장치: 마스코트 위에서 발생한 click 합성 이벤트도 차단
  el.addEventListener('click', (e) => {
    if (Date.now() - _mascotLastTouchTs < 500) {
      e.preventDefault(); e.stopPropagation();
    }
  });

  // 초기 위치 설정
  el.style.left = (window.innerWidth - 90) + 'px';
  el.style.top = (window.innerHeight - 100) + 'px';
  el.style.right = 'auto'; el.style.bottom = 'auto';

  _startMascotWander();
  _mascotBubbleTimer = setInterval(_showRandomBubble, 15000);
  setTimeout(_showRandomBubble, 2500);
}

// 화면 여기저기 자유 이동
function _startMascotWander() {
  _stopMascotWander();
  _mascotWanderTimer = setInterval(_mascotWanderStep, 6000 + Math.random() * 4000);
}
function _stopMascotWander() {
  if (_mascotWanderTimer) { clearInterval(_mascotWanderTimer); _mascotWanderTimer = null; }
}
function _mascotWanderStep() {
  if (_mascotDragging || _mascotOnChat) return;
  const el = document.getElementById('claudeMascot');
  if (!el || el.style.display === 'none') return;

  // 10% 확률로 멈추고 speaking 모드
  if (Math.random() < 0.10) {
    _mascotSetMode('speaking');
    // 3초 후 다시 jumping 으로
    setTimeout(() => _mascotSetMode('jumping'), 3000);
    return;
  }

  _mascotSetMode('jumping');
  const maxX = window.innerWidth - 80;
  const maxY = window.innerHeight - 80;
  const targetX = 60 + Math.random() * (maxX - 60);
  const targetY = 100 + Math.random() * (maxY - 100);
  const curR = el.getBoundingClientRect();

  // 방향 결정
  if (targetX < curR.left) el.classList.add('facing-left');
  else el.classList.remove('facing-left');

  el.style.transition = 'left 2.5s cubic-bezier(0.25,1,0.5,1), top 2.5s cubic-bezier(0.25,1,0.5,1)';
  el.style.left = targetX + 'px';
  el.style.top = targetY + 'px';
  el.style.right = 'auto'; el.style.bottom = 'auto';
  setTimeout(() => { el.style.transition = ''; }, 2600);
}

function _mascotSetMode(mode) {
  const jumping = document.getElementById('mascotJumping');
  const speaking = document.getElementById('mascotSpeaking');
  if (!jumping || !speaking) return;
  if (mode === 'speaking') {
    jumping.style.display = 'none';
    speaking.style.display = '';
  } else {
    jumping.style.display = '';
    speaking.style.display = 'none';
  }
}

// 챗창 위에서 좌우로 뛰기
function _mascotJumpOnChat() {
  _mascotOnChat = true;
  _stopMascotWander();
  const el = document.getElementById('claudeMascot');
  const win = document.getElementById('chatWin');
  if (!el || !win) return;

  function _bounce() {
    if (!_chatOpen || !_mascotOnChat) return;
    const wr = win.getBoundingClientRect();
    const minX = wr.left + 10;
    const maxX = wr.right - 70;
    const topY = wr.top - 50;
    const tx = minX + Math.random() * (maxX - minX);
    if (tx < parseFloat(el.style.left || 0)) el.classList.add('facing-left');
    else el.classList.remove('facing-left');
    el.style.transition = 'left 1s cubic-bezier(0.34,1.56,0.64,1), top 0.5s cubic-bezier(0.34,1.56,0.64,1)';
    el.style.left = tx + 'px';
    el.style.top = topY + 'px';
    el.style.right = 'auto'; el.style.bottom = 'auto';
    setTimeout(() => { el.style.transition = ''; }, 1100);
  }
  // 즉시 챗창 위로 점프
  const wr = win.getBoundingClientRect();
  el.style.transition = 'left 0.4s cubic-bezier(0.34,1.56,0.64,1), top 0.4s cubic-bezier(0.34,1.56,0.64,1)';
  el.style.left = (wr.left + wr.width / 2 - 35) + 'px';
  el.style.top = (wr.top - 50) + 'px';
  el.style.right = 'auto'; el.style.bottom = 'auto';
  setTimeout(() => { el.style.transition = ''; }, 500);
  _mascotChatBounceTimer = setInterval(_bounce, 2500);
}

function _mascotLeaveChat() {
  _mascotOnChat = false;
  if (_mascotChatBounceTimer) { clearInterval(_mascotChatBounceTimer); _mascotChatBounceTimer = null; }
  _startMascotWander();
}

// ── 모달 위에서 점프 (대기 중 사용자 심심하지 않게) ──
let _mascotOnModal = false;
let _mascotModalBounceTimer = null;
const _mascotCheerLines = [
  '거의 다 됐어요!', '조금만 기다려주세요…', 'Claude 가 열심히 일하는 중!',
  '잠시만요…', '곧 결과가 나와요!', '🎯 분석 중…',
  '💭 생각 중…', '⚡ 처리 중…', '☕ 한 잔의 여유',
  '🚀 거의 다!', '🔍 꼼꼼하게 보고 있어요',
];
function _mascotShowCheer() {
  const bubble = document.getElementById('mascotBubble');
  if (!bubble) return;
  bubble.textContent = _mascotCheerLines[Math.floor(Math.random() * _mascotCheerLines.length)];
  bubble.style.display = '';
  setTimeout(() => { bubble.style.display = 'none'; }, 2500);
}
function _mascotJumpOnModal() {
  if (_mascotOnModal) return;  // 이미 진행 중
  _mascotOnModal = true;
  _stopMascotWander();
  if (_mascotChatBounceTimer) { clearInterval(_mascotChatBounceTimer); _mascotChatBounceTimer = null; }
  const el = document.getElementById('claudeMascot');
  if (!el) return;
  if (el.style.display === 'none') el.style.display = '';
  el.style.pointerEvents = 'none';  // 모달 클릭 막지 않도록
  el.style.zIndex = '60';            // modal-backdrop(50) 위, 시스템 모달 아래

  function _bounce() {
    if (!_mascotOnModal) return;
    const modal = document.querySelector('#modal-root .modal');
    if (!modal) { _mascotLeaveModal(); return; }
    const rect = modal.getBoundingClientRect();
    // 모달 **내부** 로 제한 — 바깥으로 나가면 backdrop click 으로 모달 닫힘.
    // 또한 우측 상단 70×60px (닫기 ✕ 버튼 영역) 는 피함.
    const INSET = 16;   // 모달 안쪽 여유
    const MASCOT_W = 70;
    const MASCOT_H = 63;
    const TOP_RIGHT_AVOID_W = 80;
    const TOP_RIGHT_AVOID_H = 60;
    const minX = rect.left + INSET;
    const maxX = rect.right - MASCOT_W - INSET;
    const minY = rect.top + INSET;
    const maxY = rect.bottom - MASCOT_H - INSET;
    if (maxX <= minX || maxY <= minY) { return; }  // 모달이 너무 작음
    let tx, ty, tries = 0;
    do {
      tx = minX + Math.random() * (maxX - minX);
      ty = minY + Math.random() * (maxY - minY);
      tries++;
      // 우측 상단 ✕ 영역 회피
      const inAvoid = tx > (rect.right - TOP_RIGHT_AVOID_W) && ty < (rect.top + TOP_RIGHT_AVOID_H);
      if (!inAvoid) break;
    } while (tries < 8);
    if (tx < parseFloat(el.style.left || 0)) el.classList.add('facing-left');
    else el.classList.remove('facing-left');
    el.style.transition = 'left 1.4s cubic-bezier(0.34,1.56,0.64,1), top 1.4s cubic-bezier(0.34,1.56,0.64,1)';
    el.style.left = tx + 'px';
    el.style.top = ty + 'px';
    el.style.right = 'auto'; el.style.bottom = 'auto';
    setTimeout(() => { el.style.transition = ''; }, 1500);

    // 30% 확률로 speaking + 응원 메시지
    if (Math.random() < 0.30) {
      _mascotSetMode('speaking');
      _mascotShowCheer();
      setTimeout(() => _mascotSetMode('jumping'), 2000);
    }
  }
  setTimeout(_bounce, 100);
  _mascotModalBounceTimer = setInterval(_bounce, 1800);
}
function _mascotLeaveModal() {
  if (!_mascotOnModal) return;
  _mascotOnModal = false;
  if (_mascotModalBounceTimer) { clearInterval(_mascotModalBounceTimer); _mascotModalBounceTimer = null; }
  const el = document.getElementById('claudeMascot');
  if (el) {
    el.style.pointerEvents = '';
    el.style.zIndex = '1150';
  }
  const bubble = document.getElementById('mascotBubble');
  if (bubble) bubble.style.display = 'none';
  _mascotSetMode('jumping');
  if (!_mascotOnChat) _startMascotWander();
}

function _showRandomBubble() {
  if (_chatOpen || _mascotDragging) return;
  const bubble = document.getElementById('mascotBubble');
  if (!bubble) return;
  const msg = t(_mascotBubbles[Math.floor(Math.random() * _mascotBubbles.length)]);
  bubble.textContent = msg;
  bubble.style.display = 'block';
  bubble.style.animation = 'none';
  requestAnimationFrame(() => { bubble.style.animation = ''; });
  // 말풍선 나올 때 speaking 모드로 전환
  _mascotSetMode('speaking');
  setTimeout(() => {
    bubble.style.display = 'none';
    _mascotSetMode('jumping');
  }, 4000);
}

function toggleChat() {
  const win = document.getElementById('chatWin');
  const mascot = document.getElementById('claudeMascot');
  const bubble = document.getElementById('mascotBubble');
  if (_chatOpen) {
    // 닫기
    win.classList.remove('chat-win-enter');
    win.classList.add('chat-win-exit');
    setTimeout(() => { win.style.display = 'none'; win.classList.remove('chat-win-exit'); }, 200);
    _chatOpen = false;
    _mascotLeaveChat();
  } else {
    // 열기 — 말풍선 숨기기
    if (bubble) bubble.style.display = 'none';
    const isMobile = window.matchMedia('(max-width: 900px)').matches;
    if (isMobile) {
      // 모바일: 화면 전체 고정 시트 — inline 값이 CSS !important 를 방해하지 않도록 클리어
      win.style.left = ''; win.style.top = ''; win.style.right = ''; win.style.bottom = '';
      win.style.width = ''; win.style.height = ''; win.style.maxHeight = '';
    } else {
      // 데스크톱: 마스코트 위치 근처에 배치
      const mr = mascot.getBoundingClientRect();
      const chatW = 420, chatH = 480;
      let chatLeft = mr.left + mr.width / 2 - chatW / 2;
      let chatTop = mr.top + 60;
      chatLeft = Math.max(8, Math.min(chatLeft, window.innerWidth - chatW - 8));
      chatTop = Math.max(8, Math.min(chatTop, window.innerHeight - chatH - 8));
      win.style.left = chatLeft + 'px';
      win.style.top = chatTop + 'px';
      win.style.right = 'auto'; win.style.bottom = 'auto';
      win.style.width = '420px';
      win.style.maxHeight = 'min(600px,80vh)';
    }
    win.style.display = 'flex';
    win.classList.remove('chat-win-exit');
    win.classList.add('chat-win-enter');
    _chatOpen = true;
    // iOS 자동 줌/포커스 화면 튐 방지를 위해 모바일은 포커스 지연 길게 + 조건부
    const focusDelay = isMobile ? 350 : 100;
    setTimeout(() => {
      const inp = document.getElementById('chatInput');
      if (inp && !isMobile) inp.focus();
    }, focusDelay);
    const msgs = document.getElementById('chatMessages');
    msgs.scrollTop = msgs.scrollHeight;
    // 마스코트를 챗창 위로 점프 — 모바일에서는 UI 가리니 스킵
    if (!isMobile) setTimeout(() => _mascotJumpOnChat(), 150);
  }
}

function _chatToggleMax() {
  const win = document.getElementById('chatWin');
  const isMax = win.classList.toggle('feat-win-maxed');
  if (isMax) {
    win.style.left = '10vw'; win.style.top = '5vh'; win.style.right = '10vw'; win.style.bottom = '5vh';
    win.style.width = '80vw'; win.style.maxHeight = '90vh';
  } else {
    win.style.left = 'auto'; win.style.top = 'auto'; win.style.right = '24px'; win.style.bottom = '92px';
    win.style.width = '420px'; win.style.maxHeight = 'min(600px,80vh)';
  }
}

// 챗 창 드래그 — enterDashboard 시점에 초기화
let _chatDragInit = false;

function _appendChatMsg(role, html) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = role === 'user' ? 'chat-msg chat-user' : 'chat-msg chat-bot';
  div.innerHTML = role === 'user'
    ? `<div class="chat-bubble-user">${html}</div>`
    : `<div class="chat-bubble-bot">${html}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

// 챗 응답 대기 중 마스코트 말풍선으로 대기 메시지 순환 — 첫 delta 도착 시 중단
let _chatWaitTimer = null;
const _CHAT_WAIT_MSGS = [
  '잠시만요~! 결과를 불러오고 있어요',
  '🤔 좋은 답을 고르는 중…',
  '💡 관련 탭을 찾고 있어요',
  '⚡ 거의 다 왔어요!',
  '🎯 정리해서 알려드릴게요',
];
function _chatStartWaitBubble() {
  const bubble = document.getElementById('mascotBubble');
  if (!bubble) return;
  // 기존 자동 말풍선 루프 잠시 정지
  if (typeof _mascotBubbleTimer !== 'undefined' && _mascotBubbleTimer) {
    clearInterval(_mascotBubbleTimer);
  }
  let i = 0;
  const show = () => {
    bubble.textContent = t(_CHAT_WAIT_MSGS[i % _CHAT_WAIT_MSGS.length]);
    bubble.style.display = 'block';
    bubble.style.animation = 'none';
    requestAnimationFrame(() => { bubble.style.animation = ''; });
    if (typeof _mascotSetMode === 'function') _mascotSetMode('speaking');
    i++;
  };
  show();
  _chatWaitTimer = setInterval(show, 2600);
}
function _chatStopWaitBubble() {
  if (_chatWaitTimer) { clearInterval(_chatWaitTimer); _chatWaitTimer = null; }
  const bubble = document.getElementById('mascotBubble');
  if (bubble) bubble.style.display = 'none';
  if (typeof _mascotSetMode === 'function') _mascotSetMode('jumping');
  // 자동 말풍선 루프 재시작
  if (typeof _showRandomBubble === 'function') {
    if (typeof _mascotBubbleTimer !== 'undefined') {
      try { clearInterval(_mascotBubbleTimer); } catch {}
    }
    window._mascotBubbleTimer = setInterval(_showRandomBubble, 15000);
  }
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || _chatStreaming) return;
  input.value = '';
  _chatStreaming = true;
  _appendChatMsg('user', escapeHtml(msg));
  _chatHistory.push({ role: 'user', text: msg });

  // 스트리밍 버블 생성 + 마스코트 대기 말풍선 시작
  const botDiv = _appendChatMsg('bot', '<span class="streaming-cursor"></span>');
  const bubble = botDiv.querySelector('.chat-bubble-bot');
  let fullText = '';
  _chatStartWaitBubble();

  try {
    const _chatBody = JSON.stringify({ message: msg, history: _chatHistory.slice(-6), lang: _curLang });
    const _chatHeaders = { 'Content-Type': 'application/json' };

    // 스트리밍 시도 → 실패 시 일반 API 폴백
    let res;
    try {
      res = await fetch('/api/chat/stream', { method: 'POST', headers: _chatHeaders, body: _chatBody });
    } catch(e) { res = null; }

    if (!res || res.status === 404 || res.status === 405) {
      // 폴백: 일반 chat API (fetch 직접 사용)
      try {
        const fr = await fetch('/api/chat', { method: 'POST', headers: _chatHeaders, body: _chatBody });
        const r = await fr.json();
        _chatStopWaitBubble();
        if (r.error) {
          bubble.innerHTML = `<span style="color:var(--err);">${escapeHtml(r.error)}</span>`;
        } else {
          let navBtn = '';
          if (r.navigate) {
            const navItem = NAV.find(n => n.id === r.navigate);
            const label = navItem ? navItem.label : r.navigate;
            navBtn = `<button class="btn text-[10px] mt-2" onclick="go('${r.navigate}');toggleChat();">${navItem?navItem.icon+' ':''} ${escapeHtml(label)} 탭으로 이동</button>`;
          }
          bubble.innerHTML = escapeHtml(r.answer||'').replace(/\n/g,'<br>') + navBtn;
          _chatHistory.push({ role: 'assistant', text: r.answer || '' });
        }
      } catch(e2) {
        _chatStopWaitBubble();
        bubble.innerHTML = `<span style="color:var(--err);">오류: ${escapeHtml(e2.message)}</span>`;
      }
      _chatStreaming = false;
      return;
    }
    if (!res.ok) {
      _chatStopWaitBubble();
      bubble.innerHTML = `<span style="color:var(--err);">오류: ${res.status}</span>`;
      _chatStreaming = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let navigate = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          var evtType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && evtType) {
          try {
            const data = JSON.parse(line.slice(6));
            if (evtType === 'delta') {
              if (!fullText) _chatStopWaitBubble();  // 첫 토큰 도착 — 대기 말풍선 종료
              fullText += data.text || '';
              bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>') + '<span class="streaming-cursor"></span>';
              const msgs = document.getElementById('chatMessages');
              msgs.scrollTop = msgs.scrollHeight;
            } else if (evtType === 'replace') {
              _chatStopWaitBubble();
              fullText = data.text || fullText;
              bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>') + '<span class="streaming-cursor"></span>';
            } else if (evtType === 'done') {
              _chatStopWaitBubble();
              navigate = data.navigate;
              if (data.text && data.text !== fullText) fullText = data.text;
              let doneNavBtn = '';
              if (navigate) {
                const ni = NAV.find(n => n.id === navigate);
                const nl = ni ? ni.label : navigate;
                doneNavBtn = `<button class="btn text-[10px] mt-2" onclick="go('${navigate}');toggleChat();">${ni?ni.icon+' ':''} ${escapeHtml(nl)} 탭으로 이동</button>`;
              }
              bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>') + doneNavBtn;
              _chatHistory.push({ role: 'assistant', text: fullText });
              _chatStreaming = false;
            } else if (evtType === 'error') {
              _chatStopWaitBubble();
              bubble.innerHTML = `<span style="color:var(--err);">${escapeHtml(data.error||'오류')}</span>`;
              _chatStreaming = false;
              return;
            }
          } catch {}
          evtType = null;
        }
      }
    }

    // 스트리밍 완료 — 커서 제거 + 네비 버튼
    let navBtn = '';
    if (navigate) {
      const navItem = NAV.find(n => n.id === navigate);
      const label = navItem ? navItem.label : navigate;
      navBtn = `<button class="btn text-[10px] mt-2" onclick="go('${navigate}');toggleChat();">${navItem?navItem.icon+' ':''} ${escapeHtml(label)} 탭으로 이동</button>`;
    }
    bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>') + navBtn;
    _chatHistory.push({ role: 'assistant', text: fullText });
  } catch (e) {
    bubble.innerHTML = `<span style="color:var(--err);">연결 오류: ${escapeHtml(e.message)}</span>`;
  } finally {
    _chatStopWaitBubble();  // 어떤 경로로 종료되든 말풍선 정리
  }
  _chatStreaming = false;
}

function _getSpotlightItems(query) {
  const q = (query || '').toLowerCase().trim();
  const scored = []; // {item, score}

  // 점수 계산 헬퍼
  const _score = (text, q) => {
    if (!q) return 1;
    const t = text.toLowerCase();
    if (t === q) return 100;
    if (t.startsWith(q)) return 80;
    if (t.includes(q)) return 60;
    // 각 단어 매칭
    const words = q.split(/\s+/);
    const matched = words.filter(w => t.includes(w)).length;
    if (matched === words.length) return 50;
    if (matched > 0) return 20 * matched;
    return 0;
  };

  // 1) 탭 목록 — 이름 + 설명 + 연관 키워드 검색
  for (const n of NAV) {
    const keywords = (_NAV_KEYWORDS[n.id] || []).join(' ');
    const text = `${n.label} ${n.desc||''} ${n.id} ${keywords}`;
    const s = _score(text, q);
    if (s > 0) {
      scored.push({ item: { type: 'nav', id: n.id, icon: n.icon, label: n.label, desc: n.desc || '', group: n.group }, score: s });
    }
  }

  // 2) 신기능 개별 항목 — features 데이터에서 검색
  const feats = state.data.features || {};
  const allFeats = [...(feats.builtin || []), ...(feats.dynamic || [])];
  for (const f of allFeats) {
    const text = `${f.label||''} ${f.summary||''} ${f.id||''} ${(f.keywords||[]).join(' ')}`;
    const s = _score(text, q);
    if (s > 0 && q) {
      scored.push({ item: { type: 'feature', id: f.id, icon: f.icon||'✨', label: f.label, desc: f.summary||'', feat: f }, score: s + 5 }); // 정확한 매칭 보너스
    }
  }

  // 3) 빠른 액션
  const actions = [
    { id: 'act-reindex', icon: '🔄', label: '세션 재인덱스', desc: '세션 DB 새로고침', fn: "reindex(false)" },
    { id: 'act-chat', icon: '💬', label: '챗봇 열기', desc: '대시보드 도우미와 대화', fn: "toggleChat()" },
    { id: 'act-cli', icon: '⚙️', label: 'CLI 상태 확인', desc: '로그인 상태 / 플랜 확인', fn: "openCliStatusModal()" },
    { id: 'act-refresh', icon: '↻', label: '새로고침', desc: '현재 뷰 다시 로드', fn: "renderView()" },
  ];
  for (const a of actions) {
    const text = `${a.label} ${a.desc}`;
    const s = _score(text, q);
    if (s > 0) scored.push({ item: { type: 'action', ...a }, score: s });
  }

  // 점수 내림차순 정렬, 최대 15개
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 15).map(s => s.item);
}

function _renderSpotlightResults(query) {
  const items = _getSpotlightItems(query);

  el.innerHTML = items.map((it, i) => `

function _highlightSpotlight() {
  const items = document.querySelectorAll('.spotlight-item');
  items.forEach((el, i) => el.classList.toggle('active', i === _spotlightIdx));

  if (active) active.scrollIntoView({ block: 'nearest' });

function _spotlightSelect(idx) {
  const items = _getSpotlightItems(document.getElementById('spotlightInput')?.value || '');
  const item = items[idx];
  if (!item) return;
  closeSpotlight();
  if (item.type === 'nav') {
    go(item.id);
  } else if (item.type === 'feature' && item.feat) {
    go('features');
    setTimeout(() => { try { openFeatureWindow(item.feat); } catch {} }, 300);
  } else if (item.fn) {
    try { eval(item.fn); } catch {}
  }
}

function _spotlightKeydown(e) {
  const items = _getSpotlightItems(document.getElementById('spotlightInput')?.value || '');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _spotlightIdx = Math.min(_spotlightIdx + 1, items.length - 1);
    _highlightSpotlight();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _spotlightIdx = Math.max(_spotlightIdx - 1, 0);
    _highlightSpotlight();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    _spotlightSelect(_spotlightIdx);
  } else if (e.key === 'Escape') {
    closeSpotlight();
  }
}

function _setupFocusTrap(modalEl) {
  if (!modalEl) return;
  const FOCUSABLE = 'a[href], button:not([disabled]), textarea, input:not([disabled]), select, [tabindex]:not([tabindex="-1"])';
  function handleTrap(e) {
    if (e.key !== 'Tab') return;
    const focusable = Array.from(modalEl.querySelectorAll(FOCUSABLE)).filter(el => el.offsetParent !== null);
    if (!focusable.length) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }
  modalEl._focusTrapHandler = handleTrap;
  document.addEventListener('keydown', handleTrap);
  // 자동 포커스: 모달 내 첫 포커스 가능 요소
  requestAnimationFrame(() => {
    const first = modalEl.querySelector(FOCUSABLE);
    if (first) first.focus();
  });
}

  if (_origInitCostCharts) await _origInitCostCharts();
  // 스택 바 차트 추가 — 원본에서 캐시한 데이터 재사용 (이중 API 호출 제거)
  try {
    const d = window.__lastCostsData;

    const byProvider = costs.byProvider || [];
    const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-mute').trim() || '#a0a0a8';

    // 일별 프로바이더별 데이터 구성
    const datasets = providerNames.map((pName, i) => ({
      label: pName,
      data: daily.map(day => {
        const pd = (day.byProvider || []).find(p => p.provider === pName);
        return pd ? (pd.cost || 0) : 0;
      }),
      backgroundColor: providerColors[i % providerColors.length],
      borderColor: 'transparent',
      borderWidth: 1,
    }));
    _costStackedBarChart = new Chart(ctxStacked, {
      type: 'bar',
      data: { labels: daily.map(d => d.date), datasets },

          legend: { position: 'top', labels: { color: textColor, font: { size: 11 }, padding: 10 } },

        }
      }
    });
  } catch(e) { /* silent */ }

}

function _wfCreateGroup() {
  if (__wfMultiSelected.size < 2) { toast(t('2개 이상의 노드를 선택하세요'), 'warn'); return; }
  const gid = 'g-' + Date.now().toString(36);
  const group = { id: gid, name: t('그룹') + ' ' + (__wfGroups.length + 1), nodeIds: Array.from(__wfMultiSelected), collapsed: false };
  __wfGroups.push(group);
  __wfMultiSelected.clear();
  _wfSyncMultiSelectClasses();
  _wfRenderCanvas();
  toast(t('그룹이 생성되었습니다'), 'ok');
}

function _wfToggleGroupCollapse(gid) {
  const g = __wfGroups.find(x => x.id === gid);
  if (!g) return;
  g.collapsed = !g.collapsed;
  _wfRenderCanvas();
}

function _wfRemoveGroup(gid) {
  __wfGroups = __wfGroups.filter(x => x.id !== gid);
  _wfRenderCanvas();
}

// 그룹 렌더링을 기존 _wfRenderCanvas 에 추가
const _origWfRenderCanvas = _wfRenderCanvas;
window._wfRenderCanvas = function() {
  _origWfRenderCanvas();
  _wfRenderGroups();
};
// 전역에서 호출하는 _wfRenderCanvas 재바인딩
_wfRenderCanvas = window._wfRenderCanvas;

function _wfRenderGroups() {
  const nodesG = document.getElementById('wfNodes');
  if (!nodesG || !__wf.current) return;
  // 기존 그룹 요소 제거
  nodesG.querySelectorAll('.wf-group').forEach(el => el.remove());
  __wfGroups.forEach(g => {
    const nodes = (g.nodeIds || []).map(nid => (__wf.current.nodes||[]).find(n => n.id === nid)).filter(Boolean);
    if (!nodes.length) return;
    const pad = 20;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    nodes.forEach(n => {
      minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
      maxX = Math.max(maxX, n.x + (WF_NODE_W||180)); maxY = Math.max(maxY, n.y + (WF_NODE_H||60));
    });
    const gEl = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    gEl.classList.add('wf-group');
    gEl.setAttribute('data-group', g.id);
    // 그룹 박스
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.classList.add('wf-group-box');
    rect.setAttribute('x', minX - pad); rect.setAttribute('y', minY - pad - 18);
    rect.setAttribute('width', maxX - minX + pad * 2); rect.setAttribute('height', maxY - minY + pad * 2 + 18);
    gEl.appendChild(rect);
    // 그룹 라벨
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.classList.add('wf-group-label');
    label.setAttribute('x', minX - pad + 8); label.setAttribute('y', minY - pad - 4);
    label.textContent = g.name + (g.collapsed ? ' [' + t('접힘') + ']' : '');
    gEl.appendChild(label);
    // 접기/펴기 토글
    const toggle = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    toggle.classList.add('wf-group-toggle');
    toggle.setAttribute('x', maxX + pad - 16); toggle.setAttribute('y', minY - pad - 4);
    toggle.textContent = g.collapsed ? '▶' : '▼';
    toggle.addEventListener('click', () => _wfToggleGroupCollapse(g.id));
    gEl.appendChild(toggle);
    // 삭제 버튼
    const del = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    del.classList.add('wf-group-toggle');
    del.setAttribute('x', maxX + pad - 32); del.setAttribute('y', minY - pad - 4);
    del.textContent = '✕';
    del.addEventListener('click', () => _wfRemoveGroup(g.id));
    gEl.appendChild(del);
    // 접힌 상태면 노드 숨김
    if (g.collapsed) {
      g.nodeIds.forEach(nid => {
        const nodeEl = nodesG.querySelector(`.wf-node[data-node="${nid}"]`);
        if (nodeEl) nodeEl.style.display = 'none';
      });
      // 접힌 박스 높이 축소
      rect.setAttribute('height', 30);
    }
    // prepend (노드 뒤에 표시되도록)
    nodesG.insertBefore(gEl, nodesG.firstChild);
  });
}

// ────────────────────────────────────────────────────────────────
// Task 10: 워크플로우 diff 시각화
// ────────────────────────────────────────────────────────────────
async function _wfDiffVersions() {
  const cbs = document.querySelectorAll('.wf-version-compare-cb:checked');
  if (cbs.length !== 2) { toast(t('비교할 두 버전을 선택하세요'), 'warn'); return; }
  const versions = Array.from(cbs).map(cb => ({
    savedAt: cb.getAttribute('data-saved-at'),
    name: cb.getAttribute('data-name'),
    nodeCount: parseInt(cb.getAttribute('data-node-count') || '0'),
  }));
  try {
    showModalLoading(t('버전 비교 중...'));
    const [r1, r2] = await Promise.all([
      api('/api/workflows/history-detail?id=' + encodeURIComponent(__wf.current.id) + '&savedAt=' + encodeURIComponent(versions[0].savedAt)),
      api('/api/workflows/history-detail?id=' + encodeURIComponent(__wf.current.id) + '&savedAt=' + encodeURIComponent(versions[1].savedAt)),
    ]);
    const nodes1 = (r1 && r1.nodes) || [];
    const nodes2 = (r2 && r2.nodes) || [];
    const names1 = new Map(nodes1.map(n => [n.id, n.title || n.type || n.id]));
    const names2 = new Map(nodes2.map(n => [n.id, n.title || n.type || n.id]));
    const allIds = new Set([...names1.keys(), ...names2.keys()]);
    const added = [], removed = [], changed = [], unchanged = [];
    allIds.forEach(id => {
      const in1 = names1.has(id), in2 = names2.has(id);
      if (in2 && !in1) added.push({ id, name: names2.get(id) });
      else if (in1 && !in2) removed.push({ id, name: names1.get(id) });
      else if (in1 && in2) {
        const n1 = nodes1.find(n => n.id === id);
        const n2 = nodes2.find(n => n.id === id);
        if (JSON.stringify(n1) !== JSON.stringify(n2)) changed.push({ id, name: names1.get(id), name2: names2.get(id) });
        else unchanged.push({ id, name: names1.get(id) });
      }
    });
    const row = (icon, label, items, color) => items.length ? `
      <div class="mb-3">
        <div class="text-xs font-semibold mb-1" style="color:${color}">${icon} ${label} (${items.length})</div>
        ${items.map(i => `<div class="text-[11px] text-[var(--text-mute)] ml-3">• ${escapeHtml(i.name)}${i.name2 && i.name2 !== i.name ? ' → ' + escapeHtml(i.name2) : ''}</div>`).join('')}
      </div>` : '';
    showModal(`
      <div class="p-5" style="max-width:640px;">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold">🔍 ${t('버전 비교')}</h2>
          <button class="btn text-xs" onclick="closeModal()" aria-label="${t('닫기')}">✕</button>
        </div>
        <div class="flex items-center gap-4 mb-4 text-xs text-[var(--text-mute)]">
          <div class="card p-2 flex-1"><b>A:</b> ${escapeHtml(versions[0].name)} (${versions[0].nodeCount} ${t('노드')})</div>
          <span>vs</span>
          <div class="card p-2 flex-1"><b>B:</b> ${escapeHtml(versions[1].name)} (${versions[1].nodeCount} ${t('노드')})</div>
        </div>
        <div class="card p-4" style="max-height:50vh;overflow-y:auto;">
          ${row('➕', t('추가된 노드'), added, 'var(--ok)')}
          ${row('➖', t('삭제된 노드'), removed, 'var(--err)')}
          ${row('✏️', t('변경된 노드'), changed, 'var(--warn)')}
          ${row('✓', t('변경 없음'), unchanged, 'var(--text-dim)')}
          ${!added.length && !removed.length && !changed.length ? `<div class="text-xs text-center" style="color:var(--text-dim)">${t('두 버전이 동일합니다')}</div>` : ''}
        </div>
      </div>
    `);
  } catch(e) {
    showModal(`
      <div class="p-5">
        <h2 class="text-lg font-semibold mb-3">🔍 ${t('버전 비교')}</h2>
        <div class="text-xs text-[var(--text-mute)] mb-3">${t('상세 버전 데이터를 가져올 수 없어 기본 비교를 수행합니다.')}</div>
        <div class="card p-4">
          <div class="flex items-center gap-4 mb-2 text-xs text-[var(--text-mute)]">
            <div><b>A:</b> ${escapeHtml(versions[0].name)} — ${versions[0].nodeCount} ${t('노드')}</div>
            <span>vs</span>
            <div><b>B:</b> ${escapeHtml(versions[1].name)} — ${versions[1].nodeCount} ${t('노드')}</div>
          </div>
          <div class="text-xs text-[var(--text-mute)]">
            ${t('노드 수 차이')}: ${Math.abs(versions[0].nodeCount - versions[1].nodeCount)}
            ${versions[0].nodeCount !== versions[1].nodeCount ? (versions[1].nodeCount > versions[0].nodeCount ? '(' + t('추가') + ')' : '(' + t('삭제') + ')') : '(' + t('동일') + ')'}
          </div>
        </div>
        <div class="flex justify-end mt-4">
          <button class="btn text-sm" onclick="closeModal()">${t('닫기')}</button>
        </div>
      </div>
    `);
  }
}

// ────────────────────────────────────────────────────────────────
// Task 1: 모바일 반응형 — 768px 이하 사이드바 기본 접힘 + 햄버거
// ────────────────────────────────────────────────────────────────
(function _initMobileNav() {
  function syncNavToggle() {
    const isMobile = window.matchMedia('(max-width: 768px)').matches;
    const toggle = document.getElementById('navToggle');
    if (toggle) toggle.style.display = isMobile ? '' : 'none';
    if (isMobile) {
      const sb = document.getElementById('sidebar');
      if (sb && !sb.classList.contains('open')) {
        // 모바일에서 기본 접힘 상태 보장
      }
    }
  }
  // _syncNavToggleVisibility 가 이미 있으면 덮어쓰지 않고 기존 것을 호출
  if (typeof _syncNavToggleVisibility === 'function') {
    const orig = _syncNavToggleVisibility;
    window._syncNavToggleVisibility = function() { orig(); syncNavToggle(); };
  } else {
    window._syncNavToggleVisibility = syncNavToggle;
  }
  window.addEventListener('resize', syncNavToggle);
  syncNavToggle();
})();

(async function boot() {
  // 로케일 사전이 준비된 뒤 UI 를 렌더링 — 깜빡임 최소화
  try { await window._i18nReady; } catch {}
  state.view = (location.hash.replace(/^#\//, '') || 'overview');
  if (!NAV.find(n => n.id === state.view)) state.view = 'overview';
  renderNav();
  // 항상 로그인 게이트를 먼저 표시 — 연결 확인 후 진입
  try {
    const auth = await api('/api/auth/status');
    showLoginGate(auth);
  } catch(e) {
    showLoginGate({ connected: false, cliInstalled: false, reason: '서버 연결 실패: ' + e.message });
  }
})();
</script>
