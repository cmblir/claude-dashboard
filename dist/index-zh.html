<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Control Center — 최적화 仪表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@11.2.0/marked.min.js"></script>
<style>
  :root, body.theme-dark {
    --bg: #000000;
    --bg-soft: #0a0a0a;
    --card: rgba(255, 255, 255, 0.025);
    --card-hi: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.07);
    --border-hi: rgba(255, 255, 255, 0.14);
    --text: #f5f5f5;
    --text-mute: #a0a0a8;
    --text-dim: #6b6b72;
    --accent: #d97757;
    --accent-2: #c96442;
    --cyan: #7dd3fc;
    --ok: #4ade80;
    --warn: #fbbf24;
    --err: #f87171;
    --grad: linear-gradient(135deg, #d97757 0%, #c96442 100%);
    --grad-soft: linear-gradient(135deg, rgba(217,119,87,0.12), rgba(201,100,66,0.08));
    --code-bg: rgba(0,0,0,0.3);
  }
  body.theme-light {
    --bg: #f5f5f0;
    --bg-soft: #eeeee8;
    --card: rgba(0, 0, 0, 0.03);
    --card-hi: rgba(0, 0, 0, 0.06);
    --border: rgba(0, 0, 0, 0.1);
    --border-hi: rgba(0, 0, 0, 0.18);
    --text: #1a1a1a;
    --text-mute: #555560;
    --text-dim: #888892;
    --accent: #c96442;
    --accent-2: #b85535;
    --cyan: #0284c7;
    --ok: #16a34a;
    --warn: #ca8a04;
    --err: #dc2626;
    --grad: linear-gradient(135deg, #d97757 0%, #c96442 100%);
    --grad-soft: linear-gradient(135deg, rgba(217,119,87,0.1), rgba(201,100,66,0.06));
    --code-bg: rgba(0,0,0,0.05);
  }
  body.theme-light { -webkit-font-smoothing: auto; }
  body.theme-light::before { background: none !important; }
  /* 테마 전환 애니메이션 */
  body.theme-switching::after {
    content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
    background: var(--bg);
    animation: themeSweep 0.5s ease-out forwards;
  }
  @keyframes themeSweep {
    0% { clip-path: inset(0 0 100% 0); opacity:1; }
    100% { clip-path: inset(0 0 0 0); opacity:0; }
  }
  /* 라이트 모드 — 포괄적 오버라이드 */
  body.theme-light .feat-win { border-color: rgba(0,0,0,0.12); }
  body.theme-light .btn-primary { color: #fff; }
  body.theme-light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
  body.theme-light .chat-bubble-user { color: #fff; }
  body.theme-light .chat-bubble-bot { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }
  body.theme-light .modal-backdrop { background: rgba(0,0,0,0.35); }
  body.theme-light #sidebar { background: #e8e8e2 !important; border-color: rgba(0,0,0,0.1); }
  body.theme-light .nav-item.active { background: rgba(217,119,87,0.15) !important; border-color: rgba(217,119,87,0.3) !important; color: var(--text) !important; }
  body.theme-light .nav-item:hover { background: rgba(0,0,0,0.04); }
  body.theme-light .card { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.08); }
  body.theme-light .card-hi, body.theme-light .hover-lift:hover { background: rgba(255,255,255,0.8); }
  body.theme-light .chip { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); color: var(--text-mute); }
  body.theme-light .chip-ok { background: rgba(22,163,74,0.1); border-color: rgba(22,163,74,0.25); color: #15803d; }
  body.theme-light .chip-warn { background: rgba(202,138,4,0.1); border-color: rgba(202,138,4,0.25); color: #a16207; }
  body.theme-light .chip-err { background: rgba(220,38,38,0.1); border-color: rgba(220,38,38,0.25); color: #dc2626; }
  body.theme-light .btn { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.12); color: var(--text); }
  body.theme-light .btn:hover { background: rgba(0,0,0,0.1); }
  body.theme-light .btn-ghost:hover { background: rgba(0,0,0,0.06); }
  body.theme-light .input { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.12); color: var(--text); }
  body.theme-light .input:focus { border-color: var(--accent); }
  body.theme-light table.data th { color: var(--text-mute); border-color: rgba(0,0,0,0.08); }
  body.theme-light table.data td { border-color: rgba(0,0,0,0.05); }
  body.theme-light table.data tr:hover td { background: rgba(0,0,0,0.02); }
  body.theme-light .tag-tool { background: rgba(217,119,87,0.12); color: #b85535; }
  body.theme-light .gradient-text { color: #b85535; }
  body.theme-light .shimmer { background: linear-gradient(90deg, rgba(0,0,0,0.04), rgba(0,0,0,0.08), rgba(0,0,0,0.04)); background-size: 200% 100%; }
  body.theme-light .mascot-bubble { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.12); color: var(--text); }
  body.theme-light .mascot-bubble::after { border-top-color: rgba(0,0,0,0.12); }
  body.theme-light .settings-item:hover { background: rgba(0,0,0,0.05); }
  body.theme-light #settingsDropdown { background: #eaeae4; border-color: rgba(0,0,0,0.12); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
  body.theme-light .spotlight-item:hover, body.theme-light .spotlight-item.active { background: rgba(0,0,0,0.05); }
  body.theme-light .prose-claude code { background: rgba(0,0,0,0.06); }
  body.theme-light .prose-claude pre { background: #f0f0ea; border-color: rgba(0,0,0,0.08); }
  body.theme-light .pulse-dot { background: #16a34a; }
  body.theme-light .empty { color: var(--text-dim); }
  body.theme-light #sidebar-foot { border-color: rgba(0,0,0,0.08); }
  *, *::before, *::after { box-sizing: border-box; }
  html { color-scheme: dark; }
  body.theme-light { color-scheme: light; }
  html, body { background: var(--bg); color: var(--text); margin: 0; height: 100%; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(55% 40% at 0% 0%, rgba(217,119,87,0.04), transparent 60%),
      radial-gradient(40% 35% at 100% 100%, rgba(255,255,255,0.02), transparent 60%);
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  ::-webkit-scrollbar-track { background: transparent; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; min-width: 0; max-width: 100%; }
  .card-hi { background: var(--card-hi); border-color: var(--border-hi); }
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 0.85rem; border-radius: 10px; font-size: 0.82rem; font-weight: 500; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: rgba(255,255,255,0.12); border-color: var(--border-hi); }
  .btn-primary { background: var(--grad); border: none; color: #0a0a0f; font-weight: 600; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: rgba(255,255,255,0.06); }
  .chip { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.7rem; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-mute); }
  .chip-accent { background: var(--grad-soft); border-color: rgba(167,139,250,0.35); color: #e9defc; }
  .chip-ok { background: rgba(74,222,128,0.15); border-color: rgba(74,222,128,0.35); color: #86efac; }
  .chip-warn { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.35); color: #fcd34d; }
  .chip-err { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.35); color: #fca5a5; }
  /* chatbot — macOS floating window */
  .chat-msg { display: flex; }
  .chat-user { justify-content: flex-end; }
  .chat-bot { justify-content: flex-start; }
  .chat-bubble-user { background: var(--grad); color: #0a0a0f; border-radius: 14px 14px 4px 14px; padding: 8px 12px; max-width: 85%; font-size: 0.82rem; line-height: 1.45; word-break: break-word; }
  .chat-bubble-bot { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; padding: 8px 12px; max-width: 85%; font-size: 0.82rem; line-height: 1.45; color: var(--text); word-break: break-word; }
  /* claude mascot */
  #claudeMascot { cursor: grab; user-select: none; pointer-events: auto; will-change: left, top; }
  #claudeMascot:active { cursor: grabbing; }
  #claudeMascot:hover { filter: drop-shadow(0 0 14px rgba(224,124,76,0.7)); }
  #claudeMascot svg { transition: transform 0.15s; }
  #claudeMascot.facing-left svg { transform: scaleX(-1); }
  .mascot-bubble { position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card-hi);border:1px solid var(--border-hi);border-radius:12px 12px 12px 4px;padding:7px 12px;font-size:0.72rem;color:var(--text);white-space:nowrap;pointer-events:none;animation:bubblePop 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:0 4px 16px rgba(0,0,0,0.4); }
  .mascot-bubble::after { content:'';position:absolute;top:100%;left:18px;border:5px solid transparent;border-top-color:var(--border-hi); }
  @keyframes bubblePop { from{opacity:0;transform:translateX(-50%) scale(0.85);} to{opacity:1;transform:translateX(-50%) scale(1);} }
  /* streaming cursor */
  .streaming-cursor::after { content: '▍'; animation: blink-cursor 0.8s infinite; color: var(--accent); font-weight: 300; }
  @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }
  /* chat window animation */
  @keyframes chatSlideIn { from { opacity:0; transform:translateY(20px) scale(0.95); } to { opacity:1; transform:none; } }
  @keyframes chatSlideOut { from { opacity:1; transform:none; } to { opacity:0; transform:translateY(20px) scale(0.95); } }
  .chat-win-enter { animation: chatSlideIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
  .chat-win-exit { animation: chatSlideOut 0.2s ease-in forwards; }
  /* interactive counters */
  @keyframes countFadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .count-up { animation: countFadeIn 0.5s ease-out backwards; }
  /* card stagger entrance */
  @keyframes cardPop { from { opacity:0; transform:translateY(12px) scale(0.97); } to { opacity:1; transform:none; } }
  .card-animate { animation: cardPop 0.4s cubic-bezier(0.16,1,0.3,1) backwards; }
  /* spotlight — macOS floating window style */
  #spotlightInput, #spotlightInput:focus,
  #chatInput, #chatInput:focus { outline:none !important; box-shadow:none !important; --tw-ring-shadow:none !important; }
  .spotlight-item { display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background 0.12s; }
  .spotlight-item:hover,.spotlight-item.active { background:rgba(255,255,255,0.06); }
  .spotlight-item .sl-icon { font-size:1.3rem;width:32px;text-align:center;flex-shrink:0; }
  .spotlight-item .sl-label { font-size:0.95rem;font-weight:500; }
  .spotlight-item .sl-desc { font-size:0.78rem;color:var(--text-dim);margin-top:2px; }
  .spotlight-item .sl-kbd { font-size:0.7rem;color:var(--text-dim);background:rgba(255,255,255,0.06);padding:3px 8px;border-radius:5px;margin-left:auto;flex-shrink:0; }
  .settings-item { display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;background:none;border:none;color:var(--text);font-size:0.82rem;cursor:pointer;text-align:left;font-family:inherit;transition:background 0.1s; }
  .settings-item:hover { background:rgba(255,255,255,0.06); }
  body.theme-light .settings-item:hover { background:rgba(0,0,0,0.05); }
  .settings-check { margin-left:auto;color:var(--accent);font-size:0.85rem; }
  .divider { height: 1px; background: var(--border); margin: 0.75rem 0; }
  .nav-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.8rem; border-radius: 10px; color: var(--text-mute); font-size: 0.88rem; cursor: pointer; transition: background 0.15s, color 0.15s; user-select: none; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-item.active { background: var(--grad-soft); color: var(--text); border: 1px solid rgba(167,139,250,0.35); }
  .badge-n { display: inline-block; min-width: 20px; height: 20px; line-height: 20px; text-align: center; padding: 0 6px; border-radius: 10px; font-size: 0.7rem; background: rgba(255,255,255,0.08); color: var(--text-mute); }
  .gradient-text { color: #d97757; }
  @property --p { syntax: '<number>'; inherits: false; initial-value: 0; }
  .score-ring { --p: 0; --col-a: #d97757; --col-b: #c96442; width: 180px; height: 180px; border-radius: 50%;
    background: conic-gradient(from 0deg, var(--col-a) 0deg, var(--col-b) calc(var(--p) * 3.6deg), rgba(255,255,255,0.05) calc(var(--p) * 3.6deg));
    display: grid; place-items: center; position: relative; transition: --p 1s cubic-bezier(0.16,1,0.3,1); }
  .score-ring::after { content: ""; position: absolute; inset: 10px; background: var(--bg); border-radius: 50%; }
  .score-ring > * { position: relative; z-index: 2; }
  @keyframes ringSpin { from { filter: brightness(0.6); } to { filter: brightness(1); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 1.4s infinite; display: inline-block; }
  .pulse-dot.off { background: #6b7280; animation: none; }
  .tab-enter { animation: tabFade 0.3s ease; }
  @keyframes tabFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  table.data { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  table.data th { text-align: left; font-weight: 500; color: var(--text-mute); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  table.data td { padding: 0.65rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  table.data tr:hover td { background: var(--card-hi); }
  .link-row { cursor: pointer; }
  .input { width: 100%; padding: 0.55rem 0.75rem; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.88rem; }
  .input:focus { outline: none; border-color: var(--accent); }
  textarea.input { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.8rem; line-height: 1.55; }
  .kbd { display: inline-block; padding: 0.1rem 0.45rem; border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; background: rgba(255,255,255,0.05); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(4px); z-index: 50; display: grid; place-items: center; padding: 24px; }
  .modal { background: var(--bg-soft); border: 1px solid var(--border-hi); border-radius: 18px; max-width: 1100px; width: 100%; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal-wide { max-width: 1440px; height: 90vh; max-height: 90vh; }
  .modal-wide textarea { font-size: 13px; line-height: 1.55; }
  .prose-claude { color: var(--text); font-size: 0.9rem; line-height: 1.6; }
  .prose-claude h1, .prose-claude h2, .prose-claude h3 { color: var(--text); margin-top: 1em; }
  .prose-claude code { background: rgba(255,255,255,0.08); padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.85em; }
  .prose-claude pre { background: var(--code-bg); padding: 1em; border-radius: 10px; overflow-x: auto; border: 1px solid var(--border); }
  .prose-claude ul { padding-left: 1.2em; }
  .hover-lift { transition: transform 0.15s, background 0.15s; }
  .hover-lift:hover { transform: translateY(-2px); background: var(--card-hi); }
  .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.75rem; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-dim); }
  .tag-tool { display: inline-block; padding: 1px 7px; font-size: 0.68rem; border-radius: 4px; background: rgba(217,119,87,0.14); color: #f5b997; font-family: 'JetBrains Mono', monospace; margin: 1px; }
  .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.12), rgba(255,255,255,0.04)); background-size: 200% 100%; animation: shimmerMove 1.6s infinite; border-radius: 6px; }
  @keyframes shimmerMove { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .line-clamp-6 { display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; }
  /* 햄버거 토글 중복 방지: sb-collapsed 상태면 sbToggle 숨기고 navToggle 만, 평상시엔 반대 */
  body.sb-collapsed #sbToggle { display: none; }
  body.sb-collapsed #sidebar { width: 58px; }

  /* 🪟 macOS 스타일 플로팅 창 (신기능 전용) */
  .feat-win {
    position: fixed;
    width: min(640px, calc(100vw - 80px));
    min-width: 360px;
    max-width: calc(100vw - 40px);
    min-height: 180px;
    max-height: calc(100vh - 80px);
    background: var(--bg-soft);
    border: 1px solid var(--border-hi);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    resize: both;
    transition: box-shadow 0.15s;
  }
  .feat-win:hover { box-shadow: 0 24px 72px rgba(0,0,0,0.7), 0 0 0 1px rgba(217,119,87,0.15); }
  .feat-win-title {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid var(--border);
    cursor: move;
    user-select: none;
    flex-shrink: 0;
  }
  .feat-win-lights { display: flex; gap: 7px; }
  .feat-light {
    width: 12px; height: 12px; border-radius: 50%;
    border: none; padding: 0; cursor: pointer;
    transition: filter 0.1s;
  }
  .feat-light:hover { filter: brightness(1.25); }
  .feat-light-close { background: #ff5f57; }
  .feat-light-min   { background: #febc2e; }
  .feat-light-max   { background: #28c840; }
  .feat-win-title-text { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; truncate: overflow; }
  .feat-win-body {
    padding: 16px;
    overflow-y: auto;
    flex: 1 1 0;
    min-height: 0;
  }
  .feat-win-minimized { height: 40px !important; min-height: 40px !important; overflow: hidden; }
  .feat-win-minimized .feat-win-body { display: none; }
  .feat-win-maxed { border-radius: 8px; resize: none; }
  body.sb-collapsed #sidebar .nav-label,
  body.sb-collapsed #sidebar .nav-desc,
  body.sb-collapsed #sidebar .brand-text,
  body.sb-collapsed #sidebar .group-label,
  body.sb-collapsed #sidebar .cli-body { display: none; }
  body.sb-collapsed #sidebar .nav-item { justify-content: center; padding: 0.55rem 0.4rem; }
  body.sb-collapsed #content { margin-left: 58px; }
  body.sb-collapsed #sidebar-foot { padding: 0.4rem; gap: 0.3rem; }
  body.sb-collapsed #sidebar-foot .btn { display: none; }  /* 접힌 상태에서 버튼 숨김 */
  body.sb-collapsed #sidebar-foot #cliStatus > .card { padding: 0.35rem !important; }
  body.sb-collapsed #sidebar-foot #cliStatus .cli-body,
  body.sb-collapsed #sidebar-foot #cliStatus .flex.items-center.justify-between > span:first-child { display: none; }

    #content { margin-left: 0 !important; }

    body.sidebar-open::after {
      content: ''; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 35; transition: opacity 0.2s;
    }

    /* 헤더 / 본문 패딩 축소 */
    #content header { padding: 0.5rem 0.75rem !important; }
    #content #view { padding: 0.75rem !important; }

    h1.text-2xl { font-size: 1.25rem !important; }
    h2.text-lg, h2.text-xl { font-size: 1rem !important; }

    /* 카드 padding 축소 */
    .card.p-5, .card.p-6 { padding: 0.75rem !important; }
    .card.p-4 { padding: 0.625rem !important; }

    /* 테이블 가로 스크롤 */
    table.data { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; max-width: 100%; }
    table.data thead, table.data tbody { display: table; min-width: 100%; }

    /* 그리드 강제 1 컬럼 (md/lg breakpoint 무시) */
    .grid.grid-cols-2 { grid-template-columns: 1fr 1fr !important; }
    .grid.md\:grid-cols-2, .grid.md\:grid-cols-3, .grid.md\:grid-cols-4, .grid.md\:grid-cols-5,
    .grid.lg\:grid-cols-2, .grid.lg\:grid-cols-3, .grid.lg\:grid-cols-4, .grid.lg\:grid-cols-5 {

    }

    /* 입력 필드 풀폭 */

    /* 모달 */

    .modal-wide { height: 96vh !important; max-height: 96vh !important; }

    /* 신기능 창 — 화면 거의 전체 */
    .feat-win {
      width: calc(100vw - 16px) !important;
      max-width: calc(100vw - 16px) !important;
      left: 8px !important;
      top: 8px !important;

    /* Chip / 버튼 터치 타겟 */

    /* 사이드바 네비 항목 터치 타겟 */

// 更改(POST/PUT/DELETE) 후 자동 페이지 리로드 — 디바운스로 연속 调用 합치기
let __autoReloadTimer = null;
function _scheduleAutoReload() {
  if (__autoReloadTimer) clearTimeout(__autoReloadTimer);
  __autoReloadTimer = setTimeout(() => {
    __autoReloadTimer = null;
    try { renderView && renderView(); } catch (e) { console.warn('autoReload renderView failed', e); }
  }, 250);
}
// 데이터 갱신과 무관한 엔드포인트는 자동 리로드 排除 (LLM 调用, 단순 预览, 외부 IO 등)
const __noReloadPaths = [
  '/api/feature/recommend', '/api/file/recommend', '/api/recommend',
  '/api/translate/batch', '/api/translate', '/api/settings/preview',
  '/api/open-folder', '/api/open-session', '/api/sessions/reindex',
  '/api/login', '/api/auth', '/api/chat',
];
async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok && r.status !== 200) {
    let msg = r.status.toString();
    try { const j = await r.json(); if (j.error) msg = j.error; } catch {}
    throw new Error(msg);
  }
  const data = await r.json();
  const method = ((opts && opts.method) || 'GET').toUpperCase();
  if (method !== 'GET') {
    const ok = data && (data.ok === true || data.ok === undefined && !data.error);
    const skip = __noReloadPaths.some(p => path.startsWith(p));
    if (ok && !skip) _scheduleAutoReload();
  }
  return data;
}

function toast(msg, kind='info') {
  const div = document.createElement('div');
  div.className = `card px-4 py-3 text-sm flex items-center gap-2`;
  div.innerHTML = `<span>${({info:'ℹ️', ok:'✅', err:'❌', warn:'⚠️'})[kind]||'ℹ️'}</span><span>${escapeHtml(msg)}</span>`;
  _translateDOM(div);
  document.getElementById('toast').appendChild(div);
  setTimeout(() => div.style.opacity='0', 2600);
  setTimeout(() => div.remove(), 3200);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
// JSON 객체를 HTML 속성(작은/큰따옴표 모두 안전) 으로 인코딩
function jsonAttr(obj) {
  return escapeHtml(JSON.stringify(obj));
}
function fmtMs(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function fmtRel(ms) {
  if (!ms) return '—';
  const d = Math.max(0, Math.floor((Date.now() - ms) / 1000));
  if (d < 60) return `${d}秒前`;
  if (d < 3600) return `${Math.floor(d/60)}分钟前`;
  if (d < 86400) return `${Math.floor(d/3600)}小时前`;
  return `${Math.floor(d/86400)}天前`;
}
function fmtDur(ms) {
  if (!ms) return '—';
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}
function scoreColor(n) {
  n = Number(n) || 0;
  if (n >= 80) return '#4ade80';
  if (n >= 60) return '#a78bfa';
  if (n >= 40) return '#fbbf24';
  return '#f87171';
}

// 모바일 오버레이 클릭 → 사이드바 关闭
document.addEventListener('click', (e) => {
  if (!window.matchMedia('(max-width: 900px)').matches) return;
  const sb = document.getElementById('sidebar');
  if (!sb || !sb.classList.contains('open')) return;
  // 클릭이 사이드바 내부가 아니고 토글 버튼도 아니면 关闭

const VIEWS = {};

async function renderView() {
  const v = document.getElementById('view');
  v.innerHTML = `<div class="tab-enter"><div class="shimmer h-32 mb-4"></div><div class="shimmer h-64"></div></div>`;
  try {

    const after = AFTER[state.view];

  }
}

// 숫자 카운트업 애니메이션 — data-count 속성이 있는 요소 자동 应用
function _animateCounters(root) {
  root.querySelectorAll('[data-count]').forEach((el, i) => {
    const target = parseInt(el.dataset.count, 10);
    if (isNaN(target)) return;
    el.classList.add('count-up');
    el.style.animationDelay = (i * 80) + 'ms';
    const duration = 600;
    const start = performance.now();
    const step = (now) => {
      const p = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
      el.textContent = Math.round(target * ease);
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });
}

// 카드 스태거 입장 애니메이션
function _animateCards(root) {
  root.querySelectorAll('.card').forEach((el, i) => {
    if (i > 10) return; // 성능: 처음 10개만 애니메이션
    el.classList.add('card-animate');
    el.style.animationDelay = (i * 40) + 'ms';
  });
  // 프로그레스 바 + 스코어 링 애니메이션
  setTimeout(() => {
    root.querySelectorAll('[data-bar]').forEach(el => {
      el.style.width = el.dataset.bar + '%';
    });
    root.querySelectorAll('[data-ring]').forEach(el => {
      const target = parseInt(el.dataset.ring, 10);
      el.style.transition = '--p 1s cubic-bezier(0.16,1,0.3,1)';
      el.style.setProperty('--p', target);
    });
  }, 100);
}

function closeFeatureWindow(winId) {
  const w = document.getElementById(winId); if (!w) return;
  w.remove(); _winMgr.openIds.delete(winId);
}
function minimizeFeatureWindow(winId) {
  const w = document.getElementById(winId); if (!w) return;
  w.classList.toggle('feat-win-minimized');
}
function maximizeFeatureWindow(winId) {
  const w = document.getElementById(winId); if (!w) return;
  w.classList.toggle('feat-win-maxed');
  if (w.classList.contains('feat-win-maxed')) {
    w.dataset.prevLeft = w.style.left; w.dataset.prevTop = w.style.top;
    w.dataset.prevW = w.style.width; w.dataset.prevH = w.style.height;
    w.style.left = '24px'; w.style.top = '24px';
    w.style.width = 'calc(100vw - 48px)'; w.style.height = 'calc(100vh - 48px)';
  } else {
    w.style.left = w.dataset.prevLeft || '80px';
    w.style.top = w.dataset.prevTop || '60px';
    w.style.width = w.dataset.prevW || '';
    w.style.height = w.dataset.prevH || '';
  }
}
function _autoSizeWindow(w) {
  const isMobile = window.matchMedia('(max-width: 900px)').matches;
  if (isMobile) {
    // 모바일: CSS 가 이미 100vw 로 덮어쓰므로 높이만 설정
    w.style.height = 'calc(100vh - 16px)';
    return;
  }
  const body = w.querySelector('.feat-win-body');
  const title = w.querySelector('.feat-win-title');
  if (!body || !title) return;
  const titleH = title.offsetHeight;
  const contentH = body.scrollHeight;
  const desired = titleH + contentH + 8;
  const maxH = window.innerHeight - 80;
  const minH = 180;
  const finalH = Math.max(minH, Math.min(maxH, desired));
  w.style.height = finalH + 'px';
  const rect = w.getBoundingClientRect();
  if (rect.bottom > window.innerHeight - 20) {
    w.style.top = Math.max(20, window.innerHeight - finalH - 20) + 'px';
  }
  if (rect.right > window.innerWidth - 20) {
    w.style.left = Math.max(20, window.innerWidth - rect.width - 20) + 'px';
  }
}

function _makeDraggable(w) {
  const title = w.querySelector('.feat-win-title');
  if (!title) return;
  let startX, startY, origLeft, origTop, dragging = false;
  title.addEventListener('mousedown', e => {
    // 트래픽라이트 클릭은 드래그 开始 X
    if (e.target.classList.contains('feat-light')) return;
    if (w.classList.contains('feat-win-maxed')) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    origLeft = parseInt(w.style.left) || 0;
    origTop = parseInt(w.style.top) || 0;
    w.style.zIndex = ++_winMgr.zIndex;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    w.style.left = (origLeft + (e.clientX - startX)) + 'px';
    w.style.top = Math.max(0, origTop + (e.clientY - startY)) + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

}

async function aiRecommendList(kind) {
  const labelMap = { plugins:'插件', mcp:'MCP' };
  const label = labelMap[kind] || kind;
  showModalLoading(t('正在请求AI推荐(30~90秒)…'));
  try {
    const r = await api('/api/feature/recommend', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ kind, lang: _curLang }),
    });
    if (r.error) { closeModal(); toast(r.error, 'err'); return; }
    // proposed 안에서 recommendations 추출
    const proposed = r.proposed || {};
    let recs = proposed.recommendations || [];
    if (!Array.isArray(recs)) recs = [];
    closeModal();
    if (!recs.length) { toast('无推荐项(响应为空)', 'warn'); return; }
    renderAiRecListModal(kind, label, recs, r);
  } catch (e) { closeModal(); toast(e.message, 'err'); }
}

function renderAiRecListModal(kind, label, recs, raw) {
  const cost = raw.costInfo || {};
  const costBadge = `<span class="text-[10px] text-[var(--text-dim)]">费用 $${(cost.costUsd||0).toFixed(4)} · ${Math.round((cost.durationMs||0)/1000)}초</span>`;
  const cardHtml = (rec, idx) => {
    const why = escapeHtml(rec.why || rec.reason || '');
    const prio = rec.priority ? `<span class="chip chip-accent text-[9px]">우선순위 ${rec.priority}</span>` : '';
    if (kind === 'plugins') {
      const action = rec.action || (rec.pluginKey ? 'enable' : 'install');
      const target = rec.pluginKey || rec.pluginId || '';
      const mkt = rec.marketplace ? `<span class="chip text-[9px]">market: ${escapeHtml(rec.marketplace)}</span>` : '';
      const mUrl = rec.marketplaceUrl ? `<span class="chip text-[9px] mono">${escapeHtml(rec.marketplaceUrl)}</span>` : '';
      const btnLabel = action === 'enable' ? '✓ 启用' : '＋ 安装';
      return `
        <div class="card p-4 mb-2">
          <div class="flex items-start justify-between gap-3 mb-2">
            <div class="min-w-0 flex-1">
              <div class="font-semibold text-sm flex items-center gap-2 flex-wrap">
                <span>${idx+1}. ${escapeHtml(target)}</span> ${prio} ${mkt} ${mUrl}
              </div>
              <div class="text-xs text-[var(--text-mute)] mt-2">${why}</div>
            </div>
            <button class="btn-primary btn text-xs flex-shrink-0" onclick="applyPluginRec(JSON.parse(this.dataset.r))" data-r="${jsonAttr(rec)}">${btnLabel}</button>
          </div>
        </div>`;
    }
    if (kind === 'mcp') {
      const cli = rec.cli ? `<details class="text-[10px] mt-2"><summary class="cursor-pointer text-[var(--text-dim)]">CLI</summary><pre class="mono bg-[var(--code-bg)] p-2 rounded mt-1 whitespace-pre-wrap break-all">${escapeHtml(rec.cli)}</pre></details>` : '';
      return `
        <div class="card p-4 mb-2">
          <div class="flex items-start justify-between gap-3 mb-2">
            <div class="min-w-0 flex-1">
              <div class="font-semibold text-sm flex items-center gap-2 flex-wrap">
                <span>${idx+1}. ${escapeHtml(rec.mcpId || rec.id || '')}</span> ${prio}
              </div>
              <div class="text-xs text-[var(--text-mute)] mt-2">${why}</div>
              ${cli}
            </div>
            <button class="btn-primary btn text-xs flex-shrink-0" onclick="applyMcpRec(JSON.parse(this.dataset.r))" data-r="${jsonAttr(rec)}">＋ 安装</button>
          </div>
        </div>`;
    }
    return '';
  };
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between gap-3">
      <div>
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">🤖 ${label} AI推荐</div>
        <h2 class="text-lg font-bold">${recs.length}개 추천 항목 · 用户 작업 패턴 기반</h2>
        <div class="mt-1">${costBadge}</div>
      </div>

        <summary class="cursor-pointer text-[var(--text-dim)]">📋 원본 响应</summary>
        <pre class="mono text-[10px] whitespace-pre-wrap bg-[var(--code-bg)] p-2 rounded mt-2 max-h-[260px] overflow-y-auto">${escapeHtml(JSON.stringify(raw.proposed||raw, null, 2))}</pre>
      </details>
    </div>`);
}

async function applyPluginRec(rec) {
  const action = rec.action || (rec.pluginKey ? 'enable' : 'install');
  if (action === 'enable' && rec.pluginKey) {
    const r = await api('/api/plugins/toggle', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id: rec.pluginKey, enable: true }),
    });
    toast(r.ok ? `'${rec.pluginKey}' 已启用` : (r.error||'失败'), r.ok?'ok':'err');
  } else if (action === 'install') {
    if (rec.marketplaceUrl) {
      // 市场 添加 후 안내
      const mkt = rec.marketplace || rec.marketplaceUrl.split('/').pop().replace('.git','');
      const r = await api('/api/marketplaces/add', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name: mkt, url: rec.marketplaceUrl }),
      });
      toast(r.ok ? `市场已添加 — 请在插件标签页中启用` : (r.error||'失败'), r.ok?'ok':'err');
    } else {
      toast('缺少marketplaceUrl — 需手动添加市场', 'warn');
    }
  }
}

async function applyMcpRec(rec) {
  const id = rec.mcpId || rec.id;
  if (!id) { toast('缺少mcpId', 'err'); return; }
  const asName = id;
  const r = await api('/api/mcp/install', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ id, as: asName }),
  });
  toast(r.ok ? `'${id}' MCP已安装` : (r.error||'失败'), r.ok?'ok':'err');
}

async function startFeatureRecommend(kind) {
  const labelMap = { hooks:'훅', permissions:'권한', 'output-styles':'输出样式', statusline:'状态栏' };
  const label = labelMap[kind] || kind;
  showModalLoading(t('正在请求AI推荐(30~90秒)…'));
  try {
    const r = await api('/api/feature/recommend', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ kind, lang: _curLang }),
    });
    if (r.error) { closeModal(); toast(r.error, 'err'); return; }
    closeModal();
    openFeatureApplyModal(kind, r);
  } catch (e) { closeModal(); toast(e.message, 'err'); }
}

function openFeatureApplyModal(kind, r) {
  const labelMap = { hooks:'훅', permissions:'권한', 'output-styles':'输出样式', statusline:'状态栏' };
  const label = labelMap[kind] || kind;
  const currentStr = JSON.stringify(r.current || {}, null, 2);
  const proposedStr = JSON.stringify(r.proposed || {}, null, 2);
  const cost = r.costInfo || {};
  const saveFn = async (newRawStr) => {
    let parsed; try { parsed = JSON.parse(newRawStr); }
    catch (e) { return { ok:false, error: 'JSON: '+e.message }; }
    // 合并 전략
    const s = await api('/api/settings');
    if (kind === 'hooks') {
      s.hooks = { ...(s.hooks||{}), ...(parsed.hooks || parsed) };
    } else if (kind === 'permissions') {
      const p = parsed.permissions || parsed;
      const cur = s.permissions || { allow:[], deny:[] };
      const allow = Array.from(new Set([...(cur.allow||[]), ...(p.allow||[])]));
      const deny = Array.from(new Set([...(cur.deny||[]), ...(p.deny||[])]));
      s.permissions = { ...cur, allow, deny };
    } else if (kind === 'statusline') {
      s.statusLine = parsed.statusLine || parsed;
    } else if (kind === 'output-styles') {
      // 별도 API로 保存
      const id = parsed.id || 'ai-recommended';
      const raw = parsed.raw || '';
      return api('/api/output-styles/save', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id, raw }),
      });
    }
    return api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  };
  openDiffApplyModal({
    title: `AI推荐: ${label}`,
    relpath: kind === 'output-styles' ? '~/.claude/output-styles/<name>.md' : '~/.claude/settings.json',
    reason: `费用 $${(cost.costUsd||0).toFixed(4)} · ${Math.round((cost.durationMs||0)/1000)}초. ${r.applyHint||''}`,
    cwd: '',
    currentRaw: currentStr,
    proposedRaw: proposedStr,
    badge: `🤖 ${label} AI推荐`,
    saveFn,
  });
}

function statCard(label, value, color, hint) {
  const num = parseInt(value, 10);
  const isNum = !isNaN(num) && String(num) === String(value);
  return `
    <div class="card p-4 hover-lift">
      <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">${t(label)}</div>
      <div class="text-3xl font-bold mono mt-1" style="${color?`color:${color}`:''}" ${isNum ? `data-count="${num}"` : ''}>${isNum ? '0' : (value ?? '—')}</div>
      ${hint ? `<div class="text-[10px] text-[var(--text-mute)] mt-1">${escapeHtml(hint)}</div>` : ''}
    </div>`;
}

function drawTimeline(data) {
  const ctx = document.getElementById('timelineChart');
  if (!ctx) return;
  const labels = data.map(d => d.date.slice(5));
  const scores = data.map(d => d.avg_score);
  const tools = data.map(d => d.tools);
  const errors = data.map(d => d.errors);
  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: t('平均分'), data: scores, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.12)', tension: 0.4, yAxisID: 'y', fill: true },
        { label: t('工具调用'), data: tools, borderColor: '#67e8f9', backgroundColor: 'rgba(103,232,249,0.08)', tension: 0.4, yAxisID: 'y1', borderDash: [4,3] },
        { label: t('错误'), data: errors, borderColor: '#f87171', backgroundColor: 'rgba(248,113,113,0.2)', tension: 0.4, yAxisID: 'y1' },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#e7e7ea' } } },
      scales: {
        x: { ticks: { color: document.body.classList.contains('theme-light') ? '#666' : '#9aa0aa' }, grid: { color: document.body.classList.contains('theme-light') ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)' } },
        y: { position: 'left', ticks: { color: document.body.classList.contains('theme-light') ? '#666' : '#9aa0aa' }, grid: { color: document.body.classList.contains('theme-light') ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)' }, beginAtZero: true, max: 100 },
        y1: { position: 'right', ticks: { color: document.body.classList.contains('theme-light') ? '#666' : '#9aa0aa' }, grid: { display: false }, beginAtZero: true },
      },
    },
  });
}

AFTER.sessions = () => {
  const qInput = document.getElementById('sessQ');
  const sortInput = document.getElementById('sessSort');
  let debounce;
  qInput.addEventListener('input', e => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {

async function openSessionDetail(sessionId) {
  showModalLoading(t('加载会话中…'));
  try {
    const [d, tok, tl] = await Promise.all([
      api('/api/sessions/detail/' + sessionId),
      api('/api/sessions/tokens/' + sessionId),
      api('/api/sessions/timeline/' + sessionId),
    ]);
    if (d.error) { closeModal(); toast(d.error, 'err'); return; }
    renderSessionDetail(d, tok, tl);
  } catch (e) {
    closeModal();
    toast(e.message, 'err');
  }
}

function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return String(n);
}

function drawSessionTimeline(tl) {
  const el = document.getElementById('sessionTimelineGraph');
  if (!el || typeof vis === 'undefined') return;
  const colorByKind = {
    session: { background:'#d97757', border:'#fb923c', font:'#fff' },
    prompt:  { background:'#7dd3fc', border:'#38bdf8', font:'#0c4a6e' },
    agent:   { background:'#a78bfa', border:'#8b5cf6', font:'#fff' },
    tool:    { background:'#27272a', border:'#52525b', font:'#d4d4d8' },
  };
  const shapeByKind = { session:'square', prompt:'diamond', agent:'hexagon', tool:'dot' };
  const nodes = tl.nodes.map(n => ({
    id: n.id,
    label: n.label,
    shape: shapeByKind[n.kind] || 'dot',
    color: colorByKind[n.kind] || colorByKind.tool,
    font: { color:(colorByKind[n.kind]||colorByKind.tool).font, size: n.kind==='session'?13:11 },
    title: `${n.kind}\n${n.label}\n${n.meta && n.meta.tokens ? 'tokens: '+fmtTokens(n.meta.tokens) : ''}`,
    size: n.kind === 'session' ? 22 : (n.kind === 'agent' ? 18 : (n.kind === 'prompt' ? 16 : 8)),
  }));
  const edges = tl.edges.map(e => ({ from: e.src, to: e.dst, arrows:'to', color:{color:'#3f3f46'} }));
  const network = new vis.Network(el, { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) }, {
    layout: { hierarchical: { direction:'LR', sortMethod:'directed', nodeSpacing: 70, levelSeparation: 110 } },
    physics: false,
    interaction: { hover:true, zoomView:false, dragView:true, dragNodes:false },
    edges: { smooth: { type:'cubicBezier', forceDirection:'horizontal', roundness:0.4 } },
  });
}

function aggregateAgentCalls(graph) {
  const counts = {};
  (graph.edges||[]).forEach(e => {
    if (!String(e.dst).startsWith('tool:')) {
      counts[e.dst] = (counts[e.dst]||0) + e.weight;
    }
  });
  return counts;
}
function drawAgentGraph(g) {
  const container = document.getElementById('agentNetwork');
  if (!container || !window.vis) return;
  const nodes = new vis.DataSet((g.nodes||[]).map(n => ({
    id: n.id, label: n.label || n.id,
    shape: n.kind === 'core' ? 'hexagon' : (n.kind === 'tool' ? 'box' : 'dot'),
    size: n.kind === 'core' ? 34 : (n.kind === 'tool' ? 14 : 22),
    kind: n.kind,
    color: n.kind === 'core'
      ? { background: '#a78bfa', border: '#f472b6', highlight: { background: '#f472b6', border: '#fb923c' } }
      : n.kind === 'tool'
      ? { background: 'rgba(103,232,249,0.18)', border: '#67e8f9', highlight: { background: '#67e8f9', border: '#ffffff' } }
      : { background: 'rgba(244,114,182,0.14)', border: '#f472b6', highlight: { background: '#f472b6', border: '#ffffff' } },
    font: { color: '#e7e7ea', size: n.kind === 'core' ? 13 : 11 },
  })));
  const edges = new vis.DataSet((g.edges||[]).map(e => ({
    from: e.src, to: e.dst, value: e.weight,
    color: { color: 'rgba(167,139,250,0.35)', highlight: '#f472b6', opacity: 0.6 },
    arrows: 'to', smooth: { type: 'continuous' },
    title: `${e.src} → ${String(e.dst).replace(/^tool:/,'')} : ${e.weight}회`,
  })));
  const net = new vis.Network(container, { nodes, edges }, {
    physics: { enabled: true, barnesHut: { gravitationalConstant: -3500, springLength: 120, springConstant: 0.04 }, stabilization: { iterations: 250, fit: true } },
    interaction: { hover: true, selectable: true, tooltipDelay: 120, zoomView: false, dragView: true, dragNodes: true, navigationButtons: false, keyboard: false },
    edges: { scaling: { min: 1, max: 8 } },
  });
  container.style.cursor = 'pointer';
  net.once('stabilizationIterationsDone', () => {
    try { net.setOptions({ physics: { enabled: false } }); net.fit({ animation: false }); } catch {}
  });
  const nodeIdx = new Map((g.nodes||[]).map(n => [n.id, n]));
  const handleNode = (nid) => {
    const node = nodeIdx.get(nid);
    if (!node) {
      // fallback: tool:<name> prefix 만 있는 경우
      if (typeof nid === 'string' && nid.startsWith('tool:')) {
        showToolDetailModal(nid.slice(5), g);
      } else {
        viewAgent(String(nid));
      }
      return;
    }
    if (node.kind === 'tool')      showToolDetailModal(String(nid).replace(/^tool:/, ''), g);
    else if (node.kind === 'agent') viewAgent(String(nid));
    else if (node.kind === 'core')  showCoreModal(g);
  };
  net.on('click', params => {
    if (params.nodes && params.nodes.length) handleNode(params.nodes[0]);
  });
  net.on('selectNode', params => {
    if (params.nodes && params.nodes.length) handleNode(params.nodes[0]);
  });
  net.on('doubleClick', params => {
    if (params.nodes && params.nodes.length) handleNode(params.nodes[0]);
  });
}

VIEWS.commands = async () => {

    if (onlyUntranslated && c.descriptionKo) return false;
    return true;

      <div>
        <h1 class="text-2xl font-bold">슬래시 命令</h1>

        <a class="btn text-xs" href="${DOCS_BASE}slash-commands" target="_blank" rel="noopener">📖</a>
      </div>
    </div>
    <div class="card p-3 mb-4 flex flex-wrap gap-2">
      <button class="chip ${!selCat?'chip-accent':''}" onclick="setCmdCat('')">全部 ${cmds.length}</button>
      ${catChips}
    </div>

    ${catOrder.length ? catOrder.map(cid => `
      <div class="mb-5">
        <h3 class="text-xs uppercase tracking-widest text-[var(--text-dim)] mb-2">${catLabels[cid]||cid} · ${groups[cid].length}</h3>
        <div class="grid-list">
          ${groups[cid].map(c => `

async function translateAll(kind) {
  const label = { cmd: '命令', skill: '技能', plugin: '插件' }[kind] || kind;
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">翻译全部韩语</div>
        <h2 class="text-lg font-bold">${label} 批量翻译</h2>
      </div>
      <button class="btn-ghost btn" id="tbClose" onclick="__tbCancel=true;closeModal();">✕</button>
    </div>
    <div class="p-5 overflow-y-auto">
      <div id="tbStatus" class="text-sm mb-2">开始中…</div>
      <div class="h-2 rounded-full bg-white/5 overflow-hidden mb-3"><div id="tbBar" style="height:100%; background:var(--grad); width:0%; transition: width 0.3s;"></div></div>
      <div id="tbLog" class="mono text-[10px] text-[var(--text-mute)] whitespace-pre-wrap max-h-[260px] overflow-y-auto p-2 bg-[var(--code-bg)] rounded"></div>
      <div class="text-[11px] text-[var(--text-dim)] mt-2">각 批次 50개씩 · Claude CLI 1회당 20~90초 · 중간에 창 닫으면 중단</div>
    </div>
  `);
  window.__tbCancel = false;
  let totalTranslated = 0;
  let batch = 0;
  const started = Date.now();
  const log = document.getElementById('tbLog');
  const logLine = (s) => { if (log) { log.textContent += s + '\n'; log.scrollTop = log.scrollHeight; } };
  try {
    while (!window.__tbCancel) {
      batch++;
      const bar = document.getElementById('tbBar');
      const st = document.getElementById('tbStatus');
      logLine(`[批次 ${batch}] Claude CLI 요청…`);
      const r = await api('/api/translate/batch', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ kind, limit: 50 }),
      });
      if (r.error) {
        logLine(`  ❌ ${r.error}`);
        if (st) st.textContent = '错误: ' + r.error;
        toast('翻译失败: ' + r.error, 'err');
        break;
      }
      totalTranslated += r.translated || 0;
      const total = r.total || 0;
      const remaining = r.remaining || 0;
      const completed = total - remaining;
      logLine(`  ✅ +${r.translated}건 (누적 ${totalTranslated}) · 남은 ${remaining} · 요청 ${r.requested}`);
      if (bar && total) bar.style.width = Math.round((completed / total) * 100) + '%';
      if (st) st.textContent = `进度 ${completed}/${total} · 批次 ${batch} · 耗时 ${Math.round((Date.now()-started)/1000)}초`;
      if (r.done || r.translated === 0) break;
    }
    if (!window.__tbCancel) {
      logLine(`\n🎉 完成！ ${label} ${totalTranslated}개 翻译 (${batch}批次, ${Math.round((Date.now()-started)/1000)}초)`);
      toast(`${label} ${totalTranslated}条翻译完成`, 'ok');
      setTimeout(() => { closeModal(); renderView(); }, 1500);
    }
  } catch (e) {
    logLine(`❌ ${e.message}`);
    toast('翻译错误: '+e.message, 'err');
  }
}

async function upsertHook(payload, existing) {
  const s = await api('/api/settings');
  s.hooks = s.hooks || {};
  s.hooks[payload.event] = s.hooks[payload.event] || [];

  const newSubEntry = { type: payload.type, command: payload.command, timeout: payload.timeout };

  if (existing) {
    // 기존 修改
    const group = s.hooks[existing.event][existing.groupIdx];
    // 이벤트가 바뀐 경우 → 删除 후 새로 添加
    if (existing.event !== payload.event) {
      if (existing.subIdx >= 0 && group && group.hooks) {
        group.hooks.splice(existing.subIdx, 1);
        if (!group.hooks.length) s.hooks[existing.event].splice(existing.groupIdx, 1);
      } else if (group) {
        s.hooks[existing.event].splice(existing.groupIdx, 1);
      }
      addHookEntry(s, payload, newSubEntry);
    } else {
      // 같은 事件 안에서 修改
      if (existing.subIdx >= 0 && group.hooks) {
        group.matcher = payload.matcher || group.matcher;
        group.hooks[existing.subIdx] = newSubEntry;
      } else {
        s.hooks[existing.event][existing.groupIdx] = payload.matcher
          ? { matcher: payload.matcher, hooks: [newSubEntry] }
          : { ...newSubEntry };
      }
    }
  } else {
    addHookEntry(s, payload, newSubEntry);
  }

  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  toast(r.ok ? '钩子已保存' : ('失败: '+(r.error||'unknown')), r.ok?'ok':'err');
  if (r.ok) { closeModal(); renderView(); }
}

function addHookEntry(s, payload, newSubEntry) {
  const list = s.hooks[payload.event];
  if (payload.matcher) {
    // matcher 일치하는 기존 그룹에 합류 or 新分组
    const existingGroup = list.find(g => g.matcher === payload.matcher && Array.isArray(g.hooks));
    if (existingGroup) existingGroup.hooks.push(newSubEntry);
    else list.push({ matcher: payload.matcher, hooks: [newSubEntry] });
  } else {
    list.push({ hooks: [newSubEntry] });
  }
}

async function deleteHook(payload) {
  const {scope, event, groupIdx, subIdx, pluginKey} = payload || {};
  if (scope === 'plugin') {
    if (!confirm(t('确定删除插件钩子吗?') + ` (${pluginKey} → ${event}[${groupIdx}/${subIdx}])\n` + t('插件更新时可能会恢复。'))) return;
    const r = await api('/api/hooks/plugin/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pluginKey, event, groupIdx, subIdx, op:'delete' }),
    });
    toast(r.ok ? '插件钩子已删除' : ('失败: '+(r.error||'unknown')), r.ok?'ok':'err');
    return;
  }
  if (!confirm(t('删除此钩子吗?'))) return;
  const s = await api('/api/settings');
  if (!s.hooks || !s.hooks[event]) return;
  const group = s.hooks[event][groupIdx];
  if (!group) return;
  if (subIdx >= 0 && group.hooks) {
    group.hooks.splice(subIdx, 1);
    if (!group.hooks.length) s.hooks[event].splice(groupIdx, 1);
  } else {
    s.hooks[event].splice(groupIdx, 1);
  }
  if (!s.hooks[event].length) delete s.hooks[event];
  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  toast(r.ok ? '已删除' : ('失败: '+(r.error||'unknown')), r.ok?'ok':'err');
}

async function autoFixPermissions() {
  const s = await api('/api/settings');
  // 서버의 put_settings 가 자동 교정해서 保存
  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  if (r.ok) {
    const n = (r.fixed||[]).length;
    toast(n ? `✅ ${n}条规则已自动修正` : '无需修正', 'ok');
  } else toast('失败: ' + (r.error||'unknown'), 'err');
}

async function quickAddPerm(kind) {
  const inp = document.getElementById(`perm-${kind}-input`);
  const v = (inp.value || '').trim();
  if (!v) { toast('请输入规则', 'warn'); return; }
  await setPermAndSave(kind, 'add', v);
  inp.value = '';
}
async function addPermission(kind) {
  const v = prompt(`${kind==='allow'?'允许':'拒绝'} 请输入规则 (예: Bash(git status:*))`);
  if (!v) return;
  await setPermAndSave(kind, 'add', v.trim());
}
async function removePermission(kind, i) {
  await setPermAndSave(kind, 'remove', i);
}
async function setPermAndSave(kind, op, value) {
  const s = await api('/api/settings');
  s.permissions = s.permissions || { allow: [], deny: [] };
  s.permissions[kind] = s.permissions[kind] || [];
  if (op === 'add') {
    if (!s.permissions[kind].includes(value)) s.permissions[kind].push(value);
  } else if (op === 'remove') {
    s.permissions[kind].splice(value, 1);
  }
  const r = await api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(s) });
  toast(r.ok ? '已保存' : ('失败: '+(r.error||'unknown')), r.ok?'ok':'err');
  if (r.ok) renderView();
}

async function installMcp(id) {
  // 1) prepare — 필요한 env/值 조회
  const prep = await api('/api/mcp/install/prepare', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id })
  });
  if (prep.error) { toast(prep.error, 'err'); return; }
  const placeholders = prep.placeholders || [];

  // 2) 모달로 名称 + 각 env 值 输入
  const fieldHtml = placeholders.map(p => {
    const hint = p.hint || '';
    const example = {
      GITHUB_TOKEN: 'ghp_xxxxxxxxxxxxxxxxxxxx',
      GITHUB_PERSONAL_ACCESS_TOKEN: 'ghp_xxxxxxxxxxxxxxxxxxxx',
      PATH: '/Users/yoo/projects',
      PROJECT_ROOT: '/Users/yoo/my-project',
    }[p.key] || '';
    const isSecret = /TOKEN|KEY|SECRET|PASSWORD/i.test(p.key);
    return `
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">${escapeHtml(p.key)} ${isSecret?'<span class="chip chip-warn text-[9px]">secret</span>':''}</div>
        <input class="input mcp-ph-input" data-key="${escapeHtml(p.key)}" type="${isSecret?'password':'text'}" placeholder="${escapeHtml(example)}" />
        ${hint ? `<div class="text-[10px] text-[var(--text-dim)] mt-1">${escapeHtml(hint)}</div>` : ''}
        <div class="text-[10px] text-[var(--text-mute)] mt-1 mono truncate">where: ${escapeHtml(p.where)} · 원본: ${escapeHtml(p.raw||'')}</div>
      </div>`;
  }).join('');

  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <div>
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">＋ MCP 安装</div>
        <h2 class="text-lg font-bold">${escapeHtml(prep.name || id)}</h2>
      </div>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div class="p-5 space-y-3">
      <div>
        <div class="text-[11px] uppercase text-[var(--text-dim)] mb-1">등록할 名称</div>
        <input id="mcpAsName" class="input" value="${escapeHtml(id)}" />
      </div>
      ${placeholders.length ? `
        <div class="card p-3" style="background:rgba(251,191,36,0.08);">
          <div class="text-sm font-semibold mb-2">⚠️ 필수 值 ${placeholders.length}개 输入</div>
          <div class="space-y-3">${fieldHtml}</div>
        </div>` : '<div class="text-xs text-[var(--text-dim)]">无需额外配置即可安装.</div>'}
      <details class="text-[11px]">
        <summary class="cursor-pointer text-[var(--text-dim)]">📋 安装 spec 预览</summary>
        <pre class="mono text-[10px] whitespace-pre-wrap bg-[var(--code-bg)] p-2 rounded mt-2">${escapeHtml(JSON.stringify(prep.preview, null, 2))}</pre>
      </details>
    </div>
    <div class="p-4 border-t border-[var(--border)] flex justify-end gap-2">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn-primary btn" id="mcpInstallBtn">安装</button>
    </div>
  `);
  document.getElementById('mcpInstallBtn').onclick = async () => {
    const asName = document.getElementById('mcpAsName').value.trim() || id;
    const values = {};
    document.querySelectorAll('.mcp-ph-input').forEach(el => {
      const k = el.dataset.key; const v = el.value.trim();
      if (v) values[k] = v;
    });
    const missing = placeholders.filter(p => !values[p.key]).map(p => p.key);
    if (missing.length) { toast('缺少必填值: ' + missing.join(', '), 'warn'); return; }
    const r = await api('/api/mcp/install', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id, as: asName, values }),
    });
    if (r.ok) {
      toast(`'${r.name}' 已安装`, 'ok');
      closeModal();
    } else {
      toast(r.error || '失败', 'err');
    }
  };
}

function renderConnectorGroup(title, list, allowRemove) {
  const statusBadge = (m) => {
    if (m.connected === true) return '<span class="chip chip-ok text-[9px]" style="white-space:nowrap;">✓ 已连接</span>';
    if (m.needsAuth) return '<span class="chip chip-warn text-[9px]" style="white-space:nowrap;">🔐 需要认证</span>';
    if (m.connected === false) return '<span class="chip chip-err text-[9px]" style="white-space:nowrap;">✗ 失败</span>';
    return '';
  };
  return `
    <div class="card p-5 mb-4">
      <h3 class="font-semibold text-sm mb-3">${title} · ${list.length}</h3>
      <div class="grid-list">
        ${list.map(m => `
          <div class="card p-3 hover-lift" style="overflow:hidden;">
            <div class="flex items-center justify-between mb-2 gap-2">
              <div class="flex items-center gap-2 min-w-0 flex-1">
                <span class="pulse-dot ${m.connected===false?'off':''}"></span>
                <div class="font-semibold text-sm truncate" title="${escapeHtml(m.name)}">${escapeHtml(m.name)}</div>
              </div>
              <div class="flex items-center gap-1 flex-shrink-0">
                ${statusBadge(m)}
                ${m.scope === 'project' && m.projectCwd
                  ? `<button class="btn text-[10px]" style="color:#fca5a5" onclick="removeProjectMcp(JSON.parse(this.dataset.cwd), JSON.parse(this.dataset.name))" data-cwd="${jsonAttr(m.projectCwd)}" data-name="${jsonAttr(m.name)}">移除</button>`
                  : (allowRemove ? `<button class="btn text-[10px]" style="color:#fca5a5" onclick="removeMcp(JSON.parse(this.dataset.payload))" data-payload="${jsonAttr(m.name)}">移除</button>` : '')}
              </div>
            </div>
            ${m.endpoint ? `<div class="text-[10px] mono text-[var(--text-dim)] truncate" title="${escapeHtml(m.endpoint)}">${escapeHtml(m.endpoint)}</div>` : ''}
            ${(m.type || m.command) ? `<div class="text-[10px] mono text-[var(--text-dim)] truncate">${escapeHtml(m.type||'')} · ${escapeHtml(m.command||'')}</div>`:''}
            ${m.args && m.args.length ? `<div class="text-[10px] mono text-[var(--text-mute)] truncate mt-1">${escapeHtml(m.args.join(' '))}</div>`: ''}
            ${m.missingEnv && m.missingEnv.length ? `<div class="text-[10px] mt-2 p-1.5 rounded" style="background:rgba(248,113,113,0.1); color:#fca5a5;">⚠️ 환경변수 누락: ${m.missingEnv.map(k=>`<code class="mono">${escapeHtml(k)}</code>`).join(', ')}</div>` : ''}
            ${m.projectCwd ? `<div class="text-[10px] text-[var(--text-dim)] mt-1 truncate">📁 ${escapeHtml(m.projectCwd)}</div>` : ''}
            ${m.description ? `<div class="text-[10px] text-[var(--text-mute)] mt-1 line-clamp-2">${escapeHtml(m.description)}</div>` : ''}
          </div>
        `).join('') || `<div class="empty text-xs" style="grid-column:1/-1;">无</div>`}
      </div>
    </div>
  `;
}

}
async function saveSettings() {
  const t = document.getElementById('settingsEditor').value;

  try { parsed = JSON.parse(t); } catch (e) { toast('JSON 错误: ' + e.message, 'err'); return; }
  const r = await api('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(parsed) });
  toast(r.ok ? '已保存' : '保存失败', r.ok ? 'ok' : 'err');
}
function applyProfile(i) {
  // 구 버전 호환용 — editor에 직접 머지만 (保存 클릭 필요)
  const prof = (window.__recProfiles||[])[i];
  if (!prof) return;
  const cur = document.getElementById('settingsEditor');
  try {
    const existing = JSON.parse(cur.value || '{}');
    const merged = { ...existing, ...prof.settings, permissions: { ...(existing.permissions||{}), ...prof.settings.permissions } };
    cur.value = JSON.stringify(merged, null, 2);
    toast(`"${prof.name}" 配置已应用 — 点击保存确认`, 'info');
  } catch {
    cur.value = JSON.stringify(prof.settings, null, 2);
  }
}

// ── 추천 配置文件 3단계 应用 플로우 ──
async function startProfileFlow(i) {
  const prof = (window.__recProfiles||[])[i];
  if (!prof) return;

  // 스텝 1: Auth 确认 화면 (로딩)
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-center justify-between">
      <h2 class="font-semibold">추천 应用: ${escapeHtml(prof.name)}</h2>
      <button class="btn-ghost btn" onclick="closeModal()">✕</button>
    </div>
    <div id="profileFlowBody" class="p-5 flex-1 overflow-y-auto space-y-5">
      <div class="flex items-center gap-3">
        <div class="shimmer w-5 h-5 rounded-full"></div>
        <span class="text-sm">Claude 계정 연결 确认中…</span>
      </div>
    </div>
  `);

  let auth, preview;
  try {
    [auth, preview] = await Promise.all([
      api('/api/auth/status'),
      api('/api/settings/preview', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ patch: prof.settings }) }),
    ]);
  } catch (e) {
    document.getElementById('profileFlowBody').innerHTML = `<div class="empty text-sm">加载失败: ${escapeHtml(e.message)}</div>`;
    return;
  }

  const step1 = auth.connected
    ? `<div class="card p-4 flex items-center gap-3" style="border-color: rgba(74,222,128,0.35);">
         <div class="text-2xl">✅</div>
         <div class="flex-1">
           <div class="text-xs uppercase tracking-widest text-[var(--text-dim)]">1. 계정 연결</div>
           <div class="font-semibold text-sm">${escapeHtml(auth.displayName || auth.email)} · ${escapeHtml(auth.planLabel)}</div>
           <div class="text-xs text-[var(--text-mute)] mt-0.5">${escapeHtml(auth.email)} · 组织角色: ${escapeHtml(auth.organizationRole||'—')}</div>
         </div>
         <span class="chip chip-ok">已连接</span>
       </div>`
    : `<div class="card p-4 flex items-center gap-3" style="border-color: rgba(248,113,113,0.35);">
         <div class="text-2xl">❌</div>
         <div class="flex-1">
           <div class="text-xs uppercase tracking-widest text-[var(--text-dim)]">1. 계정 연결</div>
           <div class="font-semibold text-sm">未连接</div>
           <div class="text-xs text-[var(--text-mute)] mt-0.5">${escapeHtml(auth.reason||'Claude에 로그인되지 않음')}</div>
           <div class="text-xs mt-2 mono">在终端中 <code>claude login</code> 执行 후 다시 시도하세요.</div>
         </div>
       </div>`;

  const diff = preview.diff || {};
  const diffList = (arr, color) => arr.length
    ? `<ul class="text-xs space-y-0.5 mono">${arr.map(x=>`<li style="color:${color}">+ ${escapeHtml(x)}</li>`).join('')}</ul>`
    : '<div class="text-xs text-[var(--text-dim)]">无</div>';

  const step2 = `
    <div class="card p-4">
      <div class="text-xs uppercase tracking-widest text-[var(--text-dim)] mb-3">2. 更改 预览</div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <div class="text-[11px] font-semibold text-[var(--ok)] mb-1.5">✅ 추가될 允许 (${diff.addedAllow.length})</div>
          ${diffList(diff.addedAllow, '#86efac')}
        </div>
        <div>
          <div class="text-[11px] font-semibold text-[var(--err)] mb-1.5">🚫 추가될 拒绝 (${diff.addedDeny.length})</div>
          ${diffList(diff.addedDeny, '#fca5a5')}
        </div>
      </div>
      ${diff.topChanged.length ? `<div class="mt-3 text-xs"><span class="text-[var(--text-mute)]">다른 更改 키:</span> ${diff.topChanged.map(k=>`<code class="mono">${escapeHtml(k)}</code>`).join(', ')}</div>` : ''}
      <details class="mt-4">
        <summary class="cursor-pointer text-xs text-[var(--text-mute)]">全部 合并 결과 查看 (raw JSON)</summary>
        <pre class="mono text-[10px] whitespace-pre-wrap bg-[var(--code-bg)] p-3 rounded mt-2 max-h-[240px] overflow-y-auto">${escapeHtml(JSON.stringify(preview.merged, null, 2))}</pre>
      </details>
    </div>`;

  const step3 = `
    <div class="card p-4 flex items-center justify-between gap-3">
      <div>
        <div class="text-xs uppercase tracking-widest text-[var(--text-dim)] mb-1">3. 应用</div>
        <div class="text-sm">${diff.addedAllow.length + diff.addedDeny.length === 0 ? '此规则已存在 — 更改 无.' : '확인하고 settings.json 에 즉시 저장합니다.'}</div>
      </div>
      <div class="flex gap-2">
        <button class="btn" onclick="closeModal()">取消</button>
        <button id="profileApplyBtn" class="btn-primary btn" ${!auth.connected ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>💾 应用</button>
      </div>
    </div>`;

  document.getElementById('profileFlowBody').innerHTML = step1 + step2 + step3;

  const applyBtn = document.getElementById('profileApplyBtn');
  if (applyBtn && auth.connected) {
    applyBtn.onclick = async () => {
      applyBtn.disabled = true;
      applyBtn.textContent = '应用中…';
      try {
        const r = await api('/api/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(preview.merged),
        });
        if (r.ok) {
          toast(`"${prof.name}" 已应用`, 'ok');
          closeModal();
          renderView();
        } else {
          toast('保存失败: ' + (r.error||'未知'), 'err');
          applyBtn.disabled = false;
          applyBtn.textContent = '💾 应用';
        }
      } catch (e) {
        toast('失败: ' + e.message, 'err');
        applyBtn.disabled = false;
        applyBtn.textContent = '💾 应用';
      }
    };
  }
}

function scrollToSessions() {

async function openToolBreakdown(cwd) {
  showModalLoading(t('加载工具使用记录…'));
  try {
    const d = await api('/api/project/tool-breakdown?cwd=' + encodeURIComponent(cwd));
    if (d.error) { closeModal(); toast(d.error, 'err'); return; }
    const top = d.tools[0] ? d.tools[0].n : 1;
    const rows = d.tools.map(t => {
      const pct = Math.round((t.n / top) * 100);
      return `
        <div class="py-1.5 border-b border-[var(--border)]">
          <div class="flex justify-between items-center mb-1">
            <span class="mono text-xs truncate pr-2">${escapeHtml(t.tool)}</span>
            <span class="mono text-xs font-bold">${t.n}${t.errors ? ` <span class="text-[var(--err)]">✖${t.errors}</span>`:''}</span>
          </div>
          <div class="h-1 bg-white/5 rounded"><div style="width:${pct}%; height:100%; background:var(--grad); border-radius:inherit;"></div></div>
        </div>`;
    }).join('');
    showModal(`
      <div class="p-5 border-b border-[var(--border)] flex justify-between items-start">
        <div>
          <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">工具 사용 드릴다운</div>
          <h2 class="text-lg font-bold truncate">${escapeHtml(cwd)}</h2>
          <div class="text-xs text-[var(--text-mute)] mt-1">${d.sessionCount}개 세션에서 ${d.total}회 调用 · ${d.tools.length}종 工具</div>

        <button class="btn-ghost btn" onclick="closeModal()">✕</button>
      </div>
      <div class="flex-1 overflow-y-auto p-5">

      </div>
    `);
  } catch (e) {
    closeModal(); toast(e.message, 'err');
  }
}

          <div id="aiRecProgress" class="text-[10px] mono text-[var(--text-dim)] mt-1">요청 发送 중…</div>

      </div>

  // 간단한 进度 显示 (실제 스트리밍은 아님 — 耗时 초만 업데이트)
  const started = Date.now();
  const tick = setInterval(() => {
    const p = document.getElementById('aiRecProgress');
    if (p) p.textContent = `耗时 ${Math.round((Date.now()-started)/1000)}초 · claude CLI 响应 대기…`;
  }, 1000);

  try {
    const r = await api('/api/project/ai-recommend', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ cwd, lang: _curLang })
    });
    clearInterval(tick);
    if (r.error) {
      slot.innerHTML = `
        <div class="p-5 border-b border-[var(--border)]">
          <div class="card p-4" style="border-color: rgba(248,113,113,0.4);">
            <div class="font-semibold text-sm text-[var(--err)] mb-1">❌ AI推荐 失败</div>
            <div class="text-xs text-[var(--text-mute)]">${escapeHtml(r.error)}</div>
            ${r.rawResponse ? `<details class="mt-2"><summary class="text-xs cursor-pointer">원본 响应 查看</summary><pre class="mono text-[10px] whitespace-pre-wrap bg-[var(--code-bg)] p-2 rounded mt-2 max-h-[260px] overflow-y-auto">${escapeHtml(r.rawResponse)}</pre></details>`:''}
            <button class="btn mt-3 text-xs" onclick='startAiRecommend(${JSON.stringify(cwd)})'>重试</button>
          </div>
        </div>`;

    slot.innerHTML = `<div class="p-5"><div class="card p-4"><div class="text-[var(--err)]">失败: ${escapeHtml(e.message)}</div></div></div>`;

async function openAiRecEditor(recId) {
  const rec = (window.__aiRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__aiCwd || '';
  const isGlobal = rec.relpath === '~/.claude/settings.json';

  // 기존 文件 읽기
  let currentRaw = '';
  try {
    if (isGlobal) {
      const s = await api('/api/settings');
      currentRaw = JSON.stringify(s || {}, null, 2);
    } else if (rec.relpath === 'CLAUDE.md' && cwd) {
      const d = await api('/api/project/detail?cwd=' + encodeURIComponent(cwd));
      currentRaw = (d.repo && d.repo.claudeMd) || '';
    } else {
      // 项目-로컬 文件 존재시 대략적으로: project/detail 에는 없으니 시도 생략, 빈값 显示
      currentRaw = '';
    }
  } catch {}

  const saveFn = async (newRaw) => {
    if (isGlobal) {
      let parsed; try { parsed = JSON.parse(newRaw); } catch (e) { return {ok:false, error: 'JSON: '+e.message}; }
      return api('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(parsed) });
    }
    return api('/api/project/file', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath: rec.relpath, raw: newRaw }),
    });
  };

  openDiffApplyModal({
    title: rec.title,
    relpath: rec.relpath,
    reason: rec.reason,
    cwd,
    currentRaw, proposedRaw: rec.content || '',
    saveFn,
    badge: '🤖 AI推荐',
  });
}

/**
 * 좌(当前) / 우(제안) 2-컬럼 diff + 각 컬럼 에디터 + 应用/건너뛰기 / 合并 保存 UX.
 */
function openDiffApplyModal({ title, relpath, reason, cwd, currentRaw, proposedRaw, saveFn, badge }) {
  const isEmpty = !currentRaw || !currentRaw.trim();
  const hintEmpty = isEmpty ? '<span class="chip chip-warn">无文件 / 빈값</span>' : '';
  showModal(`
    <div class="p-5 border-b border-[var(--border)] flex items-start justify-between gap-3 flex-shrink-0">
      <div class="min-w-0 flex-1">
        <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">${badge || '추천 비교 & 应用'}</div>
        <h2 class="text-lg font-bold truncate">${escapeHtml(title||'')}</h2>
        <div class="flex items-center gap-2 mt-1 flex-wrap">
          <span class="text-[11px] mono text-[var(--text-mute)] truncate">${escapeHtml(relpath||'')}</span>
          ${hintEmpty}
        </div>
        ${reason ? `<div class="text-xs text-[var(--text-mute)] mt-2 line-clamp-2"><b>依据:</b> ${escapeHtml(reason)}</div>` : ''}
      </div>
      <div class="flex gap-2 flex-shrink-0">
        <button class="btn" onclick="closeModal()">건너뛰기</button>
        <button class="btn" id="diffUseLeftBtn">◀ 좌측(현재값) 유지</button>
        <button class="btn-primary btn" id="diffUseRightBtn">우측(제안) 应用 ▶</button>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2" style="flex:1 1 0; min-height:0; overflow:hidden;">
      <div class="flex flex-col border-r border-[var(--border)]" style="min-height:0; overflow:hidden;">
        <div class="px-4 py-2 border-b border-[var(--border)] flex items-center justify-between flex-shrink-0">
          <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">当前 (왼쪽)</div>
          <span class="chip text-[10px]">${isEmpty ? '비어있음' : (currentRaw.length + '자')}</span>
        </div>
        <textarea id="diffLeftText" spellcheck="false" class="mono" style="flex:1 1 0; min-height:0; width:100%; padding:16px; border-radius:0; border:none; background:transparent; resize:none; color:var(--text); font-size:13px; line-height:1.55; outline:none;">${escapeHtml(currentRaw||'')}</textarea>
      </div>
      <div class="flex flex-col" style="background: rgba(217,119,87,0.04); min-height:0; overflow:hidden;">
        <div class="px-4 py-2 border-b border-[var(--border)] flex items-center justify-between flex-shrink-0">
          <div class="text-[11px] uppercase tracking-widest text-[var(--text-dim)]">제안 (오른쪽) · AI</div>
          <span class="chip chip-accent text-[10px]">${(proposedRaw||'').length}자</span>
        </div>
        <textarea id="diffRightText" spellcheck="false" class="mono" style="flex:1 1 0; min-height:0; width:100%; padding:16px; border-radius:0; border:none; background:transparent; resize:none; color:var(--text); font-size:13px; line-height:1.55; outline:none;">${escapeHtml(proposedRaw||'')}</textarea>
      </div>
    </div>
    <div class="p-3 border-t border-[var(--border)] flex items-center justify-between text-[11px] text-[var(--text-dim)] flex-shrink-0 flex-wrap gap-2">
      <div>保存 위치: <span class="mono">${relpath==='~/.claude/settings.json' ? relpath : escapeHtml((cwd||'')+'/'+(relpath||''))}</span></div>
      <div>自由编辑两侧后选择保存哪一侧. · <kbd class="chip text-[9px]">Esc</kbd> 关闭</div>
    </div>
  `, { wide: true });

  const commit = async (which) => {
    const raw = (which === 'left' ? document.getElementById('diffLeftText') : document.getElementById('diffRightText')).value;
    try {
      const r = await saveFn(raw);
      toast(r.ok ? `已保存 (${which==='left'?'保留当前值':'应用建议'})` : ('失败: '+(r.error||'unknown')), r.ok?'ok':'err');
      if (r.ok) { closeModal(); renderView(); }
    } catch (e) { toast('失败: '+e.message, 'err'); }
  };
  document.getElementById('diffUseLeftBtn').onclick = () => commit('left');
  document.getElementById('diffUseRightBtn').onclick = () => commit('right');
}

async function appendAiRecClaudeMd(recId) {
  const rec = (window.__aiRecs || {})[recId];
  if (!rec) return;
  const cwd = window.__aiCwd || '';
  try {
    const d = await api('/api/project/detail?cwd=' + encodeURIComponent(cwd));
    const existing = (d.repo && d.repo.claudeMd) || '';
    const merged = (existing ? existing.replace(/\s+$/, '') : `# ${d.name}`) + '\n' + rec.content;
    const r = await api('/api/project/file', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, relpath:'CLAUDE.md', raw: merged }),
    });
    toast(r.ok ? 'CLAUDE.md已更新' : (r.error||'失败'), r.ok?'ok':'err');
  } catch (e) { toast('失败: '+e.message, 'err'); }
}

// PROJECT SUBAGENTS (역할 카탈로그 + 프로젝트별 관리)
// ────────────────────────────────────────────────────────────────
VIEWS.projectAgents = async () => {
  const projects = await api('/api/projects');
  const validProjects = projects.projects.filter(p => p.cwdResolved && p.path);
  if (!state.data.paCwd || !validProjects.find(p => p.path === state.data.paCwd)) {
    state.data.paCwd = validProjects[0]?.path || '';
  }
  const cwd = state.data.paCwd;
  const [rolesRes, listRes, modelRes] = await Promise.all([
    api('/api/project-agents/roles'),
    cwd ? api('/api/project-agents/list?cwd=' + encodeURIComponent(cwd)) : Promise.resolve({ agents: [], dirExists: false }),
    api('/api/subagent/model-choices'),
  ]);
  window.__subModelChoices = modelRes.choices || [];
  const roles = rolesRes.roles || [];
  const existingAgents = listRes.agents || [];
  const existingIds = new Set(existingAgents.map(a => a.id));

async function paRefreshViz() {
  const container = document.getElementById('paNetwork');
  if (!container || !window.vis) return;
  const cwd = window.__paCwd;
  if (!cwd) return;
  const r = await api('/api/project-agents/list?cwd=' + encodeURIComponent(cwd));
  const agents = r.agents || [];
  if (!agents.length) return;

  const nodes = new vis.DataSet([
    {
      id: '__claude', label: 'Claude', shape: 'hexagon', size: 34,
      color: { background: '#d97757', border: '#c96442', highlight: { background: '#c96442', border: '#f5b997' } },
      font: { color: '#000', size: 13, bold: true },
    },
    ...agents.map(a => ({
      id: a.id, label: a.name, shape: 'dot', size: 22,
      color: { background: 'rgba(217,119,87,0.18)', border: '#d97757', highlight: { background: '#d97757', border: '#ffffff' } },
      font: { color: '#f5f5f5', size: 11 },
      title: (a.description || '').slice(0, 120),
    })),
  ]);
  const edges = new vis.DataSet(agents.map(a => ({
    from: '__claude', to: a.id,
    color: { color: 'rgba(217,119,87,0.35)', highlight: '#d97757', opacity: 0.7 },
    arrows: 'to', smooth: { type: 'continuous' },
  })));
  const net = new vis.Network(container, { nodes, edges }, {
    physics: {
      enabled: true,
      barnesHut: { gravitationalConstant: -2500, springLength: 130, springConstant: 0.05 },
      stabilization: { iterations: 220, fit: true },
    },
    interaction: { hover: true, selectable: true, tooltipDelay: 120, zoomView: false, dragView: true, dragNodes: true },
  });
  container.style.cursor = 'pointer';
  net.once('stabilizationIterationsDone', () => {
    try { net.setOptions({ physics: { enabled: false } }); net.fit({ animation: false }); } catch {}
  });
  const handlePa = (id) => {
    if (id === '__claude') return;
    const ag = agents.find(x => x.id === id);
    if (ag) paEdit(ag.name);
  };
  net.on('click', params => { if (params.nodes && params.nodes.length) handlePa(params.nodes[0]); });
  net.on('selectNode', params => { if (params.nodes && params.nodes.length) handlePa(params.nodes[0]); });
}
AFTER.projectAgents = () => { setTimeout(paRefreshViz, 50); };

async function paEdit(name) {
  const cwd = window.__paCwd || '';
  const r = await api('/api/project-agents/list?cwd=' + encodeURIComponent(cwd));
  const ag = (r.agents || []).find(x => x.name === name || x.id === name);
  if (!ag) { toast('未找到', 'err'); return; }
  showEditModal({
    title: `项目代理 编辑 — ${ag.name}`,
    raw: ag.raw,
    save: async (v) => api('/api/project-agents/save', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cwd, name: ag.id, raw: v })
    }),
  });
}
async function paDelete(name) {
  if (!confirm(`'${name}' ` + t('删除代理吗?') + ` (.claude/agents/${name}.md ` + t('移除') + `)`)) return;
  const cwd = window.__paCwd || '';
  const r = await api('/api/project-agents/delete', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ cwd, name }),
  });
  if (r.ok) { toast('已删除', 'ok'); renderView(); }
  else toast(r.error || '失败', 'err');
}

async function setSubagentModel(scope, agentId, model, cwd) {
  const payload = { scope, agentId, model };
  if (scope === 'project') payload.cwd = cwd || window.__paCwd || '';
  try {
    const r = await api('/api/subagent/set-model', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    if (r.ok) { toast(`已将模型更改为 '${model}' `, 'ok'); renderView(); }
    else toast(r.error || '失败', 'err');
  } catch (e) { toast('失败: '+e.message, 'err'); }
}

async function openScoreDetail(keyOrObj) {
  // 호환: 문자열(구 调用) 또는 {cwd, projectDir}
  let cwd = '', projectDir = '';
  if (typeof keyOrObj === 'string') { projectDir = keyOrObj; }
  else { cwd = keyOrObj.cwd || ''; projectDir = keyOrObj.projectDir || ''; }
  const qs = new URLSearchParams();
  if (cwd) qs.set('cwd', cwd);
  if (projectDir) qs.set('projectDir', projectDir);
  showModalLoading(t('计算评分详情中…'));
  try {
    const d = await api('/api/project/score-detail?' + qs.toString());
    if (d.error) { toast(d.error, 'err'); closeModal(); return; }
    renderScoreDetail(d);
  } catch (e) {
    closeModal(); toast(e.message, 'err');
  }
